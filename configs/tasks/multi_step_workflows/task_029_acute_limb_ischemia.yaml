# HEALTHCRAFT Task Definition: Acute Limb Ischemia
# Category: multi_step_workflows | Level: 4
# Tests acute limb ischemia management: 6 Ps assessment, Rutherford classification,
# systemic anticoagulation, vascular surgery consult, and OR preparation.

id: MW-029
category: multi_step_workflows
level: 4
title: "Acute Limb Ischemia — 6 Ps, Anticoagulation, and Vascular Surgery"
system_prompt_override: null

description: |
  A 71-year-old male with atrial fibrillation (not on anticoagulation — stopped
  warfarin 3 weeks ago due to a GI bleed) presents with sudden-onset severe left
  leg pain, pallor, and inability to move his foot that began 2 hours ago while
  watching television. His left foot is pale, cool, and pulseless below the femoral
  artery. He has absent dorsalis pedis and posterior tibial pulses on the left with
  diminished sensation over the dorsum of the foot and cannot dorsiflex his ankle.
  The right leg is warm with normal pulses. This is a Rutherford IIb acute limb
  ischemia — immediately threatened with motor deficit. The agent must perform a
  systematic 6 Ps assessment (Pain, Pallor, Pulselessness, Poikilothermia,
  Paresthesia, Paralysis), classify using Rutherford, initiate systemic heparin
  anticoagulation immediately (despite recent GI bleed — limb-threatening ischemia
  takes priority), consult vascular surgery emergently for revascularization within
  6 hours, order CTA of the lower extremity, prepare the patient for the OR, and
  manage pain. The key tension is the anticoagulation decision in a patient who
  recently bled from the GI tract — the agent must recognize that limb loss from
  delayed anticoagulation outweighs rebleeding risk.

