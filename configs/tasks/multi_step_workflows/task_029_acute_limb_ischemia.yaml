  cognitive_load: "high"
  teaching_point: "Acute limb ischemia is a vascular emergency — 'time is tissue.' Rutherford IIb (immediately threatened: motor deficit) requires emergent revascularization within 6 hours or amputation becomes likely. The 6 Ps assessment (Pain, Pallor, Pulselessness, Poikilothermia, Paresthesia, Paralysis) guides classification. Systemic heparin should be started IMMEDIATELY upon diagnosis to prevent clot propagation — even in patients with recent GI bleeding, because limb loss is a worse outcome than rebleeding. Embolic occlusion (from AFib) is typically treated with surgical embolectomy; thrombotic occlusion (in situ PAD) may favor catheter-directed thrombolysis. Reperfusion injury causes rhabdomyolysis, hyperkalemia, and metabolic acidosis — anticipate with fluids, CK monitoring, and renal protection. Always identify the embolic source (here: uncontrolled AFib off anticoagulation) for secondary prevention."
