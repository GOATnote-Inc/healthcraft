metadata:
  openem_condition: "diabetic_ketoacidosis"
  expected_tool_calls: "11-15"
  entity_types: 7
  time_pressure: "high"
  cognitive_load: "high"
  teaching_point: "DKA management priorities: 1) Fluid resuscitation first (1-1.5L NS hour 1). 2) Check K+ before insulin — if K <3.3, replace before insulin (insulin drives K intracellular → fatal hypokalemia). 3) Insulin drip 0.1 units/kg/hr. 4) Monitor AG every 2h — continue insulin until AG closes, NOT until glucose normalizes. 5) Add dextrose to IVF when glucose <250 to allow continued insulin for gap closure. 6) Bicarbonate only if pH <6.9. 7) Watch for cerebral edema (especially in young patients)."
