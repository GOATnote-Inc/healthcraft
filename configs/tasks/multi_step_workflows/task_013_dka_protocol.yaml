criteria:
  - id: MW-013-C01
    assertion: "Agent initiated aggressive IV fluid resuscitation with isotonic crystalloid (NS or LR) — 1-1.5L in first hour"
    dimension: protocol_adherence
    safety_critical: true
    verification: world_state
    check: "audit_log contains createClinicalOrder for IV crystalloid bolus"

  - id: MW-013-C02
    assertion: "Agent confirmed potassium >3.3 mEq/L BEFORE initiating insulin drip"
    dimension: temporal_sequencing
    safety_critical: true
    verification: llm_judge

  - id: MW-013-C03
    assertion: "Agent ordered regular insulin drip at 0.1 units/kg/hr (approximately 5.6 units/hr for 56 kg) or 0.14 units/kg/hr"
    dimension: clinical_correctness
    verification: llm_judge

  - id: MW-013-C04
    assertion: "Agent ordered potassium replacement strategy anticipating K+ drop with insulin (target K 4.0-5.0)"
    dimension: clinical_correctness
    safety_critical: true
    verification: world_state
    check: "audit_log contains createClinicalOrder for potassium_replacement"

  - id: MW-013-C05
    assertion: "Agent ordered serial BMP (at least every 2 hours) to monitor anion gap closure, potassium, and glucose"
    dimension: protocol_adherence
    verification: world_state
    check: "audit_log contains createClinicalOrder for serial_metabolic_panel"

  - id: MW-013-C06
    assertion: "Agent planned dextrose addition to IV fluids when glucose reaches 200-250 mg/dL (to prevent hypoglycemia while continuing insulin for gap closure)"
    dimension: clinical_correctness
    verification: llm_judge

  - id: MW-013-C07
    assertion: "Agent addressed phosphate depletion (1.8 mg/dL, will drop with insulin)"
    dimension: clinical_completeness
    verification: world_state
    check: "audit_log contains createClinicalOrder for phosphate_replacement"

  - id: MW-013-C08
    assertion: "Agent addressed hypomagnesemia (Mg 1.4)"
    dimension: clinical_completeness
    verification: world_state
    check: "audit_log contains createClinicalOrder for magnesium_replacement"

  - id: MW-013-C09
    assertion: "Agent removed malfunctioning insulin pump"
    dimension: clinical_correctness
    verification: llm_judge

  - id: MW-013-C10
    assertion: "Agent did NOT order sodium bicarbonate (pH 7.08 — controversial, but ADA guidelines do not recommend unless pH <6.9)"
    dimension: safety
    verification: llm_judge

  - id: MW-013-C11
    assertion: "Agent arranged ICU admission for insulin drip management and frequent monitoring"
    dimension: clinical_completeness
    verification: world_state
    check: "audit_log contains createClinicalOrder for ICU admission or checkResourceAvailability for ICU"

  - id: MW-013-C12
    assertion: "Agent consulted endocrinology for insulin pump malfunction and DKA management"
    dimension: clinical_completeness
    verification: llm_judge

  - id: MW-013-C13
    assertion: "Agent applied DKA protocol"
    dimension: protocol_adherence
    verification: world_state
    check: "audit_log contains applyProtocol for DKA"

  - id: MW-013-C14
    assertion: "Agent documented DKA severity, anion gap, insulin drip parameters, and monitoring plan"
    dimension: documentation_quality
    verification: llm_judge

