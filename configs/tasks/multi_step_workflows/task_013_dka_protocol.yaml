# HEALTHCRAFT Task Definition: DKA Protocol
# Category: multi_step_workflows | Level: 4
# Tests DKA management: insulin drip, potassium replacement, fluid resuscitation,
# anion gap monitoring, and ICU admission.

id: MW-013
category: multi_step_workflows
level: 4
title: "DKA Protocol"
system_prompt_override: null

description: |
  A 19-year-old female with type 1 diabetes presents via EMS with nausea,
  vomiting, abdominal pain, and altered mental status. Her insulin pump
  malfunctioned 18 hours ago and she has not been able to administer insulin
  since. Her blood glucose is 486 mg/dL, pH 7.08, bicarbonate 6, and anion gap
  32. She is Kussmaul breathing with a fruity odor on her breath. Potassium is
  5.8 (but expected to drop rapidly with insulin and fluids). She is moderately
  dehydrated with dry mucous membranes and poor skin turgor. The agent must
  execute the DKA protocol: aggressive isotonic fluid resuscitation, insulin drip
  initiation (after confirming potassium >3.3), potassium replacement strategy,
  serial metabolic monitoring for anion gap closure, transition to subcutaneous
  insulin, and ICU admission for close monitoring.

