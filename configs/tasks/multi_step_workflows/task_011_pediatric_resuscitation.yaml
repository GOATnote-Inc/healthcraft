    ionized_calcium: "0.92 mmol/L (low)"
  timeline:
    submersion_discovered: "2026-02-10T16:15:00Z"
    bystander_cpr_started: "2026-02-10T16:17:00Z"
    ems_dispatch: "2026-02-10T16:16:00Z"
    ems_arrival_scene: "2026-02-10T16:22:00Z"
    brief_rosc: "2026-02-10T16:28:00Z"
