  facility: "Mercy Point Emergency Department"
  time: "2026-02-10T16:42:00Z"
  department: "Pediatric Resuscitation Bay"
  census: 34
  beds_available: 20
  attending_on_duty: "Dr. Sarah Chen"
  specialist_availability:
    pediatric_intensivist: "Dr. Amy Lin — on-call, 10-minute response"
    pediatric_surgery: "on-call, 20-minute response"
    social_work: "in-house, available"
    chaplain: "in-house, available"
  equipment:
    broselow_tape: "at bedside"
    pediatric_crash_cart: "at bedside"
    pediatric_io_kit: "available"
    warming_blankets: "available"
    bair_hugger: "available"

