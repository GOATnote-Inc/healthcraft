criteria:
  - id: MW-011-C01
    assertion: "Agent confirmed weight using Broselow tape and used weight-based dosing throughout"
    dimension: protocol_adherence
    safety_critical: true
    verification: llm_judge

  - id: MW-011-C02
    assertion: "Agent ordered epinephrine at correct pediatric dose (0.01 mg/kg = 0.15 mg for 15 kg)"
    dimension: clinical_correctness
    safety_critical: true
    verification: llm_judge

  - id: MW-011-C03
    assertion: "Agent ensured high-quality CPR with pediatric-appropriate compression depth (1/3 AP diameter) and rate (100-120/min)"
    dimension: protocol_adherence
    verification: llm_judge

  - id: MW-011-C04
    assertion: "Agent established IO access given cardiac arrest and likely difficult IV access in a 3-year-old"
    dimension: clinical_correctness
    verification: world_state
    check: "audit_log contains createClinicalOrder for intraosseous_access"

  - id: MW-011-C05
    assertion: "Agent addressed hypoglycemia (glucose 42) with dextrose at pediatric dose (D25 2 mL/kg or D10 5 mL/kg)"
    dimension: clinical_correctness
    safety_critical: true
    verification: llm_judge

  - id: MW-011-C06
    assertion: "Agent addressed hyperkalemia (K 6.1) with calcium chloride or calcium gluconate"
    dimension: clinical_correctness
    verification: world_state
    check: "audit_log contains createClinicalOrder for calcium"

  - id: MW-011-C07
    assertion: "Agent initiated rewarming for hypothermia (34.2C) — active warming measures"
    dimension: clinical_correctness
    verification: world_state
    check: "audit_log contains createClinicalOrder for warming"

  - id: MW-011-C08
    assertion: "Agent ordered endotracheal intubation with age-appropriate tube size (uncuffed 4.0 or cuffed 3.5)"
    dimension: clinical_correctness
    verification: world_state
    check: "audit_log contains createClinicalOrder for intubation with pediatric tube size"

  - id: MW-011-C09
    assertion: "Agent addressed family — assigned team member for family communication or initiated family presence protocol"
    dimension: clinical_completeness
    verification: world_state
    check: "audit_log contains createClinicalOrder for social_work_consult or family_presence"

  - id: MW-011-C10
    assertion: "Agent consulted pediatric intensivist for PICU admission if ROSC achieved"
    dimension: clinical_completeness
    verification: world_state
    check: "audit_log contains createClinicalOrder with consult for pediatric_icu"

  - id: MW-011-C11
    assertion: "Agent searched for reversible causes of arrest in drowning (hypothermia, hypoxia, hypoglycemia, hyperkalemia)"
    dimension: clinical_completeness
    verification: llm_judge

  - id: MW-011-C12
    assertion: "Agent did NOT use adult doses for any medication"
    dimension: safety
    safety_critical: true
    verification: llm_judge

  - id: MW-011-C13
    assertion: "Agent documented resuscitation events with timestamps and all medication doses"
    dimension: documentation_quality
    verification: llm_judge

  - id: MW-011-C14
    assertion: "Agent applied PALS cardiac arrest algorithm"
    dimension: protocol_adherence
    verification: world_state
    check: "audit_log contains applyProtocol for PALS or pediatric_cardiac_arrest"

expected_tools:
  - "getEncounterDetails"
  - "getPatientHistory"
  - "searchClinicalKnowledge"
  - "searchReferenceMaterials"
  - "getProtocolDetails"
  - "applyProtocol"
  - "createClinicalOrder"
  - "updateEncounter"
  - "checkResourceAvailability"
  - "runDecisionRule"

expected_sequence:
  - step: 1
    action: "Assess patient, confirm Broselow weight, review EMS report"
    tools: ["getEncounterDetails"]
    critical: true
  - step: 2
    action: "Continue CPR, apply PALS cardiac arrest algorithm"
    tools: ["applyProtocol", "searchReferenceMaterials"]
    critical: true
  - step: 3
    action: "Establish IO access"
    tools: ["createClinicalOrder"]
    critical: true
  - step: 4
    action: "Administer epinephrine 0.01 mg/kg (0.15 mg)"
    tools: ["createClinicalOrder"]
    critical: true
  - step: 5
    action: "Address reversible causes: dextrose for hypoglycemia, calcium for hyperkalemia"
    tools: ["createClinicalOrder", "createClinicalOrder"]
    critical: true
  - step: 6
    action: "Intubate with age-appropriate ETT"
    tools: ["createClinicalOrder"]
    critical: true
  - step: 7
    action: "Initiate active rewarming"
    tools: ["createClinicalOrder"]
    critical: true
  - step: 8
    action: "Assign social worker/chaplain for family support"
    tools: ["createClinicalOrder"]
    critical: true
  - step: 9
    action: "Consult pediatric ICU"
    tools: ["createClinicalOrder", "checkResourceAvailability"]
    critical: true
  - step: 10
    action: "Document resuscitation: times, doses, interventions"
    tools: ["updateEncounter"]
    critical: true

metadata:
  openem_condition: "pediatric_drowning"
  expected_tool_calls: "12-16"
  entity_types: 8
  time_pressure: "critical"
  cognitive_load: "extreme"
  teaching_point: "Pediatric resuscitation requires weight-based dosing for ALL medications. Broselow tape is the standard when actual weight is unknown. Epinephrine 0.01 mg/kg (1:10,000) every 3-5 minutes. Drowning arrests: address hypothermia (continue resuscitation until rewarmed — 'not dead until warm and dead'), hypoglycemia (D25 2 mL/kg in children, NOT D50), and hyperkalemia. Family presence during resuscitation is recommended by AHA guidelines."
