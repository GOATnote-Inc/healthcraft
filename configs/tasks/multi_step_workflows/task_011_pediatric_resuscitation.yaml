# HEALTHCRAFT Task Definition: Pediatric Resuscitation
# Category: multi_step_workflows | Level: 5
# Tests pediatric emergency management: weight-based dosing, Broselow tape,
# PALS algorithm, family communication, and pediatric-specific considerations.

id: MW-011
category: multi_step_workflows
level: 5
title: "Pediatric Resuscitation"
system_prompt_override: null

description: |
  A 3-year-old male (approximately 15 kg per Broselow tape — yellow zone) is
  brought in by frantic parents after a witnessed submersion event. The child
  was found face-down in the family pool, estimated submersion time 3-5 minutes.
  Bystander CPR was initiated by the father. EMS reports the child was apneic
  and pulseless on arrival, received BVM ventilation and CPR en route, with brief
  return of pulse in the ambulance followed by re-arrest. He arrives with ongoing
  CPR, a heart rate of 30 bpm (PEA), temperature 34.2C, and fixed dilated pupils.
  The agent must execute the PALS bradycardia/PEA algorithm with weight-based
  dosing, manage hypothermic drowning, coordinate family communication, and make
  difficult prognostic decisions.

