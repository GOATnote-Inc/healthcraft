# HEALTHCRAFT Task Definition: Eclampsia Protocol
# Category: multi_step_workflows | Level: 5
# Tests eclampsia management: magnesium sulfate, seizure control, blood pressure
# management, fetal monitoring, and emergent delivery coordination.

id: MW-025
category: multi_step_workflows
level: 5
title: "Obstetric Emergency — Eclampsia Protocol"
system_prompt_override: null

description: |
  A 26-year-old primigravida at 34 weeks gestation is brought by EMS after a
  witnessed generalized tonic-clonic seizure at home. Her husband reports she has
  had worsening headaches and visual changes ("seeing spots") for 2 days, and her
  feet have been severely swollen. She saw her OB 5 days ago and was told her
  blood pressure was "a little high" (152/96 per her husband) but no intervention
  was started. On arrival she is postictal (GCS 10), BP is 198/118, HR 108, SpO2
  94%, and she has 3+ pitting edema bilateral lower extremities and facial edema.
  Urine protein is 4+ on dipstick. Platelets are 82,000 and LDH is 648 — raising
  concern for HELLP syndrome. Fetal heart tones are present at 148 bpm with
  minimal variability. The agent must administer magnesium sulfate for seizure
  prophylaxis, control severe-range blood pressure, evaluate for HELLP syndrome,
  coordinate emergent OB consult for likely cesarean delivery, and manage both
  maternal and fetal concerns simultaneously.

