metadata:
  openem_condition: "eclampsia"
  expected_tool_calls: "14-20"
  entity_types: 8
  time_pressure: "critical"
  cognitive_load: "extreme"
  teaching_point: "Eclampsia = seizure in the setting of preeclampsia. Magnesium sulfate is the FIRST-LINE treatment and prophylaxis — not phenytoin, not benzodiazepines. Loading dose 4-6g IV over 15-20 minutes, then 1-2g/hr maintenance. Severe-range hypertension (>= 160/110) must be treated within 30-60 minutes with IV labetalol or hydralazine. HELLP syndrome (Hemolysis, Elevated Liver enzymes, Low Platelets) is an indication for delivery regardless of gestational age. Definitive treatment for eclampsia is delivery. Betamethasone for fetal lung maturity if < 37 weeks."
