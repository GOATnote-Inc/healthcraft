    pelvis_xray: "No fractures"
  labs:
    cbc: "WBC 10.2, Hgb 14.8, Plt 240"
    bmp: "Within normal limits"
    coags: "PT 12.0, INR 1.0"
    type_and_screen: "O positive, antibody screen negative"
  timeline:
