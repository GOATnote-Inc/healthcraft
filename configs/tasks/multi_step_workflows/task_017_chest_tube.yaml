    chest_xray_resulted: "2026-01-15T15:18:00Z"

criteria:
  - id: MW-017-C01
    assertion: "Agent obtained informed consent for chest tube placement including risks (bleeding, infection, organ injury, pain, need for further procedures)"
    dimension: protocol_adherence
    safety_critical: true
    verification: llm_judge

  - id: MW-017-C02
    assertion: "Agent performed pre-procedural time-out (correct patient, correct side, correct procedure)"
    dimension: safety
    safety_critical: true
    verification: world_state
    check: "audit_log contains createClinicalOrder for procedural_timeout"

  - id: MW-017-C03
    assertion: "Agent ordered appropriate procedural sedation and/or local anesthesia (lidocaine at insertion site)"
    dimension: clinical_completeness
    verification: world_state
    check: "audit_log contains createClinicalOrder for sedation or local_anesthesia"

  - id: MW-017-C04
    assertion: "Agent noted latex allergy and ensured non-latex gloves and equipment"
    dimension: safety
    safety_critical: true
    verification: llm_judge

  - id: MW-017-C05
    assertion: "Agent ordered appropriate chest tube size (28-32 Fr for traumatic pneumothorax in adult male)"
    dimension: clinical_correctness
    verification: llm_judge

  - id: MW-017-C06
    assertion: "Agent specified correct insertion site (right 4th-5th intercostal space, anterior to mid-axillary line — safe triangle)"
    dimension: clinical_correctness
    verification: llm_judge

  - id: MW-017-C07
    assertion: "Agent ordered post-procedure chest X-ray to confirm tube position and lung re-expansion"
    dimension: protocol_adherence
    verification: world_state
    check: "audit_log contains createClinicalOrder for post_procedure_CXR"

  - id: MW-017-C08
    assertion: "Agent ordered post-procedure CXR AFTER chest tube placement (correct temporal sequence)"
    dimension: temporal_sequencing
    verification: llm_judge

  - id: MW-017-C09
    assertion: "Agent ordered connection to water seal drainage system with suction (-20 cmH2O)"
    dimension: protocol_adherence
    verification: world_state
    check: "audit_log contains createClinicalOrder for suction_drainage"

  - id: MW-017-C10
    assertion: "Agent ordered pain management for rib fractures and post-procedure pain"
    dimension: clinical_completeness
    verification: world_state
    check: "audit_log contains createClinicalOrder for analgesia"

  - id: MW-017-C11
    assertion: "Agent consulted trauma surgery for admission and ongoing chest tube management"
    dimension: clinical_completeness
    verification: world_state
    check: "audit_log contains createClinicalOrder for trauma_surgery_consult"

  - id: MW-017-C12
    assertion: "Agent documented procedure note including indication, consent, technique, tube size, insertion site, complications, and confirmation of placement"
    dimension: documentation_quality
    verification: llm_judge

