metadata:
  openem_condition: "pneumothorax"
  expected_tool_calls: "10-14"
  entity_types: 6
  time_pressure: "moderate"
  cognitive_load: "moderate"
  teaching_point: "Chest tube insertion is a procedural workflow requiring informed consent, time-out, correct site selection (safe triangle: anterior border of latissimus dorsi, lateral border of pectoralis major, and a line at the level of the nipple — 4th-5th ICS), appropriate tube size (28-32 Fr for trauma), and post-procedure imaging confirmation. Always check for latex allergy before gloving. The procedure note must document indication, consent, site, technique, tube size, and post-procedure findings."
