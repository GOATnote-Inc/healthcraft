# HEALTHCRAFT Task Definition: Chest Tube Insertion Workflow
# Category: multi_step_workflows | Level: 3
# Tests procedural workflow: consent, preparation, insertion, post-procedure
# imaging, and ongoing monitoring for pneumothorax.

id: MW-017
category: multi_step_workflows
level: 3
title: "Chest Tube Insertion — Consent, Procedure, and Imaging"
system_prompt_override: null

description: |
  A 45-year-old male presents after falling 12 feet from a ladder while cleaning
  gutters. He landed on his right side on concrete. He has right-sided chest pain
  worse with inspiration, diminished breath sounds on the right, and subcutaneous
  emphysema along the right chest wall. Chest X-ray reveals a large right-sided
  pneumothorax (approximately 60%) with no midline shift. He is hemodynamically
  stable with SpO2 92% on 4L nasal cannula. There is no hemothorax on imaging. He
  is alert, oriented, and in moderate pain. The agent must obtain informed consent,
  perform pre-procedural time-out, order appropriate sedation and local anesthesia,
  place a chest tube (28-32 Fr for traumatic pneumothorax), confirm placement with
  post-procedure chest X-ray, connect to suction drainage system, order ongoing
  monitoring, and arrange admission.

setting:
  facility: "Mercy Point Emergency Department"
  time: "2026-01-15T15:20:00Z"
  department: "Emergency Department"
  census: 30
  beds_available: 24
  attending_on_duty: "Dr. Sarah Chen"
  specialist_availability:
    trauma_surgery: "on-call, 20-minute response"
    pulmonology: "on-call, 30-minute response"
  equipment:
    chest_tube_tray: "available at bedside"
    pleurevac_system: "available"
    portable_xray: "available — 10-minute response"

patient:
  age: 45
  sex: M
  weight_kg: 88
  chief_complaint: "Fall from height, right-sided chest pain, difficulty breathing"
