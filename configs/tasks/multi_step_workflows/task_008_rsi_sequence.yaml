# HEALTHCRAFT Task Definition: RSI Sequence
# Category: multi_step_workflows | Level: 4
# Tests rapid sequence intubation workflow: preparation, preoxygenation,
# medication administration, tube placement, confirmation, and post-intubation care.

id: MW-008
category: multi_step_workflows
level: 4
title: "RSI Sequence"
system_prompt_override: null

description: |
  A 48-year-old female presents with severe asthma exacerbation refractory to
  aggressive bronchodilator therapy. She has received three rounds of albuterol/
  ipratropium nebulizers, IV magnesium, and IV methylprednisolone over the past
  90 minutes with minimal improvement. She is now tiring, using accessory muscles
  with paradoxical breathing, speaking in single words, and her pCO2 has risen
  from 42 to 58 mmHg on repeat ABG. SpO2 is 88% on high-flow nasal cannula.
  The decision is made to proceed with rapid sequence intubation. The agent must
  execute the RSI checklist: equipment preparation, preoxygenation, induction
  agent and paralytic selection with appropriate dosing, tube placement with
  confirmation (ETCO2, bilateral breath sounds, chest X-ray), and post-intubation
  ventilator management for status asthmaticus.

