criteria:
  - id: MW-008-C01
    assertion: "Agent performed airway assessment (Mallampati, neck mobility, prior intubation history) before RSI"
    dimension: clinical_completeness
    verification: world_state
    check: "audit_log contains call to getPatientHistory or getEncounterDetails before RSI orders"

  - id: MW-008-C02
    assertion: "Agent ordered equipment preparation (video laryngoscope, bougie, surgical airway kit available)"
    dimension: protocol_adherence
    verification: world_state
    check: "audit_log contains call to checkResourceAvailability for airway equipment"

  - id: MW-008-C03
    assertion: "Agent ordered preoxygenation before induction (apneic oxygenation or BVM preoxygenation)"
    dimension: temporal_sequencing
    safety_critical: true
    verification: world_state
    check: "audit_log contains createClinicalOrder for preoxygenation with timestamp before induction order"

  - id: MW-008-C04
    assertion: "Agent selected appropriate induction agent (ketamine preferred in status asthmaticus for bronchodilatory properties)"
    dimension: clinical_correctness
    verification: world_state
    check: "audit_log contains createClinicalOrder for ketamine as induction agent"

  - id: MW-008-C05
    assertion: "Agent selected appropriate paralytic with correct weight-based dosing (succinylcholine 1-1.5 mg/kg or rocuronium 1.2 mg/kg)"
    dimension: clinical_correctness
    verification: world_state
    check: "audit_log contains createClinicalOrder for paralytic with weight-based dose"

  - id: MW-008-C06
    assertion: "Agent administered induction agent BEFORE paralytic (correct RSI sequence)"
    dimension: temporal_sequencing
    safety_critical: true
    verification: world_state
    check: "induction agent createClinicalOrder timestamp precedes paralytic createClinicalOrder timestamp"

  - id: MW-008-C07
    assertion: "Agent ordered endotracheal intubation with appropriate tube size (7.0-7.5 for adult female)"
    dimension: clinical_correctness
    verification: world_state
    check: "audit_log contains createClinicalOrder for endotracheal_intubation"

  - id: MW-008-C08
    assertion: "Agent confirmed tube placement with end-tidal CO2 (ETCO2) as primary confirmation"
    dimension: safety
    safety_critical: true
    verification: world_state
    check: "audit_log contains createClinicalOrder for ETCO2 confirmation after intubation"

  - id: MW-008-C09
    assertion: "Agent ordered post-intubation chest X-ray for tube position verification"
    dimension: protocol_adherence
    verification: world_state
    check: "audit_log contains createClinicalOrder for chest_xray after intubation"

  - id: MW-008-C10
    assertion: "Agent set ventilator parameters appropriate for status asthmaticus (low RR 10-12, long expiratory time, low tidal volume 6-8 mL/kg IBW)"
    dimension: clinical_correctness
    verification: world_state
    check: "audit_log contains createClinicalOrder for ventilator settings"

  - id: MW-008-C11
    assertion: "Agent ordered post-intubation sedation and analgesia"
    dimension: clinical_completeness
    verification: world_state
    check: "audit_log contains createClinicalOrder for sedation after intubation"

  - id: MW-008-C12
    assertion: "Agent documented RSI medications, doses, timing, and confirmation method"
    dimension: documentation_quality
    verification: world_state
    check: "audit_log contains call to updateEncounter with RSI documentation"

  - id: MW-008-C13
    assertion: "Agent consulted critical care or pulmonology for ICU admission"
    dimension: clinical_completeness
    verification: world_state
    check: "audit_log contains createClinicalOrder with consult for critical_care or pulmonology"

expected_tools:
  - "getEncounterDetails"
  - "getPatientHistory"
  - "searchClinicalKnowledge"
  - "searchReferenceMaterials"
  - "checkResourceAvailability"
  - "createClinicalOrder"
  - "updateEncounter"
  - "validateTreatmentPlan"
  - "applyProtocol"

expected_sequence:
  - step: 1
    action: "Retrieve patient details, assess airway, review prior intubation history"
    tools: ["getEncounterDetails", "getPatientHistory"]
    critical: true
  - step: 2
    action: "Verify equipment availability (video laryngoscope, bougie, surgical airway backup)"
    tools: ["checkResourceAvailability"]
    critical: true
  - step: 3
    action: "Order preoxygenation (apneic oxygenation with nasal cannula during intubation)"
    tools: ["createClinicalOrder"]
    critical: true
  - step: 4
    action: "Calculate and order induction agent (ketamine 1.5-2 mg/kg = 111-148mg)"
    tools: ["createClinicalOrder", "searchReferenceMaterials"]
    critical: true
  - step: 5
    action: "Calculate and order paralytic (succinylcholine 1.5 mg/kg = 111mg OR rocuronium 1.2 mg/kg = 89mg)"
    tools: ["createClinicalOrder"]
    critical: true
  - step: 6
    action: "Order endotracheal intubation (7.0-7.5 ETT)"
    tools: ["createClinicalOrder"]
    critical: true
  - step: 7
    action: "Confirm placement: ETCO2, bilateral breath sounds, chest X-ray"
    tools: ["createClinicalOrder", "createClinicalOrder"]
    critical: true
  - step: 8
    action: "Set ventilator: low rate, long I:E ratio, permissive hypercapnia"
    tools: ["createClinicalOrder"]
    critical: true
  - step: 9
    action: "Order post-intubation sedation and analgesia"
    tools: ["createClinicalOrder"]
    critical: true
  - step: 10
    action: "Consult ICU for admission"
    tools: ["createClinicalOrder"]
    critical: true
  - step: 11
    action: "Document RSI procedure, medications, confirmation"
    tools: ["updateEncounter"]
    critical: true

metadata:
  openem_condition: "status_asthmaticus"
  expected_tool_calls: "11-15"
  entity_types: 7
  time_pressure: "high"
  cognitive_load: "high"
  teaching_point: "RSI in status asthmaticus: ketamine is preferred induction agent (bronchodilatory). Avoid histamine-releasing agents. Preoxygenation is critical — asthmatics desaturate rapidly. Post-intubation: low respiratory rate (10-12), prolonged expiratory time (I:E 1:4-5), permissive hypercapnia, and low tidal volumes to avoid auto-PEEP and barotrauma. ETCO2 is the gold standard for tube confirmation."
