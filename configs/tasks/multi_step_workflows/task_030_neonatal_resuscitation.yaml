metadata:
  openem_condition: "neonatal_resuscitation"
  expected_tool_calls: "16-20"
  entity_types: 6
  time_pressure: "critical"
  cognitive_load: "extreme"
  teaching_point: "Neonatal resuscitation follows the NRP algorithm with strict temporal sequencing. Initial steps (warm, dry, stimulate, position, clear) must happen within the first 30 seconds. If the infant remains apneic or HR <100 after initial steps, begin PPV within 60 seconds of birth (the golden minute). For a 36-week infant, start FiO2 at 0.21-0.30. Reassess HR after 30 seconds of effective PPV. If HR remains <60 despite effective ventilation, intubate and begin chest compressions at a 3:1 ratio (90 compressions + 30 breaths = 120 events/minute). If HR still <60 after 60 seconds of compressions, administer epinephrine 0.01-0.03 mg/kg IV (1:10000) via UVC or IO. Volume expansion (10 mL/kg NS) is indicated for suspected blood loss (placental abruption). Thermoregulation is critical — hypothermia worsens acidosis and increases mortality. Pre-ductal SpO2 (right hand) is the standard monitoring site. ETT size = gestational age in weeks / 10 (3.5 for 36 weeks, or 3.0 acceptable). Cord gas pH 6.92 with base deficit -18 indicates severe perinatal asphyxia — this infant may need therapeutic hypothermia (cooling protocol) in the NICU."
