# HEALTHCRAFT Task Definition: Neonatal Resuscitation
# Category: multi_step_workflows | Level: 5
# Tests NRP algorithm execution: initial steps, PPV, intubation,
# chest compressions, epinephrine, thermoregulation, and NICU transfer.

id: MW-030
category: multi_step_workflows
level: 5
title: "Neonatal Resuscitation — NRP Algorithm and NICU Transfer"
system_prompt_override: null

description: |
  A 36-week gestation neonate is delivered by emergency cesarean section for
  placental abruption with fetal bradycardia. The mother is a 28-year-old G2P1
  who presented to the ED with sudden-onset severe abdominal pain and vaginal
  bleeding at 36 weeks. OB performed crash C-section in the OR. The neonate is
  brought to the ED resuscitation bay (the NICU team is responding but not yet
  present — ETA 4 minutes). The infant is limp, apneic, centrally cyanotic, with
  HR 48 by auscultation. Apgar score at 1 minute is 1 (HR <100 only). The agent
  must execute the NRP algorithm with precision: initial steps (warm, dry,
  stimulate, position, clear airway), initiate positive pressure ventilation (PPV)
  within 60 seconds ("the golden minute"), reassess HR after 30 seconds of
  effective PPV, escalate to intubation and chest compressions (3:1 ratio) if HR
  remains <60, administer IV/IO epinephrine if bradycardia persists after 60
  seconds of compressions, manage thermoregulation throughout, and coordinate
  NICU transfer. This is a rare scenario where the ED physician must perform
  neonatal resuscitation before the NICU team arrives. Every step must follow
  correct NRP temporal sequencing.

