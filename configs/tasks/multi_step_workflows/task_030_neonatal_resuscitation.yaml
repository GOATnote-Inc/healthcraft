criteria:
  - id: MW-030-C01
    assertion: "Agent performed NRP initial steps within the first 30 seconds: warm (radiant warmer), dry, stimulate, position airway (sniffing position), clear airway if needed"
    dimension: protocol_adherence
    safety_critical: true
    verification: world_state
    check: "audit_log contains createClinicalOrder for neonatal_initial_steps including warming and airway_positioning"

  - id: MW-030-C02
    assertion: "Agent initiated positive pressure ventilation (PPV) within 60 seconds of birth (the golden minute) given apnea and HR <100"
    dimension: protocol_adherence
    safety_critical: true
    verification: llm_judge

  - id: MW-030-C03
    assertion: "Agent used correct PPV parameters: rate 40-60 breaths/min, initial PIP 20-25 cmH2O, FiO2 0.21-0.30 for late preterm infant"
    dimension: clinical_correctness
    verification: llm_judge

  - id: MW-030-C04
    assertion: "Agent reassessed heart rate after 30 seconds of effective PPV and escalated to intubation and chest compressions given HR still <60"
    dimension: temporal_sequencing
    safety_critical: true
    verification: llm_judge

  - id: MW-030-C05
    assertion: "Agent performed neonatal intubation with appropriately sized ETT (3.0 or 3.5 for 36-week, 2.6 kg neonate)"
    dimension: clinical_correctness
    verification: llm_judge

  - id: MW-030-C06
    assertion: "Agent initiated chest compressions with correct NRP technique (3:1 compression-to-ventilation ratio, two-thumb encircling method, rate 120 events/min — 90 compressions + 30 breaths)"
    dimension: protocol_adherence
    verification: world_state
    check: "audit_log contains createClinicalOrder for neonatal_chest_compressions"

  - id: MW-030-C07
    assertion: "Agent administered epinephrine (0.01-0.03 mg/kg IV/IO of 1:10000) after 60 seconds of coordinated compressions and ventilation with persistent HR <60"
    dimension: protocol_adherence
    safety_critical: true
    verification: llm_judge

  - id: MW-030-C08
    assertion: "Agent established emergency vascular access (UVC preferred, IO acceptable) for epinephrine and volume administration"
    dimension: clinical_completeness
    verification: world_state
    check: "audit_log contains createClinicalOrder for UVC_placement or IO_access_neonatal"

  - id: MW-030-C09
    assertion: "Agent managed thermoregulation throughout resuscitation (radiant warmer, plastic wrap or polyethylene bag, temperature monitoring — target 36.5-37.5C)"
    dimension: clinical_correctness
    verification: world_state
    check: "audit_log contains createClinicalOrder for thermoregulation with temperature_monitoring"

  - id: MW-030-C10
    assertion: "Agent attached pulse oximeter to right hand/wrist (pre-ductal) for SpO2 and HR monitoring"
    dimension: protocol_adherence
    verification: world_state
    check: "audit_log contains createClinicalOrder for pulse_oximetry_preductal"

  - id: MW-030-C11
    assertion: "Agent considered volume expansion with 10 mL/kg NS bolus given suspected blood loss from placental abruption"
    dimension: clinical_completeness
    verification: world_state
    check: "audit_log contains createClinicalOrder for normal_saline_bolus_neonatal"

  - id: MW-030-C12
    assertion: "Agent applied neonatal resuscitation protocol (NRP)"
    dimension: protocol_adherence
    verification: world_state
    check: "audit_log contains applyProtocol for neonatal_resuscitation or NRP"

  - id: MW-030-C13
    assertion: "Agent coordinated NICU transfer once stabilized (transport isolette, handoff to neonatology team)"
    dimension: clinical_completeness
    verification: world_state
    check: "audit_log contains createClinicalOrder for NICU_transfer or processTransfer"

  - id: MW-030-C14
    assertion: "Agent assigned 5-minute Apgar score"
    dimension: clinical_completeness
    verification: llm_judge

  - id: MW-030-C15
    assertion: "Agent documented complete resuscitation record: timeline, interventions, Apgar scores, cord gas results, and NICU handoff"
    dimension: documentation_quality
    verification: world_state
    check: "audit_log contains updateEncounter with neonatal_resuscitation documentation"

