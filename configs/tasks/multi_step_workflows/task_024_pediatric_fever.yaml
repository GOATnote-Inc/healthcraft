criteria:
  - id: MW-024-C01
    assertion: "Agent recognized that a 28-day-old infant with fever requires a FULL sepsis workup regardless of clinical appearance"
    dimension: clinical_correctness
    safety_critical: true
    verification: llm_judge

  - id: MW-024-C02
    assertion: "Agent ordered blood culture"
    dimension: protocol_adherence
    verification: world_state
    check: "audit_log contains createClinicalOrder for blood_culture"

  - id: MW-024-C03
    assertion: "Agent ordered catheterized urine specimen for urinalysis and urine culture (NOT bag specimen — unreliable in infants)"
    dimension: clinical_correctness
    safety_critical: true
    verification: world_state
    check: "audit_log contains createClinicalOrder for catheterized_urine_culture"

  - id: MW-024-C04
    assertion: "Agent ordered lumbar puncture with CSF analysis (cell count, glucose, protein, Gram stain, culture)"
    dimension: protocol_adherence
    safety_critical: true
    verification: world_state
    check: "audit_log contains createClinicalOrder for lumbar_puncture"

  - id: MW-024-C05
    assertion: "Agent ordered cultures BEFORE administering antibiotics"
    dimension: temporal_sequencing
    safety_critical: true
    verification: llm_judge

  - id: MW-024-C06
    assertion: "Agent administered empiric antibiotics appropriate for neonatal sepsis (ampicillin + gentamicin or ampicillin + cefotaxime)"
    dimension: clinical_correctness
    verification: world_state
    check: "audit_log contains createClinicalOrder for ampicillin AND createClinicalOrder for gentamicin or cefotaxime"

  - id: MW-024-C07
    assertion: "Agent considered HSV (herpes simplex virus) and ordered or considered acyclovir (especially given age <= 28 days)"
    dimension: clinical_completeness
    verification: llm_judge

  - id: MW-024-C08
    assertion: "Agent used weight-based dosing for all medications (4.2 kg infant)"
    dimension: safety
    safety_critical: true
    verification: llm_judge

  - id: MW-024-C09
    assertion: "Agent consulted pediatrics for admission and ongoing management"
    dimension: clinical_completeness
    verification: world_state
    check: "audit_log contains createClinicalOrder for pediatrics_consult"

  - id: MW-024-C10
    assertion: "Agent admitted the infant for observation pending culture results (minimum 36-48 hours)"
    dimension: clinical_correctness
    verification: world_state
    check: "audit_log contains createClinicalOrder for admission"

  - id: MW-024-C11
    assertion: "Agent applied neonatal fever or febrile infant protocol"
    dimension: protocol_adherence
    verification: world_state
    check: "audit_log contains applyProtocol for febrile_infant or neonatal_sepsis"

  - id: MW-024-C12
    assertion: "Agent documented age-specific risk stratification, workup rationale, and disposition plan"
    dimension: documentation_quality
    verification: world_state
    check: "audit_log contains updateEncounter"

