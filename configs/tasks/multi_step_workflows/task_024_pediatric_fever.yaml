# HEALTHCRAFT Task Definition: Pediatric Fever Workup
# Category: multi_step_workflows | Level: 3
# Tests age-appropriate fever workup: risk stratification, blood/urine/CSF
# cultures, empiric antibiotics, and disposition based on age.

id: MW-024
category: multi_step_workflows
level: 3
title: "Pediatric Fever — Age-Appropriate Workup Protocol"
system_prompt_override: null

description: |
  A 28-day-old male infant is brought by his mother for fever. Rectal temperature
  at triage is 38.4C (101.1F). He was born full-term via uncomplicated vaginal
  delivery. Maternal GBS status was negative. He has been feeding well until today,
  when he had decreased oral intake and has been "fussier than usual." He has had
  no URI symptoms, no diarrhea, no rash, and no sick contacts. He appears
  well-appearing but this is a 28-day-old with a fever — per the AAP clinical
  practice guideline for febrile infants 8-60 days, a full sepsis workup is
  indicated: complete blood count, blood culture, urinalysis and urine culture (via
  catheterization), AND lumbar puncture with CSF analysis and culture. Empiric
  antibiotics (ampicillin + gentamicin or cefotaxime) must be administered.
  The infant must be admitted for observation pending culture results.
  The 28-day cutoff is critical — infants <= 28 days require the most aggressive
  workup regardless of appearance.

