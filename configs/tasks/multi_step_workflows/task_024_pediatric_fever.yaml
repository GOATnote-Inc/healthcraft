metadata:
  openem_condition: "neonatal_sepsis"
  expected_tool_calls: "10-14"
  entity_types: 6
  time_pressure: "moderate"
  cognitive_load: "moderate"
  teaching_point: "Per the 2021 AAP Clinical Practice Guideline for febrile infants 8-60 days: infants <= 28 days require FULL sepsis workup (blood culture, catheterized urine, LP) and empiric antibiotics regardless of clinical appearance. The well-appearing exam does NOT reduce the risk of serious bacterial infection in this age group. Empiric coverage: ampicillin (for Listeria and GBS) + gentamicin or cefotaxime. Consider acyclovir for HSV, especially with vesicles, seizures, elevated LFTs, or CSF pleocytosis. Bag urine specimens are unreliable — always catheterize for culture."
