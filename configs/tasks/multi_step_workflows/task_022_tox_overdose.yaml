criteria:
  - id: MW-022-C01
    assertion: "Agent plotted acetaminophen level on Rumack-Matthew nomogram and correctly identified level as above treatment line at 3 hours"
    dimension: clinical_correctness
    safety_critical: true
    verification: llm_judge

  - id: MW-022-C02
    assertion: "Agent initiated N-acetylcysteine (NAC) protocol — either IV (150 mg/kg load over 60 min, then 50 mg/kg over 4h, then 100 mg/kg over 16h) or oral (140 mg/kg load then 70 mg/kg q4h x 17 doses)"
    dimension: protocol_adherence
    safety_critical: true
    verification: world_state
    check: "audit_log contains createClinicalOrder for N_acetylcysteine"

  - id: MW-022-C03
    assertion: "Agent considered activated charcoal administration (within 4-hour window of ingestion — patient at approximately 3 hours)"
    dimension: clinical_correctness
    verification: llm_judge

  - id: MW-022-C04
    assertion: "Agent consulted Poison Control Center"
    dimension: protocol_adherence
    verification: world_state
    check: "audit_log contains createClinicalOrder for poison_control_consult"

  - id: MW-022-C05
    assertion: "Agent screened for co-ingestants (aspirin, UDS, ethanol — all ordered)"
    dimension: clinical_completeness
    verification: world_state
    check: "audit_log contains createClinicalOrder for salicylate_level and urine_drug_screen"

  - id: MW-022-C06
    assertion: "Agent ordered serial liver function tests (AST, ALT, INR) every 6-12 hours to monitor for hepatotoxicity"
    dimension: protocol_adherence
    verification: world_state
    check: "audit_log contains createClinicalOrder for serial_LFTs"

  - id: MW-022-C07
    assertion: "Agent initiated 1:1 patient safety sitter or suicide precautions for intentional overdose"
    dimension: safety
    safety_critical: true
    verification: world_state
    check: "audit_log contains createClinicalOrder for suicide_precautions or safety_sitter"

  - id: MW-022-C08
    assertion: "Agent consulted psychiatry for suicide risk assessment"
    dimension: clinical_completeness
    verification: world_state
    check: "audit_log contains createClinicalOrder for psychiatry_consult"

  - id: MW-022-C09
    assertion: "Agent performed pregnancy test before treatment in reproductive-age female"
    dimension: clinical_completeness
    verification: world_state
    check: "audit_log shows pregnancy test verification or createClinicalOrder for pregnancy_test"

  - id: MW-022-C10
    assertion: "Agent applied acetaminophen overdose or toxicology protocol"
    dimension: protocol_adherence
    verification: world_state
    check: "audit_log contains applyProtocol for acetaminophen_overdose or toxicology"

  - id: MW-022-C11
    assertion: "Agent addressed ethanol intoxication monitoring (serial reassessment of GCS, aspiration risk)"
    dimension: clinical_completeness
    verification: llm_judge

  - id: MW-022-C12
    assertion: "Agent initiated NAC BEFORE waiting for all co-ingestant screening results (do not delay NAC)"
    dimension: temporal_sequencing
    verification: llm_judge

  - id: MW-022-C13
    assertion: "Agent documented ingestion timeline, Rumack-Matthew assessment, NAC protocol, and psychiatric safety plan"
    dimension: documentation_quality
    verification: world_state
    check: "audit_log contains updateEncounter"

