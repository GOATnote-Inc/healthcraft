# HEALTHCRAFT Task Definition: Toxicology Overdose Decontamination
# Category: multi_step_workflows | Level: 4
# Tests overdose management: toxidrome identification, decontamination,
# antidote administration, and poison center consultation.

id: MW-022
category: multi_step_workflows
level: 4
title: "Toxicology Overdose — Decontamination Workflow"
system_prompt_override: null

description: |
  A 19-year-old female is brought by EMS after her roommate found her unresponsive
  next to an empty bottle of acetaminophen (500mg x 50 tablets = 25,000 mg
  potential ingestion) and a suicide note. Estimated time of ingestion is 3 hours
  ago based on the roommate's timeline. She is lethargic but arousable (GCS 13),
  with mild RUQ tenderness. She also admits to drinking "a lot of vodka." Serum
  acetaminophen level returns at 210 mcg/mL (drawn at approximately 3 hours
  post-ingestion — well above the treatment line on the Rumack-Matthew nomogram).
  Ethanol level is 180 mg/dL. AST/ALT are currently normal (early presentation).
  The agent must execute the acetaminophen overdose protocol: assess for
  decontamination (activated charcoal if within window), initiate N-acetylcysteine
  (NAC) protocol, consult poison control, evaluate for co-ingestants, initiate
  psychiatric evaluation for intentional overdose, and arrange appropriate
  monitoring and disposition.

