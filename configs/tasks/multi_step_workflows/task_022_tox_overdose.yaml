metadata:
  openem_condition: "acetaminophen_overdose"
  expected_tool_calls: "12-16"
  entity_types: 6
  time_pressure: "high"
  cognitive_load: "high"
  teaching_point: "Acetaminophen overdose: plot the 4-hour level on the Rumack-Matthew nomogram (treatment line starts at 150 mcg/mL at 4 hours). If above the line, initiate NAC immediately. IV NAC is preferred for patients who cannot tolerate oral (vomiting, altered mental status). Activated charcoal is beneficial within 4 hours of ingestion if the patient can protect their airway. Do NOT delay NAC for co-ingestant screening. All intentional overdose patients require suicide precautions and psychiatric evaluation regardless of medical severity."
