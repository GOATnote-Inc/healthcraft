metadata:
  openem_condition: "spinal_cord_injury"
  expected_tool_calls: "12-16"
  entity_types: 7
  time_pressure: "high"
  cognitive_load: "high"
  teaching_point: "Acute spinal cord injury management: (1) Maintain strict immobilization. (2) Distinguish neurogenic shock (bradycardia + hypotension + warm extremities) from hemorrhagic shock. (3) Target MAP >= 85 mmHg for spinal cord perfusion pressure optimization — this is HIGHER than standard trauma targets. (4) Monitor respiratory function — injuries above C5 may require intubation. (5) Transfer to a spine center early — time to decompression affects outcomes. (6) ASIA exam is the standard neurological assessment for SCI classification."
