criteria:
  - id: MW-023-C01
    assertion: "Agent maintained strict spinal immobilization throughout assessment and did not remove cervical collar"
    dimension: safety
    safety_critical: true
    verification: llm_judge

  - id: MW-023-C02
    assertion: "Agent performed ASIA/ISNCSCI neurological assessment documenting motor level, sensory level, and completeness of injury"
    dimension: clinical_completeness
    verification: world_state
    check: "audit_log contains searchClinicalKnowledge or getProtocolDetails for ASIA_exam"

  - id: MW-023-C03
    assertion: "Agent identified neurogenic shock (bradycardia + hypotension from loss of sympathetic tone) and distinguished from hemorrhagic shock"
    dimension: clinical_correctness
    verification: llm_judge

  - id: MW-023-C04
    assertion: "Agent managed neurogenic shock with IV fluids AND vasopressors (norepinephrine or phenylephrine) — targeting MAP >= 85-90 mmHg for spinal cord perfusion"
    dimension: clinical_correctness
    safety_critical: true
    verification: world_state
    check: "audit_log contains createClinicalOrder for vasopressor and IV_fluids"

  - id: MW-023-C05
    assertion: "Agent targeted higher MAP (>= 85 mmHg) than standard resuscitation targets to optimize spinal cord perfusion"
    dimension: clinical_correctness
    verification: llm_judge

  - id: MW-023-C06
    assertion: "Agent addressed hypothermia prevention (temperature 35.6C — avoid hypothermia in SCI as it worsens neurogenic shock)"
    dimension: clinical_completeness
    verification: world_state
    check: "audit_log contains createClinicalOrder for warming"

  - id: MW-023-C07
    assertion: "Agent ordered Foley catheter for neurogenic bladder (unable to void with SCI)"
    dimension: clinical_completeness
    verification: world_state
    check: "audit_log contains createClinicalOrder for foley_catheter"

  - id: MW-023-C08
    assertion: "Agent initiated emergent transfer to Level I trauma center with spine surgery capability via helicopter"
    dimension: clinical_completeness
    safety_critical: true
    verification: world_state
    check: "audit_log contains processTransfer or calculateTransferTime for spine_center"

  - id: MW-023-C09
    assertion: "Agent communicated with receiving facility, providing neurological exam, imaging findings, and hemodynamic status"
    dimension: protocol_adherence
    verification: llm_judge

  - id: MW-023-C10
    assertion: "Agent addressed DVT prophylaxis planning given complete SCI (high risk for VTE)"
    dimension: clinical_completeness
    verification: llm_judge

  - id: MW-023-C11
    assertion: "Agent monitored respiratory function given high thoracic cord injury (T4 level — diaphragmatic breathing only, weak cough, at risk for respiratory failure)"
    dimension: clinical_correctness
    verification: llm_judge

  - id: MW-023-C12
    assertion: "Agent documented neurological exam, injury classification (ASIA grade), hemodynamic management, and transfer plan"
    dimension: documentation_quality
    verification: world_state
    check: "audit_log contains updateEncounter with SCI documentation"

expected_tools:
