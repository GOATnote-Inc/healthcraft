# HEALTHCRAFT Task Definition: Spinal Cord Injury Immobilization and Transfer
# Category: multi_step_workflows | Level: 4
# Tests spinal cord injury management: immobilization, neurological assessment,
# hemodynamic support, and transfer to a spine center.

id: MW-023
category: multi_step_workflows
level: 4
title: "Spinal Cord Injury — Immobilization and Transfer"
system_prompt_override: null

description: |
  A 24-year-old male presents after a diving accident in a shallow lake. He dove
  headfirst from a dock into approximately 3 feet of water, striking the bottom.
  Bystanders pulled him from the water with in-line stabilization. He has complete
  loss of motor function and sensation below the nipple line (approximately T4).
  He has priapism. He is bradycardic (HR 48) and hypotensive (BP 78/40) consistent
  with neurogenic shock (loss of sympathetic tone below the injury). He has no
  sensation to pinprick below T4, no voluntary motor function in lower extremities,
  absent patellar and Achilles reflexes, and reduced grip strength bilateral upper
  extremities. CT spine shows a C5-C6 burst fracture with retropulsed fragment
  compressing the spinal cord. This facility does not have a spine surgeon or
  neurosurgeon. The agent must complete the neurological assessment (ASIA/ISNCSCI),
  manage neurogenic shock with fluids and vasopressors, maintain spinal
  immobilization, address secondary injury prevention, and coordinate emergent
  transfer to a Level I trauma center with spine surgery capability.

