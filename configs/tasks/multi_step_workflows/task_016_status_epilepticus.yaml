# HEALTHCRAFT Task Definition: Status Epilepticus Management
# Category: multi_step_workflows | Level: 5
# Tests escalating antiepileptic therapy: benzodiazepines, second-line agents,
# RSI for refractory SE, and continuous EEG monitoring.

id: MW-016
category: multi_step_workflows
level: 5
title: "Status Epilepticus — Escalating Therapy"
system_prompt_override: null

description: |
  A 34-year-old male with known epilepsy is brought by EMS actively seizing. His
  wife reports he ran out of levetiracetam 4 days ago and has been having
  "twitching episodes" since this morning. EMS administered midazolam 10mg IM in
  the field 8 minutes ago with brief cessation of seizure activity, but he resumed
  generalized tonic-clonic seizure activity 3 minutes later. He has now been
  seizing for approximately 25 minutes total. On arrival he is actively convulsing,
  cyanotic (SpO2 84%), with GCS 3. Temperature is 39.1C. The agent must execute
  the status epilepticus protocol with escalating therapy: repeat benzodiazepine,
  second-line antiepileptic (levetiracetam, fosphenytoin, or valproate), and
  prepare for RSI and third-line agents (propofol or midazolam infusion) if
  seizures persist. Prolonged seizure carries risk of permanent brain injury,
  rhabdomyolysis, aspiration, and death.

