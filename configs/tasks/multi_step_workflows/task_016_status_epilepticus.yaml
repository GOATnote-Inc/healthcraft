metadata:
  openem_condition: "status_epilepticus"
  expected_tool_calls: "12-18"
  entity_types: 7
  time_pressure: "critical"
  cognitive_load: "extreme"
  teaching_point: "Status epilepticus escalation: (1) Benzodiazepine (lorazepam 4mg IV or midazolam 10mg IM/IV), repeat x1 if needed. (2) Second-line AED: levetiracetam 60mg/kg, fosphenytoin 20mg PE/kg, or valproate 40mg/kg — check allergies before selecting. (3) If refractory: RSI + third-line continuous infusion (propofol, midazolam, or pentobarbital). Always check allergy history — this patient has documented phenytoin SJS, making fosphenytoin absolutely contraindicated. Monitor for rhabdomyolysis, hyperthermia, and metabolic acidosis."
