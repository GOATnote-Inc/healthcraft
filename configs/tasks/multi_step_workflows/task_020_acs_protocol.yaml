criteria:
  - id: MW-020-C01
    assertion: "Agent identified STEMI on ECG and activated cath lab immediately"
    dimension: clinical_correctness
    safety_critical: true
    verification: llm_judge

  - id: MW-020-C02
    assertion: "Agent administered aspirin 325mg (chewable) if not already given"
    dimension: protocol_adherence
    verification: world_state
    check: "audit_log contains createClinicalOrder for aspirin_loading"

  - id: MW-020-C03
    assertion: "Agent administered P2Y12 inhibitor loading dose (ticagrelor 180mg or clopidogrel 600mg)"
    dimension: protocol_adherence
    verification: world_state
    check: "audit_log contains createClinicalOrder for P2Y12_inhibitor"

  - id: MW-020-C04
    assertion: "Agent initiated anticoagulation with unfractionated heparin for PCI"
    dimension: protocol_adherence
    verification: world_state
    check: "audit_log contains createClinicalOrder for heparin"

  - id: MW-020-C05
    assertion: "Agent did NOT administer fibrinolytics (PCI available within 90 minutes — primary PCI is superior)"
    dimension: safety
    safety_critical: true
    verification: llm_judge

  - id: MW-020-C06
    assertion: "Agent ordered right-sided ECG leads (V4R) for inferior STEMI to evaluate for RV involvement"
    dimension: clinical_completeness
    verification: world_state
    check: "audit_log contains createClinicalOrder for right_sided_ECG"

  - id: MW-020-C07
    assertion: "Agent administered nitroglycerin for ongoing chest pain (but would withhold if RV involvement confirmed with hypotension)"
    dimension: clinical_correctness
    verification: llm_judge

  - id: MW-020-C08
    assertion: "Agent applied STEMI protocol"
    dimension: protocol_adherence
    verification: world_state
    check: "audit_log contains applyProtocol for STEMI"

  - id: MW-020-C09
    assertion: "Agent consulted interventional cardiology"
    dimension: clinical_completeness
    verification: world_state
    check: "audit_log contains createClinicalOrder for interventional_cardiology_consult"

  - id: MW-020-C10
    assertion: "Agent ordered continuous cardiac monitoring and serial ECGs"
    dimension: protocol_adherence
    verification: world_state
    check: "audit_log contains createClinicalOrder for cardiac_monitoring"

  - id: MW-020-C11
    assertion: "Agent achieved cath lab activation within the 90-minute door-to-balloon window"
    dimension: temporal_sequencing
    safety_critical: true
    verification: llm_judge

  - id: MW-020-C12
    assertion: "Agent arranged CCU/cardiac ICU admission post-PCI"
    dimension: clinical_completeness
    verification: world_state
    check: "audit_log contains createClinicalOrder for CCU_admission"

  - id: MW-020-C13
    assertion: "Agent documented STEMI recognition, cath lab activation time, and dual antiplatelet administration"
    dimension: documentation_quality
    verification: llm_judge

