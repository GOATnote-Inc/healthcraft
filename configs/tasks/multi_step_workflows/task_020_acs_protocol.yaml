# HEALTHCRAFT Task Definition: Acute Coronary Syndrome Protocol
# Category: multi_step_workflows | Level: 4
# Tests ACS management: dual antiplatelet therapy, anticoagulation,
# risk stratification, and cath lab activation.

id: MW-020
category: multi_step_workflows
level: 4
title: "Acute Coronary Syndrome — Dual Antiplatelet and Cath Lab"
system_prompt_override: null

description: |
  A 62-year-old male presents with 90 minutes of substernal chest pressure
  radiating to the left arm, associated with diaphoresis and nausea. He took
  3 sublingual nitroglycerin tablets at home without relief. He has a history of
  hypertension, diabetes, hyperlipidemia, and a 40 pack-year smoking history.
  12-lead ECG shows 3mm ST elevation in leads II, III, aVF with reciprocal
  changes in I and aVL — consistent with acute inferior STEMI. He is
  hemodynamically stable (BP 148/88, HR 68, SpO2 98%). Troponin is 2.4 ng/mL.
  The door-to-balloon target is 90 minutes. The agent must execute the STEMI
  protocol: dual antiplatelet loading (aspirin + P2Y12 inhibitor), anticoagulation,
  cath lab activation, cardiology consult, adjunctive therapy, and CCU admission.
  The agent must NOT administer fibrinolytics since PCI is available within
  90 minutes.

