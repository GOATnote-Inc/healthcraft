metadata:
  openem_condition: "stemi"
  expected_tool_calls: "12-16"
  entity_types: 7
  time_pressure: "critical"
  cognitive_load: "high"
  teaching_point: "STEMI management requires immediate cath lab activation — door-to-balloon target is 90 minutes. Dual antiplatelet therapy (aspirin + P2Y12 inhibitor) should be given as early as possible. Do NOT give fibrinolytics if PCI is available within 120 minutes. For inferior STEMI, obtain right-sided leads (V4R) to assess RV involvement — RV infarction requires volume resuscitation and contraindicates nitroglycerin. Heparin dosing is typically 60-70 units/kg bolus (max 4,000 units) for PCI."
