metadata:
  openem_condition: "diabetic_ketoacidosis"
  expected_tool_calls: "12-16"
  entity_types: 7
  time_pressure: "high"
  cognitive_load: "high"
  teaching_point: "DKA management follows a strict sequence: volume resuscitation first, then insulin drip. Current ADA guidelines recommend 0.1-0.14 units/kg/hr continuous infusion WITHOUT a bolus. Potassium must be monitored aggressively — insulin drives K intracellular, and hypokalemia can cause fatal arrhythmias. Hold insulin if K < 3.3. Add dextrose to IVF when glucose reaches 200-250 to prevent hypoglycemia while continuing insulin for anion gap closure. Gap closure (not glucose normalization) is the endpoint. Transition to SQ insulin requires 2-hour overlap with drip."
