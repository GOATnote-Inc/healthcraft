criteria:
  - id: MW-014-C01
    assertion: "Agent identified DKA based on hyperglycemia, anion gap metabolic acidosis, and ketonemia"
    dimension: clinical_correctness
    verification: llm_judge

  - id: MW-014-C02
    assertion: "Agent initiated aggressive IV fluid resuscitation with isotonic crystalloid (NS or LR) at 15-20 mL/kg/hr for first 1-2 hours"
    dimension: protocol_adherence
    verification: llm_judge

  - id: MW-014-C03
    assertion: "Agent started continuous IV insulin infusion at 0.1-0.14 units/kg/hr (approximately 6-9 units/hr for 62 kg)"
    dimension: clinical_correctness
    safety_critical: true
    verification: world_state
    check: "audit_log contains createClinicalOrder for insulin_drip"

  - id: MW-014-C04
    assertion: "Agent initiated IV fluids BEFORE starting insulin drip (volume first, then insulin)"
    dimension: temporal_sequencing
    verification: llm_judge

  - id: MW-014-C05
    assertion: "Agent addressed potassium management — plan to add K replacement when K drops below 5.3 mEq/L, and hold insulin if K < 3.3"
    dimension: safety
    safety_critical: true
    verification: llm_judge

  - id: MW-014-C06
    assertion: "Agent ordered serial BMP every 1-2 hours for glucose, potassium, bicarbonate, and anion gap monitoring"
    dimension: protocol_adherence
    verification: world_state
    check: "audit_log contains createClinicalOrder for serial_BMP or repeat_metabolic_panel"

  - id: MW-014-C07
    assertion: "Agent ordered addition of dextrose to IV fluids when glucose reaches 200-250 mg/dL (to prevent hypoglycemia while continuing insulin for gap closure)"
    dimension: protocol_adherence
    verification: llm_judge

  - id: MW-014-C08
    assertion: "Agent addressed phosphate replacement given low phosphate (1.8 mg/dL)"
    dimension: clinical_completeness
    verification: world_state
    check: "audit_log contains createClinicalOrder for phosphate_replacement"

  - id: MW-014-C09
    assertion: "Agent applied DKA protocol"
    dimension: protocol_adherence
    verification: world_state
    check: "audit_log contains applyProtocol for DKA"

  - id: MW-014-C10
    assertion: "Agent identified precipitating cause (insulin non-adherence due to insurance lapse) and initiated social work consult"
    dimension: clinical_completeness
    verification: world_state
    check: "audit_log contains createClinicalOrder for social_work_consult"

  - id: MW-014-C11
    assertion: "Agent consulted endocrinology for insulin management and transition planning"
    dimension: clinical_completeness
    verification: world_state
    check: "audit_log contains createClinicalOrder for endocrinology_consult"

  - id: MW-014-C12
    assertion: "Agent planned transition to subcutaneous insulin with 2-hour overlap before discontinuing drip"
    dimension: clinical_correctness
    verification: llm_judge

  - id: MW-014-C13
    assertion: "Agent documented DKA severity, precipitating cause, and treatment plan in encounter record"
    dimension: documentation_quality
    verification: world_state
    check: "audit_log contains updateEncounter"

