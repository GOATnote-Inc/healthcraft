# HEALTHCRAFT Task Definition: Diabetic Ketoacidosis Protocol
# Category: multi_step_workflows | Level: 4
# Tests DKA management: insulin drip initiation, fluid resuscitation,
# electrolyte monitoring, anion gap closure, and transition to SQ insulin.

id: MW-014
category: multi_step_workflows
level: 4
title: "Diabetic Ketoacidosis — Insulin Drip and Monitoring"
system_prompt_override: null

description: |
  A 28-year-old female with type 1 diabetes presents with nausea, vomiting,
  abdominal pain, and rapid breathing for the past 8 hours. She ran out of her
  insulin 3 days ago due to a lapse in insurance coverage. She is tachypneic with
  Kussmaul respirations, fruity breath odor, and appears dehydrated. Blood glucose
  is 486 mg/dL, pH 7.12, bicarbonate 8, anion gap 28, positive serum ketones.
  Potassium is 5.4 (expected to drop with insulin). The agent must execute the
  ADA DKA protocol: aggressive IV fluid resuscitation, insulin drip initiation
  (NOT bolus in this case per current guidelines), potassium replacement when K
  drops below 5.3, serial metabolic panels every 2 hours, monitoring for anion
  gap closure, transition to subcutaneous insulin with overlap, and identification
  of the precipitating cause.

