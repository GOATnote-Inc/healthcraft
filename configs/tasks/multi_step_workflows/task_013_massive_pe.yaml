criteria:
  - id: MW-013-C01
    assertion: "Agent identified massive PE with obstructive shock based on hemodynamic instability, echo findings, and clinical presentation"
    dimension: clinical_correctness
    verification: llm_judge

  - id: MW-013-C02
    assertion: "Agent initiated IV fluid resuscitation cautiously (small bolus 250-500 mL, not large volume — RV failure worsens with excess preload)"
    dimension: clinical_correctness
    safety_critical: true
    verification: llm_judge

  - id: MW-013-C03
    assertion: "Agent started vasopressor support (norepinephrine preferred for PE-related shock)"
    dimension: clinical_correctness
    verification: world_state
    check: "audit_log contains createClinicalOrder for vasopressor"

  - id: MW-013-C04
    assertion: "Agent initiated systemic thrombolytics (alteplase 100mg over 2 hours or tenecteplase weight-based) for massive PE with hemodynamic instability"
    dimension: clinical_correctness
    safety_critical: true
    verification: world_state
    check: "audit_log contains createClinicalOrder for thrombolytic"

  - id: MW-013-C05
    assertion: "Agent explicitly weighed the bleeding risk of thrombolytics given 10-day post-surgical status and documented the risk-benefit analysis"
    dimension: safety
    safety_critical: true
    verification: llm_judge

  - id: MW-013-C06
    assertion: "Agent started vasopressor BEFORE or concurrent with thrombolytic (hemodynamic bridge while awaiting lytic effect)"
    dimension: temporal_sequencing
    verification: world_state
    check: "vasopressor createClinicalOrder timestamp precedes or equals thrombolytic createClinicalOrder timestamp"

  - id: MW-013-C07
    assertion: "Agent ordered CTPA to confirm diagnosis (if patient stable enough) or proceeded with empiric treatment based on echo given instability"
    dimension: clinical_completeness
    verification: llm_judge

  - id: MW-013-C08
    assertion: "Agent initiated therapeutic anticoagulation with unfractionated heparin (after or concurrent with thrombolytic per protocol)"
    dimension: protocol_adherence
    verification: world_state
    check: "audit_log contains createClinicalOrder for heparin_infusion"

  - id: MW-013-C09
    assertion: "Agent consulted cardiothoracic surgery or interventional radiology as backup for surgical embolectomy or catheter-directed therapy"
    dimension: clinical_completeness
    verification: world_state
    check: "audit_log contains createClinicalOrder for consult to CT_surgery or interventional_radiology"

  - id: MW-013-C10
    assertion: "Agent arranged ICU admission for hemodynamic monitoring and post-thrombolytic care"
    dimension: clinical_completeness
    verification: world_state
    check: "audit_log contains createClinicalOrder for ICU_admission"

  - id: MW-013-C11
    assertion: "Agent ordered repeat bedside echo or hemodynamic reassessment after thrombolytic initiation"
    dimension: protocol_adherence
    verification: world_state
    check: "audit_log contains createClinicalOrder for repeat_echo or getEncounterDetails after thrombolytic timestamp"

  - id: MW-013-C12
    assertion: "Agent applied massive PE or thrombolytic protocol"
    dimension: protocol_adherence
    verification: world_state
    check: "audit_log contains applyProtocol for massive_PE or thrombolytic"

  - id: MW-013-C13
    assertion: "Agent documented risk-benefit discussion, thrombolytic indication, and post-surgical bleeding risk in encounter record"
    dimension: documentation_quality
    verification: world_state
    check: "audit_log contains updateEncounter"

expected_tools:
  - "getEncounterDetails"
  - "getPatientHistory"
  - "searchClinicalKnowledge"
  - "searchReferenceMaterials"
  - "getProtocolDetails"
  - "applyProtocol"
  - "createClinicalOrder"
  - "updateEncounter"
  - "checkResourceAvailability"
  - "validateTreatmentPlan"
  - "runDecisionRule"

expected_sequence:
  - step: 1
    action: "Assess patient, review bedside echo, identify massive PE with obstructive shock"
    tools: ["getEncounterDetails", "getPatientHistory"]
    critical: true
  - step: 2
    action: "Initiate cautious IV fluid bolus (250-500 mL) and vasopressor"
    tools: ["createClinicalOrder"]
    critical: true
  - step: 3
    action: "Evaluate thrombolytic eligibility — weigh bleeding risk vs mortality"
    tools: ["searchClinicalKnowledge", "runDecisionRule", "validateTreatmentPlan"]
    critical: true
  - step: 4
    action: "Administer systemic thrombolytic (alteplase 100mg/2hr)"
    tools: ["createClinicalOrder"]
    critical: true
  - step: 5
    action: "Start heparin infusion per PE thrombolytic protocol"
    tools: ["createClinicalOrder", "applyProtocol"]
    critical: true
  - step: 6
    action: "Consult CT surgery and/or IR for backup intervention"
    tools: ["createClinicalOrder"]
    critical: true
  - step: 7
    action: "Order CTPA if patient stabilizes, or defer if too unstable"
    tools: ["createClinicalOrder"]
    critical: false
  - step: 8
    action: "Reassess hemodynamics and order repeat echo"
    tools: ["getEncounterDetails", "createClinicalOrder"]
    critical: true
  - step: 9
    action: "Arrange ICU admission"
    tools: ["createClinicalOrder", "checkResourceAvailability"]
    critical: true
  - step: 10
    action: "Document risk-benefit analysis, interventions, and plan"
    tools: ["updateEncounter"]
    critical: true

metadata:
  openem_condition: "pulmonary_embolism"
  expected_tool_calls: "12-18"
  entity_types: 8
  time_pressure: "critical"
  cognitive_load: "extreme"
  teaching_point: "Massive PE is defined by hemodynamic instability (sustained hypotension, obstructive shock). Systemic thrombolytics are indicated despite relative contraindications when the patient is in extremis — the mortality of untreated massive PE exceeds the bleeding risk. Norepinephrine is the preferred vasopressor. Cautious fluid resuscitation only (250-500 mL) — excessive volume worsens RV failure. Bedside echo showing RV dilation, McConnell's sign, and D-shaped LV is sufficient for empiric treatment in unstable patients."
