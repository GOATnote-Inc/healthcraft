# HEALTHCRAFT Task Definition: Massive PE Management
# Category: multi_step_workflows | Level: 5
# Tests massive pulmonary embolism workflow: risk stratification, thrombolytics,
# hemodynamic support, and ICU disposition.

id: MW-013
category: multi_step_workflows
level: 5
title: "Massive PE — Thrombolytics and Hemodynamic Support"
system_prompt_override: null

description: |
  A 54-year-old female presents with sudden-onset severe dyspnea, pleuritic chest
  pain, and near-syncope while walking to the bathroom. She is 10 days post-op
  from a right total knee arthroplasty and has been relatively immobile. On arrival
  she is diaphoretic, tachycardic (HR 128), hypotensive (BP 76/42), and hypoxic
  (SpO2 82% on room air). Bedside echo shows a dilated right ventricle with
  septal bowing, McConnell's sign, and a D-shaped left ventricle. Troponin is
  0.48 ng/mL. BNP is 890 pg/mL. She is in obstructive shock from massive
  pulmonary embolism. The agent must rapidly stabilize hemodynamics, confirm the
  diagnosis, initiate systemic thrombolytics (weighing the 10-day post-surgical
  bleeding risk), manage vasopressors, and coordinate ICU admission. This is a
  high-stakes decision — thrombolytics carry significant bleeding risk post-surgery
  but the patient is dying from obstructive shock.

