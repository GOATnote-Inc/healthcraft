# HEALTHCRAFT Task Definition: Cardiac Arrest Post-ROSC Care Bundle
# Category: multi_step_workflows | Level: 5
# Tests post-cardiac arrest care: targeted temperature management,
# hemodynamic optimization, neuroprognostication planning, and ICU disposition.

id: MW-021
category: multi_step_workflows
level: 5
title: "Post-ROSC Care Bundle — Targeted Temperature Management"
system_prompt_override: null

description: |
  A 56-year-old male had a witnessed ventricular fibrillation cardiac arrest in
  the ED waiting room. Bystander CPR was initiated immediately by an off-duty
  paramedic. The arrest team delivered 3 shocks and administered epinephrine x2
  before achieving return of spontaneous circulation (ROSC) after 18 minutes of
  CPR. Post-ROSC, he is intubated, comatose (GCS 3T), hemodynamically unstable
  (BP 82/50 on norepinephrine), and has a 12-lead ECG showing ST elevation in V1-V4
  (anterior STEMI as the likely arrest etiology). Temperature is 35.8C. The agent
  must execute the post-ROSC care bundle: targeted temperature management (TTM),
  hemodynamic optimization, coronary reperfusion (cath lab for STEMI), ventilator
  management, neuroprotective strategies, seizure prophylaxis assessment, serial
  neurological evaluation planning, and ICU admission. The patient is NOT a
  candidate for neuroprognostication yet — it is too early.

