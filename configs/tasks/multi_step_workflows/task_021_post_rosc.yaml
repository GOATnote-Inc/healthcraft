criteria:
  - id: MW-021-C01
    assertion: "Agent initiated targeted temperature management (TTM) to 32-36C per current guidelines"
    dimension: protocol_adherence
    safety_critical: true
    verification: world_state
    check: "audit_log contains createClinicalOrder for targeted_temperature_management or cooling"

  - id: MW-021-C02
    assertion: "Agent identified anterior STEMI on post-ROSC ECG and activated cath lab for emergent PCI"
    dimension: clinical_correctness
    safety_critical: true
    verification: world_state
    check: "audit_log contains createClinicalOrder for cath_lab_activation"

  - id: MW-021-C03
    assertion: "Agent optimized hemodynamics — titrated vasopressors to target MAP >= 65 mmHg and considered inotropes"
    dimension: clinical_correctness
    verification: world_state
    check: "audit_log contains createClinicalOrder for vasopressor_titration"

  - id: MW-021-C04
    assertion: "Agent optimized ventilator settings — target SpO2 94-98% (avoid hyperoxia) and normocapnia (PaCO2 35-45)"
    dimension: clinical_correctness
    verification: llm_judge

  - id: MW-021-C05
    assertion: "Agent ordered reduction of FiO2 from 100% to target SpO2 94-98% (hyperoxia is harmful post-ROSC)"
    dimension: safety
    safety_critical: true
    verification: world_state
    check: "audit_log contains createClinicalOrder for ventilator_adjustment or FiO2_reduction"

  - id: MW-021-C06
    assertion: "Agent ordered continuous EEG monitoring for seizure detection in comatose post-arrest patient"
    dimension: protocol_adherence
    verification: world_state
    check: "audit_log contains createClinicalOrder for continuous_EEG"

  - id: MW-021-C07
    assertion: "Agent addressed glucose management (target 140-180 mg/dL) — insulin drip or correction for glucose 286"
    dimension: clinical_completeness
    verification: world_state
    check: "audit_log contains createClinicalOrder for insulin or glucose_management"

  - id: MW-021-C08
    assertion: "Agent did NOT attempt neuroprognostication within the first 72 hours (too early — must wait for TTM completion and rewarming)"
    dimension: safety
    safety_critical: true
    verification: llm_judge

  - id: MW-021-C09
    assertion: "Agent applied post-ROSC or post-cardiac arrest care bundle protocol"
    dimension: protocol_adherence
    verification: world_state
    check: "audit_log contains applyProtocol for post_ROSC or post_cardiac_arrest"

  - id: MW-021-C10
    assertion: "Agent ordered serial neurological assessments and planned multimodal neuroprognostication at 72+ hours"
    dimension: clinical_completeness
    verification: llm_judge

  - id: MW-021-C11
    assertion: "Agent consulted critical care / ICU for admission"
    dimension: clinical_completeness
    verification: world_state
    check: "audit_log contains createClinicalOrder for ICU_admission or critical_care_consult"

  - id: MW-021-C12
    assertion: "Agent administered dual antiplatelet therapy for STEMI prior to cath lab"
    dimension: protocol_adherence
    verification: world_state
    check: "audit_log contains createClinicalOrder for aspirin and P2Y12_inhibitor"

  - id: MW-021-C13
    assertion: "Agent documented resuscitation summary, ROSC time, post-ROSC ECG findings, TTM initiation, and care bundle elements"
    dimension: documentation_quality
    verification: world_state
    check: "audit_log contains updateEncounter with post-ROSC documentation"

  - id: MW-021-C14
    assertion: "Agent initiated TTM BEFORE or concurrent with cath lab transport (do not delay TTM for PCI)"
    dimension: temporal_sequencing
    verification: llm_judge

expected_tools:
  - "getEncounterDetails"
  - "getPatientHistory"
  - "searchClinicalKnowledge"
  - "getProtocolDetails"
  - "applyProtocol"
  - "createClinicalOrder"
  - "updateEncounter"
  - "checkResourceAvailability"
  - "validateTreatmentPlan"

expected_sequence:
  - step: 1
    action: "Assess post-ROSC patient, review resuscitation details and ECG"
    tools: ["getEncounterDetails", "getPatientHistory"]
    critical: true
  - step: 2
    action: "Apply post-ROSC care bundle protocol"
    tools: ["applyProtocol"]
    critical: true
  - step: 3
    action: "Initiate TTM (target 32-36C)"
    tools: ["createClinicalOrder"]
    critical: true
  - step: 4
    action: "Activate cath lab for anterior STEMI"
    tools: ["createClinicalOrder", "checkResourceAvailability"]
    critical: true
  - step: 5
    action: "Optimize hemodynamics — titrate vasopressors, target MAP >= 65"
    tools: ["createClinicalOrder"]
    critical: true
  - step: 6
    action: "Adjust ventilator — reduce FiO2, target normoxia and normocapnia"
    tools: ["createClinicalOrder"]
    critical: true
  - step: 7
    action: "Administer dual antiplatelet for STEMI"
    tools: ["createClinicalOrder"]
    critical: true
  - step: 8
    action: "Order continuous EEG and glucose management"
    tools: ["createClinicalOrder"]
    critical: true
  - step: 9
    action: "Arrange ICU admission"
    tools: ["createClinicalOrder"]
    critical: true
  - step: 10
    action: "Document resuscitation and post-ROSC care bundle"
    tools: ["updateEncounter"]
    critical: true

metadata:
  openem_condition: "cardiac_arrest"
  expected_tool_calls: "14-20"
  entity_types: 8
  time_pressure: "critical"
  cognitive_load: "extreme"
  teaching_point: "Post-ROSC care bundle: (1) TTM 32-36C for 24 hours in comatose survivors. (2) Avoid hyperoxia — target SpO2 94-98%, titrate FiO2 down. (3) Avoid hypotension — MAP >= 65, vasopressors as needed. (4) Coronary angiography for STEMI regardless of coma. (5) Avoid premature neuroprognostication — wait at least 72 hours after normothermia. (6) Continuous EEG for seizure detection. (7) Glucose 140-180 mg/dL. TTM and PCI should proceed in parallel, not sequentially."
