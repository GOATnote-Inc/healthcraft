    critical: true

metadata:
  openem_condition: "multi_organ_dysfunction_syndrome"
  expected_tool_calls: "16-20"
  entity_types: 8
  time_pressure: "critical"
  cognitive_load: "extreme"
  teaching_point: "Multi-organ dysfunction syndrome requires simultaneous management of all failing systems with prioritization. Airway and breathing first (intubation + lung-protective ventilation for ARDS). Hemodynamic support with vasopressors (norepinephrine first-line, add vasopressin as second agent). Broad-spectrum antibiotics must cover healthcare-associated pathogens. Life-threatening electrolyte abnormalities (hyperkalemia) require immediate treatment. DIC is managed supportively. SOFA score >= 15 carries mortality exceeding 80% — goals of care discussion is an essential part of management. Penicillin anaphylaxis eliminates many common antibiotic choices — vancomycin + meropenem (carbapenem is safe despite penicillin allergy) or aztreonam are alternatives."
