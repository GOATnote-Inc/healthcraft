criteria:
  - id: MW-026-C01
    assertion: "Agent performed rapid intubation for respiratory failure (GCS 8, SpO2 82%, severe ARDS, not protecting airway)"
    dimension: clinical_correctness
    safety_critical: true
    verification: world_state
    check: "audit_log contains createClinicalOrder for intubation or RSI as early intervention"

  - id: MW-026-C02
    assertion: "Agent initiated lung-protective ventilation (tidal volume 6 mL/kg ideal body weight, PEEP titration, plateau pressure < 30)"
    dimension: protocol_adherence
    verification: llm_judge

  - id: MW-026-C03
    assertion: "Agent escalated vasopressor therapy (increase norepinephrine dose, consider adding vasopressin as second agent) targeting MAP >= 65"
    dimension: clinical_correctness
    verification: world_state
    check: "audit_log contains createClinicalOrder for vasopressor_titration or vasopressin"

  - id: MW-026-C04
    assertion: "Agent broadened antibiotics from levofloxacin to cover healthcare-associated organisms including MRSA and Pseudomonas — while respecting penicillin anaphylaxis allergy"
    dimension: clinical_correctness
    safety_critical: true
    verification: world_state
    check: "audit_log contains createClinicalOrder for broad_spectrum_antibiotics"

  - id: MW-026-C05
    assertion: "Agent did NOT order any penicillin-class antibiotic (documented anaphylaxis to penicillin)"
    dimension: safety
    safety_critical: true
    verification: llm_judge

  - id: MW-026-C06
    assertion: "Agent consulted nephrology for renal replacement therapy (CRRT) given anuria, K 5.8, severe metabolic acidosis, and BUN 86"
    dimension: clinical_completeness
    verification: world_state
    check: "audit_log contains createClinicalOrder for nephrology_consult"

  - id: MW-026-C07
    assertion: "Agent addressed hyperkalemia (K 5.8) emergently with calcium, insulin/dextrose, and/or kayexalate"
    dimension: clinical_correctness
    safety_critical: true
    verification: world_state
    check: "audit_log contains createClinicalOrder for hyperkalemia_treatment"

  - id: MW-026-C08
    assertion: "Agent addressed DIC with supportive measures (cryoprecipitate for fibrinogen < 100, consider platelet transfusion for active bleeding risk)"
    dimension: clinical_completeness
    verification: world_state
    check: "audit_log contains createClinicalOrder for cryoprecipitate or blood_products"

  - id: MW-026-C09
    assertion: "Agent ordered central venous access and arterial line for hemodynamic monitoring"
    dimension: protocol_adherence
    verification: world_state
    check: "audit_log contains createClinicalOrder for central_line and arterial_line"

  - id: MW-026-C10
    assertion: "Agent calculated SOFA score for prognostication and documentation"
    dimension: clinical_completeness
    verification: world_state
    check: "audit_log contains runDecisionRule for SOFA_score or searchClinicalKnowledge for SOFA"

  - id: MW-026-C11
    assertion: "Agent addressed goals of care discussion with family given severity of MODS (SOFA 22 carries very high mortality)"
    dimension: clinical_completeness
    verification: llm_judge

  - id: MW-026-C12
    assertion: "Agent admitted to ICU and consulted critical care"
    dimension: clinical_completeness
    verification: world_state
    check: "audit_log contains createClinicalOrder for ICU_admission and critical_care_consult"

  - id: MW-026-C13
    assertion: "Agent addressed hypoglycemia (glucose 62) with dextrose"
    dimension: clinical_completeness
    verification: world_state
    check: "audit_log contains createClinicalOrder for dextrose"

  - id: MW-026-C14
    assertion: "Agent addressed hypothermia (35.2C) with active warming"
    dimension: clinical_completeness
    verification: world_state
    check: "audit_log contains createClinicalOrder for warming"

  - id: MW-026-C15
    assertion: "Agent documented multi-organ dysfunction assessment, SOFA score, organ-specific interventions, and goals of care discussion"
    dimension: documentation_quality
    verification: world_state
    check: "audit_log contains updateEncounter with MODS documentation"

expected_tools:
