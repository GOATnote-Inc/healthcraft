    critical: true
  - step: 5
    action: "Treat hyperkalemia emergently"
    tools: ["createClinicalOrder"]
    critical: true
  - step: 6
    action: "Address DIC (cryoprecipitate, consider platelets), hypoglycemia, hypothermia"
    tools: ["createClinicalOrder"]
    critical: true
  - step: 7
    action: "Place central line and arterial line"
    tools: ["createClinicalOrder"]
    critical: true
  - step: 8
    action: "Calculate SOFA score, consult nephrology for CRRT"
    tools: ["runDecisionRule", "createClinicalOrder"]
    critical: true
  - step: 9
    action: "Consult critical care, admit to ICU"
    tools: ["createClinicalOrder", "checkResourceAvailability"]
    critical: true
  - step: 10
