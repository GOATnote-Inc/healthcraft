# HEALTHCRAFT Task Definition: Multi-Organ Failure Triage and Stabilization
# Category: multi_step_workflows | Level: 5
# Tests simultaneous management of multiple failing organ systems: respiratory,
# cardiovascular, renal, hepatic, and hematologic.

id: MW-026
category: multi_step_workflows
level: 5
title: "Multi-Organ Failure — Triage and Stabilization"
system_prompt_override: null

description: |
  A 72-year-old male is transferred from a skilled nursing facility for progressive
  deterioration over 48 hours. He was initially seen for community-acquired
  pneumonia 5 days ago and started on levofloxacin. Despite treatment, he has
  progressed to multi-organ dysfunction syndrome (MODS). He is now in acute
  hypoxic respiratory failure (SpO2 82% on 15L non-rebreather, bilateral
  infiltrates consistent with ARDS), distributive shock requiring vasopressors
  (BP 68/38 on norepinephrine started at the nursing facility), acute kidney
  injury with anuria (Cr 4.8, baseline 1.2), new coagulopathy (INR 2.4, Plt 42),
  hepatic dysfunction (AST 420, bilirubin 6.2), and altered mental status (GCS 8).
  Lactate is 9.2 mmol/L. SOFA score is 18. The agent must simultaneously manage
  multiple failing organ systems: intubation for respiratory failure, vasopressor
  optimization for shock, broad-spectrum antibiotics (upgrade from levofloxacin),
  renal replacement therapy evaluation, coagulopathy management, and ICU admission.
  This is the most complex multi-system management scenario.

