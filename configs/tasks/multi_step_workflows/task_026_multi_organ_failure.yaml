expected_sequence:
  - step: 1
    action: "Assess patient, review transfer records, identify multi-organ failure"
    tools: ["getEncounterDetails", "getPatientHistory"]
    critical: true
  - step: 2
    action: "Intubate for respiratory failure — lung-protective ventilation"
    tools: ["createClinicalOrder"]
    critical: true
  - step: 3
    action: "Escalate vasopressors, add vasopressin"
