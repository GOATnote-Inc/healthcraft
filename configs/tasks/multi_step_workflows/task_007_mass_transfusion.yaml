    anesthesia: "in-house, responding"
    orthopedics: "on-call, 15-minute response"
    interventional_radiology: "Dr. Yuki Tanaka — on-call, 25-minute response"
    vascular_surgery: "on-call, 30-minute response"
  blood_bank:
    type_o_negative: "6 units available"
    type_o_positive: "12 units available"
    ffp_thawed: "4 units available"
    platelets: "2 units available"
    cryoprecipitate: "10 units available"
    mtp_cooler: "ready for release"
  or_status: "OR 1 available in 10 minutes, OR 2 occupied"

