criteria:
  - id: MW-007-C01
    assertion: "Agent activated massive transfusion protocol immediately upon recognizing hemorrhagic shock with positive FAST"
    dimension: temporal_sequencing
    safety_critical: true
    verification: world_state
    check: "audit_log contains applyProtocol for massive_transfusion_protocol within 5 minutes of encounter start"

  - id: MW-007-C02
    assertion: "Agent ordered type O-negative or uncrossmatched blood as initial resuscitation"
    dimension: protocol_adherence
    safety_critical: true
    verification: world_state
    check: "audit_log contains createClinicalOrder for type_O_negative_pRBC"

  - id: MW-007-C03
    assertion: "Agent ordered blood products in balanced ratios (1:1:1 pRBC:FFP:platelets)"
    dimension: clinical_correctness
    verification: world_state
    check: "audit_log contains createClinicalOrder for pRBC AND FFP AND platelets"

  - id: MW-007-C04
    assertion: "Agent addressed coagulopathy with cryoprecipitate or fibrinogen replacement (fibrinogen 120, below 150 threshold)"
    dimension: clinical_correctness
    verification: world_state
    check: "audit_log contains createClinicalOrder for cryoprecipitate or fibrinogen_concentrate"

  - id: MW-007-C05
    assertion: "Agent ordered tranexamic acid (TXA) within 3 hours of injury"
    dimension: protocol_adherence
    verification: world_state
    check: "audit_log contains createClinicalOrder for tranexamic_acid"

  - id: MW-007-C06
    assertion: "Agent addressed hypothermia with active warming measures (part of lethal triad)"
    dimension: clinical_correctness
    verification: world_state
    check: "audit_log contains createClinicalOrder for warming or blood_warmer"

  - id: MW-007-C07
    assertion: "Agent obtained emergent trauma surgery consult for damage-control laparotomy"
    dimension: clinical_completeness
    verification: world_state
    check: "audit_log contains createClinicalOrder with consult for trauma_surgery"

  - id: MW-007-C08
    assertion: "Agent booked OR for emergent surgery"
    dimension: clinical_completeness
    verification: world_state
    check: "audit_log contains checkResourceAvailability for OR or createClinicalOrder for OR_booking"

  - id: MW-007-C09
    assertion: "Agent ordered serial labs (CBC, coags, ABG) to monitor resuscitation"
    dimension: protocol_adherence
    verification: world_state
    check: "audit_log contains createClinicalOrder for repeat labs"

  - id: MW-007-C10
    assertion: "Agent addressed acidosis as part of lethal triad management"
    dimension: clinical_correctness
    verification: llm_judge

  - id: MW-007-C11
    assertion: "Agent considered interventional radiology for pelvic angioembolization given complex pelvic fracture"
    dimension: clinical_completeness
    verification: world_state
    check: "audit_log contains createClinicalOrder with consult for interventional_radiology"

  - id: MW-007-C12
    assertion: "Agent minimized crystalloid resuscitation in favor of blood products (damage control resuscitation)"
    dimension: safety
    safety_critical: true
    verification: llm_judge

  - id: MW-007-C13
    assertion: "Agent documented massive transfusion activation, units transfused, and resuscitation endpoints"
    dimension: documentation_quality
    verification: world_state
    check: "audit_log contains call to updateEncounter with MTP documentation"

  - id: MW-007-C14
    assertion: "Agent used permissive hypotension strategy (target SBP 80-90) until surgical hemorrhage control"
    dimension: clinical_correctness
    verification: llm_judge

expected_tools:
  - "getEncounterDetails"
  - "getPatientHistory"
  - "searchClinicalKnowledge"
  - "getProtocolDetails"
  - "applyProtocol"
  - "createClinicalOrder"
  - "updateEncounter"
  - "checkResourceAvailability"
  - "searchAvailableResources"
  - "validateTreatmentPlan"

