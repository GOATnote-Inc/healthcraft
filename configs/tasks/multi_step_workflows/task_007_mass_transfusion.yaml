    tools: ["createClinicalOrder"]
    critical: false
  - step: 9
    action: "Book OR, confirm availability"
    tools: ["checkResourceAvailability"]
    critical: true
  - step: 10
    action: "Order serial labs for resuscitation monitoring"
    tools: ["createClinicalOrder"]
    critical: true
  - step: 11
    action: "Document MTP activation, products given, resuscitation status"
    tools: ["updateEncounter"]
    critical: true

metadata:
  openem_condition: "hemorrhagic_shock"
  expected_tool_calls: "12-16"
  entity_types: 9
  time_pressure: "critical"
  cognitive_load: "very_high"
  teaching_point: "Massive transfusion protocol: 1:1:1 pRBC:FFP:platelets. Damage control resuscitation: minimize crystalloid, permissive hypotension (SBP 80-90), address lethal triad (hypothermia, acidosis, coagulopathy). TXA within 3 hours of injury. Fibrinogen <150 requires cryoprecipitate. Complex pelvic fractures may need IR angioembolization in addition to surgical hemorrhage control."
