    tools: ["createClinicalOrder"]
    critical: true
  - step: 6
    action: "Address lethal triad: warming, monitor acidosis"
    tools: ["createClinicalOrder"]
    critical: true
  - step: 7
    action: "Consult trauma surgery for damage-control laparotomy"
    tools: ["createClinicalOrder"]
    critical: true
  - step: 8
