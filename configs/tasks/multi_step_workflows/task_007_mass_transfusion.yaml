# HEALTHCRAFT Task Definition: Mass Transfusion
# Category: multi_step_workflows | Level: 5
# Tests massive transfusion protocol activation and execution for
# hemorrhaging trauma patient with coordinated resuscitation.

id: MW-007
category: multi_step_workflows
level: 5
title: "Mass Transfusion"
system_prompt_override: null

description: |
  A 42-year-old male is brought by EMS from an industrial accident — a steel beam
  fell across his pelvis and lower abdomen. He is conscious but pale, tachycardic
  to 140, and hypotensive at 68/38 despite 2 liters of NS en route. His abdomen
  is rigid and distending. FAST exam reveals large-volume free fluid in all four
  quadrants. Pelvis is mechanically unstable. Labs show hemoglobin 6.2 and
  coagulopathy with INR 1.6 and fibrinogen 120. The agent must activate the
  massive transfusion protocol, coordinate blood product delivery in 1:1:1 ratios,
  manage the lethal triad (hypothermia, acidosis, coagulopathy), obtain emergent
  surgical consult, and prepare for damage-control laparotomy.

