  - step: 1
    action: "Assess patient, review FAST and vitals, recognize hemorrhagic shock"
    tools: ["getEncounterDetails"]
    critical: true
  - step: 2
    action: "Activate massive transfusion protocol"
    tools: ["applyProtocol"]
    critical: true
  - step: 3
    action: "Order type O-negative pRBC stat"
    tools: ["createClinicalOrder"]
    critical: true
  - step: 4
