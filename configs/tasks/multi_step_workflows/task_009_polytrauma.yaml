metadata:
  openem_condition: "polytrauma"
  expected_tool_calls: "14-20"
  entity_types: 11
  time_pressure: "critical"
  cognitive_load: "extreme"
  teaching_point: "Polytrauma prioritization: life-threatening injuries first. Epidural hematoma with herniation signs (anisocoria, GCS <8) requires emergent craniotomy — this takes priority over orthopedic fixation. Splenic laceration with active extravasation may need OR or IR. Competing surgical priorities require explicit triage communication. Always screen for compartment syndrome with long bone fractures."
