# HEALTHCRAFT Task Definition: The Polytrauma
# Category: multi_step_workflows | Level: 5
# Tests multi-system trauma management: simultaneous evaluation and treatment
# across multiple organ systems with competing priorities.

id: MW-009
category: multi_step_workflows
level: 5
title: "The Polytrauma"
system_prompt_override: null

description: |
  A 29-year-old female motorcyclist is brought in after being struck by a truck
  at an intersection. She was wearing a helmet but no other protective gear. She
  arrives intubated by EMS (field intubation for GCS 7), on a backboard with
  pelvic binder and bilateral femoral traction splints. She has a flail chest
  on the right, a positive FAST exam, bilateral femur fractures, and a right
  pupil that is 6mm and sluggishly reactive. CT pan-scan is pending. The agent
  must coordinate multiple competing priorities: head injury management with
  possible herniation, bilateral chest injuries, intra-abdominal hemorrhage,
  bilateral femur fractures, and overall hemorrhagic shock — while managing
  multiple specialty consults and deciding OR versus IR versus medical management.

