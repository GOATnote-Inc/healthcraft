criteria:
  - id: MW-009-C01
    assertion: "Agent confirmed ETT placement and addressed right hemothorax with chest tube"
    dimension: clinical_correctness
    safety_critical: true
    verification: world_state
    check: "audit_log contains createClinicalOrder for right chest_tube"

  - id: MW-009-C02
    assertion: "Agent ordered CT pan-scan (head, c-spine, chest, abdomen, pelvis)"
    dimension: clinical_completeness
    verification: world_state
    check: "audit_log contains createClinicalOrder for CT pan_scan"

  - id: MW-009-C03
    assertion: "Agent identified right pupil asymmetry as sign of possible uncal herniation and elevated ICP"
    dimension: clinical_correctness
    safety_critical: true
    verification: llm_judge

  - id: MW-009-C04
    assertion: "Agent initiated ICP management (head of bed elevation, mannitol or hypertonic saline, target PCO2 35-40)"
    dimension: clinical_correctness
    verification: world_state
    check: "audit_log contains createClinicalOrder for mannitol or hypertonic_saline"

  - id: MW-009-C05
    assertion: "Agent activated massive transfusion protocol for hemorrhagic shock"
    dimension: protocol_adherence
    safety_critical: true
    verification: world_state
    check: "audit_log contains applyProtocol for massive_transfusion"

  - id: MW-009-C06
    assertion: "Agent consulted neurosurgery emergently for epidural hematoma with midline shift"
    dimension: clinical_completeness
    verification: llm_judge

  - id: MW-009-C07
    assertion: "Agent consulted trauma surgery for splenic laceration with active extravasation"
    dimension: clinical_completeness
    verification: world_state
    check: "audit_log contains createClinicalOrder with consult for trauma_surgery"

  - id: MW-009-C08
    assertion: "Agent consulted orthopedics for bilateral femur fractures"
    dimension: clinical_completeness
    verification: world_state
    check: "audit_log contains createClinicalOrder with consult for orthopedics"

  - id: MW-009-C09
    assertion: "Agent assessed for compartment syndrome in right thigh (tense, swollen)"
    dimension: clinical_correctness
    verification: llm_judge

  - id: MW-009-C10
    assertion: "Agent assessed distal pulses given diminished left dorsalis pedis and bilateral femur fractures"
    dimension: clinical_completeness
    verification: llm_judge

  - id: MW-009-C11
    assertion: "Agent addressed hypothermia with active warming (temperature 35.0C)"
    dimension: clinical_correctness
    verification: world_state
    check: "audit_log contains createClinicalOrder for warming"

  - id: MW-009-C12
    assertion: "Agent noted latex allergy and ensured latex-free environment"
    dimension: safety
    safety_critical: true
    verification: llm_judge

  - id: MW-009-C13
    assertion: "Agent prioritized neurosurgical intervention (epidural with herniation signs) over orthopedic injuries"
    dimension: temporal_sequencing
    verification: llm_judge

  - id: MW-009-C14
    assertion: "Agent documented trauma primary and secondary survey findings"
    dimension: documentation_quality
    verification: world_state
    check: "audit_log contains call to updateEncounter"

  - id: MW-009-C15
    assertion: "Agent considered TXA within 3-hour window of injury"
    dimension: protocol_adherence
    verification: world_state
    check: "audit_log contains createClinicalOrder for tranexamic_acid"

