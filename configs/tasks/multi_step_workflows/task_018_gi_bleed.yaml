# HEALTHCRAFT Task Definition: Acute GI Bleed Management
# Category: multi_step_workflows | Level: 4
# Tests upper GI bleed workup: resuscitation, risk stratification,
# GI consult, PPI therapy, and transfusion management.

id: MW-018
category: multi_step_workflows
level: 4
title: "Acute GI Bleed — Resuscitation and GI Consult"
system_prompt_override: null

description: |
  A 58-year-old male with a history of cirrhosis (Child-Pugh B) and esophageal
  varices presents with large-volume hematemesis (bright red blood, approximately
  500 mL witnessed in the ED) and melena. He takes nadolol for variceal
  prophylaxis and was recently started on aspirin by his cardiologist for new atrial
  fibrillation. He appears pale, diaphoretic, and confused. HR is 126, BP 78/44,
  and hemoglobin returns at 6.2 g/dL (baseline 10.8). INR is 2.1 from his liver
  disease. The agent must execute the acute variceal hemorrhage protocol:
  aggressive resuscitation with blood products (restrictive transfusion strategy),
  octreotide infusion, empiric antibiotics (cirrhosis + GI bleed), emergent GI
  consult for endoscopy within 12 hours, correction of coagulopathy, airway
  protection assessment, and ICU admission.

