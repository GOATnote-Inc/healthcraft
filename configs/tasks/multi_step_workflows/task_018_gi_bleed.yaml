metadata:
  openem_condition: "variceal_hemorrhage"
  expected_tool_calls: "12-16"
  entity_types: 8
  time_pressure: "critical"
  cognitive_load: "high"
  teaching_point: "Variceal hemorrhage in cirrhosis requires a multi-pronged approach: restrictive transfusion (target Hgb 7-8 — overtransfusion increases portal pressure), octreotide infusion (50mcg bolus then 50mcg/hr), empiric antibiotics (ceftriaxone 1g — reduces mortality), and emergent endoscopy within 12 hours. Coagulopathy correction is complex in cirrhosis — INR does not reflect true bleeding risk due to balanced coagulopathy. Aspirin should be held. Airway protection before endoscopy in altered patients."
