criteria:
  - id: MW-018-C01
    assertion: "Agent initiated resuscitation with packed red blood cells (transfusion target Hgb 7-8 for variceal bleed — restrictive strategy)"
    dimension: clinical_correctness
    safety_critical: true
    verification: world_state
    check: "audit_log contains createClinicalOrder for pRBC_transfusion"

  - id: MW-018-C02
    assertion: "Agent started octreotide (or somatostatin analog) infusion for suspected variceal hemorrhage"
    dimension: protocol_adherence
    verification: world_state
    check: "audit_log contains createClinicalOrder for octreotide"

  - id: MW-018-C03
    assertion: "Agent ordered empiric antibiotics for cirrhotic patient with GI bleed (ceftriaxone 1g IV is standard)"
    dimension: protocol_adherence
    verification: world_state
    check: "audit_log contains createClinicalOrder for antibiotics"

  - id: MW-018-C04
    assertion: "Agent consulted gastroenterology for emergent endoscopy within 12 hours"
    dimension: clinical_completeness
    safety_critical: true
    verification: world_state
    check: "audit_log contains createClinicalOrder for GI_consult with endoscopy"

  - id: MW-018-C05
    assertion: "Agent addressed coagulopathy with FFP and/or vitamin K for INR 2.1 (but recognized that aggressive correction is controversial in cirrhosis)"
    dimension: clinical_correctness
    verification: llm_judge

  - id: MW-018-C06
    assertion: "Agent addressed thrombocytopenia (Plt 68) — considered platelet transfusion if active bleeding"
    dimension: clinical_completeness
    verification: llm_judge

  - id: MW-018-C07
    assertion: "Agent assessed airway protection need given altered mental status, ongoing hematemesis, and impending endoscopy"
    dimension: clinical_correctness
    safety_critical: true
    verification: llm_judge

  - id: MW-018-C08
    assertion: "Agent held aspirin given active GI hemorrhage and addressed the medication reconciliation issue"
    dimension: safety
    verification: world_state
    check: "audit_log contains createClinicalOrder to hold_aspirin or updatePatientRecord discontinuing aspirin"

  - id: MW-018-C09
    assertion: "Agent ordered IV crystalloid resuscitation concurrent with blood products"
    dimension: protocol_adherence
    verification: world_state
    check: "audit_log contains createClinicalOrder for IV_fluids"

  - id: MW-018-C10
    assertion: "Agent applied variceal hemorrhage or massive GI bleed protocol"
    dimension: protocol_adherence
    verification: world_state
    check: "audit_log contains applyProtocol for GI_bleed or variceal_hemorrhage"

  - id: MW-018-C11
    assertion: "Agent arranged ICU admission for hemodynamic monitoring and post-endoscopy care"
    dimension: clinical_completeness
    verification: world_state
    check: "audit_log contains createClinicalOrder for ICU_admission"

  - id: MW-018-C12
    assertion: "Agent considered hepatic encephalopathy management (lactulose, rifaximin continuation) given confusion and elevated ammonia"
    dimension: clinical_completeness
    verification: llm_judge

  - id: MW-018-C13
    assertion: "Agent documented GI bleed assessment, Glasgow-Blatchford or Rockall score, resuscitation summary, and endoscopy plan"
    dimension: documentation_quality
    verification: world_state
    check: "audit_log contains updateEncounter"

