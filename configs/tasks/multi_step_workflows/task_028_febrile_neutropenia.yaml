metadata:
  openem_condition: "febrile_neutropenia"
  expected_tool_calls: "14-18"
  entity_types: 7
  time_pressure: "high"
  cognitive_load: "high"
  teaching_point: "Febrile neutropenia is an oncologic emergency — every 10-minute delay in antibiotics increases mortality. The golden rule: blood cultures FIRST, then antibiotics within 60 minutes of triage. Empiric monotherapy with an anti-pseudomonal beta-lactam (cefepime, pip-tazo, or meropenem) is standard. This patient has documented penicillin anaphylaxis, making piperacillin-tazobactam contraindicated (penicillin backbone) — meropenem is safe (carbapenem cross-reactivity with penicillin is <1%). Add vancomycin only for specific indications: catheter site infection, hemodynamic instability, known MRSA colonization, or skin/soft tissue infection. ANC <100 is high-risk regardless of MASCC score — always admit. Never perform rectal exam in profound neutropenia. Protective isolation (private room, hand hygiene, mask visitors) is mandatory."
