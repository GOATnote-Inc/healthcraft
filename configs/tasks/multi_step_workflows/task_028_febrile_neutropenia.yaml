# HEALTHCRAFT Task Definition: Febrile Neutropenia Protocol
# Category: multi_step_workflows | Level: 4
# Tests febrile neutropenia management: urgent workup, empiric broad-spectrum
# antibiotics within 60 minutes, isolation, risk stratification, and oncology consult.

id: MW-028
category: multi_step_workflows
level: 4
title: "Febrile Neutropenia — Urgent Workup, Empiric Antibiotics, and Isolation"
system_prompt_override: null

description: |
  A 47-year-old female undergoing chemotherapy for acute myeloid leukemia (AML)
  presents with fever (39.4C), rigors, and malaise that began 3 hours ago. She
  completed cycle 2 of 7+3 induction chemotherapy (cytarabine + daunorubicin) 10
  days ago. Her oncologist warned her to come to the ED immediately if she developed
  a fever. She appears ill but is hemodynamically stable. Labs reveal an ANC of 80
  cells/mcL (profoundly neutropenic), WBC 0.3, and a mildly elevated lactate of 2.8.
  Blood cultures have not yet been drawn. She has a tunneled central line (Hickman
  catheter) in the right subclavian vein with mild erythema at the exit site. The
  agent must execute the febrile neutropenia protocol with extreme urgency:
  obtain blood cultures (peripheral AND from each central line lumen) BEFORE
  antibiotics, initiate empiric anti-pseudomonal beta-lactam within 60 minutes of
  triage, place the patient in protective isolation, perform MASCC risk
  stratification, consult oncology/hematology, and address the possible line
  infection. Every 10-minute delay in antibiotics increases mortality in
  neutropenic sepsis.

