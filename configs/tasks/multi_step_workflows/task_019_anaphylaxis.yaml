metadata:
  openem_condition: "anaphylaxis"
  expected_tool_calls: "10-14"
  entity_types: 6
  time_pressure: "critical"
  cognitive_load: "moderate"
  teaching_point: "Epinephrine IM is the FIRST and most important treatment for anaphylaxis — there is no contraindication in anaphylaxis. Repeat every 5-15 minutes if symptoms persist. H1/H2 blockers and corticosteroids are adjunctive only and should never delay epinephrine. Biphasic reactions occur in up to 20% of cases, typically 1-72 hours after initial reaction — observe severe presentations for minimum 4-6 hours. All patients should be discharged with an EpiPen prescription and allergy referral."
