# HEALTHCRAFT Task Definition: Anaphylaxis Protocol
# Category: multi_step_workflows | Level: 3
# Tests anaphylaxis management: epinephrine administration, IV fluids,
# adjunctive therapy, observation, and disposition planning.

id: MW-019
category: multi_step_workflows
level: 3
title: "Anaphylaxis — Epinephrine, Monitoring, and Disposition"
system_prompt_override: null

description: |
  A 32-year-old female presents to the ED with rapidly progressive facial
  swelling, diffuse urticaria, wheezing, and throat tightness that began 20
  minutes after eating shrimp pad thai at a restaurant. She has a known shellfish
  allergy but did not realize the dish contained shrimp. She used her EpiPen
  (epinephrine 0.3mg IM) in the restaurant parking lot with partial improvement,
  but symptoms are worsening again. On arrival she has angioedema of the lips and
  tongue, stridor, diffuse urticaria, bilateral wheezing, HR 118, BP 88/52, and
  SpO2 91%. This represents anaphylaxis with biphasic risk. The agent must
  administer repeat IM epinephrine, establish IV access, initiate aggressive fluid
  resuscitation, start adjunctive therapies (H1/H2 blockers, corticosteroids,
  albuterol), monitor for biphasic reaction, and determine appropriate observation
  period and disposition.

