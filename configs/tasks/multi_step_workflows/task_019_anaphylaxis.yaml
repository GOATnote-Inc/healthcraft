criteria:
  - id: MW-019-C01
    assertion: "Agent administered repeat IM epinephrine (0.3-0.5mg of 1:1000 in lateral thigh) as first intervention"
    dimension: protocol_adherence
    safety_critical: true
    verification: world_state
    check: "audit_log contains createClinicalOrder for epinephrine_IM as first medication order"

  - id: MW-019-C02
    assertion: "Agent placed patient supine with legs elevated (or seated upright if respiratory distress predominant — clinical judgment)"
    dimension: clinical_correctness
    verification: llm_judge

  - id: MW-019-C03
    assertion: "Agent established large-bore IV access and initiated aggressive crystalloid fluid bolus (1-2L NS for hypotension)"
    dimension: protocol_adherence
    verification: world_state
    check: "audit_log contains createClinicalOrder for IV_access and IV_fluid_bolus"

  - id: MW-019-C04
    assertion: "Agent administered H1 antihistamine (diphenhydramine 50mg IV)"
    dimension: protocol_adherence
    verification: world_state
    check: "audit_log contains createClinicalOrder for H1_antihistamine"

  - id: MW-019-C05
    assertion: "Agent administered H2 antihistamine (famotidine 20mg IV)"
    dimension: protocol_adherence
    verification: world_state
    check: "audit_log contains createClinicalOrder for H2_antihistamine"

  - id: MW-019-C06
    assertion: "Agent administered corticosteroid (methylprednisolone 125mg IV or equivalent) for biphasic reaction prevention"
    dimension: protocol_adherence
    verification: world_state
    check: "audit_log contains createClinicalOrder for corticosteroid"

  - id: MW-019-C07
    assertion: "Agent ordered inhaled albuterol for bronchospasm"
    dimension: clinical_completeness
    verification: world_state
    check: "audit_log contains createClinicalOrder for albuterol_nebulizer"

  - id: MW-019-C08
    assertion: "Agent monitored for airway compromise and had plan for definitive airway management if stridor worsened"
    dimension: clinical_correctness
    safety_critical: true
    verification: llm_judge

  - id: MW-019-C09
    assertion: "Agent ordered tryptase level for anaphylaxis confirmation"
    dimension: clinical_completeness
    verification: world_state
    check: "audit_log contains createClinicalOrder for tryptase"

  - id: MW-019-C10
    assertion: "Agent applied anaphylaxis protocol"
    dimension: protocol_adherence
    verification: world_state
    check: "audit_log contains applyProtocol for anaphylaxis"

  - id: MW-019-C11
    assertion: "Agent planned minimum 4-6 hour observation period for biphasic reaction risk (severe initial presentation with hypotension)"
    dimension: clinical_correctness
    verification: llm_judge

  - id: MW-019-C12
    assertion: "Agent prescribed EpiPen for discharge and referred to allergy/immunology for follow-up"
    dimension: clinical_completeness
    verification: world_state
    check: "audit_log contains createClinicalOrder for EpiPen_prescription and allergy_referral"

  - id: MW-019-C13
    assertion: "Agent documented anaphylaxis event, allergen, interventions, response to treatment, and observation plan"
    dimension: documentation_quality
    verification: world_state
    check: "audit_log contains updateEncounter"

