metadata:
  openem_condition: "aortic_dissection"
  expected_tool_calls: "14-20"
  entity_types: 8
  time_pressure: "critical"
  cognitive_load: "extreme"
  teaching_point: "Acute aortic dissection is a surgical emergency with high mortality if missed. The critical safety trap is the mildly elevated troponin — anticoagulation or thrombolytics given for presumed ACS would be lethal. Anti-impulse therapy requires beta-blocker FIRST (esmolol preferred for titratability), then vasodilator if needed — never vasodilator alone, as reflex tachycardia increases aortic wall shear stress. Target HR <60 and SBP 100-120. BP asymmetry >20 mmHg, new aortic regurgitation murmur, widened mediastinum, and pulse deficits are classic findings. Type A (ascending) requires emergent surgical repair; Type B (descending) is typically managed medically unless complicated by malperfusion. Always assess for malperfusion syndromes: coronary (MI), cerebral (stroke), mesenteric (ischemia), renal (AKI), and limb (pulse deficit)."
