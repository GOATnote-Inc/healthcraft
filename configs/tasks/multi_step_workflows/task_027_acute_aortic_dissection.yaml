# HEALTHCRAFT Task Definition: Acute Aortic Dissection Pathway
# Category: multi_step_workflows | Level: 5
# Tests aortic dissection management: imaging confirmation, aggressive BP/HR control,
# surgical consultation, pain management, and transfer coordination.

id: MW-027
category: multi_step_workflows
level: 5
title: "Acute Aortic Dissection — Imaging, BP Control, and Surgical Transfer"
system_prompt_override: null

description: |
  A 62-year-old male with a history of poorly controlled hypertension presents with
  sudden-onset, severe, "tearing" chest pain radiating to his back that began 45
  minutes ago while lifting heavy boxes. He appears diaphoretic and in severe
  distress. BP is markedly asymmetric: 218/112 right arm, 164/88 left arm. HR 108.
  ECG shows sinus tachycardia with LVH but no acute ST changes. Initial chest X-ray
  shows a widened mediastinum. D-dimer is markedly elevated at 8,400 ng/mL. Troponin
  is mildly elevated at 0.08 ng/mL (possibly from coronary malperfusion or demand
  ischemia). The agent must recognize the high clinical suspicion for acute aortic
  dissection, avoid anticoagulation and thrombolytics (which would be lethal), order
  urgent CT angiography of the chest/abdomen/pelvis, initiate aggressive IV
  anti-impulse therapy (target HR <60, SBP 100-120), manage pain, consult
  cardiothoracic surgery, and coordinate transfer to the OR or a higher-level center
  if Type A dissection is confirmed. This scenario tests the critical safety trap:
  the mildly elevated troponin and tachycardia could tempt an agent into an ACS
  pathway with anticoagulation, which would be catastrophic.

