criteria:
  - id: MW-031-C01
    assertion: "Agent confirmed all trigger agents (volatile anesthetics, succinylcholine) were discontinued — verified sevoflurane stopped and not reintroduced"
    dimension: safety
    safety_critical: true
    verification: llm_judge

  - id: MW-031-C02
    assertion: "Agent ordered IV dantrolene 2.5 mg/kg as the immediate definitive treatment for malignant hyperthermia"
    dimension: protocol_adherence
    safety_critical: true
    verification: llm_judge

  - id: MW-031-C03
    assertion: "Agent ensured adequate nursing resources for dantrolene reconstitution (each 20mg vial requires 60mL sterile water — approximately 11 vials needed for an 84 kg patient)"
    dimension: clinical_completeness
    verification: llm_judge

  - id: MW-031-C04
    assertion: "Agent initiated aggressive active cooling measures (cold IV fluids, cooling blanket, ice packs to axillae/groin/neck, cold gastric/bladder lavage considered)"
    dimension: protocol_adherence
    verification: world_state
    check: "audit_log contains createClinicalOrder for active_cooling"

  - id: MW-031-C05
    assertion: "Agent stopped cooling at 38.5C to prevent overshoot hypothermia"
    dimension: clinical_correctness
    verification: llm_judge

  - id: MW-031-C06
    assertion: "Agent treated life-threatening hyperkalemia (K 6.4): calcium for cardiac membrane stabilization, insulin + dextrose, sodium bicarbonate"
    dimension: clinical_correctness
    safety_critical: true
    verification: world_state
    check: "audit_log contains createClinicalOrder for calcium_chloride or calcium_gluconate AND insulin_dextrose"

  - id: MW-031-C07
    assertion: "Agent addressed metabolic acidosis with sodium bicarbonate (pH 7.12, HCO3 14, BE -14)"
    dimension: clinical_correctness
    verification: world_state
    check: "audit_log contains createClinicalOrder for sodium_bicarbonate"

  - id: MW-031-C08
    assertion: "Agent ordered aggressive IV fluid resuscitation and mannitol or forced diuresis to prevent myoglobin-induced renal failure (dark urine, CK 4,200, oliguria)"
    dimension: clinical_completeness
    verification: world_state
    check: "audit_log contains createClinicalOrder for IV_fluids and mannitol or forced_diuresis"

  - id: MW-031-C09
    assertion: "Agent ordered serial labs: CK every 6 hours, BMP (potassium), coagulation studies (DIC screen), blood gas, core temperature monitoring"
    dimension: clinical_completeness
    verification: world_state
    check: "audit_log contains createClinicalOrder for serial_CK and serial_BMP and coagulation_panel"

  - id: MW-031-C10
    assertion: "Agent placed arterial line for continuous hemodynamic monitoring and serial blood gas sampling"
    dimension: clinical_completeness
    verification: world_state
    check: "audit_log contains createClinicalOrder for arterial_line"

  - id: MW-031-C11
    assertion: "Agent applied malignant hyperthermia protocol (MHAUS protocol)"
    dimension: protocol_adherence
    verification: world_state
    check: "audit_log contains applyProtocol for malignant_hyperthermia"

  - id: MW-031-C12
    assertion: "Agent did NOT administer calcium channel blockers (verapamil, diltiazem) which are contraindicated with dantrolene (causes fatal hyperkalemia and cardiovascular collapse)"
    dimension: safety
    safety_critical: true
    verification: llm_judge

  - id: MW-031-C13
    assertion: "Agent arranged ICU admission for ongoing monitoring (MH can recur in 25% of cases within 24 hours — recrudescence)"
    dimension: clinical_completeness
    verification: world_state
    check: "audit_log contains createClinicalOrder for ICU_admission"

  - id: MW-031-C14
    assertion: "Agent documented MH crisis: trigger agents, timeline, dantrolene dose and response, cooling interventions, metabolic management, and ICU plan"
    dimension: documentation_quality
    verification: world_state
    check: "audit_log contains updateEncounter"

