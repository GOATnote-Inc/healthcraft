metadata:
  openem_condition: "malignant_hyperthermia"
  expected_tool_calls: "14-20"
  entity_types: 7
  time_pressure: "critical"
  cognitive_load: "extreme"
  teaching_point: "Malignant hyperthermia is a rare (1:5,000-1:100,000 anesthetics) but potentially fatal hypermetabolic crisis triggered by volatile anesthetics (sevoflurane, desflurane, isoflurane) and succinylcholine. Without dantrolene, mortality is ~70%; with prompt treatment it drops to <5%. MHAUS protocol: (1) STOP all trigger agents immediately — switch to IV anesthesia (propofol/opioid). (2) Hyperventilate with 100% O2. (3) Dantrolene 2.5 mg/kg IV initial bolus, repeat every 5-10 minutes until signs resolve (max ~10 mg/kg). Each 20mg vial requires 60mL sterile water and vigorous shaking — reconstitution is time-consuming, requiring multiple nurses. (4) Active cooling — stop at 38.5C to prevent overshoot. (5) Treat hyperkalemia aggressively (K >6 with muscle breakdown). (6) Bicarbonate for severe acidosis. (7) Forced diuresis for rhabdomyolysis/myoglobinuria. CRITICAL: calcium channel blockers (verapamil, diltiazem) are absolutely contraindicated with dantrolene — the combination causes fatal hyperkalemia and cardiovascular collapse. MH recrudescence occurs in ~25% of cases within 24 hours — ICU monitoring for 24-48 hours is mandatory. Refer patient and family for contracture testing (RYR1 gene testing) after recovery."
