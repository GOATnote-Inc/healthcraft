# HEALTHCRAFT Task Definition: Malignant Hyperthermia Protocol
# Category: multi_step_workflows | Level: 5
# Tests malignant hyperthermia crisis management: trigger agent removal,
# dantrolene administration, active cooling, metabolic correction,
# and ICU disposition.

id: MW-031
category: multi_step_workflows
level: 5
title: "Malignant Hyperthermia — Dantrolene, Cooling, and Metabolic Management"
system_prompt_override: null

description: |
  A 22-year-old male is brought to the ED from the adjacent outpatient surgery
  center after developing a malignant hyperthermia (MH) crisis during elective
  arthroscopic knee surgery under general anesthesia with sevoflurane and
  succinylcholine. The anesthesiologist at the surgery center recognized
  masseter muscle rigidity after succinylcholine, rapidly rising ETCO2 (from 38
  to 92 mmHg over 10 minutes), tachycardia to 148, and a temperature rising
  from 36.8C to 39.8C. The surgery center does not stock dantrolene (a known
  safety gap). They discontinued sevoflurane, switched to IV anesthesia (propofol),
  hyperventilated with 100% O2, applied ice packs, and transported the patient
  emergently to Mercy Point ED (2-minute transport). On arrival, the patient is
  intubated, tachycardic (HR 156), hyperthermic (40.2C and rising), rigid (generalized),
  with mottled skin. ABG shows mixed respiratory and metabolic acidosis. The agent
  must execute the MHAUS (Malignant Hyperthermia Association of the United States)
  protocol: confirm trigger agents discontinued, administer IV dantrolene
  2.5 mg/kg (the definitive treatment), initiate aggressive active cooling,
  treat hyperkalemia and acidosis, monitor for DIC and rhabdomyolysis, send
  CK/myoglobin/coagulation studies, and arrange ICU admission. Dantrolene
  preparation is labor-intensive (each 20mg vial requires 60mL sterile water —
  multiple vials needed) and the agent must ensure adequate nursing resources
  for reconstitution. Without dantrolene, mortality approaches 70%.

