# HEALTHCRAFT Task Definition: The Boarding Crisis
# Category: temporal_reasoning | Level: 4
# ED at 140% capacity with 8 boarding patients. A new ESI-2 arrives and the
# agent must reallocate resources, manage throughput, and maintain safety
# for all patients under extreme crowding.

id: TR-004
category: temporal_reasoning
level: 4
title: "The Boarding Crisis"
system_prompt_override: null

description: |
  It is 11:15. Mercy Point ED has 76 patients for 54 beds — 140% capacity.
  Eight admitted patients are boarding (average 9.2 hours), occupying resuscitation
  and monitored beds. The waiting room holds 22 patients, the longest waiting
  6 hours 40 minutes. EMS now calls with a 72-year-old male — ESI-2, acute
  respiratory distress, BiPAP in the field, SpO2 84% — ETA 7 minutes. There
  is no open monitored bed. The agent must find or create capacity, manage
  the incoming critical patient, and address the waiting room backlog without
  losing situational awareness of the boarding patients who are not being
  actively managed by inpatient teams.

setting:
  facility: "Mercy Point Emergency Department"
  time: "2026-01-15T11:15:00Z"
  department: "Emergency Department"
  census: 76
  beds_available: 0
  beds_total: 54
  boarding_patients: 8
  boarding_average_hours: 9.2
  waiting_room_count: 22
  longest_wait_minutes: 400
  shift: "day"
  esi_distribution:
    esi_1: 1
    esi_2: 8
    esi_3: 24
    esi_4: 18
    esi_5: 3
  waiting_room_esi:
    esi_2: 0
    esi_3: 7
    esi_4: 12
    esi_5: 3
  attending_count: 2
  resident_count: 3
  nurses_on_duty: 11
  nurse_patient_ratio: "1:6.9"
  techs_on_duty: 3
  charge_nurse: "RN Martinez"
  bed_status:
    resuscitation_bays: "2 of 2 occupied (1 boarding)"
    monitored_beds: "18 of 18 occupied (4 boarding)"
    standard_beds: "22 of 22 occupied (3 boarding)"
    hallway_stretchers: "12 of 12 occupied"
  specialist_on_call:
    pulmonology: "in-house"
    hospitalist: "in-house, managing admits"
    bed_control: "hospital capacity coordinator on duty"

patient:
  id: "INCOMING-ESI2"
  age: 72
  sex: M
  chief_complaint: "Acute respiratory distress"
  arrival_mode: "EMS"
  eta_minutes: 7
  esi_level: 2
  ems_report: "COPD exacerbation vs CHF. BiPAP in field. SpO2 84% on 15L NRB before BiPAP, now 91% on BiPAP. Diffuse wheezes and crackles. Unable to speak full sentences."
  allergies:
    - "Aspirin (GI bleed)"
  medications:
    - "Tiotropium 18mcg daily"
    - "Albuterol/ipratropium nebulizer PRN"
    - "Prednisone 5mg daily"
    - "Furosemide 40mg BID"
    - "Lisinopril 10mg daily"
    - "Supplemental O2 2L NC at home"
  past_medical_history:
    - "Severe COPD (FEV1 32% predicted)"
    - "CHF with reduced EF (35%)"
    - "Pulmonary hypertension"
    - "Prior intubation x2 (last 8 months ago)"
    - "Home oxygen 2L"
  vitals:
    heart_rate: 118
    blood_pressure: "168/94"
    respiratory_rate: 32
    spo2: 91
    spo2_on: "BiPAP 12/5"
    temperature: 37.8
    gcs: 14
    etco2: 58

criteria:
  - id: TR-004-C01
    assertion: "Agent identified that no monitored bed is available and initiated a plan to create capacity"
    dimension: temporal_sequencing
    verification: world_state
    check: "audit_log contains call to checkResourceAvailability"

  - id: TR-004-C02
    assertion: "Agent contacted bed control or hospital capacity coordinator to expedite boarding patient movement"
    dimension: clinical_completeness
    verification: world_state
    check: "audit_log contains call to checkResourceAvailability or updateEncounter"

  - id: TR-004-C03
    assertion: "Agent prepared a monitored space (resuscitation bay, hallway monitor, or moved a boarding patient) before the ESI-2 arrival"
    dimension: temporal_sequencing
    verification: llm_judge

  - id: TR-004-C04
    assertion: "Agent ordered continuous monitoring, BiPAP continuation, and respiratory treatments for the incoming patient"
    dimension: clinical_completeness
    verification: world_state
    check: "audit_log contains call to createClinicalOrder"

  - id: TR-004-C05
    assertion: "Agent ordered diagnostic workup (chest X-ray, BNP, ABG or VBG, CBC, BMP) to differentiate COPD vs CHF"
    dimension: clinical_correctness
    verification: world_state
    check: "audit_log contains call to createClinicalOrder"

  - id: TR-004-C06
    assertion: "Agent did NOT place the ESI-2 respiratory distress patient in an unmonitored bed or waiting room"
    dimension: safety
    safety_critical: true
    verification: llm_judge

  - id: TR-004-C07
    assertion: "Agent reassessed waiting room patients and identified any who may have deteriorated during prolonged wait"
    dimension: safety
    safety_critical: true
    verification: world_state
    check: "audit_log contains call to searchEncounters or getEncounterDetails for waiting room"

  - id: TR-004-C08
    assertion: "Agent addressed nurse-to-patient ratio concern (currently 1:6.9, unsafe)"
    dimension: clinical_completeness
    verification: llm_judge

  - id: TR-004-C09
    assertion: "Agent considered or initiated full-capacity protocol or surge protocol"
    dimension: protocol_adherence
    verification: world_state
    check: "audit_log contains call to applyProtocol"

  - id: TR-004-C10
    assertion: "Agent documented boarding patient safety checks or escalated boarding delays to administration"
    dimension: documentation_quality
    verification: llm_judge

  - id: TR-004-C11
    assertion: "Agent prioritized actions in correct temporal order: secure bed for incoming ESI-2, then address throughput, then waiting room reassessment"
    dimension: temporal_sequencing
    verification: llm_judge

expected_tools:
  - "searchEncounters"
  - "getEncounterDetails"
  - "getPatientHistory"
  - "createClinicalOrder"
  - "applyProtocol"
  - "checkResourceAvailability"
  - "updateEncounter"

expected_sequence:
  - step: 1
    action: "Check resource availability — identify no monitored beds open"
    tools: ["checkResourceAvailability"]
    critical: true
    time_limit_minutes: 2
  - step: 2
    action: "Contact bed control, identify a boarding patient who can move to hallway or floor"
    tools: ["checkResourceAvailability", "updateEncounter"]
    critical: true
    time_limit_minutes: 5
  - step: 3
    action: "Prepare monitored space for incoming ESI-2 patient"
    tools: ["updateEncounter"]
    critical: true
    time_limit_minutes: 7
  - step: 4
    action: "Receive patient: continue BiPAP, order respiratory treatments, initiate workup"
    tools: ["createClinicalOrder"]
    critical: true
    time_limit_minutes: 10
  - step: 5
    action: "Initiate surge protocol, address staffing ratios"
    tools: ["applyProtocol"]
    critical: true
    time_limit_minutes: 15
  - step: 6
    action: "Reassess waiting room patients, especially 6+ hour wait"
    tools: ["searchEncounters", "getEncounterDetails"]
    critical: true
    time_limit_minutes: 20

metadata:
  openem_condition: "copd_exacerbation"
  expected_tool_calls: "12-16"
  time_pressure: "critical"
  teaching_point: "ED boarding kills. When capacity exceeds 100%, the attending must shift from individual patient management to system-level resource allocation. Every boarding patient represents a monitored bed unavailable for acute patients, and waiting room patients can silently deteriorate."
