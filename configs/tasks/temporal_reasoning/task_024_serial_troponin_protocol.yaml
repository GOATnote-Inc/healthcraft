metadata:
  openem_condition: "acute_coronary_syndrome"
  expected_tool_calls: "8-12"
  entity_types: 5
  time_pressure: "moderate"
  teaching_point: "The 0/3/6-hour high-sensitivity troponin protocol is a time-locked decision tree. Each draw time is measured from the FIRST draw (T0), not from symptom onset or ED arrival. The absolute delta between T0 and T3 drives the decision — not the raw value alone. A troponin above the 99th percentile URL is necessary but not sufficient for AMI diagnosis; the delta (rise or fall pattern) distinguishes acute myocardial injury from chronic elevation. Moving the patient to an unmonitored area during an active troponin protocol is unsafe — STEMI can evolve between draws. Bed pressure is real but must never override clinical safety."
