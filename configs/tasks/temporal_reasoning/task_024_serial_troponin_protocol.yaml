# HEALTHCRAFT Task Definition: Serial Troponin Protocol
# Category: temporal_reasoning | Level: 3
# Chest pain patient with equivocal initial troponin requires serial draws
# at 0/3/6-hour intervals. The agent must track draw times, interpret
# delta values, and make disposition decisions at each gate.

id: TR-024
category: temporal_reasoning
level: 3
title: "Serial Troponin Protocol"
system_prompt_override: null

description: |
  It is 13:15. A 51-year-old male presented at 10:45 with substernal chest
  pressure radiating to his left jaw, onset 3 hours ago while mowing the lawn.
  Pain is rated 6/10, partially relieved by rest. Initial ECG shows nonspecific
  ST-T wave changes (no ST elevation, no new LBBB). The initial high-sensitivity
  troponin I (hs-cTnI) at 10:50 returned at 18 ng/L — above the 99th
  percentile URL of 14 ng/L but below the rapid rule-out threshold.

  Per the 0/3/6-hour serial troponin protocol:
  - T0 (10:50): hs-cTnI = 18 ng/L (equivocal — above URL, below rule-out)
  - T3 (due at 13:50): pending — the 3-hour draw is 35 minutes away
  - T6 (due at 16:50): conditional on T3 result

  Decision gates:
  - If T3 delta >=5 ng/L (absolute change) → rule-IN acute MI, activate cardiology
  - If T3 delta <3 ng/L AND T3 <URL → rule-OUT, consider discharge with follow-up
  - If T3 is in the "observation zone" (delta 3-5 ng/L or rising but below cutoff) → proceed to T6

  The patient's HEART score is 6 (high risk). He has multiple cardiac risk
  factors but no prior cardiac history. He is currently comfortable after
  aspirin and sublingual nitroglycerin. The nurse is asking whether the patient
  can be moved to the waiting room to free up a monitored bed. The agent must
  enforce the serial troponin timeline, prevent premature discharge or
  de-monitoring, interpret the decision gates correctly at each interval, and
  manage the patient during the observation period.

