  - "checkResourceAvailability"
  - "getProtocolDetails"

expected_sequence:
  - step: 1
    action: "Complete primary survey — identify all life threats (chest, abdomen, pelvis, femur)"
    tools: ["getEncounterDetails"]
    critical: true
    time_limit_minutes: 3
  - step: 2
    action: "Activate MTP, order O-neg blood, apply pelvic binder — address hemorrhagic shock"
    tools: ["applyProtocol", "createClinicalOrder"]
    critical: true
    time_limit_minutes: 5
  - step: 3
    action: "Address left chest — CXR or needle decompression, obtain second large-bore IV, initiate warming"
    tools: ["createClinicalOrder"]
    critical: true
    time_limit_minutes: 8
  - step: 4
    action: "Reassess after initial resuscitation — hemodynamic response to blood products"
    tools: ["getEncounterDetails"]
    critical: true
    time_limit_minutes: 12
  - step: 5
    action: "CT vs. OR decision — if hemodynamically responsive, rapid CT; if not, straight to OR"
    tools: ["createClinicalOrder", "checkResourceAvailability"]
    critical: true
    time_limit_minutes: 18
  - step: 6
    action: "Document trauma resuscitation timeline, notify OR/surgery, transfer patient"
    tools: ["updateEncounter", "createClinicalOrder"]
    critical: true
    time_limit_minutes: 25

metadata:
  openem_condition: "hemorrhagic_shock"
  expected_tool_calls: "10-15"
  entity_types: 6
  time_pressure: "extreme"
  parallel_threads: 3
  teaching_point: "The golden hour is measured from time of injury, not ED arrival. In hemorrhagic shock, blood products (1:1:1 ratio pRBC:FFP:platelets) replace crystalloid as the primary resuscitation fluid. The CT-vs-OR decision is the pivotal temporal branch point: hemodynamically unstable patients with positive FAST go directly to OR — CT is a luxury reserved for responders. The lethal triad (hypothermia, coagulopathy, acidosis) is a self-reinforcing cycle that accelerates death if not interrupted early."
