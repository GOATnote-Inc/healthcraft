# HEALTHCRAFT Task Definition: Trauma Golden Hour
# Category: temporal_reasoning | Level: 4
# High-mechanism MVC with evolving hemorrhagic shock. The agent must complete
# primary survey, identify life threats, obtain CT imaging, and make an OR
# decision — all within 60 minutes of arrival.

id: TR-022
category: temporal_reasoning
level: 4
title: "Trauma Golden Hour"
system_prompt_override: null

description: |
  It is 22:08. EMS delivers a 29-year-old male, unrestrained driver in a
  high-speed head-on MVC at approximately 60 mph. Positive steering wheel
  deformity, starred windshield, prolonged extrication (18 minutes). GCS 13
  in the field (E3V4M6), one 18g IV placed with 500mL NS running. The trauma
  team has been activated (Level 1). The clock starts now — the golden hour
  began at the time of injury, estimated at 21:35, meaning 33 minutes have
  already elapsed. The patient has 27 minutes remaining before the golden hour
  closes.

  On primary survey: airway intact but patient is tachypneic, breath sounds
  diminished on the left, abdomen is rigid and distended, pelvis is unstable
  on compression, and the left femur is angulated mid-shaft. FAST exam is
  positive in Morison's pouch and the left upper quadrant. The patient's BP
  is 82/48 and falling despite the field fluid bolus. The agent must execute
  a time-compressed trauma resuscitation: complete the primary survey, address
  immediate life threats (chest decompression if tension physiology, pelvic
  binder, massive transfusion), decide between CT and immediate OR, and
  coordinate with the trauma surgeon — all against a relentless clock.

