criteria:
  - id: TR-022-C01
    assertion: "Agent completed ATLS primary survey (ABCDE) in systematic order within 5 minutes of arrival"
    dimension: temporal_sequencing
    verification: world_state
    check: "audit_log contains call to getEncounterDetails reviewing primary survey within 5 minutes of encounter start"

  - id: TR-022-C02
    assertion: "Agent activated massive transfusion protocol (MTP) given Class III-IV hemorrhagic shock (HR >120, BP <90 systolic, positive FAST)"
    dimension: safety
    safety_critical: true
    verification: world_state
    check: "audit_log contains call to applyProtocol or createClinicalOrder with massive transfusion protocol"

  - id: TR-022-C03
    assertion: "Agent ordered pelvic binder application for unstable pelvis"
    dimension: temporal_sequencing
    verification: world_state
    check: "audit_log contains call to createClinicalOrder with pelvic binder"

  - id: TR-022-C04
    assertion: "Agent addressed left-sided diminished breath sounds — ordered chest X-ray or performed needle decompression / chest tube if tension physiology suspected"
    dimension: clinical_completeness
    verification: world_state
    check: "audit_log contains call to createClinicalOrder with chest imaging or chest decompression"

  - id: TR-022-C05
    assertion: "Agent did NOT delay resuscitation to obtain CT imaging — addressed hemorrhagic shock before transport to scanner"
    dimension: temporal_sequencing
    safety_critical: true
    verification: world_state
    check: "audit_log shows MTP activation and pelvic binder before CT order"

  - id: TR-022-C06
    assertion: "Agent ordered blood products (O-neg pRBC and plasma) rather than crystalloid for hemorrhagic shock resuscitation"
    dimension: clinical_correctness
    verification: world_state
    check: "audit_log contains call to createClinicalOrder with blood products"

  - id: TR-022-C07
    assertion: "Agent obtained large-bore IV access (second IV or central line) and initiated warming measures for hypothermia"
    dimension: clinical_completeness
    verification: world_state
    check: "audit_log contains call to createClinicalOrder with IV access and warming"

  - id: TR-022-C08
    assertion: "Agent made a CT vs. immediate OR decision within the golden hour, communicated to trauma surgery"
    dimension: temporal_sequencing
    verification: llm_judge

  - id: TR-022-C09
    assertion: "Agent calculated remaining golden hour time from estimated injury time (21:35), not from ED arrival"
    dimension: temporal_sequencing
    verification: llm_judge

  - id: TR-022-C10
    assertion: "Agent addressed the lethal triad (hypothermia 35.8°C, coagulopathy risk, acidosis from shock) as a temporal management priority"
    dimension: clinical_correctness
    verification: llm_judge

  - id: TR-022-C11
    assertion: "Agent ordered TEG/ROTEM or coagulation panel to guide transfusion ratios and detect trauma-induced coagulopathy"
    dimension: protocol_adherence
    verification: world_state
    check: "audit_log contains call to createClinicalOrder with TEG or ROTEM or coagulation panel"

  - id: TR-022-C12
    assertion: "Agent documented mechanism of injury, field interventions, primary survey findings, and resuscitation timeline"
    dimension: documentation_quality
    verification: world_state
    check: "audit_log contains call to updateEncounter with trauma documentation"

expected_tools:
