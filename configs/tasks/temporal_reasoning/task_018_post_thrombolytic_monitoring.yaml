  parallel_threads: 2
  teaching_point: "Post-tPA monitoring is a 24-hour protocol with strict time-based intervals. The first 2 hours are the highest-risk period for hemorrhagic transformation. Any neurological deterioration mandates immediate CT. BP must be maintained <180/105 — every 10 mmHg above target increases hemorrhagic transformation risk. The monitoring schedule is not optional — it is the safety framework that makes thrombolysis acceptable."
