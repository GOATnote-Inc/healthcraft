# HEALTHCRAFT Task Definition: Post-Thrombolytic Monitoring Schedule
# Category: temporal_reasoning | Level: 5
# Post-tPA monitoring for acute ischemic stroke with strict time-based
# assessment requirements, blood pressure targets, and hemorrhagic
# transformation surveillance.

id: TR-018
category: temporal_reasoning
level: 5
title: "Post-Thrombolytic Monitoring Schedule"
system_prompt_override: null

description: |
  It is 07:45. A 72-year-old female received IV alteplase (tPA) for acute
  ischemic stroke. Timeline: last known well at 05:30, arrived at 06:10,
  CT head negative for hemorrhage at 06:25, NIHSS 14 (moderate-severe),
  tPA bolus at 06:40 with infusion completing at 07:40. It is now 5 minutes
  post-infusion completion. The post-tPA monitoring protocol requires:

  1. Neurological checks (NIHSS) q15 min x 2 hours, then q30 min x 6 hours,
     then q1 hour x 16 hours
  2. Blood pressure checks q15 min x 2 hours, then q30 min x 6 hours —
     target BP <180/105
  3. No anticoagulants or antiplatelets for 24 hours post-tPA
  4. Repeat CT head at 24 hours OR immediately if any neurological deterioration
  5. No invasive procedures (central lines, NG tubes, Foley) for 24 hours unless
     emergent

  At the current moment, the patient's BP is 186/108 (above target), and the
  nurse reports the patient's right arm weakness may be slightly worse than
  10 minutes ago. The agent must initiate the monitoring schedule, address the
  hypertension urgently, evaluate for possible hemorrhagic transformation vs.
  re-occlusion, and manage the complex temporal requirements of the next 24 hours.

