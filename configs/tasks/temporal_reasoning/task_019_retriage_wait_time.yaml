# HEALTHCRAFT Task Definition: Overcrowded ED Re-Triage
# Category: temporal_reasoning | Level: 4
# Overcrowded ED where patients in the waiting room are deteriorating
# based on wait time. The agent must re-triage based on temporal
# deterioration signals and reprioritize care.

id: TR-019
category: temporal_reasoning
level: 4
title: "Overcrowded ED Re-Triage"
system_prompt_override: null

description: |
  It is 19:45. Mercy Point ED is at 100% capacity (54/54 beds) with 14
  patients in the waiting room. The charge nurse has flagged three patients
  for re-triage based on wait-time deterioration:

  1. Patient W1: 58-year-old male, triaged ESI-3 at 16:30 for "abdominal pain,
     nausea." Now 3 hours 15 minutes in the waiting room. Repeat vitals at
     19:30 show HR 112 (was 88), BP 98/62 (was 128/78), temp 38.9C (was 37.4C).
     He is now diaphoretic and pale.

  2. Patient W2: 34-year-old female, triaged ESI-4 at 17:45 for "ankle injury."
     Now 2 hours in the waiting room. She reports new chest tightness and
     difficulty breathing. She is 28 weeks pregnant (not mentioned at triage —
     she was embarrassed and only told the charge nurse when asked why she
     looked uncomfortable). SpO2 is 93%.

  3. Patient W3: 81-year-old male, triaged ESI-3 at 15:00 for "dizziness."
     Now 4 hours 45 minutes in the waiting room. He has been sitting quietly
     and "not complaining," but the charge nurse noticed he is now confused
     and cannot state the date. His wife says he was "completely normal" at
     triage.

  The agent must re-triage all three patients, identify the most time-critical,
  create bed space (identify potential discharges from current patients), and
  manage the queue — all while recognizing that prolonged wait times are
  themselves a source of clinical risk.

