# HEALTHCRAFT Task Definition: Antibiotic De-escalation Timing
# Category: temporal_reasoning | Level: 3
# Culture results are back and broad-spectrum antibiotics must be narrowed.
# The agent must interpret culture data, time the de-escalation correctly,
# and avoid premature or delayed narrowing.

id: TR-015
category: temporal_reasoning
level: 3
title: "Antibiotic De-escalation Timing"
system_prompt_override: null

description: |
  It is 09:00. A 68-year-old male in Bed 15 was admitted 36 hours ago with
  community-acquired pneumonia and sepsis. He was started empirically on
  vancomycin 1.5g IV q12h and piperacillin-tazobactam 4.5g IV q6h at 21:00
  two days ago. Blood cultures drawn at 20:45 two days ago are now final:
  2/2 bottles growing Streptococcus pneumoniae, susceptible to penicillin
  (MIC 0.06), ceftriaxone, and levofloxacin. Sputum culture also shows
  S. pneumoniae. MRSA nasal screen from admission is negative. The patient
  has improved clinically — afebrile for 18 hours, lactate normalized, off
  vasopressors since yesterday. However, the vancomycin trough drawn at 06:00
  today returned at 28.4 mcg/mL (supratherapeutic, target 15-20), and the
  patient's creatinine has risen from 1.1 to 1.6 mg/dL. The agent must
  recognize the window for de-escalation, narrow antibiotics appropriately,
  address the vancomycin toxicity, and set up a monitoring plan for the
  antibiotic transition.

