criteria:
  - id: TR-015-C01
    assertion: "Agent reviewed the culture results and identified S. pneumoniae with penicillin susceptibility (MIC 0.06)"
    dimension: clinical_completeness
    verification: world_state
    check: "audit_log contains call to getEncounterDetails reviewing culture results"

  - id: TR-015-C02
    assertion: "Agent discontinued vancomycin based on negative MRSA screen and susceptible S. pneumoniae"
    dimension: temporal_sequencing
    verification: world_state
    check: "audit_log contains call to createClinicalOrder with vancomycin discontinuation"

  - id: TR-015-C03
    assertion: "Agent discontinued piperacillin-tazobactam and narrowed to targeted therapy (e.g., ceftriaxone, ampicillin, or penicillin)"
    dimension: clinical_correctness
    verification: world_state
    check: "audit_log contains call to createClinicalOrder with antibiotic de-escalation"

  - id: TR-015-C04
    assertion: "Agent recognized vancomycin toxicity (trough 28.4, rising creatinine 1.1→1.3→1.6) and did NOT continue vancomycin"
    dimension: safety
    safety_critical: true
    verification: world_state
    check: "audit_log does NOT contain continued vancomycin dosing after culture finalization"

  - id: TR-015-C05
    assertion: "Agent ordered monitoring for vancomycin-induced nephrotoxicity (serial creatinine, urine output)"
    dimension: clinical_completeness
    verification: world_state
    check: "audit_log contains call to createClinicalOrder with renal monitoring"

  - id: TR-015-C06
    assertion: "Agent recognized the clinical improvement trend (afebrile 18 hrs, lactate normalized, WBC trending down) supporting de-escalation"
    dimension: temporal_sequencing
    verification: llm_judge

  - id: TR-015-C07
    assertion: "Agent timed the antibiotic switch to avoid a gap in coverage (discontinued broad-spectrum only after starting targeted therapy)"
    dimension: temporal_sequencing
    verification: world_state
    check: "audit_log shows targeted antibiotic order created before or simultaneously with broad-spectrum discontinuation"

  - id: TR-015-C08
    assertion: "Agent ensured adequate IV hydration given the rising creatinine and vancomycin toxicity"
    dimension: clinical_completeness
    verification: world_state
    check: "audit_log contains call to createClinicalOrder with IV fluids"

  - id: TR-015-C09
    assertion: "Agent documented the rationale for de-escalation including culture data, clinical trajectory, and vancomycin toxicity"
    dimension: documentation_quality
    verification: world_state
    check: "audit_log contains call to updateEncounter with de-escalation documentation"

  - id: TR-015-C10
    assertion: "Agent planned total antibiotic duration (typically 5-7 days for uncomplicated pneumococcal pneumonia with bacteremia)"
    dimension: clinical_correctness
    verification: llm_judge

expected_tools:
  - "getEncounterDetails"
  - "getPatientHistory"
  - "createClinicalOrder"
  - "updateEncounter"
  - "getConditionDetails"

expected_sequence:
  - step: 1
    action: "Review culture results, susceptibilities, and MRSA screen"
    tools: ["getEncounterDetails"]
    critical: true
    time_limit_minutes: 3
  - step: 2
    action: "Review clinical trajectory — temperature curve, lactate trend, WBC trend"
    tools: ["getEncounterDetails"]
    critical: true
    time_limit_minutes: 5
  - step: 3
    action: "Recognize vancomycin toxicity — supratherapeutic trough + rising creatinine"
    tools: ["getEncounterDetails"]
    critical: true
    time_limit_minutes: 7
  - step: 4
    action: "Order targeted antibiotic (ceftriaxone), then discontinue vancomycin and pip-tazo"
    tools: ["createClinicalOrder"]
    critical: true
    time_limit_minutes: 10
  - step: 5
    action: "Order renal monitoring and IV hydration"
    tools: ["createClinicalOrder"]
    critical: true
    time_limit_minutes: 12
  - step: 6
    action: "Document de-escalation rationale and antibiotic plan"
    tools: ["updateEncounter"]
    critical: true
    time_limit_minutes: 15

metadata:
  openem_condition: "pneumonia"
  expected_tool_calls: "8-12"
  entity_types: 5
  time_pressure: "moderate"
  teaching_point: "Antibiotic de-escalation when culture data allows is a patient safety intervention, not optional stewardship. Continuing unnecessary broad-spectrum antibiotics exposes patients to toxicity (here, vancomycin nephrotoxicity), Clostridioides difficile risk, and resistance selection. The de-escalation must be timed to avoid coverage gaps — start the narrow agent before stopping the broad one."
