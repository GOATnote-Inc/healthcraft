# HEALTHCRAFT Task Definition: Antibiotic Clock
# Category: temporal_reasoning | Level: 3
# Septic patient whose antibiotics have been delayed 45 minutes post
# blood-culture draw. The agent must identify the delay, escalate, and
# restore protocol compliance before outcomes worsen.

id: TR-005
category: temporal_reasoning
level: 3
title: "Antibiotic Clock"
system_prompt_override: null

description: |
  It is 08:45. A 56-year-old male presented at 07:15 with fever, tachycardia,
  and hypotension meeting SIRS criteria. Blood cultures were drawn at 08:00
  per the sepsis bundle. The 1-hour antibiotic target was 08:00 — it is now
  08:45, and antibiotics have not yet been administered. The delay was caused
  by a pharmacy verification hold on the patient's reported beta-lactam allergy.
  Each hour of antibiotic delay in sepsis increases mortality by 7.6%. The agent
  must identify the delay, determine allergy validity, choose an appropriate
  antibiotic, and get it running — all while managing the patient's hemodynamic
  deterioration.

