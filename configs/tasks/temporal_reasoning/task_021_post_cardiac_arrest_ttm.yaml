metadata:
  openem_condition: "cardiac_arrest"
  expected_tool_calls: "12-15"
  entity_types: 6
  time_pressure: "extreme"
  parallel_threads: 3
  teaching_point: "Post-cardiac arrest care involves multiple overlapping time-critical protocols. TTM must be initiated within 4 hours of ROSC but must NOT delay cath lab activation for STEMI (90-minute door-to-balloon target applies from ROSC, not from ED arrival). Rewarming rate >0.25°C/hour is associated with rebound cerebral edema. Neuroprognostication before 72 hours post-ROSC (and after rewarming) leads to premature withdrawal of care — this is a patient safety guardrail, not a suggestion."
