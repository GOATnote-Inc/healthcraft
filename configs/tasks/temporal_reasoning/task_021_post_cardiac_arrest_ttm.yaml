# HEALTHCRAFT Task Definition: Post-Cardiac Arrest Targeted Temperature Management
# Category: temporal_reasoning | Level: 4
# Post-ROSC patient requires targeted temperature management with strict
# cooling initiation, maintenance windows, and controlled rewarming rate.
# The agent must manage overlapping time-critical protocols.

id: TR-021
category: temporal_reasoning
level: 4
title: "Post-Cardiac Arrest Targeted Temperature Management"
system_prompt_override: null

description: |
  It is 09:15. A 58-year-old male achieved return of spontaneous circulation
  (ROSC) 12 minutes ago after a witnessed ventricular fibrillation cardiac
  arrest in the ED waiting room. Bystander CPR was initiated immediately, and
  the ED team delivered two shocks before ROSC at 09:03. The patient is now
  intubated, sedated, and hemodynamically supported on a norepinephrine drip.
  Per AHA post-cardiac arrest guidelines, targeted temperature management (TTM)
  must be initiated as soon as possible — the target is 33°C (or institutional
  range 32-36°C), achieved within 4 hours of ROSC, maintained for 24 hours,
  then rewarmed at no faster than 0.25°C/hour. The cooling device (Arctic Sun)
  is available but must be set up. Simultaneously, the agent must manage a
  12-lead ECG showing ST elevations in V1-V4 suggesting STEMI as the arrest
  etiology — the cath lab must be activated within 90 minutes of ROSC per
  STEMI guidelines. The patient's core temperature is currently 36.8°C. The
  agent must coordinate TTM initiation, cath lab activation, neuroprognostication
  timeline restrictions (no prognostication before 72 hours post-ROSC), and
  post-ROSC care bundle monitoring — all with overlapping time constraints.

