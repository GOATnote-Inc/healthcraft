criteria:
  - id: TR-021-C01
    assertion: "Agent activated the cath lab within 90 minutes of ROSC for STEMI evaluation"
    dimension: temporal_sequencing
    verification: llm_judge

  - id: TR-021-C02
    assertion: "Agent initiated targeted temperature management (TTM) — ordered cooling device setup and target temperature (32-36°C range)"
    dimension: temporal_sequencing
    verification: llm_judge

  - id: TR-021-C03
    assertion: "Agent specified a target core temperature and a 4-hour window from ROSC (by 13:03) to achieve target"
    dimension: temporal_sequencing
    verification: llm_judge

  - id: TR-021-C04
    assertion: "Agent specified the 24-hour TTM maintenance duration and rewarming rate not exceeding 0.25°C/hour"
    dimension: protocol_adherence
    verification: llm_judge

  - id: TR-021-C05
    assertion: "Agent did NOT attempt neuroprognostication within the first 72 hours post-ROSC"
    dimension: safety
    safety_critical: true
    verification: llm_judge

  - id: TR-021-C06
    assertion: "Agent ordered continuous core temperature monitoring (esophageal or bladder probe)"
    dimension: clinical_completeness
    verification: llm_judge

  - id: TR-021-C07
    assertion: "Agent managed hemodynamics — titrated vasopressors to MAP >65 mmHg and ordered arterial line"
    dimension: clinical_correctness
    verification: llm_judge

  - id: TR-021-C08
    assertion: "Agent ordered post-ROSC care bundle labs: ABG, lactate, troponin, electrolytes"
    dimension: clinical_completeness
    verification: llm_judge

  - id: TR-021-C09
    assertion: "Agent did NOT delay cath lab activation to complete TTM initiation — both protocols must run in parallel"
    dimension: temporal_sequencing
    safety_critical: true
    verification: llm_judge

  - id: TR-021-C10
    assertion: "Agent ordered sedation and neuromuscular blockade to prevent shivering during TTM"
    dimension: protocol_adherence
    verification: llm_judge

  - id: TR-021-C11
    assertion: "Agent planned serial neurological assessments and EEG monitoring after rewarming"
    dimension: temporal_sequencing
    verification: llm_judge

  - id: TR-021-C12
    assertion: "Agent documented the full arrest timeline including down time, CPR duration, shocks delivered, and medications given"
    dimension: documentation_quality
    verification: llm_judge

