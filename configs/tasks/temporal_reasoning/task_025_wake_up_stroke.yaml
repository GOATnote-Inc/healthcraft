metadata:
  openem_condition: "acute_ischemic_stroke"
  expected_tool_calls: "10-15"
  entity_types: 6
  time_pressure: "extreme"
  parallel_threads: 2
  teaching_point: "Wake-up strokes are not automatically excluded from intervention. The last-known-well time (when the patient was last observed neurologically normal) defines the treatment window — NOT the time symptoms were discovered. CT perfusion replaces the time clock with a tissue clock: a large penumbra-to-core mismatch indicates salvageable brain regardless of elapsed time. However, anticoagulation (apixaban) makes IV tPA unsafe even if perfusion imaging is favorable — mechanical thrombectomy becomes the primary reperfusion strategy. The imaging-to-groin-puncture time (<60 min) is the final temporal bottleneck. Every decision in this scenario requires tracking a different clock simultaneously."
