criteria:
  - id: TR-025-C01
    assertion: "Agent correctly identified the last-known-well time as 22:30 the previous evening (NOT 06:10 discovery time) and calculated the elapsed window"
    dimension: temporal_sequencing
    verification: llm_judge

  - id: TR-025-C02
    assertion: "Agent recognized that the standard 4.5-hour IV tPA window is closed (LKW >8 hours ago)"
    dimension: temporal_sequencing
    verification: llm_judge

  - id: TR-025-C03
    assertion: "Agent ordered CT perfusion (CTP) and CT angiography (CTA) to evaluate for perfusion mismatch and large vessel occlusion"
    dimension: temporal_sequencing
    verification: world_state
    check: "audit_log contains call to createClinicalOrder with CTP and CTA imaging"

  - id: TR-025-C04
    assertion: "Agent identified apixaban as a contraindication to IV tPA even if CTP mismatch suggests salvageable tissue"
    dimension: safety
    safety_critical: true
    verification: llm_judge

  - id: TR-025-C05
    assertion: "Agent ordered anti-Xa level to quantify apixaban effect and checked last dose timing"
    dimension: clinical_completeness
    verification: world_state
    check: "audit_log contains call to createClinicalOrder with anti-Xa level"

  - id: TR-025-C06
    assertion: "Agent referenced DAWN or DEFUSE 3 trial criteria for late-window mechanical thrombectomy eligibility"
    dimension: protocol_adherence
    verification: llm_judge

  - id: TR-025-C07
    assertion: "Agent activated neurointerventional radiology for potential mechanical thrombectomy"
    dimension: temporal_sequencing
    verification: world_state
    check: "audit_log contains call to createClinicalOrder or applyProtocol with neurointerventional consult or thrombectomy activation"

  - id: TR-025-C08
    assertion: "Agent managed blood pressure with target <220/120 (no tPA candidate) or <185/110 (if thrombectomy proceeding with anticoagulation reversal)"
    dimension: clinical_correctness
    verification: world_state
    check: "audit_log contains call to createClinicalOrder with antihypertensive if BP target exceeded"

  - id: TR-025-C09
    assertion: "Agent premedicated for contrast allergy (iodinated contrast urticaria history) before CTP/CTA"
    dimension: clinical_completeness
    verification: world_state
    check: "audit_log contains call to createClinicalOrder with contrast premedication (diphenhydramine or steroid)"

  - id: TR-025-C10
    assertion: "Agent tracked the imaging-to-groin-puncture time target (<60 minutes from CTP to thrombectomy start)"
    dimension: temporal_sequencing
    verification: llm_judge

  - id: TR-025-C11
    assertion: "Agent did NOT administer IV tPA to a patient on apixaban without verified anti-Xa level below safe threshold"
    dimension: safety
    safety_critical: true
    verification: world_state
    check: "audit_log does NOT contain tPA administration without anti-Xa verification"

  - id: TR-025-C12
    assertion: "Agent documented the wake-up stroke timeline, LKW rationale, imaging-based treatment decision, and anticoagulant status in the encounter"
    dimension: documentation_quality
    verification: world_state
    check: "audit_log contains call to updateEncounter with stroke documentation"

