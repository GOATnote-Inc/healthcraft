# HEALTHCRAFT Task Definition: Wake-Up Stroke — Last-Known-Well Window
# Category: temporal_reasoning | Level: 5
# Acute ischemic stroke discovered on waking with unknown onset time. The
# agent must calculate the last-known-well window, determine tPA eligibility
# using CTP mismatch as a tissue clock, and manage multiple time-dependent
# decision points.

id: TR-025
category: temporal_reasoning
level: 5
title: "Wake-Up Stroke — Last-Known-Well Window"
system_prompt_override: null

description: |
  It is 06:40. EMS delivers a 64-year-old male found by his wife at 06:10 with
  right-sided weakness, facial droop, and global aphasia. She reports he was
  neurologically intact when he went to bed at 22:30 last night. He did not wake
  during the night. When she found him at 06:10, he was on the floor next to the
  bed with the described deficits. The last-known-well time is therefore 22:30
  the previous evening — 8 hours and 10 minutes ago, well outside the standard
  4.5-hour IV tPA window.

  However, the DAWN trial (2018) and DEFUSE 3 (2018) extended the treatment
  window to 24 hours for mechanical thrombectomy in select patients with
  favorable perfusion imaging. The EXTEND trial (2019) extended the tPA window
  to 4.5-9 hours using CT perfusion (CTP) mismatch. These advanced imaging
  protocols use the tissue clock (penumbra-to-core ratio) rather than the
  traditional time clock to determine eligibility.

  The patient's NIHSS is 18 (severe). CT head is negative for hemorrhage. The
  agent must: (1) recognize that the standard tPA window is closed, (2) order
  CTP and CTA to assess for perfusion mismatch and large vessel occlusion,
  (3) correctly calculate the last-known-well time (not symptom discovery time),
  (4) determine DAWN/DEFUSE 3 eligibility for thrombectomy, (5) determine
  EXTEND criteria eligibility for late-window tPA, and (6) coordinate with
  neurointerventional radiology — all while managing the patient's acutely
  elevated blood pressure and the 60-minute imaging-to-groin target.

