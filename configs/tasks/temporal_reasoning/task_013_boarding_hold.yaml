# HEALTHCRAFT Task Definition: Boarding Hold
# Category: temporal_reasoning | Level: 4
# Boarding patient exceeding 4-hour target with clinical deterioration.
# The agent must track hold time, escalate appropriately, and prevent
# harm from prolonged ED boarding.

id: TR-013
category: temporal_reasoning
level: 4
title: "Boarding Hold"
system_prompt_override: null

description: |
  It is 22:15. A 78-year-old female in Bed 31 was admitted to the medicine
  service at 16:30 for acute decompensated heart failure. An inpatient bed was
  requested at that time but none are available — she has been boarding in the
  ED for 5 hours and 45 minutes, well past the 4-hour institutional target.
  During this time, her clinical status has changed: oxygen requirements
  increased from 2L NC to 6L NC at 20:00, a new set of vitals at 21:45 shows
  worsening tachycardia (HR 108, was 88 at admission), and she is now
  reporting orthopnea and cannot lay flat. The night hospitalist has not been
  notified of the deterioration. Meanwhile, the ED is at 96% capacity with 3
  EMS units holding in the hallway. The agent must recognize the boarding time
  violation, escalate the clinical deterioration to the admitting team,
  reassess the patient's treatment plan (the admission orders written 5 hours
  ago may be inadequate), consider ICU-level care escalation, and manage the
  competing demand of EMS offload.

