    esi_5: 7
  attending_count: 2
  resident_count: 3
  nurses_on_duty: 12
  ct_scanner_available: true
  ct_scanner_wait_minutes: 8
  last_known_well: "2026-01-15T11:00:00Z"
  tpa_window_closes: "2026-01-15T15:30:00Z"
  stroke_team_status: "not in-house, 20-minute callback"
  specialist_on_call:
    neurology: "off-site, 20min response"
    neuroradiology: "in-house"
    neurosurgery: "home, 30min response"

patient:
  age: 68
  sex: F
