  allergies:
    - "Sulfa (rash)"
  medications:
    - "Apixaban 5mg BID"
    - "Metoprolol 25mg BID"
    - "Atorvastatin 80mg daily"
    - "Amlodipine 5mg daily"
  past_medical_history:
    - "Atrial fibrillation (on apixaban)"
    - "Hypertension"
    - "Hyperlipidemia"
    - "Type 2 Diabetes"
    - "Prior TIA 2 years ago (fully resolved)"
  vitals:
    heart_rate: 88
