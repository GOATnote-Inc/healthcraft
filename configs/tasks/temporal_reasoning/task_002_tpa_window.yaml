# HEALTHCRAFT Task Definition: The tPA Window
# Category: temporal_reasoning | Level: 4
# Acute ischemic stroke at 3.5 hours from last known well. The agent must
# complete evaluation and make a thrombolytic decision within 30 minutes
# before the 4.5-hour window closes.

id: TR-002
category: temporal_reasoning
level: 4
title: "The tPA Window"
system_prompt_override: null

description: |
  It is 14:32. EMS delivers a 68-year-old woman with acute left-sided weakness
  and slurred speech. Her husband states she was last known well at 11:00 this
  morning — 3 hours and 32 minutes ago. The 4.5-hour tPA eligibility window
  closes at 15:30, giving you exactly 58 minutes to complete a stroke workup,
  obtain CT imaging, verify no contraindications, and initiate thrombolysis if
  appropriate. The stroke team is not in-house and has a 20-minute response
  time. Every minute of delay costs 1.9 million neurons.

setting:
  facility: "Mercy Point Emergency Department"
  time: "2026-01-15T14:32:00Z"
  department: "Emergency Department"
  census: 41
  beds_available: 13
  beds_total: 54
  shift: "day"
  esi_distribution:
    esi_1: 0
    esi_2: 4
    esi_3: 18
