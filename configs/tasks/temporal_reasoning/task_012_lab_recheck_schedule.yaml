# HEALTHCRAFT Task Definition: Lab Recheck Schedule
# Category: temporal_reasoning | Level: 3
# Critical lab value requiring timely rechecking with escalation decisions
# based on trend analysis and time-sensitive intervention thresholds.

id: TR-012
category: temporal_reasoning
level: 3
title: "Lab Recheck Schedule"
system_prompt_override: null

description: |
  It is 11:30. A 47-year-old male in Bed 9 presented at 08:00 with weakness,
  muscle cramps, and an ECG showing peaked T-waves. Initial potassium at 08:15
  was 6.9 mEq/L (critical). He received calcium gluconate 2g IV at 08:25,
  insulin 10 units IV with D50 at 08:30, and sodium polystyrene sulfonate 30g
  PO at 08:45. A 2-hour recheck potassium at 10:15 returned 6.2 mEq/L — still
  critically elevated but trending down. The standard protocol calls for another
  recheck at 2 hours (now due at 12:15), but the patient's ECG at 11:00 shows
  persistent PR prolongation and the patient reports new paresthesias. The agent
  must determine whether to accelerate the recheck schedule, repeat treatment,
  reassess the ECG, and decide if nephrology consultation and/or emergent
  dialysis should be initiated based on the temporal trend and clinical
  trajectory. A 4-hour delay would miss the intervention window.

