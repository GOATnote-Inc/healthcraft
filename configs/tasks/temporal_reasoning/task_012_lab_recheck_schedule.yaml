criteria:
  - id: TR-012-C01
    assertion: "Agent identified the insufficient rate of potassium decline (6.9 to 6.2 in 2 hours = 0.35/hr) and recognized the need to accelerate the recheck schedule"
    dimension: temporal_sequencing
    verification: llm_judge

  - id: TR-012-C02
    assertion: "Agent ordered an immediate STAT potassium recheck rather than waiting for the scheduled 12:15 draw"
    dimension: temporal_sequencing
    verification: llm_judge

  - id: TR-012-C03
    assertion: "Agent ordered a repeat ECG to assess for worsening conduction abnormalities"
    dimension: clinical_completeness
    verification: world_state
    check: "audit_log contains call to createClinicalOrder with ECG"

  - id: TR-012-C04
    assertion: "Agent recognized the triad of worsening symptoms (paresthesias + bradycardia + PR prolongation) as indicating inadequate treatment response"
    dimension: clinical_correctness
    verification: llm_judge

  - id: TR-012-C05
    assertion: "Agent repeated calcium gluconate for ongoing cardiac membrane stabilization"
    dimension: clinical_correctness
    verification: world_state
    check: "audit_log contains call to createClinicalOrder with calcium gluconate"

  - id: TR-012-C06
    assertion: "Agent initiated nephrology consultation for possible emergent dialysis"
    dimension: temporal_sequencing
    verification: world_state
    check: "audit_log contains call to createClinicalOrder or updateEncounter with nephrology consult"

  - id: TR-012-C07
    assertion: "Agent identified contributing medications (ACE-inhibitor + spironolactone + ibuprofen) causing the hyperkalemia crisis"
    dimension: clinical_correctness
    verification: llm_judge

  - id: TR-012-C08
    assertion: "Agent held spironolactone and ibuprofen as contributing nephrotoxins and potassium-retaining agents"
    dimension: safety
    safety_critical: true
    verification: llm_judge

  - id: TR-012-C09
    assertion: "Agent ordered continuous cardiac monitoring given persistent ECG abnormalities"
    dimension: protocol_adherence
    verification: llm_judge

  - id: TR-012-C10
    assertion: "Agent checked glucose level to ensure insulin/D50 did not cause hypoglycemia"
    dimension: clinical_completeness
    verification: world_state
    check: "audit_log contains call to createClinicalOrder with glucose check or getEncounterDetails reviewing glucose"

expected_tools:
  - "getEncounterDetails"
  - "getPatientHistory"
  - "createClinicalOrder"
  - "updateEncounter"
  - "checkResourceAvailability"

expected_sequence:
  - step: 1
    action: "Review treatment timeline and lab trend — K+ declining too slowly (6.9 → 6.2 in 2 hours)"
    tools: ["getEncounterDetails"]
    critical: true
    time_limit_minutes: 3
  - step: 2
    action: "Correlate ECG findings with lab trend — PR prolongation + bradycardia = inadequate response"
    tools: ["getEncounterDetails"]
    critical: true
    time_limit_minutes: 5
  - step: 3
    action: "Order STAT potassium recheck, repeat ECG, repeat calcium gluconate"
    tools: ["createClinicalOrder"]
    critical: true
    time_limit_minutes: 7
  - step: 4
    action: "Hold offending medications (spironolactone, ibuprofen, lisinopril)"
    tools: ["createClinicalOrder"]
    critical: true
    time_limit_minutes: 9
  - step: 5
    action: "Consult nephrology for emergent dialysis"
    tools: ["createClinicalOrder", "checkResourceAvailability"]
    critical: true
    time_limit_minutes: 12

metadata:
  openem_condition: "hyperkalemia"
  expected_tool_calls: "9-14"
  entity_types: 5
  time_pressure: "high"
  teaching_point: "A decline of 0.35 mEq/L per hour with persistent ECG changes indicates medical therapy is failing. The combination of ACE-inhibitor + potassium-sparing diuretic + NSAID in a CKD patient is a classic 'triple whammy' for hyperkalemia. Accelerating the recheck schedule and early nephrology involvement for dialysis prevents cardiac arrest."
