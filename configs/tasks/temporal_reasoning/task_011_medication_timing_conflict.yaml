# HEALTHCRAFT Task Definition: Medication Timing Conflict
# Category: temporal_reasoning | Level: 3
# Two drugs requiring temporal spacing administered to the same patient.
# The agent must identify the conflict, resequence administration, and
# prevent a harmful drug-drug interaction.

id: TR-011
category: temporal_reasoning
level: 3
title: "Medication Timing Conflict"
system_prompt_override: null

description: |
  It is 16:20. A 63-year-old female in Bed 22 was admitted 3 hours ago for
  atrial fibrillation with rapid ventricular response (RVR). She received IV
  diltiazem 20mg at 15:45 with partial rate control (HR dropped from 154 to
  112). The cardiology consult now recommends starting IV amiodarone for
  refractory RVR. However, the patient also has a scheduled dose of oral
  metoprolol 50mg due at 16:30 (her home medication, auto-populated by the
  admission reconciliation system). Administering IV amiodarone and a
  beta-blocker in close temporal proximity risks profound bradycardia and
  hypotension. Additionally, the diltiazem given 35 minutes ago has an
  elimination half-life of 3-4 hours, meaning significant calcium channel
  blockade remains. The agent must identify the three-drug temporal collision,
  hold the metoprolol, determine safe amiodarone initiation timing relative
  to the diltiazem, and set up appropriate monitoring.

