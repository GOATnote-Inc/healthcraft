    tools: ["updateEncounter"]
    critical: true
    time_limit_minutes: 15

metadata:
  openem_condition: "wound_infection"
  expected_tool_calls: "8-12"
  entity_types: 5
  time_pressure: "moderate"
  teaching_point: "The tetanus prophylaxis decision is a 2x2 matrix: (clean vs. dirty wound) x (vaccinated vs. unvaccinated/uncertain). A dirty wound in a patient with uncertain vaccination status requires BOTH Tdap and TIG. Wound age >6 hours with soil contamination is high-risk. A 30-hour-old contaminated puncture wound in a diabetic patient should never be primarily closed — it requires debridement, irrigation, antibiotics, and secondary intention healing."
