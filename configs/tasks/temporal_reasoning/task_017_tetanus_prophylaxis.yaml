# HEALTHCRAFT Task Definition: Tetanus Prophylaxis Timing Decision
# Category: temporal_reasoning | Level: 3
# Wound age and immunization history create a time-dependent prophylaxis
# decision matrix. The agent must assess wound chronology, vaccination
# status, and wound characteristics to make the correct tetanus decision.

id: TR-017
category: temporal_reasoning
level: 3
title: "Tetanus Prophylaxis Timing Decision"
system_prompt_override: null

description: |
  It is 20:30. A 54-year-old male presents to the ED with a deep puncture wound
  to his right foot sustained while working in his garden. The critical temporal
  complexity: the patient states the injury occurred "yesterday afternoon" but
  he only came in tonight because the wound is now red, swollen, and painful.
  On further questioning, the injury was at approximately 14:00 yesterday —
  making the wound approximately 30 hours old. The wound was contaminated with
  soil and has not been cleaned. His tetanus vaccination history is uncertain:
  he "thinks" he had a tetanus shot about 8 years ago when he cut his hand, but
  he changed primary care providers and has no records. His wife recalls it was
  actually for their son, not him. A dirty wound older than 6 hours in a patient
  with uncertain vaccination status presents a specific tetanus prophylaxis
  decision: both Tdap and tetanus immune globulin (TIG) may be indicated. The
  wound also needs debridement, irrigation, and infection assessment given the
  30-hour delay and current signs of cellulitis. Antibiotics for the wound
  infection must also be timed appropriately.

