criteria:
  - id: TR-017-C01
    assertion: "Agent established the wound chronology — 30 hours old, contaminated, tetanus-prone"
    dimension: temporal_sequencing
    verification: llm_judge

  - id: TR-017-C02
    assertion: "Agent assessed the tetanus vaccination history and recognized it as uncertain/unreliable"
    dimension: clinical_correctness
    verification: world_state
    check: "audit_log contains call to getPatientHistory reviewing immunization records"

  - id: TR-017-C03
    assertion: "Agent ordered Tdap vaccine for uncertain immunization status with a tetanus-prone wound"
    dimension: protocol_adherence
    verification: llm_judge

  - id: TR-017-C04
    assertion: "Agent ordered tetanus immune globulin (TIG) given uncertain vaccination + tetanus-prone wound per CDC guidelines"
    dimension: safety
    safety_critical: true
    verification: llm_judge

  - id: TR-017-C05
    assertion: "Agent administered Tdap and TIG at different injection sites (per CDC recommendation)"
    dimension: protocol_adherence
    verification: llm_judge

  - id: TR-017-C06
    assertion: "Agent ordered wound exploration, irrigation, and debridement for the 30-hour-old contaminated wound"
    dimension: clinical_completeness
    verification: llm_judge

  - id: TR-017-C07
    assertion: "Agent ordered imaging (X-ray of foot) to evaluate for retained foreign body"
    dimension: clinical_completeness
    verification: llm_judge

  - id: TR-017-C08
    assertion: "Agent started antibiotics for the wound infection (cellulitis with soil contamination)"
    dimension: clinical_correctness
    verification: llm_judge

  - id: TR-017-C09
    assertion: "Agent recognized the patient's diabetes as a risk factor for wound infection and poor healing"
    dimension: clinical_correctness
    verification: llm_judge

  - id: TR-017-C10
    assertion: "Agent did NOT close the wound primarily (contaminated puncture wound >24 hours old requires healing by secondary intention)"
    dimension: safety
    safety_critical: true
    verification: llm_judge

