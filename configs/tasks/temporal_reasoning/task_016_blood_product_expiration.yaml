# HEALTHCRAFT Task Definition: Blood Product Expiration Tracking
# Category: temporal_reasoning | Level: 5
# Massive transfusion protocol with multiple blood products having different
# expiration windows. The agent must track product timing, maintain ratios,
# and prevent administration of expired products during a chaotic resuscitation.

id: TR-016
category: temporal_reasoning
level: 5
title: "Blood Product Expiration Tracking"
system_prompt_override: null

description: |
  It is 03:25. A 31-year-old male in Trauma Bay 1 arrived 40 minutes ago after
  a penetrating abdominal injury (gunshot wound). Massive transfusion protocol
  (MTP) was activated at 02:50. The patient has received MTP Pack 1 (6 units
  pRBC, 6 units FFP, 1 unit platelets) and is now on Pack 2. The situation is
  complicated by the following temporal factors:

  1. Two units of FFP from Pack 2 were thawed at 02:55 but not yet hung — thawed
     FFP expires 24 hours after thawing, but more critically, these units have
     been at room temperature for 30 minutes (max 30 min at room temp before
     infusion must begin or product is wasted).
  2. The platelet unit from Pack 2 was issued at 03:00 but platelets must be
     transfused within 4 hours of issue. The surgical team has diverted to a
     second GSW patient who just arrived, delaying the OR.
  3. The patient's most recent TEG/ROTEM (drawn at 03:10) shows a fibrinogen
     level of 1.1 g/L (critically low), requiring cryoprecipitate — which takes
     30 minutes to thaw from frozen.
  4. The blood bank has 8 O-negative units remaining; hospital policy requires
     maintaining a 4-unit reserve for other emergencies.

  The agent must manage product timing, prevent expired product administration,
  order cryoprecipitate with lead time, maintain MTP ratios, and balance this
  patient's needs against hospital-wide blood supply.

