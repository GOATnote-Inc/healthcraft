metadata:
  openem_condition: "hemorrhagic_shock"
  expected_tool_calls: "12-15"
  entity_types: 6
  time_pressure: "extreme"
  parallel_threads: 3
  teaching_point: "Blood product expiration tracking during MTP is a cognitive load trap. Thawed FFP at room temperature has a 30-minute window. Cryoprecipitate requires 30 minutes to thaw — the order must be placed proactively, not reactively. Citrate-induced hypocalcemia from massive transfusion is undertreated in 60% of MTP activations. The lethal triad (hypothermia, acidosis, coagulopathy) must be addressed in parallel with product administration."
