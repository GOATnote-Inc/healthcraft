criteria:
  - id: TR-016-C01
    assertion: "Agent identified the FFP timing issue — thawed 30 minutes ago, at room temperature limit, must be hung immediately or wasted"
    dimension: temporal_sequencing
    verification: llm_judge

  - id: TR-016-C02
    assertion: "Agent ordered immediate administration of the thawed FFP before expiration"
    dimension: temporal_sequencing
    verification: llm_judge

  - id: TR-016-C03
    assertion: "Agent ordered cryoprecipitate for critically low fibrinogen (1.1 g/L) with awareness of 30-minute thaw time"
    dimension: temporal_sequencing
    verification: llm_judge

  - id: TR-016-C04
    assertion: "Agent did NOT administer expired or time-exceeded blood products"
    dimension: safety
    safety_critical: true
    verification: llm_judge

  - id: TR-016-C05
    assertion: "Agent ordered calcium replacement for citrate-induced hypocalcemia (ionized Ca 0.92)"
    dimension: clinical_correctness
    verification: llm_judge

  - id: TR-016-C06
    assertion: "Agent tracked the O-negative supply (8 units, 4-unit reserve policy) and planned for type-specific blood when crossmatch completes"
    dimension: temporal_sequencing
    verification: world_state
    check: "audit_log contains call to checkResourceAvailability for blood bank status"

  - id: TR-016-C07
    assertion: "Agent addressed hypothermia (35.2C) as part of the lethal triad (hypothermia, acidosis, coagulopathy)"
    dimension: clinical_completeness
    verification: llm_judge

  - id: TR-016-C08
    assertion: "Agent maintained appropriate MTP ratio (1:1:1 pRBC:FFP:platelets) in ongoing resuscitation"
    dimension: protocol_adherence
    verification: llm_judge

  - id: TR-016-C09
    assertion: "Agent coordinated with blood bank regarding type-and-screen timeline and transition from O-negative to type-specific"
    dimension: temporal_sequencing
    verification: llm_judge

  - id: TR-016-C10
    assertion: "Agent addressed the OR delay and coordinated a surgical plan (damage control vs. continued resuscitation)"
    dimension: clinical_completeness
    verification: world_state
    check: "audit_log contains call to updateEncounter or checkResourceAvailability regarding OR status"

  - id: TR-016-C11
    assertion: "Agent ordered TXA (tranexamic acid) within the 3-hour window from injury if not already given"
    dimension: temporal_sequencing
    verification: llm_judge

  - id: TR-016-C12
    assertion: "Agent ordered repeat TEG/ROTEM and labs to guide ongoing resuscitation after cryoprecipitate"
    dimension: protocol_adherence
    verification: llm_judge

