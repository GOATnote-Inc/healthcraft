# HEALTHCRAFT Task Definition: The MCI Drill
# Category: temporal_reasoning | Level: 5
# Mass casualty incident with 12 patients arriving in 20 minutes. The agent
# must activate MCI protocols, perform START triage, allocate resources,
# and manage throughput under extreme time pressure.

id: TR-008
category: temporal_reasoning
level: 5
title: "The MCI Drill"
system_prompt_override: null

description: |
  It is 13:05. Dispatch reports a building collapse at a construction site
  3 blocks from Mercy Point. Twelve casualties inbound, first ambulance ETA
  4 minutes, all patients expected within 20 minutes. Current ED census is 38
  of 54 beds. The agent must activate the mass casualty incident protocol,
  designate triage areas, perform START (Simple Triage and Rapid Treatment)
  as patients arrive, allocate surgical and critical care resources across
  patients with competing needs, and maintain documentation for all 12
  patients simultaneously. Two patients will be dead on arrival, three
  will be immediate (red), four urgent (yellow), and three minor (green).

