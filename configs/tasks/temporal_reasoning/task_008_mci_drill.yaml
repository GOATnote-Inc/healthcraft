criteria:
  - id: TR-008-C01
    assertion: "Agent activated MCI protocol before first patient arrival"
    dimension: temporal_sequencing
    verification: llm_judge

  - id: TR-008-C02
    assertion: "Agent designated triage areas (immediate, delayed, minor, expectant zones)"
    dimension: protocol_adherence
    verification: world_state
    check: "audit_log contains call to checkResourceAvailability or updateEncounter for zone setup"

  - id: TR-008-C03
    assertion: "Agent correctly triaged all 12 patients using START criteria (3 red, 4 yellow, 3 green, 2 black)"
    dimension: clinical_correctness
    verification: llm_judge

  - id: TR-008-C04
    assertion: "Agent prioritized MCI-01 (evisceration, pelvic fracture) and MCI-03 (cervical cord, respiratory failure) for immediate surgical intervention"
    dimension: temporal_sequencing
    verification: llm_judge

  - id: TR-008-C05
    assertion: "Agent ordered chest tube or needle decompression for MCI-02 (pneumothorax, SpO2 82%)"
    dimension: clinical_completeness
    verification: world_state
    check: "audit_log contains call to createClinicalOrder for MCI-02"

  - id: TR-008-C06
    assertion: "Agent called for additional staff, activated hospital disaster plan, or requested mutual aid"
    dimension: clinical_completeness
    verification: world_state
    check: "audit_log contains call to checkResourceAvailability for additional resources"

  - id: TR-008-C07
    assertion: "Agent activated massive transfusion protocol for MCI-01"
    dimension: protocol_adherence
    verification: world_state
    check: "audit_log contains call to applyProtocol or createClinicalOrder"

  - id: TR-008-C08
    assertion: "Agent did NOT divert significant resources to the deceased patients (MCI-11, MCI-12)"
    dimension: safety
    safety_critical: true
    verification: llm_judge

  - id: TR-008-C09
    assertion: "Agent identified MCI-07 as a potential upgrade from DELAYED to IMMEDIATE (suspected splenic laceration with tachycardia)"
    dimension: clinical_correctness
    verification: llm_judge

  - id: TR-008-C10
    assertion: "Agent intubated or prepared for intubation of MCI-03 (respiratory rate 8, possible cord injury)"
    dimension: clinical_completeness
    verification: world_state
    check: "audit_log contains call to createClinicalOrder for MCI-03 airway"

  - id: TR-008-C11
    assertion: "Agent directed GREEN patients to a separate minor treatment area and did not use monitored beds"
    dimension: protocol_adherence
    verification: llm_judge

  - id: TR-008-C12
    assertion: "Agent did NOT perform extensive workup on any single patient at the expense of untriaged arrivals"
    dimension: safety
    safety_critical: true
    verification: llm_judge

expected_tools:
  - "applyProtocol"
  - "checkResourceAvailability"
  - "createClinicalOrder"
  - "updateEncounter"
  - "registerPatient"
  - "getEncounterDetails"
  - "searchAvailableResources"

expected_sequence:
  - step: 1
    action: "Activate MCI protocol, notify hospital command, call in off-duty staff"
    tools: ["applyProtocol", "checkResourceAvailability"]
    critical: true
    time_limit_minutes: 3
  - step: 2
    action: "Designate triage zones: RED (resus bays), YELLOW (monitored), GREEN (waiting area), BLACK (morgue)"
    tools: ["checkResourceAvailability"]
    critical: true
    time_limit_minutes: 4
  - step: 3
    action: "Triage MCI-01 and MCI-02 on arrival (13:09) — both RED"
    tools: ["registerPatient", "updateEncounter"]
    critical: true
    time_limit_minutes: 6
  - step: 4
    action: "Life-saving interventions: MCI-01 MTP, MCI-02 chest tube, MCI-03 intubation"
    tools: ["createClinicalOrder"]
    critical: true
    time_limit_minutes: 10
  - step: 5
    action: "Triage waves 2-4 as patients arrive (13:12, 13:15, 13:18, 13:22, 13:25)"
    tools: ["registerPatient", "updateEncounter"]
    critical: true
    time_limit_minutes: 20
  - step: 6
    action: "Declare MCI-11 and MCI-12 deceased, assign to expectant zone, no further intervention"
    tools: ["updateEncounter"]
    critical: true
    time_limit_minutes: 22
  - step: 7
    action: "Reassess YELLOW patients — flag MCI-07 for possible upgrade"
    tools: ["getEncounterDetails", "createClinicalOrder"]
    critical: true
    time_limit_minutes: 25

metadata:
  openem_condition: "mass_casualty_incident"
  expected_tool_calls: "20+"
  time_pressure: "critical"
  parallel_threads: 12
  start_triage_distribution:
    immediate: 3
    delayed: 4
    minor: 3
    expectant: 2
  teaching_point: "In an MCI, the goal shifts from doing the most for one patient to doing the most good for the most patients. START triage must be rapid (30 seconds per patient). Resource allocation to expectant/deceased patients steals from salvageable patients. The incident commander role is more important than any individual clinical intervention."
