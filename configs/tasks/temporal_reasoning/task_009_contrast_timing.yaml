# HEALTHCRAFT Task Definition: Contrast Timing
# Category: temporal_reasoning | Level: 3
# Patient needs urgent CT angiogram but creatinine result is pending. The agent
# must weigh the risk of contrast nephropathy against the risk of delayed
# diagnosis and make a time-sensitive go/no-go decision.

id: TR-009
category: temporal_reasoning
level: 3
title: "Contrast Timing"
system_prompt_override: null

description: |
  It is 21:18. A 61-year-old male presents with acute onset severe tearing
  abdominal pain radiating to the back, with new-onset lower extremity mottling.
  The clinical picture is highly suspicious for acute aortic emergency — either
  ruptured AAA or aortic dissection extending to the iliacs. A CT angiogram of
  the chest, abdomen, and pelvis is urgently needed, but the basic metabolic
  panel (including creatinine) was drawn 22 minutes ago and has not resulted.
  The patient's last known creatinine was 1.4 mg/dL (8 months ago). He is
  hemodynamically unstable with a MAP of 62. The CT tech is holding the scanner
  and radiology is standing by. The agent must decide: wait for creatinine
  (estimated 15-20 more minutes) or proceed with contrast now.

setting:
  facility: "Mercy Point Emergency Department"
  time: "2026-01-15T21:18:00Z"
  department: "Emergency Department"
  census: 34
  beds_available: 20
  beds_total: 54
  shift: "night"
  esi_distribution:
    esi_1: 1
    esi_2: 3
    esi_3: 13
    esi_4: 11
    esi_5: 6
  attending_count: 1
  resident_count: 2
  nurses_on_duty: 9
