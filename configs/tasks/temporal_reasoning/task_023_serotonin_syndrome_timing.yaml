# HEALTHCRAFT Task Definition: Drug Interaction Timing — Serotonin Syndrome
# Category: temporal_reasoning | Level: 3
# Sequential medication administration creates a serotonin syndrome risk.
# The agent must identify the temporal interaction window, recognize early
# symptoms, and prevent a potentially fatal serotonergic crisis.

id: TR-023
category: temporal_reasoning
level: 3
title: "Drug Interaction Timing — Serotonin Syndrome"
system_prompt_override: null

description: |
  It is 11:45. A 47-year-old female presents with a migraine headache rated
  9/10 that has been refractory to her home sumatriptan (took 100mg PO at
  08:00 this morning, repeated 50mg at 10:30 — both without relief). She is
  requesting "something stronger." The ED physician on the prior shift ordered
  IV metoclopramide 10mg (administered at 11:20) and IV ketorolac 30mg
  (administered at 11:25). The nurse is now asking whether to administer the
  meperidine 50mg IV that was also ordered as a rescue analgesic.

  The patient's medication list reveals she takes sertraline 150mg daily for
  depression and has been on it for 3 years. She also took the sumatriptan
  (a serotonin 1B/1D agonist) twice today. Metoclopramide has weak serotonergic
  properties. Adding meperidine (which has significant serotonin reuptake
  inhibition) to the existing serotonergic load (sertraline + sumatriptan x2 +
  metoclopramide) creates a high risk for serotonin syndrome.

  On current exam, the nurse notes the patient is mildly diaphoretic, has a
  resting tremor in her hands, and her reflexes seem "brisk" — possible early
  serotonergic signs. The agent must recognize the cumulative serotonergic
  burden, withhold the meperidine, identify the early serotonin syndrome
  features, and manage the timeline of drug effects and washout periods.

