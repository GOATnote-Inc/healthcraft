metadata:
  openem_condition: "serotonin_syndrome"
  expected_tool_calls: "8-12"
  entity_types: 5
  time_pressure: "high"
  teaching_point: "Serotonin syndrome is a clinical diagnosis based on the Hunter criteria. It results from cumulative serotonergic burden — not just a single drug. The temporal stacking of sertraline (long half-life SSRI), sumatriptan (short-acting but given twice), metoclopramide (often overlooked serotonergic), and a proposed meperidine creates a pharmacokinetic collision. Meperidine is the most dangerous addition because it has potent serotonin reuptake inhibition — it is the drug most commonly implicated in fatal serotonin syndrome cases. The agent must reconstruct the medication timeline to understand the overlapping drug effect windows."
