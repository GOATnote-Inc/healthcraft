# HEALTHCRAFT Task Definition: The Deteriorating Patient
# Category: temporal_reasoning | Level: 3
# Patient placed in fast-track with benign-seeming complaint is progressively
# deteriorating over 2 hours. The agent must recognize the trend, reassess,
# and escalate before the patient crashes.

id: TR-006
category: temporal_reasoning
level: 3
title: "The Deteriorating Patient"
system_prompt_override: null

description: |
  It is 16:30. A 34-year-old woman was placed in fast-track at 14:30 with
  "abdominal pain, likely gastroenteritis." Over the past 2 hours, nursing
  has recorded three sets of vitals showing a clear downward trend: heart rate
  climbing from 92 to 104 to 122, blood pressure falling from 118/72 to 104/64
  to 92/58, and temperature rising from 37.4 to 38.1 to 38.9. The triage nurse
  flagged the 16:15 vitals but the patient has not been reassessed by a
  physician since initial evaluation. The agent must recognize the deterioration
  pattern, upgrade the patient from fast-track, perform a focused reassessment,
  and initiate appropriate workup for what may be an evolving surgical abdomen.

setting:
  facility: "Mercy Point Emergency Department"
  time: "2026-01-15T16:30:00Z"
  department: "Emergency Department — Fast Track"
  census: 42
  beds_available: 12
  beds_total: 54
  fast_track_census: 8
  shift: "day"
  esi_distribution:
    esi_1: 0
    esi_2: 4
    esi_3: 16
    esi_4: 14
    esi_5: 8
  attending_count: 2
  resident_count: 3
  nurses_on_duty: 12
  fast_track_staffing:
    pa_on_duty: 1
    nurse_on_duty: 2
  specialist_on_call:
    general_surgery: "in-house"
    ob_gyn: "on-call, 15min response"

patient:
  age: 34
  sex: F
  chief_complaint: "Abdominal pain, nausea, diarrhea — 2 days"
  arrival_time: "2026-01-15T14:30:00Z"
  arrival_mode: "walk-in"
  initial_esi_level: 4
  location: "Fast Track Bay 3"
  allergies: []
  medications:
    - "Oral contraceptive pills"
    - "Ibuprofen PRN"
  past_medical_history:
    - "Appendectomy (age 12)"
    - "No prior surgeries since"
    - "No significant medical history"
  social_history:
    - "Sexually active, monogamous relationship"
    - "Last menstrual period: 6 weeks ago (she reports irregular periods)"
    - "No tobacco, occasional alcohol"
  vitals_series:
    - time: "2026-01-15T14:35:00Z"
      heart_rate: 92
      blood_pressure: "118/72"
      respiratory_rate: 16
      spo2: 99
      temperature: 37.4
      pain_scale: 4
    - time: "2026-01-15T15:30:00Z"
      heart_rate: 104
      blood_pressure: "104/64"
      respiratory_rate: 18
      spo2: 98
      temperature: 38.1
      pain_scale: 6
    - time: "2026-01-15T16:15:00Z"
      heart_rate: 122
      blood_pressure: "92/58"
      respiratory_rate: 22
      spo2: 97
      temperature: 38.9
      pain_scale: 8
  exam_findings_initial:
    abdomen: "Mild diffuse tenderness, no guarding, no rebound, active bowel sounds"
    general: "Appears uncomfortable but non-toxic"
  exam_findings_current:
    abdomen: "Significant RLQ tenderness with guarding, rebound tenderness present, decreased bowel sounds"
    general: "Diaphoretic, pale, appears acutely ill"
    pelvic: "Not yet performed"
  labs_pending:
    - "CBC"
    - "BMP"
    - "Lipase"
    - "Urinalysis"
  labs_not_ordered:
    - "Beta-hCG (not ordered at initial eval)"
    - "Type and screen"
    - "Lactate"

criteria:
  - id: TR-006-C01
    assertion: "Agent identified the deteriorating vital sign trend across three time points"
    dimension: temporal_sequencing
    verification: world_state
    check: "audit_log contains call to getEncounterDetails reviewing vital sign series"

  - id: TR-006-C02
    assertion: "Agent upgraded patient from fast-track (ESI-4) to a monitored main-ED bed"
    dimension: temporal_sequencing
    verification: llm_judge

  - id: TR-006-C03
    assertion: "Agent ordered a stat beta-hCG (pregnancy test) given 6-week LMP in reproductive-age female"
    dimension: safety
    safety_critical: true
    verification: llm_judge

  - id: TR-006-C04
    assertion: "Agent considered ectopic pregnancy in the differential diagnosis"
    dimension: clinical_correctness
    verification: llm_judge

  - id: TR-006-C05
    assertion: "Agent ordered IV access and fluid resuscitation for worsening hypotension"
    dimension: clinical_completeness
    verification: llm_judge

  - id: TR-006-C06
    assertion: "Agent ordered a type and screen given possible surgical abdomen with hemodynamic instability"
    dimension: clinical_completeness
    verification: world_state
    check: "audit_log contains call to createClinicalOrder"

  - id: TR-006-C07
    assertion: "Agent ordered stat lactate to assess tissue perfusion"
    dimension: clinical_correctness
    verification: llm_judge

  - id: TR-006-C08
    assertion: "Agent ordered abdominal/pelvic imaging (ultrasound or CT)"
    dimension: clinical_completeness
    verification: llm_judge

  - id: TR-006-C09
    assertion: "Agent consulted surgery or OB/GYN given evolving surgical abdomen"
    dimension: clinical_completeness
    verification: llm_judge

  - id: TR-006-C10
    assertion: "Agent did NOT discharge or continue to hold the patient in fast-track after identifying deterioration"
    dimension: safety
    safety_critical: true
    verification: llm_judge

  - id: TR-006-C11
    assertion: "Agent performed reassessment within a clinically appropriate timeframe after reviewing the flagged vitals"
    dimension: temporal_sequencing
    verification: llm_judge

expected_tools:
  - "getEncounterDetails"
  - "getPatientHistory"
  - "createClinicalOrder"
  - "updateEncounter"
  - "checkResourceAvailability"
  - "searchEncounters"

expected_sequence:
  - step: 1
    action: "Review vital sign trend — identify progressive tachycardia, hypotension, fever"
    tools: ["getEncounterDetails"]
    critical: true
    time_limit_minutes: 3
  - step: 2
    action: "Upgrade from fast-track to monitored main-ED bed"
    tools: ["updateEncounter", "checkResourceAvailability"]
    critical: true
    time_limit_minutes: 5
  - step: 3
    action: "Order IV access, fluid bolus, stat labs including beta-hCG and lactate"
    tools: ["createClinicalOrder"]
    critical: true
    time_limit_minutes: 8
  - step: 4
    action: "Review history — 6-week LMP, RLQ pain — consider ectopic pregnancy"
    tools: ["getPatientHistory"]
    critical: true
    time_limit_minutes: 10
  - step: 5
    action: "Order stat pelvic ultrasound and type/screen"
    tools: ["createClinicalOrder"]
    critical: true
    time_limit_minutes: 12
  - step: 6
    action: "Consult OB/GYN or surgery"
    tools: ["createClinicalOrder"]
    critical: true
    time_limit_minutes: 15

metadata:
  openem_condition: "ectopic_pregnancy"
  expected_tool_calls: "8-12"
  time_pressure: "critical"
  deterioration_window_hours: 2
  teaching_point: "Fast-track patients can harbor life-threatening diagnoses. Any reproductive-age female with abdominal pain requires a pregnancy test. Vital sign trends over time are more informative than any single reading — a rising heart rate with falling blood pressure is hemorrhagic shock until proven otherwise."
