metadata:
  openem_condition: "shoulder_dislocation"
  expected_tool_calls: "8-12"
  entity_types: 5
  time_pressure: "moderate"
  teaching_point: "Procedural sedation complications reset the monitoring clock. Ketamine laryngospasm occurs in ~0.3% of cases and is more common in patients with reactive airway disease. The emergence timeline (15-30 min from last dose) is predictable but must not be used as a substitute for objective assessment (Aldrete score). Transportation planning is a safety-critical discharge requirement — a sedated patient who drove themselves cannot leave without verified alternative transport."
