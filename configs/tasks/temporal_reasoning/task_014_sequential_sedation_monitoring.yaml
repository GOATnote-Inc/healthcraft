# HEALTHCRAFT Task Definition: Sequential Sedation Monitoring
# Category: temporal_reasoning | Level: 4
# Post-procedural sedation monitoring with time-specific assessment
# requirements and discharge readiness evaluation.

id: TR-014
category: temporal_reasoning
level: 4
title: "Sequential Sedation Monitoring"
system_prompt_override: null

description: |
  It is 15:40. A 42-year-old male in Procedure Room 2 just underwent procedural
  sedation for reduction of a posterior shoulder dislocation. He received
  ketamine 1.5 mg/kg IV (120mg) at 15:10, with an additional 60mg at 15:18 when
  the first attempt failed. The reduction was successful at 15:22 and confirmed
  by post-reduction X-ray. The patient is now in the emergence phase. At 15:35,
  the nurse reports the patient had a brief episode of laryngospasm (SpO2 dropped
  to 88%, resolved with jaw thrust and BVM in 30 seconds). The patient is now
  breathing spontaneously but remains dissociated. Per institutional protocol,
  post-sedation monitoring requires vitals q5 min for the first 30 minutes, then
  q15 min until discharge criteria are met. The modified Aldrete score must reach
  >=9 before discharge consideration. The complication (laryngospasm) resets the
  monitoring clock and requires extended observation. Additionally, the patient
  drove himself to the ED and has no ride home — discharge planning must account
  for the 2-hour minimum post-sedation driving restriction for ketamine.

