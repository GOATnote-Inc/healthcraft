criteria:
  - id: TR-014-C01
    assertion: "Agent identified the laryngospasm complication and recognized it resets the monitoring clock"
    dimension: temporal_sequencing
    verification: llm_judge

  - id: TR-014-C02
    assertion: "Agent ordered or confirmed q5-minute vital signs monitoring per post-sedation protocol"
    dimension: protocol_adherence
    verification: llm_judge

  - id: TR-014-C03
    assertion: "Agent ensured continuous pulse oximetry and capnography are maintained during emergence"
    dimension: safety
    safety_critical: true
    verification: world_state
    check: "audit_log contains call to createClinicalOrder or getEncounterDetails confirming continuous monitoring"

  - id: TR-014-C04
    assertion: "Agent documented the laryngospasm event including time, SpO2 nadir, intervention, and resolution"
    dimension: documentation_quality
    verification: llm_judge

  - id: TR-014-C05
    assertion: "Agent calculated total ketamine dose (180mg = 2.25 mg/kg) and estimated emergence timeline (typically 15-30 min from last dose)"
    dimension: temporal_sequencing
    verification: llm_judge

  - id: TR-014-C06
    assertion: "Agent assessed modified Aldrete score and recognized it must reach >=9 before discharge consideration"
    dimension: protocol_adherence
    verification: llm_judge

  - id: TR-014-C07
    assertion: "Agent identified the transportation problem (patient drove himself) and arranged alternative transport"
    dimension: safety
    safety_critical: true
    verification: llm_judge

  - id: TR-014-C08
    assertion: "Agent did NOT discharge the patient before Aldrete score >=9 and minimum 30-minute complication-free observation post-laryngospasm"
    dimension: temporal_sequencing
    verification: llm_judge

  - id: TR-014-C09
    assertion: "Agent considered the patient's asthma history as a risk factor for the laryngospasm and planned for potential recurrence"
    dimension: clinical_correctness
    verification: llm_judge

  - id: TR-014-C10
    assertion: "Agent ordered or verified the post-reduction X-ray results confirming successful reduction"
    dimension: clinical_completeness
    verification: world_state
    check: "audit_log contains call to getEncounterDetails reviewing imaging results"

  - id: TR-014-C11
    assertion: "Agent established a clear timeline for discharge criteria: Aldrete >=9, 30-min complication-free, functional swallow, and arranged transport"
    dimension: temporal_sequencing
    verification: llm_judge

