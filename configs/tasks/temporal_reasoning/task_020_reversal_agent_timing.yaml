metadata:
  openem_condition: "opioid_overdose"
  expected_tool_calls: "10-14"
  entity_types: 5
  time_pressure: "high"
  teaching_point: "The most dangerous moment in opioid overdose reversal is the 'feeling fine' phase when naloxone is active but the opioid has not been cleared. Extended-release opioids create a particularly treacherous half-life mismatch — the naloxone wears off while the opioid is still being absorbed. Discharging a patient in this window is a sentinel event waiting to happen. A naloxone drip (typically 2/3 of the effective bolus dose per hour) provides continuous coverage. The patient who 'feels fine' and wants to leave is the patient at highest risk."
