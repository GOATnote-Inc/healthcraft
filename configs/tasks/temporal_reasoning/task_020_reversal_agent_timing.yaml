# HEALTHCRAFT Task Definition: Medication Half-Life Overlap
# Category: temporal_reasoning | Level: 4
# Reversal agent timing decision involving medication half-lives,
# re-sedation risk, and discharge safety window calculation.

id: TR-020
category: temporal_reasoning
level: 4
title: "Medication Half-Life Overlap"
system_prompt_override: null

description: |
  It is 14:15. A 45-year-old male in Bed 28 was brought in by EMS at 12:30
  after being found unresponsive at home by his wife. He had a GCS of 7 on
  arrival with pinpoint pupils and a respiratory rate of 6. Naloxone 0.4mg IV
  was given at 12:35 by EMS with partial response (RR improved to 10, GCS to
  10). In the ED at 12:45, an additional 0.8mg IV naloxone was given with
  good response (GCS 14, RR 16, pupils dilating). The patient admits to taking
  "a handful" of extended-release oxycodone (OxyContin) approximately 3 hours
  before being found, which would place ingestion at approximately 09:30.

  The critical temporal problem: naloxone has a half-life of 30-90 minutes, but
  extended-release oxycodone has a half-life of 4.5 hours with continued
  absorption over 12+ hours. The total naloxone administered (1.2mg) will be
  substantially cleared by 14:30-15:00, while the oxycodone will continue to
  be absorbed and reach peak plasma levels around 15:00-16:00. The patient is
  currently alert, conversant, and requesting discharge ("I'm fine, it was an
  accident"). His wife confirms he has chronic pain and has been "taking more
  than prescribed." The agent must calculate the re-sedation risk window,
  decide on naloxone redosing or drip, prevent premature discharge, and manage
  the tension between patient autonomy and safety.

