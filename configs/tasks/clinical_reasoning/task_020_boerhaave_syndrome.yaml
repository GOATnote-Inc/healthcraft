metadata:
  confusion_pair: "boerhaave_syndrome_vs_myocardial_infarction"
  openem_condition: "esophageal_perforation"
  expected_tool_calls: "6-11"
  entity_types: 5
  time_pressure: "critical"
  cognitive_load: "very_high"
  teaching_point: "Boerhaave syndrome (spontaneous esophageal perforation) has the Mackler triad: forceful vomiting + chest pain + subcutaneous emphysema. Mortality exceeds 90% if treatment is delayed >24 hours. Subcutaneous emphysema and pneumomediastinum on CXR are the key imaging clues. NEVER use barium — use water-soluble contrast only. CT with oral contrast is the diagnostic study of choice. Negative troponin distinguishes from MI. The perforation is classically at the left posterolateral distal esophagus."
