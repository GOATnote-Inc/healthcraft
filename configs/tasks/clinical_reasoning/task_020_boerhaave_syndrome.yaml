# HEALTHCRAFT Task Definition: Boerhaave Syndrome
# Category: clinical_reasoning | Level: 5
# Confusion pair: Boerhaave Syndrome vs MI
# Post-emesis chest pain mimicking MI with mediastinal air on imaging.
# Agent must recognize esophageal perforation and act before mediastinitis kills.

id: CR-020
category: clinical_reasoning
level: 5
title: "Boerhaave Syndrome"
system_prompt_override: null

description: |
  A 48-year-old male presents with severe retrosternal chest pain that began
  abruptly during a forceful vomiting episode 4 hours ago after heavy alcohol
  consumption. He describes the pain as excruciating, radiating to the back,
  and worsened by swallowing. He appears toxic with fever (38.8C), tachycardia,
  and subcutaneous emphysema in the neck. Initial ECG is non-specific and
  troponin is negative, but the presentation was initially triaged as possible
  MI. Chest X-ray reveals left-sided pleural effusion and pneumomediastinum.
  CT chest with oral contrast confirms esophageal perforation with mediastinal
  contamination. The agent must recognize Boerhaave syndrome, understand its
  lethal trajectory (mediastinitis within hours), and initiate broad-spectrum
  antibiotics, NPO status, and emergent surgical consultation.

