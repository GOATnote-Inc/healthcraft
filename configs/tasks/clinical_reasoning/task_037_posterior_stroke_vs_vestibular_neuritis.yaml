# HEALTHCRAFT Task Definition: Posterior Stroke vs Vestibular Neuritis
# Category: clinical_reasoning | Level: 5
# Confusion pair: posterior_stroke:vestibular_neuritis
# Patient with acute vertigo — agent must recognize posterior circulation stroke
# mimicking benign vestibular neuritis. Missing this diagnosis is devastating.

id: CR-037
category: clinical_reasoning
level: 5
title: "The Dizzy Deception"
system_prompt_override: null

description: |
  A 62-year-old male with hypertension and atrial fibrillation (on warfarin,
  subtherapeutic INR 1.4) presents with acute-onset severe vertigo, nausea,
  vomiting, and unsteadiness for 4 hours. He has no hearing loss. Initial assessment
  by the triage physician suspects vestibular neuritis and plans for symptomatic
  management and discharge. However, key exam findings suggest a central cause:
  direction-changing nystagmus (changes direction with gaze, not fixed unidirectional),
  severe gait ataxia (cannot sit unsupported), a NEGATIVE head impulse test (HIT) on
  the left (central lesion — peripheral would show corrective saccade), and subtle
  left-sided dysmetria on finger-to-nose. The HINTS exam (Head Impulse, Nystagmus,
  Test of Skew) is concerning for a central pattern. The agent must recognize this as
  posterior circulation stroke (likely cerebellar), order emergent MRI/MRA or CTA,
  and consult neurology rather than discharging with meclizine.

