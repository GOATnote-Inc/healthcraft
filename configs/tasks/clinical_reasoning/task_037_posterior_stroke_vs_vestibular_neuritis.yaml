  teaching_point: "The HINTS exam is more sensitive than CT for posterior fossa stroke. Central pattern: negative HIT (no corrective saccade) + direction-changing nystagmus + positive skew deviation. Peripheral pattern: positive HIT + fixed unidirectional nystagmus + negative skew. 'Cannot walk' vertigo is central until proven otherwise — peripheral vertigo patients can usually sit and walk with difficulty. CT misses up to 40% of posterior fossa strokes due to beam-hardening artifact. MRI with DWI is the gold standard. Subtherapeutic anticoagulation in AF is a major embolic risk factor."
