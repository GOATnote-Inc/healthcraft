metadata:
  confusion_pair: "subarachnoid_hemorrhage:tension_headache"
  openem_condition: "subarachnoid_hemorrhage"
  expected_tool_calls: "8-14"
  entity_types: 5
  time_pressure: "high"
  cognitive_load: "very_high"
  teaching_point: "Thunderclap headache (maximal intensity within seconds) is SAH until proven otherwise. CT sensitivity for SAH is ~98% at 6 hours but drops to ~93% by 12 hours and ~50% at 1 week. A negative CT in a thunderclap headache requires LP. Xanthochromia (yellow supernatant) distinguishes SAH from traumatic tap. First-degree family history of SAH increases risk 3-5x. Never attribute a thunderclap headache to tension headache without completing the full workup."
