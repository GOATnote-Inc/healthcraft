# HEALTHCRAFT Task Definition: Subarachnoid Hemorrhage vs Tension Headache
# Category: clinical_reasoning | Level: 5
# Confusion pair: subarachnoid_hemorrhage:tension_headache
# Patient with "worst headache" and normal CT — agent must pursue LP to rule out SAH
# despite pressure to diagnose tension headache and discharge.

id: CR-021
category: clinical_reasoning
level: 5
title: "The Thunderclap"
system_prompt_override: null

description: |
  A 42-year-old female presents with sudden-onset severe headache that began 6 hours
  ago while straining at the gym. She describes it as the "worst headache of my life,"
  peaking within seconds. She had brief nausea and one episode of vomiting at onset.
  The headache has partially improved with IV ketorolac but persists at 5/10. She has
  a history of tension headaches but states this is "completely different." Exam shows
  mild neck stiffness but no focal neurological deficits. Non-contrast CT head
  (obtained 6 hours after onset) is read as normal. The agent must recognize that a
  normal CT does not exclude SAH (sensitivity drops to ~93% at 6 hours) and perform
  a lumbar puncture to look for xanthochromia and RBCs. Discharging with a tension
  headache diagnosis risks a fatal re-bleed from an unsecured aneurysm.

