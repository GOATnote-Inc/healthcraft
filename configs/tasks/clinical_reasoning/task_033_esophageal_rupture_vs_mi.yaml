  teaching_point: "Boerhaave syndrome (spontaneous esophageal rupture) occurs from forceful vomiting and presents with Mackler's triad: vomiting + chest pain + subcutaneous emphysema. Pneumomediastinum on CXR and Hamman's sign on auscultation are key findings. The borderline troponin is demand ischemia from shock, not ACS. Elevated pleural fluid amylase (salivary type) is diagnostic. Mortality is nearly 100% without surgical repair within 24 hours. Do NOT waste time on cath lab activation — this is a thoracic surgery emergency."
