# HEALTHCRAFT Task Definition: Esophageal Rupture vs Myocardial Infarction
# Category: clinical_reasoning | Level: 5
# Confusion pair: esophageal_rupture:myocardial_infarction
# Patient with severe chest pain after vomiting — agent must recognize Boerhaave
# syndrome rather than treating for ACS. Delay in diagnosis is almost always fatal.

id: CR-033
category: clinical_reasoning
level: 5
title: "The Retching Rupture"
system_prompt_override: null

description: |
  A 52-year-old male presents with sudden severe left-sided chest pain that began
  during forceful vomiting after a large meal with heavy alcohol consumption. He is
  diaphoretic, tachycardic, and febrile (38.3°C). The initial ECG shows sinus
  tachycardia with non-specific ST changes, and troponin is borderline at 0.05 ng/mL,
  raising concern for ACS. However, subcutaneous emphysema is palpable in the left
  supraclavicular area, and the chest X-ray shows a left-sided pleural effusion with
  pneumomediastinum and subcutaneous emphysema. Hamman's sign (mediastinal crunch
  synchronous with heartbeat) is audible on auscultation. The agent must diagnose
  Boerhaave syndrome (spontaneous esophageal rupture), initiate broad-spectrum IV
  antibiotics, make NPO, and consult thoracic surgery emergently.

