metadata:
  confusion_pair: "fat_embolism:ards"
  openem_condition: "fat_embolism"
  expected_tool_calls: "8-12"
  entity_types: 5
  time_pressure: "high"
  cognitive_load: "high"
  teaching_point: "Fat embolism syndrome (FES) presents 24-72 hours after long bone fracture with the classic triad: respiratory distress + neurological changes + petechial rash (in non-dependent areas: axillae, chest, conjunctivae). Unlike generic ARDS, FES has petechiae, acute confusion, retinal changes, and thrombocytopenia from fat globule consumption. Fat globules in urine are confirmatory. Gurd's criteria: 1 major + 4 minor, or 2 major criteria. Treatment is primarily supportive. Early definitive fracture fixation reduces ongoing fat embolization. No specific antidote exists."
