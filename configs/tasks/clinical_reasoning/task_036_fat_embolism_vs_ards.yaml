# HEALTHCRAFT Task Definition: Fat Embolism Syndrome vs ARDS
# Category: clinical_reasoning | Level: 5
# Confusion pair: fat_embolism:ards
# Post-fracture patient with respiratory distress, confusion, and petechiae — agent
# must recognize fat embolism syndrome and not just treat generic ARDS.

id: CR-036
category: clinical_reasoning
level: 5
title: "The Marrow Shower"
system_prompt_override: null

description: |
  A 22-year-old male who sustained bilateral femur fractures in a motor vehicle
  accident 36 hours ago (now with external fixation) develops acute dyspnea,
  confusion, and tachycardia. On exam, there is a petechial rash across the chest,
  axillae, and conjunctivae. SpO2 is 84% on room air. He is confused and agitated
  (GCS 12). Chest X-ray shows bilateral diffuse alveolar infiltrates ("snowstorm"
  pattern). ABG shows PaO2 52 on room air. Platelets have dropped from 240 to 98
  over 36 hours. Fat globules are seen on urinalysis. The classic triad of respiratory
  distress + neurological changes + petechial rash 24-72 hours after long bone
  fracture is pathognomonic for fat embolism syndrome. The agent must diagnose FES,
  distinguish it from generic ARDS or PE, and initiate appropriate supportive care
  with emphasis on the neurological and hematological components.

