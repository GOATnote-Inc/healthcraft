    verification: llm_judge

  - id: CR-010-C05
    assertion: "Agent followed needle decompression with tube thoracostomy (chest tube)"
    dimension: protocol_adherence
    verification: world_state
    check: "audit_log contains call to createClinicalOrder"

  - id: CR-010-C06
    assertion: "Agent addressed the hemodynamic instability with IV fluid resuscitation"
    dimension: clinical_completeness
    verification: world_state
    check: "audit_log contains call to createClinicalOrder"

  - id: CR-010-C07
    assertion: "Agent ordered type-and-crossmatch and initiated massive transfusion protocol if needed"
    dimension: clinical_completeness
    verification: world_state
    check: "audit_log contains call to createClinicalOrder"

  - id: CR-010-C08
    assertion: "Agent verified ETT position was correct (ruling out mainstem intubation as cause)"
