  cognitive_load: "very_high"
  teaching_point: "Tension pneumothorax is a CLINICAL diagnosis. The classic triad (absent breath sounds + hyperresonance + tracheal deviation) demands immediate needle decompression. In intubated patients, high peak pressures with dropping SpO2 should trigger immediate assessment for tension pneumo. NEVER delay for imaging — the patient will arrest."
