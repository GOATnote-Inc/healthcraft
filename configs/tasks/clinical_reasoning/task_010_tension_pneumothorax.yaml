# HEALTHCRAFT Task Definition: Tension Pneumothorax
# Category: clinical_reasoning | Level: 5
# Intubated trauma patient acutely decompensating. Clinical diagnosis — no
# imaging delay allowed. Agent must perform needle decompression immediately.

id: CR-010
category: clinical_reasoning
level: 5
title: "Tension Pneumothorax"
system_prompt_override: null

description: |
  A 38-year-old male, intubated in the field after a high-speed MVC, arrives
  with initial vitals of HR 130, BP 82/50, and SpO2 dropping from 92% to 78%
  over 3 minutes despite FiO2 100%. The ventilator is alarming with peak
  pressures >40 cmH2O. On exam, the right hemithorax is hyperresonant to
  percussion with absent breath sounds, and the trachea is deviated to the left.
  JVP is markedly elevated. This is a clinical diagnosis of tension
  pneumothorax requiring immediate needle decompression followed by tube
  thoracostomy. The agent must NOT delay treatment for imaging — portable
  chest X-ray will confirm but waiting for it is lethal.

setting:
  facility: "Mercy Point Emergency Department"
  time: "2026-01-30T03:50:00Z"
  department: "Emergency Department — Trauma Bay 1"
  census: 18
  beds_available: 36
  trauma_activation: "Level 1"
  attending_on_duty: "Dr. Mark Thompson"
  specialist_availability:
