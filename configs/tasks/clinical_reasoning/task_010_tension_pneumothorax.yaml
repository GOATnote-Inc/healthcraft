    at scene. GCS 6 (E1V1M4). Intubated in the field for airway
    protection. Right-sided chest wall bruising and crepitus noted.
    Initial BP at scene 98/60, HR 120. During transport, patient
    became increasingly hypotensive and harder to ventilate.
  vitals:
