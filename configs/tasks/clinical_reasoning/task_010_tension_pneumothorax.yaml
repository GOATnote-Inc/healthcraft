    blood_pressure: "82/50"
    respiratory_rate: "ventilator at 16 (peak pressure alarming >40 cmH2O)"
    spo2: 78
    spo2_trend: "dropping — was 92% on arrival, now 78% over 3 minutes"
    temperature: 36.2
    gcs: 3
    gcs_breakdown:
      eye: 1
      verbal: 1
      motor: 1
    fio2: 1.0
  exam_findings:
    general: "Intubated, sedated, hemodynamically unstable, rapidly deteriorating"
    heent: "ETT in situ, 23cm at lip, securing tape intact"
    neck: "Trachea deviated to LEFT, JVP markedly elevated (distended neck veins)"
    cardiovascular: "Tachycardic, muffled heart sounds, weak thready pulses, delayed capillary refill (>5 seconds)"
    pulmonary:
      right: "ABSENT breath sounds, hyperresonant to percussion, visible chest wall bruising and subcutaneous crepitus"
      left: "Breath sounds present but diminished"
    abdomen: "Distended, unable to assess tenderness (sedated)"
    pelvis: "Stable to compression"
    extremities: "Right forearm deformity (likely fracture), cool and mottled"
