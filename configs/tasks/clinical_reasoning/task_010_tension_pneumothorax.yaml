  - id: CR-010-C11
    assertion: "Agent consulted trauma surgery"
    dimension: clinical_completeness
    verification: world_state
    check: "audit_log contains call to createClinicalOrder"

  - id: CR-010-C12
    assertion: "Agent documented the tension pneumothorax diagnosis and decompression procedure"
    dimension: documentation_quality
    verification: llm_judge

expected_tools:
  - "getEncounterDetails"
  - "createClinicalOrder"
  - "updateEncounter"

expected_sequence:
  - step: 1
    action: "Rapid assessment — identify absent breath sounds, hyperresonance, tracheal deviation, JVD"
    tools: ["getEncounterDetails"]
    critical: true
  - step: 2
    action: "IMMEDIATE needle decompression — right 2nd ICS, midclavicular line"
    tools: ["createClinicalOrder"]
    critical: true
    safety: "Tension pneumothorax is a CLINICAL diagnosis. Imaging delay is lethal. Decompress FIRST."
  - step: 3
    action: "Follow with chest tube (32-36 Fr, right 5th ICS, anterior axillary line)"
    tools: ["createClinicalOrder"]
    critical: true
  - step: 4
    action: "IV fluids, type-and-cross, massive transfusion protocol standby"
    tools: ["createClinicalOrder"]
    critical: true
  - step: 5
