    verification: llm_judge

  - id: CR-010-C09
    assertion: "Agent performed ATLS primary survey systematically (ABCDE)"
    dimension: protocol_adherence
    verification: llm_judge

  - id: CR-010-C10
    assertion: "Agent ordered portable CXR AFTER decompression to confirm resolution and assess other injuries"
