  - id: CR-042-C11
    assertion: "Agent addressed hyponatremia (Na 126) with fluid restriction or hypertonic saline, recognizing SIADH as a feature of AIP"
    dimension: clinical_correctness
    verification: llm_judge

  - id: CR-042-C12
    assertion: "Agent consulted hematology for hemin administration and AIP management"
    dimension: clinical_completeness
