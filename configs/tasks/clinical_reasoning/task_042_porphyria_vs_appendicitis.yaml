# HEALTHCRAFT Task Definition: Acute Intermittent Porphyria vs Appendicitis
# Category: clinical_reasoning | Level: 5
# Confusion pair: acute_intermittent_porphyria:appendicitis
# Young woman with severe abdominal pain, tachycardia, and vomiting — agent must
# recognize the psychiatric/neurological features and dark urine as porphyria rather
# than sending to surgery for a normal appendix.

id: CR-042
category: clinical_reasoning
level: 5
title: "The Purple Urine Mystery"
system_prompt_override: null

description: |
  A 28-year-old woman presents with severe, diffuse, colicky abdominal pain for 2 days
  that began 3 days into a new ketogenic diet she started for weight loss. She has had
  multiple episodes of vomiting and constipation. She reports feeling anxious, confused,
  and "seeing things that aren't there." She has had two prior hospitalizations for similar
  abdominal pain episodes (ages 22 and 25), both resulting in negative surgical
  explorations. Her current medications include oral contraceptive pills (recently started)
  and she was prescribed trimethoprim-sulfamethoxazole 5 days ago for a UTI. On exam she
  is tachycardic (HR 118), hypertensive (BP 162/98), and has diffuse abdominal tenderness
  without peritoneal signs. Notably, deep tendon reflexes are diminished in the lower
  extremities and she has bilateral wrist drop. The nursing note documents that her urine
  turned dark reddish-brown on standing. Labs show hyponatremia (Na 126), normal WBC,
  and normal lipase. CT abdomen/pelvis is unremarkable with a normal appendix. The agent
  must diagnose acute intermittent porphyria (AIP) precipitated by multiple triggers
  (fasting/keto diet, OCP, sulfonamide antibiotic), order urine porphobilinogen and
  aminolevulinic acid, discontinue precipitating medications, initiate IV hemin and
  glucose loading, and avoid unsafe medications. The agent must NOT refer for appendectomy.

