  teaching_point: "AIP is the great masquerader of acute abdomen. The classic pentad is abdominal pain, neuropsychiatric symptoms, autonomic dysfunction, motor neuropathy, and dark/red urine. It is autosomal dominant with variable penetrance, predominantly affecting women of reproductive age. Key triggers: fasting, hormonal changes (OCP, menses), medications (sulfonamides, barbiturates, anticonvulsants), alcohol, and stress. Urine PBG is the diagnostic test — it is markedly elevated during acute attacks. The urine turns dark reddish-brown on standing due to porphobilinogen polymerization. Prior negative laparotomies are a classic clue. Treatment is IV hemin + glucose loading + trigger removal. Hyponatremia from SIADH is common. Motor neuropathy can progress to respiratory paralysis if triggers are not removed."
