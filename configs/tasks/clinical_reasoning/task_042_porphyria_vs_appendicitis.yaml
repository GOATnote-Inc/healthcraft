  - id: CR-042-C03
    assertion: "Agent diagnosed acute intermittent porphyria based on the constellation: recurrent severe abdominal pain without peritoneal signs, neuropsychiatric features (confusion, hallucinations), motor neuropathy (wrist drop), autonomic dysfunction (tachycardia, hypertension), hyponatremia, dark urine, and multiple triggers"
