  time_pressure: "high"
  cognitive_load: "high"
  teaching_point: "Pheochromocytoma presents with paroxysmal hypertensive crises (BP >200 systolic), headache, diaphoresis, and palpitations — easily misdiagnosed as panic disorder. Key differences: panic attacks do NOT cause BP >200 or significant diaphoresis. Weight loss, hemoconcentration (Hgb 15.8, Hct 47), and hyperglycemia point to catecholamine excess. Family history of MTC suggests MEN2. Plasma free metanephrines are 96% sensitive. ALWAYS alpha-block BEFORE beta-block — beta-blocker monotherapy is contraindicated."
