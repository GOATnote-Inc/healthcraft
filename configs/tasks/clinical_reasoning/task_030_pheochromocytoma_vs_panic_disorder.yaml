# HEALTHCRAFT Task Definition: Pheochromocytoma vs Panic Disorder
# Category: clinical_reasoning | Level: 4
# Confusion pair: pheochromocytoma:panic_disorder
# Patient with episodic hypertensive crises, palpitations, and diaphoresis — agent
# must recognize pheochromocytoma rather than treating as panic attacks.

id: CR-030
category: clinical_reasoning
level: 4
title: "The Adrenaline Surge"
system_prompt_override: null

description: |
  A 36-year-old female presents with her fourth ED visit in 3 months for episodes of
  sudden severe headache, palpitations, diaphoresis, and "a sense of impending doom"
  lasting 20-30 minutes. She has been diagnosed with panic disorder and prescribed
  sertraline and lorazepam with minimal benefit. During this episode, her BP is
  242/138 with HR 132. Between episodes (per prior records), her BP is normal. On
  exam, she is diaphoretic and tremulous. She reports unintentional 15-pound weight
  loss over 3 months. A family history reveals her father had a thyroidectomy for
  medullary thyroid cancer. Labs show elevated plasma free metanephrines (normetanephrine
  1,840 pg/mL, metanephrine 620 pg/mL). The agent must diagnose pheochromocytoma,
  avoid beta-blockers alone (can cause unopposed alpha stimulation), and initiate
  alpha-blockade with phenoxybenzamine or phentolamine.

