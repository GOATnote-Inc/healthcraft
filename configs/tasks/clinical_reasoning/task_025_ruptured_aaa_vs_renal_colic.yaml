metadata:
  confusion_pair: "ruptured_aaa:renal_colic"
  openem_condition: "ruptured_aaa"
  expected_tool_calls: "8-12"
  entity_types: 5
  time_pressure: "critical"
  cognitive_load: "high"
  teaching_point: "The classic triad of ruptured AAA is sudden flank/back pain + hypotension + pulsatile abdominal mass. Only 25-50% present with all three. Any hypotensive patient with known AAA and acute pain is ruptured until proven otherwise. Renal colic does NOT cause hypotension (patients are usually normotensive and writhing). Absence of hematuria argues against renal colic. Known AAA surveillance lapse (>12 months between scans) is a risk factor. Do NOT delay for CT if hemodynamically unstable — go directly to OR."
