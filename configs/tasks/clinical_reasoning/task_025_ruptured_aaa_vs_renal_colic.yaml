# HEALTHCRAFT Task Definition: Ruptured AAA vs Renal Colic
# Category: clinical_reasoning | Level: 5
# Confusion pair: ruptured_aaa:renal_colic
# Elderly patient with sudden flank pain — agent must recognize ruptured abdominal
# aortic aneurysm rather than treating as kidney stone. Misdiagnosis is rapidly fatal.

id: CR-025
category: clinical_reasoning
level: 5
title: "The Catastrophic Flank Pain"
system_prompt_override: null

description: |
  A 72-year-old male with a history of hypertension and 50-pack-year smoking presents
  with sudden-onset severe left flank pain radiating to the groin, which he attributes
  to a kidney stone (he had nephrolithiasis 10 years ago). He is diaphoretic and
  restless. On exam, blood pressure is 92/58 with heart rate 118. There is a pulsatile
  abdominal mass palpable above the umbilicus. The left flank is tender. Hemoglobin
  returns at 9.2 (baseline unknown but likely lower than expected for his age). There
  is no hematuria on urinalysis. The agent must recognize the triad of sudden flank/back
  pain + hypotension + pulsatile abdominal mass as ruptured AAA and arrange emergent
  vascular surgery, NOT pursue CT for renal stone workup. Every minute of delay
  increases mortality.

