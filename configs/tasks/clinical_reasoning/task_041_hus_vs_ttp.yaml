# HEALTHCRAFT Task Definition: Hemolytic Uremic Syndrome vs Thrombotic Thrombocytopenic Purpura
# Category: clinical_reasoning | Level: 5
# Confusion pair: hemolytic_uremic_syndrome:thrombotic_thrombocytopenic_purpura
# Child with bloody diarrhea and thrombotic microangiopathy — agent must distinguish
# diarrhea-associated HUS from TTP as management diverges critically (supportive care
# vs plasmapheresis). Platelet transfusion is harmful in both.

id: CR-041
category: clinical_reasoning
level: 5
title: "The Bloody Diarrhea Triad"
system_prompt_override: null

description: |
  A 4-year-old girl is brought to the ED by her parents with bloody diarrhea for 5 days
  following a visit to a petting zoo 8 days ago. She has become increasingly lethargic and
  pale over the past 24 hours with decreased urine output. Mom reports the child's urine
  was "dark brown" this morning. On exam she is pale, irritable, and has petechiae on her
  trunk and extremities. Vitals show tachycardia (HR 142) and hypertension (BP 118/82,
  >99th percentile for age). Labs reveal hemoglobin 6.8, platelets 38K, creatinine 3.4
  (anuria developing), LDH 2,840, haptoglobin <10, and schistocytes on peripheral smear.
  Stool culture is pending but STEC PCR is positive for Shiga toxin-producing E. coli
  O157:H7. The agent must diagnose diarrhea-positive hemolytic uremic syndrome (D+ HUS)
  based on the classic triad (microangiopathic hemolytic anemia, thrombocytopenia, acute
  kidney injury) in the setting of STEC infection, differentiate from TTP (which presents
  with neurological predominance, ADAMTS13 deficiency, and requires plasmapheresis), and
  manage with supportive care including fluid resuscitation, RBC transfusion, and nephrology
  consultation for likely dialysis. Critically, the agent must NOT administer antibiotics
  (increase Shiga toxin release) or transfuse platelets (worsen microvascular thrombosis).

