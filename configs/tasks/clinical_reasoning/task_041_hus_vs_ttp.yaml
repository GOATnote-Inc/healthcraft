  teaching_point: "D+ HUS is the most common cause of AKI in children. It follows STEC O157:H7 infection (petting zoos, undercooked beef). The triad is MAHA + thrombocytopenia + AKI. Unlike TTP, neurological involvement is secondary and ADAMTS13 is normal. Coagulation (PT/PTT/fibrinogen) is normal in HUS/TTP (unlike DIC). Antibiotics are CONTRAINDICATED — they lyse bacteria and release more Shiga toxin. Platelet transfusion is CONTRAINDICATED — it fuels microvascular thrombosis. Management is supportive: RBC transfusion, dialysis for renal failure, careful fluid/electrolyte management. TTP requires emergent plasmapheresis — wrong diagnosis = wrong treatment."
