# HEALTHCRAFT Task Definition: Spinal Epidural Abscess vs Disc Herniation
# Category: clinical_reasoning | Level: 5
# Confusion pair: spinal_epidural_abscess:disc_herniation
# Patient with back pain and radiculopathy — agent must recognize spinal epidural
# abscess (surgical emergency) rather than treating as disc herniation.

id: CR-038
category: clinical_reasoning
level: 5
title: "The Hot Spine"
system_prompt_override: null

description: |
  A 56-year-old male IV drug user presents with 5 days of progressive severe
  midline thoracic back pain, now with bilateral lower extremity weakness and
  urinary retention. He has a fever of 38.9°C and point tenderness over the
  T8-T10 spinous processes. He was seen at another ED 3 days ago, diagnosed with
  "musculoskeletal back pain," given NSAIDs and muscle relaxants, and discharged.
  Since then, his symptoms have progressed — he now has 3/5 bilateral lower extremity
  weakness, decreased sensation below the umbilicus (T10 level), urinary retention
  (800mL on straight cath), and hyperreflexia in the lower extremities. WBC is 18.2,
  ESR 98, CRP 18. Blood cultures are positive for MSSA. MRI shows a posterior
  epidural abscess from T7-T11 with cord compression. The agent must diagnose spinal
  epidural abscess, start IV antistaphylococcal antibiotics immediately, and consult
  neurosurgery for emergent decompression before irreversible paralysis occurs.

