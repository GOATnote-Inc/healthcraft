  openem_condition: "spinal_epidural_abscess"
  expected_tool_calls: "8-14"
  entity_types: 5
  time_pressure: "critical"
  cognitive_load: "high"
  teaching_point: "Spinal epidural abscess presents as back pain progressing through stages: back pain → radiculopathy → motor/sensory deficits → paralysis. Key differentiators from disc herniation: FEVER, elevated inflammatory markers (ESR >20 in 95%), IVDU/bacteremia risk, midline tenderness (not paraspinal), upper motor neuron signs (hyperreflexia, Babinski) if above the conus. The classic triad (fever + back pain + neuro deficit) is present in only 10-15% at initial presentation. IVDU is the #1 risk factor. MRI with gadolinium is the gold standard. Surgical decompression within 24 hours of deficit onset gives the best neurological outcomes."
