    tools: ["createClinicalOrder"]
    critical: true

metadata:
  confusion_pair: "pancreatitis:peptic_ulcer_perforation"
  openem_condition: "peptic_ulcer_perforation"
  expected_tool_calls: "8-12"
  entity_types: 5
  time_pressure: "critical"
  cognitive_load: "high"
  teaching_point: "Elevated lipase does not equal pancreatitis. Perforated peptic ulcer, bowel obstruction, and mesenteric ischemia can all elevate lipase. Free air under the diaphragm on upright CXR is pneumoperitoneum until proven otherwise — this is a surgical emergency. Board-like abdominal rigidity with absent bowel sounds indicates peritonitis, not simple pancreatitis. History of NSAID use with PUD raises perforation risk."
