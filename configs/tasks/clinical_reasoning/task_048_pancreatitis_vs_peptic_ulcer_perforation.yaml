# HEALTHCRAFT Task Definition: Pancreatitis vs Peptic Ulcer Perforation
# Category: clinical_reasoning | Level: 4
# Confusion pair: pancreatitis:peptic_ulcer_perforation
# Epigastric pain with elevated amylase — agent must differentiate pancreatitis from
# perforated ulcer, which also elevates amylase but requires emergent surgery.

id: CR-048
category: clinical_reasoning
level: 4
title: "The Deceptive Enzyme"
system_prompt_override: null

description: |
  A 55-year-old male with a history of heavy alcohol use and peptic ulcer disease
  presents with sudden-onset severe epigastric pain radiating to the back that began
  2 hours ago. He is diaphoretic, lying rigid, and reports the pain as 10/10. Lipase
  is elevated at 420 U/L (3x upper limit of normal). However, the exam reveals
  diffuse abdominal rigidity with board-like quality, absent bowel sounds, and
  rebound tenderness — features atypical for uncomplicated pancreatitis. An upright
  chest X-ray reveals free air under the right hemidiaphragm. The agent must
  recognize that while the elevated lipase and history suggest pancreatitis, the
  peritoneal signs and free air indicate a perforated peptic ulcer (which can also
  elevate lipase/amylase) requiring emergent surgical intervention.

