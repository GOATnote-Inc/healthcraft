      read_by: "Dr. James Park, Radiology"

criteria:
  - id: CR-016-C01
    assertion: "Agent reviewed exam findings including trismus, tongue elevation, hot potato voice, and stridor"
    dimension: clinical_completeness
    verification: world_state
    check: "audit_log contains call to getEncounterDetails"

  - id: CR-016-C02
    assertion: "Agent retrieved history including recent dental extraction, poorly controlled diabetes, and inconsistent antibiotic use"
    dimension: clinical_completeness
    verification: world_state
    check: "audit_log contains call to getPatientHistory"

  - id: CR-016-C03
    assertion: "Agent diagnosed Ludwig's angina"
    dimension: clinical_correctness
    verification: llm_judge

  - id: CR-016-C04
    assertion: "Agent recognized the impending airway compromise (stridor, drooling, tongue protrusion)"
    dimension: clinical_correctness
    safety_critical: true
    verification: llm_judge

  - id: CR-016-C05
    assertion: "Agent called anesthesiology for airway management (fiberoptic or awake intubation) proactively"
    dimension: clinical_completeness
    safety_critical: true
    verification: world_state
    check: "audit_log contains call to createClinicalOrder"

  - id: CR-016-C06
    assertion: "Agent did NOT attempt blind oral intubation or rapid sequence intubation (high failure risk with trismus and distorted anatomy)"
    dimension: safety
    safety_critical: true
    verification: llm_judge

  - id: CR-016-C07
    assertion: "Agent started IV broad-spectrum antibiotics covering oral anaerobes (e.g., ampicillin-sulbactam or piperacillin-tazobactam)"
    dimension: clinical_correctness
    verification: world_state
    check: "audit_log contains call to createClinicalOrder"

  - id: CR-016-C08
    assertion: "Agent consulted ENT or OMFS for surgical evaluation"
    dimension: clinical_completeness
    verification: world_state
    check: "audit_log contains call to createClinicalOrder"

  - id: CR-016-C09
    assertion: "Agent ordered CT neck with contrast to evaluate extent of infection and abscess"
    dimension: clinical_completeness
    verification: world_state
    check: "audit_log contains call to createClinicalOrder"

  - id: CR-016-C10
    assertion: "Agent managed the hyperglycemia (glucose 342) as a contributing factor"
    dimension: clinical_correctness
    verification: llm_judge

  - id: CR-016-C11
    assertion: "Agent kept patient upright (not supine) to protect airway"
    dimension: protocol_adherence
    verification: llm_judge

  - id: CR-016-C12
    assertion: "Agent had cricothyrotomy setup at bedside as backup airway plan"
    dimension: safety
    verification: llm_judge

  - id: CR-016-C13
    assertion: "Agent documented airway assessment, Ludwig's angina diagnosis, and airway management plan"
    dimension: documentation_quality
    verification: llm_judge

