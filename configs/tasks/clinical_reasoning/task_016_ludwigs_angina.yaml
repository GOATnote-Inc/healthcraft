metadata:
  confusion_pair: "ludwigs_angina_vs_peritonsillar_abscess"
  openem_condition: "ludwigs_angina"
  expected_tool_calls: "6-10"
  entity_types: 5
  time_pressure: "high"
  cognitive_load: "high"
  teaching_point: "Ludwig's angina is a bilateral submandibular space infection that elevates the tongue and can obstruct the airway. Stridor and drooling are signs of impending obstruction. Proactive airway management is essential — do NOT wait for complete obstruction. Awake fiberoptic intubation is preferred; surgical airway must be immediately available. Risk factors: dental infection, diabetes, immunocompromise."
