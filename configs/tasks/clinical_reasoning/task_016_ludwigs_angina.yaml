# HEALTHCRAFT Task Definition: Ludwig's Angina
# Category: clinical_reasoning | Level: 4
# Floor of mouth infection threatening airway. Agent must recognize the
# impending airway compromise and manage proactively before obstruction.

id: CR-016
category: clinical_reasoning
level: 4
title: "Ludwig's Angina"
system_prompt_override: null

description: |
  A 44-year-old male presents with progressive jaw swelling, severe sore throat,
  and difficulty swallowing over the past 2 days following a dental extraction of
  a lower molar 4 days ago. He now reports difficulty breathing when lying flat
  and has a muffled "hot potato" voice. On exam, there is bilateral submandibular
  induration with woody, board-like swelling of the floor of the mouth. The
  tongue is elevated and protruding. The patient is sitting upright, leaning
  forward, and drooling. The agent must recognize Ludwig's angina with impending
  airway compromise, secure the airway proactively (call anesthesia for
  fiberoptic or awake intubation), start IV antibiotics, and consult ENT/OMFS
  for surgical drainage.

