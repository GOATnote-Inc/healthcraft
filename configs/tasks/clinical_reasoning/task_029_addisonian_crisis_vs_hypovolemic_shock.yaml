metadata:
  confusion_pair: "addisonian_crisis:hypovolemic_shock"
  openem_condition: "addisonian_crisis"
  expected_tool_calls: "8-12"
  entity_types: 5
  time_pressure: "critical"
  cognitive_load: "high"
  teaching_point: "Adrenal crisis presents identically to hypovolemic or septic shock but is refractory to fluids and vasopressors without cortisol. Classic lab triad: hyponatremia + hyperkalemia + hypoglycemia. Eosinophilia is a clue (cortisol suppresses eosinophils). Chronic steroid use (>3 weeks) suppresses the HPA axis — rapid taper or intercurrent illness precipitates crisis. Random cortisol <3 in a stressed patient is diagnostic. Do NOT wait for ACTH stimulation test — treat empirically with hydrocortisone 100mg IV. Response to steroids is dramatic (within 1-2 hours)."
