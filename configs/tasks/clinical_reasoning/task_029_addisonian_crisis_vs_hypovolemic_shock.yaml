# HEALTHCRAFT Task Definition: Addisonian Crisis vs Hypovolemic Shock
# Category: clinical_reasoning | Level: 4
# Confusion pair: addisonian_crisis:hypovolemic_shock
# Hypotensive patient unresponsive to fluids — agent must recognize adrenal crisis
# rather than continuing fluid resuscitation for presumed hypovolemia.

id: CR-029
category: clinical_reasoning
level: 4
title: "The Refractory Hypotension"
system_prompt_override: null

description: |
  A 48-year-old female on chronic prednisone for lupus (recently tapered by her
  rheumatologist 2 weeks ago) presents with progressive fatigue, nausea, vomiting,
  and confusion over 3 days, triggered by a viral gastroenteritis. She is profoundly
  hypotensive (BP 72/44) and tachycardic (HR 128) despite 3 liters of IV normal
  saline administered by EMS and in the ED. Labs show hyponatremia (Na 124),
  hyperkalemia (K 5.8), hypoglycemia (glucose 48), and a random cortisol of 2.1
  mcg/dL (critically low for a stressed patient). Eosinophilia is present on CBC.
  The agent must recognize that fluid-refractory hypotension in a patient with recent
  steroid taper indicates adrenal crisis, and administer IV stress-dose
  hydrocortisone immediately. Without cortisol replacement, continued fluids and
  vasopressors will fail.

