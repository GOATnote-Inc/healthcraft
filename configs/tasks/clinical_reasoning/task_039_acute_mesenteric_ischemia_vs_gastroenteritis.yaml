# HEALTHCRAFT Task Definition: Acute Mesenteric Ischemia vs Gastroenteritis
# Category: clinical_reasoning | Level: 5
# Confusion pair: acute_mesenteric_ischemia:gastroenteritis
# Elderly patient with severe abdominal pain and diarrhea — agent must recognize
# mesenteric ischemia rather than treating as viral gastroenteritis.

id: CR-039
category: clinical_reasoning
level: 5
title: "The Gut Infarction"
system_prompt_override: null

description: |
  A 74-year-old female with atrial fibrillation (on warfarin, INR 1.3 — subtherapeutic)
  and a recent hospitalization for CHF exacerbation presents with sudden severe
  periumbilical abdominal pain, nausea, and watery diarrhea for 6 hours. She
  describes the pain as 10/10 but the abdominal exam is surprisingly benign — soft,
  mildly tender, no peritoneal signs (the classic "pain out of proportion to exam").
  She had two episodes of non-bloody watery stool. The initial assessment suspects
  viral gastroenteritis. However, lactate is markedly elevated at 6.8 mmol/L, there
  is a new metabolic acidosis (pH 7.24), and WBC is 22.4. CTA abdomen shows a
  filling defect in the superior mesenteric artery with absent enhancement of jejunal
  loops. The agent must diagnose acute mesenteric ischemia (embolic, from AF),
  initiate anticoagulation, and consult vascular surgery for emergent intervention
  before bowel necrosis becomes irreversible.

