  cognitive_load: "very_high"
  teaching_point: "The hallmark of acute mesenteric ischemia is pain out of proportion to physical exam — severe pain with a benign-appearing abdomen. Atrial fibrillation (especially with subtherapeutic anticoagulation) is the #1 cause of SMA embolism. Gastroenteritis does NOT cause lactate >4, severe metabolic acidosis, or leukocytosis >20. Elevated LDH and amylase (from ischemic bowel) are additional clues. CTA is the gold standard. Once peritoneal signs develop, bowel necrosis has likely occurred and outcomes worsen dramatically. Diarrhea in mesenteric ischemia is from ischemic mucosal sloughing, not infection."
