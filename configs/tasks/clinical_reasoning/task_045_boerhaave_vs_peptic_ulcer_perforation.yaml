    assertion: "Agent differentiated Boerhaave syndrome from peptic ulcer perforation: perforated ulcer has free peritoneal air, board-like abdominal rigidity, and peritoneal signs; Boerhaave has pneumomediastinum, subcutaneous emphysema, left pleural effusion, and no peritoneal air"
