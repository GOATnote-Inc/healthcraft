# HEALTHCRAFT Task Definition: Boerhaave Syndrome vs Peptic Ulcer Perforation
# Category: clinical_reasoning | Level: 5
# Confusion pair: boerhaave_syndrome:peptic_ulcer_perforation
# Patient with acute chest/epigastric pain after vomiting — agent must distinguish
# esophageal perforation (mediastinal air, left effusion) from peptic ulcer perforation
# (free peritoneal air, rigid abdomen). Wrong diagnosis leads to wrong surgery and death.

id: CR-045
category: clinical_reasoning
level: 5
title: "The Wrong Perforation"
system_prompt_override: null

description: |
  A 52-year-old male presents with excruciating epigastric and left chest pain that began
  abruptly 6 hours ago during a violent retching episode. He has a long history of peptic
  ulcer disease and the initial assessment by the emergency physician noted "likely perforated
  ulcer." He was started on IV pantoprazole and a surgical consult was placed for exploratory
  laparotomy. However, the CT abdomen/pelvis shows NO free intraperitoneal air and NO
  evidence of perforated viscus. Instead, there is pneumomediastinum, a left pleural
  effusion, and esophageal wall thickening. The surgical resident who re-evaluates notes
  subcutaneous emphysema in the neck that was not documented on initial exam. The patient
  is now febrile (39.1C), hypotensive (BP 86/52), tachycardic (HR 128), and deteriorating
  rapidly. Repeat labs show rising WBC (22.4), lactate (6.8), and procalcitonin (8.2).
  A CT chest with oral water-soluble contrast confirms left posterolateral esophageal
  perforation with contrast extravasation into the left pleural space and mediastinum.
  Left chest tube yields 600 mL of turbid, foul-smelling fluid with food particles. The
  agent must recognize Boerhaave syndrome (esophageal perforation), correct the working
  diagnosis from peptic ulcer perforation, arrange emergent thoracic surgery consultation
  (not general surgery for laparotomy), and manage the developing sepsis from mediastinitis.

