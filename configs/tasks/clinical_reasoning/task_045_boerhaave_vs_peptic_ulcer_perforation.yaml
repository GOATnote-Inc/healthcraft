metadata:
  confusion_pair: "boerhaave_syndrome:peptic_ulcer_perforation"
  openem_condition: "boerhaave_syndrome"
  expected_tool_calls: "10-15"
  entity_types: 5
  time_pressure: "critical"
  cognitive_load: "very_high"
  teaching_point: "Boerhaave syndrome and peptic ulcer perforation both cause acute epigastric pain but require completely different surgical approaches. Key differentiators: Perforated ulcer has free peritoneal air on upright CXR/CT, board-like abdominal rigidity, and peritoneal signs — treated by laparotomy/laparoscopy with repair. Boerhaave has pneumomediastinum (NOT pneumoperitoneum), subcutaneous emphysema, left pleural effusion (gastric contents drain left due to esophageal anatomy), and Hamman's sign — treated by thoracotomy with esophageal repair. The post-emetic mechanism (Mackler triad: vomiting + chest pain + subcutaneous emphysema) is the clinical giveaway. Pleural fluid with food particles, low pH, and high amylase (salivary) is diagnostic. CT with oral water-soluble contrast (NEVER barium) confirms the perforation site. Delay >24 hours from perforation to repair doubles mortality. Anchoring on the patient's ulcer history is the cognitive trap."
