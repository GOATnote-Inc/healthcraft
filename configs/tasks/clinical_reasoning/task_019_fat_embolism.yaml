# HEALTHCRAFT Task Definition: Fat Embolism Syndrome
# Category: clinical_reasoning | Level: 4
# Confusion pair: Fat Embolism vs PE vs Pneumonia
# Post-orthopedic surgery patient with respiratory distress, petechiae, and
# neurological changes. Agent must recognize the classic triad.

id: CR-019
category: clinical_reasoning
level: 4
title: "Fat Embolism Syndrome"
system_prompt_override: null

description: |
  A 28-year-old male, 36 hours post-operative from intramedullary nailing of a
  right femur fracture sustained in a motorcycle accident, develops acute
  dyspnea, confusion, and tachycardia on the orthopedic floor. He was doing
  well post-operatively until he became agitated and hypoxic. On exam, there
  is a petechial rash across the chest, axillae, and conjunctivae — the
  pathognomonic finding of fat embolism syndrome. CTA chest is negative for
  pulmonary embolism but shows bilateral diffuse ground-glass opacities. The
  agent must recognize the Gurd criteria triad (respiratory distress + neurological
  changes + petechiae), differentiate from PE and pneumonia, and initiate
  supportive care with high-flow oxygen and ICU transfer.

