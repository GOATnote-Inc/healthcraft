    assertion: "Agent reviewed vitals including severe hypoxemia (SpO2 84%), tachycardia, and fever"
    dimension: clinical_completeness
    verification: world_state
    check: "audit_log contains call to getEncounterDetails"

  - id: CR-019-C02
    assertion: "Agent identified the petechial rash on chest, axillae, and conjunctivae"
