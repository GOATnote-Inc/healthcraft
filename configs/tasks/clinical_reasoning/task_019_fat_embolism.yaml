metadata:
  confusion_pair: "fat_embolism_vs_pulmonary_embolism"
  openem_condition: "fat_embolism_syndrome"
  expected_tool_calls: "5-9"
  entity_types: 5
  time_pressure: "high"
  cognitive_load: "high"
  teaching_point: "Fat embolism syndrome presents 24-72 hours after long bone fracture with the Gurd triad: respiratory distress, neurological changes, and petechial rash. Petechiae on the chest, axillae, and conjunctivae are pathognomonic. CTA is NEGATIVE for PE. Thrombocytopenia and elevated lipase are supportive findings. Treatment is entirely supportive — there is no specific antidote. Intramedullary nailing of femur fractures is the highest-risk procedure."
