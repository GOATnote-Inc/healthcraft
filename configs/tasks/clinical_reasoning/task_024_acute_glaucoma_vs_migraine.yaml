# HEALTHCRAFT Task Definition: Acute Glaucoma vs Migraine with Aura
# Category: clinical_reasoning | Level: 4
# Confusion pair: acute_glaucoma:migraine_with_aura
# Patient with severe headache, visual disturbance, and nausea — agent must recognize
# acute angle-closure glaucoma rather than treating as migraine. Delay causes permanent blindness.

id: CR-024
category: clinical_reasoning
level: 4
title: "The Red Eye Headache"
system_prompt_override: null

description: |
  A 58-year-old Asian female presents with severe left-sided headache, nausea,
  vomiting, and "halos around lights" that began 3 hours ago after sitting in a
  dark movie theater. She has a history of migraines with visual aura and initially
  assumed this was a migraine. On closer exam, the left eye is injected (ciliary
  flush), the cornea is hazy/steamy, the pupil is mid-dilated (5mm) and fixed
  (non-reactive to light), and the globe is firm to palpation. Visual acuity is
  20/200 OS (normally 20/30). Intraocular pressure (IOP) measured by tonometry is
  58 mmHg (normal 10-21). The right eye is normal. The agent must diagnose acute
  angle-closure glaucoma, initiate IOP-lowering medications immediately, and consult
  ophthalmology for definitive laser iridotomy rather than treating with migraine
  abortives.

setting:
  facility: "Mercy Point Emergency Department"
  time: "2026-02-14T20:00:00Z"
  department: "Emergency Department"
  census: 29
  beds_available: 25
  attending_on_duty: "Dr. Sarah Chen"
  specialist_availability:
    ophthalmology: "on_call, 25min response"
    neurology: "on_call, 30min response"

patient:
