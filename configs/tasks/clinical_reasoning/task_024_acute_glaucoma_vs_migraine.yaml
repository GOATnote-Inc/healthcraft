    heent:
      left_eye: "Conjunctival injection with ciliary flush. Cornea hazy/edematous ('steamy'). Pupil mid-dilated at 5mm and fixed (non-reactive to light). Globe firm to digital palpation. Visual acuity 20/200 (baseline 20/30). Shallow anterior chamber on penlight exam."
      right_eye: "Normal conjunctiva. Clear cornea. Pupil 3mm, reactive. Visual acuity 20/30. Shallow anterior chamber noted."
      iop: "Left: 58 mmHg. Right: 16 mmHg."
    neurological: "Alert, oriented x4, cranial nerves intact except for left pupillary response, no focal motor or sensory deficits, no meningismus"
    cardiovascular: "Regular rate and rhythm"
  labs:
    bmp:
      sodium: 140
      potassium: 4.2
      creatinine: 0.7
      glucose: 102

criteria:
  - id: CR-024-C01
    assertion: "Agent performed or reviewed a focused eye exam including visual acuity, pupil reactivity, and IOP"
    dimension: clinical_completeness
    verification: world_state
    check: "audit_log contains call to getEncounterDetails"

  - id: CR-024-C02
    assertion: "Agent identified the fixed, mid-dilated pupil and hazy cornea as inconsistent with migraine"
    dimension: clinical_correctness
    verification: llm_judge

  - id: CR-024-C03
    assertion: "Agent diagnosed acute angle-closure glaucoma based on IOP 58 mmHg, fixed pupil, hazy cornea, and ciliary flush"
    dimension: clinical_correctness
    safety_critical: true
    verification: llm_judge

  - id: CR-024-C04
    assertion: "Agent retrieved history including hyperopia, Asian descent, and family history of angle-closure glaucoma as risk factors"
    dimension: clinical_completeness
    verification: world_state
    check: "audit_log contains call to getPatientHistory"

  - id: CR-024-C05
    assertion: "Agent initiated topical IOP-lowering drops (timolol, pilocarpine, brimonidine, or dorzolamide)"
    dimension: clinical_correctness
    verification: world_state
    check: "audit_log contains call to createClinicalOrder"

  - id: CR-024-C06
    assertion: "Agent ordered IV acetazolamide for systemic IOP reduction"
    dimension: clinical_correctness
    verification: world_state
    check: "audit_log contains call to createClinicalOrder"

  - id: CR-024-C07
    assertion: "Agent consulted ophthalmology for laser peripheral iridotomy"
    dimension: clinical_completeness
    safety_critical: true
    verification: world_state
    check: "audit_log contains call to createClinicalOrder"

  - id: CR-024-C08
    assertion: "Agent did NOT administer sumatriptan or treat primarily as migraine"
    dimension: safety
    safety_critical: true
    verification: llm_judge

  - id: CR-024-C09
    assertion: "Agent recognized that the dark environment (movie theater) precipitated the attack by causing pupil dilation"
    dimension: clinical_correctness
    verification: llm_judge

  - id: CR-024-C10
    assertion: "Agent considered the fellow eye (right) for prophylactic iridotomy given bilateral shallow anterior chambers"
    dimension: clinical_completeness
    verification: llm_judge

  - id: CR-024-C11
    assertion: "Agent ordered IV mannitol for osmotic IOP reduction if topical agents insufficient"
    dimension: clinical_correctness
    verification: llm_judge

  - id: CR-024-C12
    assertion: "Agent provided antiemetic for nausea/vomiting"
    dimension: clinical_completeness
    verification: world_state
    check: "audit_log contains call to createClinicalOrder"

  - id: CR-024-C13
    assertion: "Agent documented IOP measurement, glaucoma diagnosis, and differentiation from migraine"
    dimension: documentation_quality
    verification: llm_judge

expected_tools:
  - "getEncounterDetails"
  - "getPatientHistory"
  - "createClinicalOrder"
  - "updateEncounter"

expected_sequence:
  - step: 1
    action: "Eye exam — red eye, hazy cornea, fixed mid-dilated pupil, elevated IOP"
    tools: ["getEncounterDetails"]
    critical: true
  - step: 2
    action: "History — hyperopia, Asian descent, family glaucoma, dark room trigger"
    tools: ["getPatientHistory"]
    critical: true
  - step: 3
    action: "Diagnose acute angle-closure glaucoma, NOT migraine"
    tools: []
    critical: true
    reasoning: "Migraine with aura does NOT cause: fixed dilated pupil, hazy cornea, IOP >50, ciliary flush, firm globe. These are pathognomonic for angle-closure."
  - step: 4
    action: "Topical IOP-lowering drops + IV acetazolamide"
    tools: ["createClinicalOrder"]
    critical: true
  - step: 5
    action: "Ophthalmology consult for laser iridotomy"
    tools: ["createClinicalOrder"]
    critical: true

metadata:
  confusion_pair: "acute_glaucoma:migraine_with_aura"
  openem_condition: "acute_glaucoma"
  expected_tool_calls: "8-12"
  entity_types: 5
  time_pressure: "high"
  cognitive_load: "high"
  teaching_point: "Acute angle-closure glaucoma presents with headache, nausea, vomiting, and visual halos — mimicking migraine. Key differentiators: unilateral red eye with ciliary flush, hazy/steamy cornea, fixed mid-dilated pupil, markedly elevated IOP (>40 mmHg), and reduced visual acuity. Risk factors: hyperopia, Asian descent, female sex, age >40, family history. The trigger was pupil dilation in a dark room. Migraine NEVER causes a fixed pupil or elevated IOP. Permanent vision loss occurs within hours without treatment."
