    cardiovascular: "Regular rate and rhythm, triphasic pericardial friction rub best heard at left lower sternal border with patient leaning forward, no murmurs, JVP normal"
    pulmonary: "Clear bilaterally"
    abdomen: "Soft, non-tender"
    extremities: "No edema, warm, well-perfused"
  labs:
