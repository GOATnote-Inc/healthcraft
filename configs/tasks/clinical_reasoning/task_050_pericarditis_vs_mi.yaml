# HEALTHCRAFT Task Definition: Pericarditis vs Myocardial Infarction
# Category: clinical_reasoning | Level: 4
# Confusion pair: pericarditis:myocardial_infarction
# Young patient with diffuse ST elevation — agent must recognize pericarditis
# pattern and avoid unnecessary cath lab activation.

id: CR-050
category: clinical_reasoning
level: 4
title: "The ST Elevation Trap"
system_prompt_override: null

description: |
  A 28-year-old male presents with sharp substernal chest pain that is worse with
  inspiration and when lying flat, improved by leaning forward. He had a viral URI
  one week ago. ECG shows diffuse ST elevation in multiple vascular territories
  (I, II, III, aVF, V2-V6) with PR depression in II and PR elevation in aVR.
  There is no reciprocal ST depression. The automated ECG read triggers a STEMI
  alert. Troponin I is 0.12 ng/mL (mildly elevated). The agent must recognize the
  ECG pattern as pericarditis (diffuse ST elevation, PR depression, no reciprocal
  changes) rather than STEMI, cancel the cath lab activation, and manage with
  NSAIDs and colchicine. Inappropriate cath lab activation wastes resources and
  exposes the patient to procedural risk.

setting:
  facility: "Mercy Point Emergency Department"
  time: "2026-02-05T08:15:00Z"
  department: "Emergency Department"
  census: 26
