metadata:
  confusion_pair: "pericarditis:myocardial_infarction"
  openem_condition: "pericarditis"
  expected_tool_calls: "8-12"
  entity_types: 5
  time_pressure: "high"
  cognitive_load: "high"
  teaching_point: "Pericarditis ECG: diffuse ST elevation (concave up), PR depression, PR elevation in aVR, NO reciprocal ST depression. STEMI ECG: focal ST elevation (convex up) in a vascular territory with reciprocal depression. Mildly elevated troponin in pericarditis = myopericarditis, not ACS. Friction rub is pathognomonic. Anticoagulation in pericarditis risks hemorrhagic pericardial effusion and tamponade."
