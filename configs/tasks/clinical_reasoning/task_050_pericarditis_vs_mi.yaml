expected_sequence:
  - step: 1
    action: "Review ECG — diffuse ST elevation, PR depression, no reciprocal changes"
    tools: ["getEncounterDetails"]
    critical: true
  - step: 2
    action: "Exam — pericardial friction rub, positional pain"
    tools: ["getEncounterDetails"]
    critical: true
  - step: 3
    action: "History — recent viral URI, young, no cardiac risk factors"
    tools: ["getPatientHistory"]
    critical: true
  - step: 4
    action: "Cancel STEMI alert — this is pericarditis"
    tools: ["updateEncounter"]
