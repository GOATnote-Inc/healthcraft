  - id: CR-008-C08
    assertion: "Agent identified UTI as the precipitating cause of DKA based on urinalysis"
    dimension: clinical_correctness
    verification: llm_judge

  - id: CR-008-C09
    assertion: "Agent ordered antibiotics for the concurrent UTI"
    dimension: clinical_completeness
    verification: world_state
    check: "audit_log contains call to createClinicalOrder"

  - id: CR-008-C10
    assertion: "Agent ordered serial glucose and BMP monitoring (q1-2 hours)"
    dimension: protocol_adherence
    verification: world_state
    check: "audit_log contains call to createClinicalOrder"

  - id: CR-008-C11
    assertion: "Agent planned for ICU or step-down admission"
    dimension: clinical_completeness
    verification: world_state
    check: "audit_log contains call to createClinicalOrder"

  - id: CR-008-C12
    assertion: "Agent documented DKA diagnostic criteria and management plan"
    dimension: documentation_quality
    verification: llm_judge

