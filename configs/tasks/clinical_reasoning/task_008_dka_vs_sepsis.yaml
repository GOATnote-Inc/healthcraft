metadata:
  confusion_pair: "dka_vs_sepsis"
  openem_condition: "diabetic_ketoacidosis"
  expected_tool_calls: "5-9"
  entity_types: 5
  time_pressure: "high"
  cognitive_load: "moderate"
  teaching_point: "DKA and sepsis frequently co-exist — always search for a precipitating cause (infection, MI, missed insulin). Potassium is falsely elevated in DKA due to acidosis-driven cellular shift; it will plummet with insulin. NEVER give insulin if K <3.3. Kussmaul respirations are compensatory — do NOT intubate a DKA patient for tachypnea unless they are failing."
