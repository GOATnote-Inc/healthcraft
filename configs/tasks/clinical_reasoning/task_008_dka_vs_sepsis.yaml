# HEALTHCRAFT Task Definition: DKA vs Sepsis
# Category: clinical_reasoning | Level: 3
# Confusion pair: DKA vs Sepsis
# Type 1 diabetic with altered mental status and tachycardia. Agent must
# differentiate between DKA and sepsis (or recognize both co-existing).

id: CR-008
category: clinical_reasoning
level: 3
title: "DKA vs Sepsis"
system_prompt_override: null

description: |
  A 26-year-old woman with type 1 diabetes presents with altered mental status,
  tachycardia (HR 128), Kussmaul respirations (RR 32), and a glucose of 486
  mg/dL. She was found confused by her partner after 2 days of vomiting and
  decreased oral intake. She ran out of insulin 3 days ago. Her anion gap is 28,
  pH 7.12, and beta-hydroxybutyrate is 7.8 mmol/L. The agent must diagnose DKA,
  initiate the DKA protocol (insulin drip, aggressive fluids, potassium
  monitoring), and search for a precipitating cause. Urinalysis reveals pyuria,
  suggesting a concurrent UTI as the trigger.

