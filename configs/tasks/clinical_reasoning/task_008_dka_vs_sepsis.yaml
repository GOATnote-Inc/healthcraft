    verification: world_state
    check: "audit_log contains call to getPatientHistory"

  - id: CR-008-C03
    assertion: "Agent identified DKA based on anion gap 28, pH 7.12, glucose 486, elevated beta-hydroxybutyrate"
    dimension: clinical_correctness
