# HEALTHCRAFT Task Definition: Malignant Hyperthermia vs Heat Stroke
# Category: clinical_reasoning | Level: 5
# Confusion pair: malignant_hyperthermia:heat_stroke
# Post-operative patient with extreme hyperthermia and rigidity — agent must recognize
# malignant hyperthermia requiring dantrolene, not standard heat stroke cooling.

id: CR-031
category: clinical_reasoning
level: 5
title: "The Operating Room Inferno"
system_prompt_override: null

description: |
  A 24-year-old male is transferred emergently from the OR to the ED resuscitation
  bay after developing rapidly rising temperature (currently 41.8°C), generalized
  muscle rigidity, masseter spasm (could not open jaw after succinylcholine), end-tidal
  CO2 spiking to 85 mmHg, tachycardia (HR 148), and dark-colored urine during an
  elective ACL repair under general anesthesia with sevoflurane and succinylcholine.
  ABG shows mixed respiratory and metabolic acidosis (pH 7.08, pCO2 72, HCO3 14).
  CK is 42,000 U/L and rising. Potassium is 6.4. The patient's cousin had an
  unexplained death during surgery. The agent must immediately diagnose malignant
  hyperthermia, stop all triggering agents, administer IV dantrolene (specific
  antidote), and manage the metabolic derangements. Standard cooling alone is
  insufficient and the patient will die without dantrolene.

