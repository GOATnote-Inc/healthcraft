metadata:
  confusion_pair: "malignant_hyperthermia:heat_stroke"
  openem_condition: "malignant_hyperthermia"
  expected_tool_calls: "8-15"
  entity_types: 5
  time_pressure: "critical"
  cognitive_load: "very_high"
  teaching_point: "Malignant hyperthermia is a pharmacogenetic emergency triggered by volatile anesthetics (sevoflurane, desflurane, halothane) and succinylcholine. Key features: masseter spasm, generalized rigidity, rapidly rising ETCO2 and temperature, rhabdomyolysis (CK >10,000), mixed acidosis. Distinguished from heat stroke by: onset during/after anesthesia, muscle rigidity (heat stroke has flaccidity), masseter spasm, and specific triggering agents. Dantrolene is the ONLY antidote (inhibits calcium release from sarcoplasmic reticulum). Heat stroke cooling alone will not stop the metabolic cascade."
