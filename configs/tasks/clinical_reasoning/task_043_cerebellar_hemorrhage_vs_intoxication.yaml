  openem_condition: "cerebellar_hemorrhage"
  expected_tool_calls: "10-15"
  entity_types: 5
  time_pressure: "critical"
  cognitive_load: "high"
  teaching_point: "Cerebellar hemorrhage is a neurosurgical emergency. The posterior fossa is a closed space — hemorrhages >3cm or those with brainstem compression or hydrocephalus require emergent decompression. The attribution bias of 'just drunk' kills patients. Key differentiators: BAL does not match clinical impairment, sudden headache onset, severe hypertension, Cushing reflex (hypertension + bradycardia = rising ICP), CN VI palsy (false localizing sign of elevated ICP), and progressive obtundation. Warfarin-associated ICH requires emergent reversal with 4-factor PCC (acts in minutes) AND IV vitamin K (sustains reversal). FFP alone is too slow and volume-intensive. AHA/ASA guidelines: target SBP <140 in ICH, emergent surgical consultation for cerebellar hemorrhage with neurological deterioration."
