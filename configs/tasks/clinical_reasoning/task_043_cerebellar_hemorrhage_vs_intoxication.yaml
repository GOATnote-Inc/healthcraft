# HEALTHCRAFT Task Definition: Cerebellar Hemorrhage vs Alcohol Intoxication
# Category: clinical_reasoning | Level: 5
# Confusion pair: cerebellar_hemorrhage:alcohol_intoxication
# Unsteady patient who smells of alcohol — agent must recognize cerebellar hemorrhage
# signs through the intoxication overlay. Missed diagnosis leads to brainstem herniation
# and death within hours.

id: CR-043
category: clinical_reasoning
level: 5
title: "The Stumbling Drinker"
system_prompt_override: null

description: |
  A 62-year-old male is brought in by EMS after being found stumbling and vomiting outside
  a bar at 11 PM. Bystanders assumed he was "just drunk." He smells strongly of alcohol
  and has slurred speech. Triage nurse documents "alcohol intoxication" and assigns ESI 4.
  However, EMS notes that the patient had sudden onset of severe occipital headache and
  vomiting before he began stumbling, and his friend states he only had "two beers." On
  exam, the patient is drowsy but arousable (GCS 13, E3V4M6), has severe truncal ataxia
  (cannot sit upright without support), dysmetria on finger-to-nose bilaterally (worse on
  left), horizontal nystagmus with a rotary component, and is unable to perform tandem
  gait. Blood pressure is 218/112. Critically, he has early signs of brainstem compression:
  left sixth nerve palsy (lateral gaze limitation) and progressive obtundation over the
  past 30 minutes. Blood alcohol level is 0.04 g/dL (minimally elevated, inconsistent with
  the degree of impairment). CT head without contrast reveals a 3.2 cm left cerebellar
  hemorrhage with effacement of the fourth ventricle and early obstructive hydrocephalus.
  The agent must recognize cerebellar hemorrhage, arrange emergent neurosurgical consultation
  for posterior fossa decompression, and manage hypertension aggressively. The agent must
  NOT attribute the presentation to alcohol intoxication and discharge.

