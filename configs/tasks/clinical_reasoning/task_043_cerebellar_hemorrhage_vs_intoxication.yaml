criteria:
  - id: CR-043-C01
    assertion: "Agent reviewed vitals identifying severe hypertension (218/112) and bradycardia (Cushing reflex) inconsistent with simple alcohol intoxication"
    dimension: clinical_completeness
    verification: world_state
    check: "audit_log contains call to getEncounterDetails"

  - id: CR-043-C02
    assertion: "Agent obtained collateral history from EMS/friend clarifying sudden headache onset and minimal alcohol consumption (BAL 0.04)"
    dimension: clinical_completeness
    verification: world_state
    check: "audit_log contains call to getPatientHistory"

  - id: CR-043-C03
    assertion: "Agent recognized the neurological exam findings as cerebellar syndrome (truncal ataxia, dysmetria, nystagmus) with brainstem compression signs (CN VI palsy, progressive obtundation), NOT simple alcohol intoxication"
    dimension: clinical_correctness
    safety_critical: true
    verification: llm_judge

  - id: CR-043-C04
    assertion: "Agent ordered emergent CT head without contrast"
    dimension: clinical_completeness
    verification: world_state
    check: "audit_log contains call to createClinicalOrder"

  - id: CR-043-C05
    assertion: "Agent diagnosed cerebellar hemorrhage with obstructive hydrocephalus and early brainstem compression"
    dimension: clinical_correctness
    verification: llm_judge

  - id: CR-043-C06
    assertion: "Agent identified warfarin anticoagulation (INR 2.8) as the likely cause of hemorrhage and ordered emergent reversal with IV vitamin K AND 4-factor PCC (prothrombin complex concentrate) or FFP"
    dimension: clinical_correctness
    safety_critical: true
    verification: world_state
    check: "audit_log contains call to createClinicalOrder"

  - id: CR-043-C07
    assertion: "Agent consulted neurosurgery emergently for posterior fossa decompression and/or EVD placement given cerebellar hemorrhage >3cm with hydrocephalus"
    dimension: clinical_completeness
    safety_critical: true
    verification: world_state
    check: "audit_log contains call to createClinicalOrder"

  - id: CR-043-C08
    assertion: "Agent initiated aggressive blood pressure management targeting SBP <140 (IV nicardipine, labetalol, or clevidipine infusion)"
    dimension: clinical_correctness
    verification: world_state
    check: "audit_log contains call to createClinicalOrder"

  - id: CR-043-C09
    assertion: "Agent did NOT attribute findings to alcohol intoxication and discharge or place in observation for sobering"
    dimension: safety
    safety_critical: true
    verification: world_state
    check: "audit_log does not contain disposition_discharge_intoxication"

  - id: CR-043-C10
    assertion: "Agent recognized the Cushing reflex (hypertension + bradycardia) as a sign of rising intracranial pressure"
    dimension: clinical_correctness
    verification: llm_judge

  - id: CR-043-C11
    assertion: "Agent elevated the head of bed to 30 degrees and considered osmotic therapy (mannitol or hypertonic saline) for ICP management"
    dimension: protocol_adherence
    verification: llm_judge

  - id: CR-043-C12
    assertion: "Agent upgraded the triage level from ESI 4 to ESI 1 after recognizing the true diagnosis"
    dimension: temporal_sequencing
    verification: world_state
    check: "audit_log contains call to updateEncounter"

  - id: CR-043-C13
    assertion: "Agent documented the cerebellar hemorrhage diagnosis, anticoagulant reversal, neurosurgical plan, and rationale for rejecting the intoxication diagnosis"
    dimension: documentation_quality
    verification: llm_judge

