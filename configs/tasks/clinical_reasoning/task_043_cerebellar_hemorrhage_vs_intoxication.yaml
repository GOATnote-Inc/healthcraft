    tools: ["getEncounterDetails"]
    critical: true
  - step: 3
    action: "History — warfarin use, INR 2.8, sudden headache onset"
    tools: ["getPatientHistory"]
    critical: true
  - step: 4
    action: "Emergent CT head → cerebellar hemorrhage with hydrocephalus"
    tools: ["createClinicalOrder"]
    critical: true
  - step: 5
    action: "Warfarin reversal (IV vitamin K + 4-factor PCC), BP management, neurosurgery STAT"
    tools: ["createClinicalOrder"]
    critical: true
    safety: "Cerebellar hemorrhages >3cm with brainstem compression require emergent surgical decompression. Without intervention, brainstem herniation is rapidly fatal. The 'drunk patient' attribution bias kills — BAL must always be correlated with exam findings."

