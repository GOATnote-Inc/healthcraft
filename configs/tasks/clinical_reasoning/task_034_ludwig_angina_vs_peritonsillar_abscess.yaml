  teaching_point: "Ludwig's angina vs PTA: Ludwig's is bilateral submandibular/sublingual/submental space infection with tongue elevation and floor of mouth induration — an airway emergency. PTA is unilateral peritonsillar abscess with uvular deviation, muffled voice, and trismus — drainable at bedside. Key differences: Ludwig's has NO uvular deviation, is bilateral, involves the floor of mouth, and has NO discrete abscess to drain. PTA rarely threatens the airway; Ludwig's commonly does. Dental extraction is the most common cause of Ludwig's angina."
