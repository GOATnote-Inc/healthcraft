# HEALTHCRAFT Task Definition: Ludwig's Angina vs Peritonsillar Abscess
# Category: clinical_reasoning | Level: 4
# Confusion pair: ludwig_angina:peritonsillar_abscess
# Patient with severe throat/floor of mouth swelling — agent must differentiate
# Ludwig's angina (bilateral floor of mouth, airway emergency) from PTA (unilateral,
# drainable, less immediately dangerous).

id: CR-034
category: clinical_reasoning
level: 4
title: "The Swollen Floor"
system_prompt_override: null

description: |
  A 38-year-old male presents with progressive bilateral jaw swelling, trismus,
  and inability to swallow for 2 days. He had a lower molar extracted 5 days ago.
  He was seen at an urgent care yesterday where he was diagnosed with a peritonsillar
  abscess and referred for ENT drainage. On arrival, however, the swelling is
  bilateral and submandibular (not unilateral tonsillar), the tongue is elevated and
  protruding, the floor of the mouth is indurated and "woody," and there is no
  uvular deviation. He is sitting upright in a tripod position with drooling and a
  muffled voice. CT neck shows diffuse bilateral submandibular, sublingual, and
  submental space infection without a discrete drainable abscess — consistent with
  Ludwig's angina, not peritonsillar abscess. The agent must recognize this distinction,
  prioritize airway management, and consult ENT/OMFS for surgical exploration.

