# HEALTHCRAFT Task Definition: Necrotizing Fasciitis vs Cellulitis
# Category: clinical_reasoning | Level: 5
# Confusion pair: necrotizing_fasciitis:cellulitis
# Patient with a rapidly progressive soft tissue infection — agent must differentiate
# necrotizing fasciitis from simple cellulitis. Delay in surgical debridement is lethal.

id: CR-023
category: clinical_reasoning
level: 5
title: "The Flesh Eater"
system_prompt_override: null

description: |
  A 62-year-old diabetic male presents with rapidly progressive left lower leg
  redness, swelling, and excruciating pain that began 36 hours ago from a small
  laceration sustained while gardening. He was seen at urgent care yesterday and
  started on oral cephalexin for cellulitis, but the area has doubled in size
  overnight. On exam, the skin is tense and dusky with hemorrhagic bullae, there
  is crepitus on palpation, and the pain is disproportionate to the visible findings.
  Notably, there are areas of cutaneous anesthesia within the erythematous zone.
  WBC is 24.2 with bandemia, lactate is 4.6, and CRP is 32. CT of the leg shows
  gas tracking along fascial planes. The agent must recognize necrotizing fasciitis
  (not progressive cellulitis), consult surgery emergently for operative debridement,
  and initiate broad-spectrum IV antibiotics including clindamycin for toxin suppression.

