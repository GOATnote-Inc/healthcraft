  cognitive_load: "high"
  teaching_point: "Necrotizing fasciitis mimics cellulitis early but has key distinguishing features: pain out of proportion, rapid progression despite antibiotics, hemorrhagic bullae, crepitus (gas in tissues), cutaneous anesthesia (nerve destruction), and systemic toxicity. LRINEC score >6 suggests necrotizing fasciitis. Gas on imaging is pathognomonic but absent in many cases. The ONLY definitive treatment is surgical debridement — antibiotics alone are insufficient. Clindamycin suppresses toxin production. Mortality increases ~7.6% per hour of surgical delay."
