# HEALTHCRAFT Task Definition: Epidural Hematoma vs Concussion
# Category: clinical_reasoning | Level: 5
# Confusion pair: epidural_hematoma:concussion
# Patient with brief LOC after head trauma and a "lucid interval" — agent must
# recognize the classic epidural hematoma presentation before herniation occurs.

id: CR-022
category: clinical_reasoning
level: 5
title: "The Lucid Interval"
system_prompt_override: null

description: |
  A 22-year-old male is brought in by friends after being hit in the left temporal
  region by a baseball during a recreational game 2 hours ago. He had a brief loss
  of consciousness (~30 seconds) at the scene, then appeared to recover completely
  and was "talking and joking" for about 90 minutes (lucid interval). Over the last
  30 minutes, he has become progressively drowsy, confused, and is now difficult to
  rouse. On arrival, GCS is 10 (E2 V3 M5). The left pupil is 5mm and sluggishly
  reactive, the right is 3mm and brisk. There is a large left temporal scalp
  hematoma. The agent must recognize the classic epidural hematoma presentation
  (temporal trauma + lucid interval + rapid deterioration + ipsilateral pupil dilation)
  and arrange emergent neurosurgical intervention rather than managing as a concussion.

