metadata:
  confusion_pair: "epidural_hematoma:concussion"
  openem_condition: "epidural_hematoma"
  expected_tool_calls: "8-12"
  entity_types: 5
  time_pressure: "critical"
  cognitive_load: "high"
  teaching_point: "The classic epidural hematoma presentation: temporal trauma → brief LOC → lucid interval → rapid deterioration. The lucid interval is caused by the initial concussive LOC resolving before arterial bleeding (middle meningeal artery) accumulates enough to cause herniation. Cushing triad (hypertension, bradycardia, irregular respirations) indicates critically elevated ICP. Ipsilateral pupil dilation = uncal herniation. This is the most time-critical neurosurgical emergency — the patient can go from talking to dead in under an hour."
