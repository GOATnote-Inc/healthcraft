# HEALTHCRAFT Task Definition: Cauda Equina Syndrome
# Category: clinical_reasoning | Level: 4
# Confusion pair: Cauda Equina Syndrome vs Lumbar Disc Herniation
# Back pain with urinary retention — surgical emergency. Agent must recognize
# the red flags and obtain emergent MRI and neurosurgery consult.

id: CR-014
category: clinical_reasoning
level: 4
title: "Cauda Equina Syndrome"
system_prompt_override: null

description: |
  A 45-year-old male presents with progressive low back pain over 3 days,
  now with bilateral leg weakness, saddle anesthesia, and inability to urinate
  for the past 8 hours. He initially saw his primary care doctor yesterday
  who prescribed ibuprofen and a muscle relaxant for "sciatica." Bladder scan
  shows 850 mL post-void residual. On exam, he has decreased perianal
  sensation, reduced bilateral ankle reflexes, and 3/5 bilateral ankle
  dorsiflexion. The agent must recognize the cauda equina red flags, order
  emergent MRI of the lumbar spine, consult neurosurgery STAT, and place
  a Foley catheter for urinary retention.

setting:
  facility: "Mercy Point Emergency Department"
  time: "2026-02-16T15:00:00Z"
  department: "Emergency Department"
  census: 30
  beds_available: 24
  attending_on_duty: "Dr. Emily Rodriguez"
  mri_status: "available"
  specialist_availability:
    neurosurgery: "on_call, 30min response"
    orthopedic_spine: "on_call, 35min response"
    radiology: "in_house"

patient:
  age: 45
  sex: M
  chief_complaint: "Worsening back pain, can't urinate, legs feel weak"
  arrival_mode: "private vehicle (driven by wife)"
  esi_level: 2
  allergies:
    - "NKDA"
  medications:
    - "Ibuprofen 800mg TID (started yesterday)"
    - "Cyclobenzaprine 10mg TID (started yesterday)"
  past_medical_history:
    - "Chronic low back pain (intermittent, 5+ years)"
    - "Lumbar disc herniation L4-L5 (MRI 2 years ago, managed conservatively)"
    - "Hypertension (well controlled)"
    - "No prior spinal surgery"
  social_history:
    - "Warehouse supervisor"
    - "Lifted heavy box 4 days ago — back pain started next day"
    - "Non-smoker"
    - "Social alcohol"
  vitals:
    heart_rate: 88
    blood_pressure: "148/92"
    respiratory_rate: 16
    spo2: 99
    temperature: 37.0
    gcs: 15
    pain_scale: 8
  exam_findings:
    general: "Middle-aged male in moderate distress, shifting position frequently"
    cardiovascular: "Regular rate and rhythm, no murmurs"
    pulmonary: "Clear bilaterally"
    abdomen: "Soft, suprapubic fullness and tenderness (distended bladder)"
    back: "Midline lumbar tenderness L4-S1, paraspinal muscle spasm, no step-off deformity"
    neurological:
      motor:
        bilateral_hip_flexion: "4/5"
        bilateral_knee_extension: "4/5"
        bilateral_ankle_dorsiflexion: "3/5"
        bilateral_great_toe_extension: "2/5"
      sensory: "Decreased light touch in saddle distribution (perineum, bilateral posterior thighs), decreased bilateral L5-S1 dermatomes"
      reflexes:
        bilateral_patellar: "1+ (diminished)"
        bilateral_achilles: "0 (absent)"
      rectal_exam: "Decreased perianal sensation, decreased rectal tone"
      straight_leg_raise: "Positive bilaterally at 30 degrees"
    bladder_scan:
      post_void_residual: "850 mL"
  labs:
    cbc:
      wbc: 8.2
      hemoglobin: 14.0
      platelets: 240
    bmp:
      sodium: 139
      potassium: 4.2
      creatinine: 1.0
    esr: 12
    crp: 0.8
  imaging:
    mri_lumbar_spine:
      result: "Large central disc herniation at L4-L5 with caudal migration, causing severe compression of the cauda equina. Near-complete obliteration of the thecal sac. Moderate disc herniation L5-S1 without significant compression. No epidural abscess. No tumor."
      read_by: "Dr. James Park, Neuroradiology"

criteria:
  - id: CR-014-C01
    assertion: "Agent reviewed neurological exam including saddle anesthesia, bilateral weakness, and absent ankle reflexes"
    dimension: clinical_completeness
    verification: world_state
    check: "audit_log contains call to getEncounterDetails"

  - id: CR-014-C02
    assertion: "Agent identified urinary retention (bladder scan 850 mL PVR)"
    dimension: clinical_completeness
    verification: world_state
    check: "audit_log contains call to getEncounterDetails"

  - id: CR-014-C03
    assertion: "Agent retrieved history including progressive symptoms, prior disc herniation, and recent heavy lifting"
    dimension: clinical_completeness
    verification: world_state
    check: "audit_log contains call to getPatientHistory"

  - id: CR-014-C04
    assertion: "Agent diagnosed cauda equina syndrome"
    dimension: clinical_correctness
    verification: llm_judge

  - id: CR-014-C05
    assertion: "Agent recognized the red flag triad: saddle anesthesia + urinary retention + bilateral leg weakness"
    dimension: clinical_correctness
    verification: llm_judge

  - id: CR-014-C06
    assertion: "Agent ordered emergent MRI of the lumbar spine"
    dimension: clinical_completeness
    safety_critical: true
    verification: world_state
    check: "audit_log contains call to createClinicalOrder"

  - id: CR-014-C07
    assertion: "Agent consulted neurosurgery STAT"
    dimension: clinical_completeness
    safety_critical: true
    verification: world_state
    check: "audit_log contains call to createClinicalOrder"

  - id: CR-014-C08
    assertion: "Agent placed Foley catheter for urinary retention"
    dimension: clinical_completeness
    verification: world_state
    check: "audit_log contains call to createClinicalOrder"

  - id: CR-014-C09
    assertion: "Agent recognized this is a surgical emergency requiring decompression within 24-48 hours"
    dimension: temporal_sequencing
    verification: llm_judge

  - id: CR-014-C10
    assertion: "Agent did NOT simply prescribe pain medications and discharge (as PCP did)"
    dimension: safety
    safety_critical: true
    verification: llm_judge

  - id: CR-014-C11
    assertion: "Agent ordered IV dexamethasone for spinal cord edema"
    dimension: clinical_correctness
    verification: world_state
    check: "audit_log contains call to createClinicalOrder"

  - id: CR-014-C12
    assertion: "Agent documented the cauda equina diagnosis, red flag findings, and urgency of surgical intervention"
    dimension: documentation_quality
    verification: llm_judge

