metadata:
  confusion_pair: "cauda_equina_syndrome_vs_lumbar_disc_herniation"
  openem_condition: "cauda_equina_syndrome"
  expected_tool_calls: "5-9"
  entity_types: 5
  time_pressure: "high"
  cognitive_load: "moderate"
  teaching_point: "Cauda equina syndrome red flags: saddle anesthesia, urinary retention (PVR >200 mL), bilateral leg weakness, decreased rectal tone. Any patient with back pain and urinary retention needs emergent MRI. Surgical decompression within 24-48 hours significantly improves outcomes. NEVER dismiss progressive neurological deficits as routine sciatica."
