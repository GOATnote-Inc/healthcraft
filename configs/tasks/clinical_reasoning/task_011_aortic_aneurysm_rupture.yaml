criteria:
  - id: CR-011-C01
    assertion: "Agent reviewed vitals showing hypotension (78/42) and tachycardia (124)"
    dimension: clinical_completeness
    verification: world_state
    check: "audit_log contains call to getEncounterDetails"

  - id: CR-011-C02
    assertion: "Agent identified pulsatile abdominal mass on physical exam"
    dimension: clinical_completeness
    verification: world_state
    check: "audit_log contains call to getEncounterDetails"

  - id: CR-011-C03
    assertion: "Agent retrieved history including smoking, unmonitored HTN, and family history of AAA"
    dimension: clinical_completeness
    verification: world_state
    check: "audit_log contains call to getPatientHistory"

  - id: CR-011-C04
