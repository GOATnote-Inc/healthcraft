  facility: "Mercy Point Emergency Department"
  time: "2026-02-14T08:20:00Z"
  department: "Emergency Department"
  census: 24
  beds_available: 30
  attending_on_duty: "Dr. Emily Rodriguez"
  ct_scanner_status: "available"
  specialist_availability:
    vascular_surgery: "on_call, 20min response"
    interventional_radiology: "on_call, 25min response"
    anesthesiology: "in_house"
    blood_bank: "available"

