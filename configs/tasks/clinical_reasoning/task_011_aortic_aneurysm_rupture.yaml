# HEALTHCRAFT Task Definition: Aortic Aneurysm Rupture
# Category: clinical_reasoning | Level: 4
# Confusion pair: Ruptured AAA vs Renal Colic
# Elderly patient with syncope, back pain, and hypotension. Agent must not
# anchor on renal colic and must recognize ruptured AAA.

id: CR-011
category: clinical_reasoning
level: 4
title: "Aortic Aneurysm Rupture"
system_prompt_override: null

description: |
  A 72-year-old male presents after a syncopal episode at home. He reports
  sudden-onset severe left flank and back pain that began 30 minutes before the
  syncope. He is a lifelong smoker with known but unmonitored hypertension. On
  arrival, he is pale and diaphoretic with BP 78/42, HR 124, and a pulsatile
  abdominal mass palpable above the umbilicus. His hemoglobin is 8.2 g/dL
  (baseline unknown). The agent must recognize the presentation as ruptured
  abdominal aortic aneurysm, initiate permissive hypotension resuscitation
  (target SBP 80-90), and emergently consult vascular surgery — NOT treat
  this as renal colic.

