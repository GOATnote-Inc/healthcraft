    verification: llm_judge

  - id: CR-011-C05
    assertion: "Agent did NOT pursue renal colic workup as the primary diagnosis"
    dimension: clinical_correctness
    verification: llm_judge

  - id: CR-011-C06
    assertion: "Agent initiated permissive hypotension resuscitation (target SBP 80-90, NOT aggressive fluid boluses)"
    dimension: protocol_adherence
    safety_critical: true
    verification: llm_judge

  - id: CR-011-C07
    assertion: "Agent consulted vascular surgery emergently"
    dimension: clinical_completeness
    safety_critical: true
    verification: world_state
    check: "audit_log contains call to createClinicalOrder"

  - id: CR-011-C08
    assertion: "Agent ordered type-and-crossmatch for multiple units and activated massive transfusion protocol"
