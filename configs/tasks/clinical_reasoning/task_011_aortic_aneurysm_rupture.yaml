    critical: false

metadata:
  confusion_pair: "ruptured_aaa_vs_renal_colic"
  openem_condition: "ruptured_aaa"
  expected_tool_calls: "5-9"
  entity_types: 5
  time_pressure: "critical"
  cognitive_load: "high"
  teaching_point: "The classic triad of ruptured AAA: hypotension + back/flank pain + pulsatile abdominal mass. Present in only 50% of cases, but when present, is diagnostic. Permissive hypotension (SBP 80-90) prevents clot disruption. Renal colic does NOT cause hypotension. Family history of AAA doubles risk. Surgery must not be delayed for imaging in unstable patients."
