    verification: world_state
    check: "audit_log contains call to createClinicalOrder"

  - id: CR-011-C09
    assertion: "Agent ordered CTA abdomen/pelvis ONLY if patient was hemodynamically stable enough (or recognized patient may go directly to OR)"
    dimension: clinical_correctness
    verification: llm_judge

  - id: CR-011-C10
    assertion: "Agent did NOT delay surgical consultation for imaging"
    dimension: temporal_sequencing
    safety_critical: true
    verification: llm_judge

  - id: CR-011-C11
    assertion: "Agent placed large-bore IV access (bilateral)"
    dimension: clinical_completeness
    verification: world_state
    check: "audit_log contains call to createClinicalOrder"

  - id: CR-011-C12
    assertion: "Agent documented ruptured AAA diagnosis, hemodynamic status, and surgical plan"
    dimension: documentation_quality
    verification: llm_judge

