# HEALTHCRAFT Task Definition: Pneumonia vs Pulmonary Embolism
# Category: clinical_reasoning | Level: 4
# Confusion pair: pneumonia:pulmonary_embolism
# Post-surgical patient with pleuritic chest pain, dyspnea, and a focal infiltrate —
# agent must recognize that the infiltrate represents pulmonary infarction from PE,
# not community-acquired pneumonia.

id: CR-049
category: clinical_reasoning
level: 4
title: "The False Consolidation"
system_prompt_override: null

description: |
  A 38-year-old female presents with acute-onset right-sided pleuritic chest pain,
  dyspnea, and low-grade fever (38.1°C) for 12 hours. She had a right total knee
  replacement 10 days ago and has been relatively immobile since. She was started on
  levofloxacin by her PCP this morning for presumed pneumonia after a chest X-ray
  showed a wedge-shaped peripheral opacity in the right lower lobe. In the ED, she
  is tachycardic (HR 114), tachypneic (RR 24), and hypoxic (SpO2 91% on room air).
  D-dimer is markedly elevated at 4,200 ng/mL. Wells score is high (recent surgery,
  immobilization, tachycardia, clinical PE most likely diagnosis). The agent must
  recognize the risk factors, discontinue the pneumonia-only treatment, and pursue
  PE workup with CTA chest and anticoagulation.

