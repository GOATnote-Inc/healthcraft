  openem_condition: "pulmonary_embolism"
  expected_tool_calls: "10-14"
  entity_types: 5
  time_pressure: "high"
  cognitive_load: "high"
  teaching_point: "Pulmonary infarction from PE can mimic pneumonia with focal infiltrate, pleuritic pain, and low-grade fever. Hampton's hump (wedge-shaped peripheral opacity) is the classic CXR finding of pulmonary infarction. Always assess VTE risk factors: recent surgery, immobilization, obesity, OCPs, family history. An elevated D-dimer with high clinical suspicion warrants CTA regardless of CXR findings. Antibiotics alone will miss a potentially fatal PE."
