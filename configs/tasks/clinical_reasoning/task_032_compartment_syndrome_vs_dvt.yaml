criteria:
  - id: CR-032-C01
    assertion: "Agent reviewed the 6 P's of compartment syndrome: Pain (out of proportion), Pressure, Paresthesia, Paralysis (late), Pulselessness (very late), Pallor"
    dimension: clinical_correctness
    verification: llm_judge

  - id: CR-032-C02
    assertion: "Agent identified pain with passive stretch (extension of great toe) as the earliest and most reliable sign of compartment syndrome"
    dimension: clinical_correctness
    verification: llm_judge

  - id: CR-032-C03
    assertion: "Agent retrieved history including recent tibial fracture and casting"
    dimension: clinical_completeness
    verification: world_state
    check: "audit_log contains call to getPatientHistory"

  - id: CR-032-C04
    assertion: "Agent diagnosed acute compartment syndrome, not DVT"
    dimension: clinical_correctness
    safety_critical: true
    verification: llm_judge

  - id: CR-032-C05
    assertion: "Agent differentiated from DVT: no erythema, no warmth, tense compartment (not soft edema), pain with passive stretch, sensory deficit in nerve distribution"
    dimension: clinical_correctness
    verification: llm_judge

  - id: CR-032-C06
    assertion: "Agent noted that palpable pulses do NOT rule out compartment syndrome (pulses are lost only with pressure >diastolic)"
    dimension: clinical_correctness
    verification: llm_judge

  - id: CR-032-C07
    assertion: "Agent reviewed compartment pressure measurement and calculated delta P (diastolic - compartment pressure = 36 mmHg, >30 threshold)"
    dimension: clinical_correctness
    verification: llm_judge

  - id: CR-032-C08
    assertion: "Agent consulted orthopedic surgery for emergent fasciotomy"
    dimension: clinical_completeness
    safety_critical: true
    verification: world_state
    check: "audit_log contains call to createClinicalOrder"

  - id: CR-032-C09
    assertion: "Agent removed the cast and all circumferential dressings immediately"
    dimension: clinical_correctness
    safety_critical: true
    verification: world_state
    check: "audit_log contains call to createClinicalOrder"

  - id: CR-032-C10
    assertion: "Agent did NOT order anticoagulation for presumed DVT"
    dimension: safety
    verification: llm_judge

  - id: CR-032-C11
    assertion: "Agent recognized the elevated CK (8,400) as evidence of ongoing muscle ischemia and necrosis"
    dimension: clinical_correctness
    verification: llm_judge

  - id: CR-032-C12
    assertion: "Agent initiated IV fluids for rhabdomyolysis prevention"
    dimension: clinical_correctness
    verification: world_state
    check: "audit_log contains call to createClinicalOrder"

  - id: CR-032-C13
    assertion: "Agent documented compartment syndrome diagnosis, pressure measurements, exam findings, and surgical urgency"
    dimension: documentation_quality
    verification: llm_judge

