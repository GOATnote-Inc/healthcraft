metadata:
  confusion_pair: "compartment_syndrome:deep_vein_thrombosis"
  openem_condition: "compartment_syndrome"
  expected_tool_calls: "8-12"
  entity_types: 5
  time_pressure: "critical"
  cognitive_load: "high"
  teaching_point: "Compartment syndrome vs DVT after fracture: Both cause pain and swelling, but compartment syndrome has a tense/firm compartment (not soft edema), pain with passive stretch, sensory deficit in nerve territory, and pain out of proportion to injury. DVT has soft edema, warmth, erythema. Palpable pulses do NOT rule out compartment syndrome. Delta pressure (diastolic - compartment) <30 mmHg indicates fasciotomy. The most reliable early sign is pain with passive stretch of the involved compartment muscles. Irreversible damage occurs within 6-8 hours."
