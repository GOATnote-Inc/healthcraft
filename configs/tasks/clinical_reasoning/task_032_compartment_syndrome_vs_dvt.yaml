# HEALTHCRAFT Task Definition: Compartment Syndrome vs Deep Vein Thrombosis
# Category: clinical_reasoning | Level: 4
# Confusion pair: compartment_syndrome:deep_vein_thrombosis
# Post-fracture patient with increasing leg pain and swelling — agent must differentiate
# compartment syndrome (surgical emergency) from DVT.

id: CR-032
category: clinical_reasoning
level: 4
title: "The Tightening Cast"
system_prompt_override: null

description: |
  A 28-year-old male presents 14 hours after closed reduction and casting of a
  tibial shaft fracture with escalating pain in the left leg that is not controlled
  by his prescribed oxycodone. He reports the pain is "deep and burning" and worse
  with passive dorsiflexion of the toes. On exam after cast removal, the anterior
  compartment of the left leg is tense and firm. There is pain with passive
  extension of the great toe (stretch of the anterior compartment). Sensation is
  decreased over the first web space (deep peroneal nerve). Pulses are still palpable
  (a late and unreliable finding). Compartment pressure measured at 42 mmHg
  (diastolic BP 78 mmHg, delta P = 36 mmHg — <30 mmHg threshold for fasciotomy).
  The agent must diagnose acute compartment syndrome and arrange emergent fasciotomy
  rather than treating for presumed DVT.

