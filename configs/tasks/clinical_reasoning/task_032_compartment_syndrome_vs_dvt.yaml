      palpation: "Anterior compartment is firm, tense ('wood-like'). Lateral compartment moderately tense. Posterior compartments soft."
      pain: "Excruciating pain with passive extension of the great toe (passive stretch of anterior compartment muscles). Pain far exceeds what is expected for the fracture."
      neurovascular: "Decreased sensation over first web space (deep peroneal nerve territory). Weak dorsiflexion of the great toe (2/5). Dorsalis pedis pulse palpable but diminished. Posterior tibial pulse palpable."
      compartment_pressure: "Anterior compartment: 42 mmHg (Stryker intracompartmental pressure monitor). Diastolic BP 78 mmHg. Delta pressure = 36 mmHg."
