    critical: true

metadata:
  confusion_pair: "ectopic_pregnancy_vs_threatened_abortion"
  openem_condition: "ectopic_pregnancy"
  expected_tool_calls: "5-8"
  entity_types: 5
  time_pressure: "high"
  cognitive_load: "moderate"
  teaching_point: "Every woman of reproductive age with abdominal pain gets a pregnancy test. IUDs reduce overall pregnancy risk but increase ectopic risk if pregnancy occurs. beta-hCG above the discriminatory zone with no IUP = ectopic until proven otherwise. Ruptured ectopic with hemodynamic instability requires surgery, not methotrexate."
