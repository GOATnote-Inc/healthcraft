  - step: 4
    action: "Interpret findings — beta-hCG 4200, empty uterus, adnexal mass, free fluid"
    tools: ["getEncounterDetails"]
    critical: true
    reasoning: "beta-hCG above discriminatory zone (1500-3000) with no IUP + adnexal mass + free fluid = ectopic pregnancy with likely rupture"
  - step: 5
