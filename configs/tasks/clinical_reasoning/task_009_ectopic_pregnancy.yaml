# HEALTHCRAFT Task Definition: Ectopic Pregnancy
# Category: clinical_reasoning | Level: 3
# Ectopic pregnancy in woman of reproductive age with abdominal pain.
# Agent must check beta-hCG and recognize ruptured ectopic as a surgical emergency.

id: CR-009
category: clinical_reasoning
level: 3
title: "Ectopic Pregnancy"
system_prompt_override: null

description: |
  A 31-year-old woman presents with left lower quadrant pain for 6 hours and
  one episode of vaginal spotting. She reports her last menstrual period was
  7 weeks ago and she has been using an IUD for contraception. She assumed the
  spotting was a late period. Vitals reveal tachycardia (HR 106) and borderline
  hypotension (BP 96/62). Quantitative beta-hCG is 4,200 mIU/mL but
  transvaginal ultrasound shows no intrauterine pregnancy and a left adnexal
  mass with free fluid in the pelvis. The agent must recognize ruptured ectopic
  pregnancy, initiate IV access and type-and-cross, and consult OB/GYN
  emergently for operative management.

