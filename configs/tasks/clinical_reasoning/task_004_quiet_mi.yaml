# HEALTHCRAFT Task Definition: The Quiet MI
# Category: clinical_reasoning | Level: 3
# Confusion pair: MI vs GI illness
# Diabetic patient with atypical MI presentation — nausea, jaw pain, no
# chest pain. Agent must recognize the silent MI pattern in diabetic neuropathy.

id: CR-004
category: clinical_reasoning
level: 3
title: "The Quiet MI"
system_prompt_override: null

description: |
  A 67-year-old male with longstanding type 2 diabetes and peripheral neuropathy
  presents with 3 hours of nausea, jaw tightness, and diaphoresis. He denies
  chest pain. Triage initially categorizes him as a GI complaint. His ECG shows
  ST depression in V1-V4 with T-wave inversions, and his troponin returns at
  2.84 ng/mL (normal <0.04). The agent must recognize the atypical NSTEMI
  presentation in a diabetic patient, initiate ACS protocol, and avoid the trap
  of treating this as gastroesophageal reflux.

