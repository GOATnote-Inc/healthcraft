    automated_read: "Possible anterior ischemia — clinical correlation recommended"

criteria:
  - id: CR-004-C01
    assertion: "Agent retrieved vitals and noted diaphoresis with nausea"
    dimension: clinical_completeness
    verification: world_state
    check: "audit_log contains call to getEncounterDetails"

