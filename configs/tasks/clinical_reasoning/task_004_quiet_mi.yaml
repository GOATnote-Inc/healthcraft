expected_tools:
  - "getEncounterDetails"
  - "getPatientHistory"
  - "createClinicalOrder"
  - "updateEncounter"

expected_sequence:
  - step: 1
    action: "Review vitals, exam findings, and note diaphoresis"
    tools: ["getEncounterDetails"]
    critical: true
  - step: 2
    action: "Review history — diabetes with neuropathy, prior CAD with stent"
    tools: ["getPatientHistory"]
    critical: true
  - step: 3
    action: "Review ECG showing anterior ischemia and troponin of 2.84"
    tools: ["getEncounterDetails"]
    critical: true
  - step: 4
    action: "Diagnose NSTEMI — atypical presentation in diabetic patient"
    tools: []
    critical: true
    reasoning: "Diabetic neuropathy masks chest pain. Nausea, jaw tightness, diaphoresis are anginal equivalents. Troponin 2.84 with ECG changes confirms MI."
  - step: 5
    action: "Initiate ACS protocol (aspirin load, P2Y12 inhibitor, heparin, nitro, morphine PRN)"
    tools: ["createClinicalOrder"]
    critical: true
  - step: 6
    action: "Consult interventional cardiology for early invasive strategy"
    tools: ["createClinicalOrder"]
    critical: true

metadata:
  confusion_pair: "nstemi_vs_gerd"
  openem_condition: "nstemi"
  expected_tool_calls: "5-8"
  entity_types: 5
  time_pressure: "moderate"
  cognitive_load: "moderate"
  teaching_point: "Up to 42% of diabetic patients present with atypical MI symptoms due to autonomic neuropathy. Nausea, jaw pain, dyspnea, and diaphoresis are anginal equivalents. Any diabetic with unexplained diaphoresis needs an ECG and troponin."
