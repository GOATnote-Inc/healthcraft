# HEALTHCRAFT Task Definition: Toxic Megacolon vs Bowel Obstruction
# Category: clinical_reasoning | Level: 4
# Confusion pair: toxic_megacolon:bowel_obstruction
# Patient with abdominal distension and dilated colon on imaging — agent must
# differentiate toxic megacolon (medical/surgical emergency) from mechanical obstruction.

id: CR-035
category: clinical_reasoning
level: 4
title: "The Dilating Colon"
system_prompt_override: null

description: |
  A 58-year-old female with a history of ulcerative colitis (on mesalamine, recently
  self-discontinued steroids) presents with 4 days of worsening bloody diarrhea
  (>10 stools/day), abdominal distension, fever (39.1°C), and tachycardia. She
  appears toxic. On exam, the abdomen is distended and tympanitic with diffuse
  tenderness but no focal peritoneal signs yet. Abdominal X-ray shows colonic dilation
  of the transverse colon measuring 8cm (>6cm threshold) with loss of haustral
  markings. Labs show WBC 19.4, hemoglobin 8.8, albumin 2.2, potassium 3.0, and
  lactate 3.6. C. difficile toxin is negative. The agent must diagnose toxic
  megacolon complicating UC (not mechanical bowel obstruction), decompress with NG
  tube, optimize electrolytes, start IV steroids, consult GI and surgery, and
  prepare for potential emergent colectomy if no improvement in 24-72 hours.

