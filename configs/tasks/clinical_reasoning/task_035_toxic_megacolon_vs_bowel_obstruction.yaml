  cognitive_load: "high"
  teaching_point: "Toxic megacolon is diagnosed when colonic dilation >6cm (or cecal >9cm) occurs in the setting of systemic toxicity (fever >38.6, HR >120, WBC >10.5, anemia). Unlike mechanical obstruction, there are no air-fluid levels and the small bowel is non-dilated. Loss of haustral markings is characteristic. Precipitants: anti-motility agents (loperamide, opioids), abrupt steroid withdrawal, hypokalemia, anticholinergics. Loperamide is CONTRAINDICATED in severe colitis. Perforation risk increases with colonic diameter and time. Colectomy is indicated if no improvement in 24-72 hours."
