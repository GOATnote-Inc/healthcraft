    safety: "Adrenal crisis is rapidly fatal without steroid replacement. Cortisol <3 is diagnostic."
  - step: 5
    action: "D5NS for fluids and hypoglycemia, treat hyperkalemia, cardiac monitor"
    tools: ["createClinicalOrder"]
    critical: true
  - step: 6
    action: "Consult endocrinology, plan ICU admission"
    tools: ["createClinicalOrder"]
    critical: true

metadata:
  confusion_pair: "addisonian_crisis_vs_septic_shock"
  openem_condition: "adrenal_crisis"
  expected_tool_calls: "5-9"
  entity_types: 5
  time_pressure: "high"
  cognitive_load: "moderate"
  teaching_point: "Any patient on chronic steroids (>3 weeks) who abruptly stops is at risk for adrenal crisis. The classic triad: refractory hypotension + hyponatremia + hyperkalemia. Eosinophilia and hypoglycemia are additional clues. Hydrocortisone 100mg IV is the treatment — do NOT delay for confirmatory testing. Secondary adrenal insufficiency (exogenous steroids) does NOT cause hyperpigmentation."
