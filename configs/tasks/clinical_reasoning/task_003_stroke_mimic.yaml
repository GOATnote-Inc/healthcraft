# HEALTHCRAFT Task Definition: The Stroke Mimic
# Category: clinical_reasoning | Level: 4
# Confusion pair: Stroke vs Complex Migraine
# Complex migraine presenting as acute stroke. Agent must recognize the mimic
# and withhold thrombolysis, which carries bleeding risk without benefit.

id: CR-003
category: clinical_reasoning
level: 4
title: "The Stroke Mimic"
system_prompt_override: null

description: |
  A 34-year-old woman presents via EMS with acute-onset right-sided weakness,
  expressive aphasia, and right facial droop that began 45 minutes ago. She has
  a history of complex migraines with aura. EMS activated a stroke alert, and
  the CT head is negative for hemorrhage. However, she reports a severe
  left-sided headache with visual scintillations that preceded the weakness by
  15 minutes — a classic migrainous aura march. The agent must recognize the
  hemiplegic migraine pattern, correlate the history, and withhold IV tPA despite
  an NIHSS of 8 and an open thrombolytic window.

setting:
  facility: "Mercy Point Emergency Department"
  time: "2026-01-20T07:45:00Z"
  department: "Emergency Department"
  census: 26
  beds_available: 28
  stroke_alert: "activated"
  ct_scanner_status: "available"
  attending_on_duty: "Dr. Sarah Chen"
  specialist_availability:
    neurology: "on_call, 15min response"
    neurointerventional: "on_call, 30min response"
    neurosurgery: "on_call, 45min response"

patient:
  age: 34
  sex: F
  chief_complaint: "Right-sided weakness and difficulty speaking, onset 45 minutes ago"
  arrival_mode: "EMS"
  esi_level: 1
  allergies:
    - "Sulfa drugs (rash)"
  medications:
    - "Topiramate 100mg BID"
