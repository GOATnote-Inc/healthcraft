# HEALTHCRAFT Task Definition: Cholecystitis vs Biliary Colic
# Category: clinical_reasoning | Level: 3
# Confusion pair: cholecystitis:biliary_colic
# Patient with RUQ pain — agent must distinguish surgical cholecystitis from
# self-limited biliary colic to avoid delayed intervention or unnecessary discharge.

id: CR-017
category: clinical_reasoning
level: 3
title: "The Persistent Stone"
system_prompt_override: null

description: |
  A 46-year-old female presents with severe right upper quadrant pain that began
  8 hours ago after a large fatty meal. She reports prior episodes of similar pain
  lasting 30-60 minutes that resolved spontaneously, but this episode has persisted
  and worsened. She has nausea and one episode of vomiting. Temperature is 38.6°C.
  On exam, there is RUQ tenderness with a positive Murphy's sign (inspiratory arrest
  with deep palpation of the RUQ). WBC is 15.2 with left shift. RUQ ultrasound shows
  gallbladder wall thickening (5mm), pericholecystic fluid, a 1.2cm gallstone
  impacted in the gallbladder neck, and a sonographic Murphy's sign. Common bile duct
  is 4mm (normal). The agent must recognize that this is acute cholecystitis (not
  simple biliary colic) requiring IV antibiotics, surgical consultation, and admission
  rather than pain management and outpatient follow-up.

