metadata:
  confusion_pair: "cholecystitis:biliary_colic"
  openem_condition: "cholecystitis"
  expected_tool_calls: "8-12"
  entity_types: 5
  time_pressure: "moderate"
  cognitive_load: "moderate"
  teaching_point: "Biliary colic is self-limited (<6 hours), afebrile, with normal WBC and no gallbladder wall changes. Acute cholecystitis features persistent pain >6 hours, fever, leukocytosis, and ultrasound findings of wall thickening, pericholecystic fluid, and sonographic Murphy's sign. A patient with known gallstones and a prior history of colic is at risk of being mislabeled as 'another episode of colic' when they present with cholecystitis."
