  teaching_point: "SVC syndrome presents with progressive facial, neck, and upper extremity edema with plethoric cyanosis, venous collateral formation, and positional worsening (worse lying down). It is most commonly caused by lung cancer (especially right-sided) or lymphoma compressing the SVC. Key differentiators from angioedema: subacute course (days to weeks vs minutes to hours), no lip/tongue involvement, no urticaria, prominent venous distension, positional component, and no response to epinephrine. Pemberton's sign (worsening plethora with arms raised) is pathognomonic. Normal tryptase argues against mast cell-mediated angioedema. Management: upright positioning, dexamethasone, anticoagulation for SVC thrombus, and oncology referral. SVC stenting provides rapid relief in severe cases. ACE inhibitor-induced angioedema (patient is on lisinopril) should be considered but would present acutely with lip/tongue swelling."
