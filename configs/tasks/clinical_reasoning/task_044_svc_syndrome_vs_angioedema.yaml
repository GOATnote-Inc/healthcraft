    assertion: "Agent differentiated SVC syndrome from angioedema: angioedema is acute onset (minutes to hours), involves lips/tongue/uvula, may have urticaria, responds to epinephrine, and does NOT cause venous distension or positional worsening. SVC syndrome is subacute, involves face/neck/upper extremities, has venous collaterals, and worsens with recumbency."
