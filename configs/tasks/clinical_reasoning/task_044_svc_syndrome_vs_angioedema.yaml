# HEALTHCRAFT Task Definition: Superior Vena Cava Syndrome vs Angioedema
# Category: clinical_reasoning | Level: 4
# Confusion pair: superior_vena_cava_syndrome:angioedema
# Patient with progressive facial and upper extremity swelling — agent must recognize
# SVC syndrome (gradual, positional, with venous distension) rather than treating as
# angioedema (acute, urticarial, airway-focused).

id: CR-044
category: clinical_reasoning
level: 4
title: "The Swollen Face"
system_prompt_override: null

description: |
  A 58-year-old male presents with progressive facial swelling and "puffiness" that has
  worsened over 2 weeks. He woke up this morning with his face so swollen he could barely
  open his eyes, and his wife called 911 concerned about an allergic reaction. He was
  initially treated in the field with IM epinephrine by EMS for suspected angioedema. On
  arrival, the swelling has not improved. He reports the swelling is worse when lying down
  and when bending forward, and improves slightly when sitting upright. He also notes his
  arms feel "heavy and swollen" and he has a persistent headache worse in the morning. He
  has a 40-pack-year smoking history and has had a worsening cough with 15-pound unintentional
  weight loss over 3 months. On exam, there is non-pitting edema of the face, neck, and
  bilateral upper extremities with a plethoric (ruddy, cyanotic) appearance. Distended veins
  are visible across the anterior chest wall and neck (collateral venous circulation). There
  are no hives, no lip/tongue angioedema, and no stridor. Pemberton's sign is positive
  (facial plethora and venous distension worsen with arms raised overhead for 1 minute).
  CT chest with contrast reveals a large anterior mediastinal mass encasing and compressing
  the SVC with extensive thrombus. The agent must diagnose SVC syndrome secondary to
  mediastinal malignancy, NOT continue treating as angioedema.

