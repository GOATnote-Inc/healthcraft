  time_pressure: "critical"
  cognitive_load: "high"
  teaching_point: "Epiglottitis vs croup: Epiglottitis has rapid onset, high fever, toxic appearance, drooling, muffled voice, tripod position, NO barky cough, and thumbprint sign on lateral neck X-ray. Croup has gradual onset, low-grade fever, barky cough, hoarse voice, and steeple sign. Epiglottitis is rare in vaccinated children but still occurs in unvaccinated or adults. NEVER agitate a child with epiglottitis — complete airway obstruction can occur. Controlled intubation in the OR is the standard of care."
