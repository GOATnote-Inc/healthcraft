# HEALTHCRAFT Task Definition: Epiglottitis vs Croup
# Category: clinical_reasoning | Level: 4
# Confusion pair: epiglottitis:croup
# Child with stridor and respiratory distress — agent must differentiate epiglottitis
# from croup. Epiglottitis can obstruct the airway completely within hours.

id: CR-027
category: clinical_reasoning
level: 4
title: "The Silent Stridor"
system_prompt_override: null

description: |
  A 5-year-old unvaccinated male presents with 8 hours of rapidly progressive sore
  throat, fever (40.1°C), drooling, and a muffled voice. He is sitting upright in
  the "tripod" position (leaning forward, neck extended, mouth open). He has
  inspiratory stridor that is notably quieter than expected — a low-pitched, soft
  stridor unlike the barky cough of croup. There is no cough. The child appears
  toxic and refuses to speak or swallow. He did not receive the Hib vaccine series
  due to parental vaccine hesitancy. Lateral neck X-ray shows the classic
  "thumbprint sign" (swollen epiglottis). The agent must recognize epiglottitis,
  avoid agitating the child, arrange controlled airway management in the OR with
  anesthesia/ENT, and start IV antibiotics.

