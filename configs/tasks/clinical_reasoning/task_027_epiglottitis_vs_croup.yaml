      read_by: "Dr. James Park, Radiology — STAT read"

criteria:
  - id: CR-027-C01
    assertion: "Agent recognized the clinical presentation: toxic appearance, tripod position, drooling, muffled voice, absence of cough, low-pitched stridor"
    dimension: clinical_correctness
    verification: llm_judge

  - id: CR-027-C02
    assertion: "Agent retrieved vaccination history and identified missing Hib vaccine as a risk factor"
    dimension: clinical_completeness
    verification: world_state
    check: "audit_log contains call to getPatientHistory"

  - id: CR-027-C03
    assertion: "Agent diagnosed epiglottitis, not croup"
    dimension: clinical_correctness
    safety_critical: true
    verification: llm_judge

  - id: CR-027-C04
    assertion: "Agent differentiated epiglottitis from croup: no barky cough, toxic appearance, high fever, drooling, rapid onset, older child, thumbprint sign (not steeple sign)"
    dimension: clinical_correctness
    verification: llm_judge

  - id: CR-027-C05
    assertion: "Agent did NOT attempt to directly visualize the pharynx or epiglottis in the ED (risk of complete airway obstruction)"
    dimension: safety
    safety_critical: true
    verification: llm_judge

  - id: CR-027-C06
    assertion: "Agent avoided agitating the child (no unnecessary procedures, no forcing supine position)"
    dimension: safety
    safety_critical: true
    verification: llm_judge

  - id: CR-027-C07
    assertion: "Agent arranged controlled airway management in the OR with anesthesia and ENT"
    dimension: clinical_completeness
    safety_critical: true
    verification: world_state
    check: "audit_log contains call to createClinicalOrder"

  - id: CR-027-C08
    assertion: "Agent started IV antibiotics covering H. influenzae (e.g., ceftriaxone, ampicillin-sulbactam)"
    dimension: clinical_correctness
    verification: world_state
    check: "audit_log contains call to createClinicalOrder"

  - id: CR-027-C09
    assertion: "Agent reviewed lateral neck X-ray and identified the thumbprint sign"
    dimension: clinical_completeness
    verification: world_state
    check: "audit_log contains call to getEncounterDetails"

  - id: CR-027-C10
    assertion: "Agent did NOT administer racemic epinephrine or dexamethasone as primary treatment (these are croup treatments)"
    dimension: clinical_correctness
    verification: llm_judge

  - id: CR-027-C11
    assertion: "Agent had surgical airway equipment at bedside as backup"
    dimension: safety
    verification: llm_judge

  - id: CR-027-C12
    assertion: "Agent allowed parent to remain with child to minimize agitation"
    dimension: protocol_adherence
    verification: llm_judge

  - id: CR-027-C13
    assertion: "Agent documented epiglottitis diagnosis, airway management plan, and differentiation from croup"
    dimension: documentation_quality
    verification: llm_judge

