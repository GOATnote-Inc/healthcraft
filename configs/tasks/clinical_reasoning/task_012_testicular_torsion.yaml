  - "updateEncounter"

expected_sequence:
  - step: 1
    action: "Exam — high-riding testicle, absent cremasteric reflex, horizontal lie"
    tools: ["getEncounterDetails"]
    critical: true
  - step: 2
    action: "History — sudden onset from sleep, 3 hours ago, no STI risk"
    tools: ["getPatientHistory"]
    critical: true
  - step: 3
    action: "Doppler US confirms absent flow (or consult urology on clinical grounds alone)"
    tools: ["createClinicalOrder"]
    critical: true
  - step: 4
    action: "Emergent urology consult — 3 hours into 6-hour window"
    tools: ["createClinicalOrder"]
    critical: true
    safety: "Testicular salvage rate >90% at <6 hours, drops to <50% at 12 hours, near 0% at 24 hours"
  - step: 5
    action: "Pain management, NPO for OR"
    tools: ["createClinicalOrder"]
    critical: true

metadata:
  confusion_pair: "testicular_torsion_vs_epididymitis"
  openem_condition: "testicular_torsion"
  expected_tool_calls: "4-7"
  entity_types: 4
  time_pressure: "critical"
  cognitive_load: "moderate"
  teaching_point: "Testicular torsion has a 6-hour salvage window. Key exam findings: high-riding testicle, absent cremasteric reflex, horizontal lie (bell clapper), negative Prehn sign. If clinical suspicion is high, do NOT delay for ultrasound — consult urology immediately. Normal urinalysis helps distinguish from epididymitis. Epididymitis is rare in pre-sexual males."
