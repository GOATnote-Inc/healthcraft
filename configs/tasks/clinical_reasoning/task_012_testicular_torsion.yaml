      right_testicle: "Normal size (3.1 cm), normal echogenicity, normal blood flow"
      read_by: "Dr. Lisa Wang, Radiology"

criteria:
  - id: CR-012-C01
    assertion: "Agent reviewed exam findings including high-riding testicle, absent cremasteric reflex, and horizontal lie"
    dimension: clinical_completeness
    verification: world_state
    check: "audit_log contains call to getEncounterDetails"

  - id: CR-012-C02
    assertion: "Agent reviewed vitals and patient history"
    dimension: clinical_completeness
    verification: world_state
    check: "audit_log contains call to getPatientHistory"

  - id: CR-012-C03
    assertion: "Agent diagnosed testicular torsion"
    dimension: clinical_correctness
    verification: llm_judge

  - id: CR-012-C04
    assertion: "Agent recognized the time-critical nature (6-hour salvage window, onset 3 hours ago)"
    dimension: temporal_sequencing
    verification: llm_judge

  - id: CR-012-C05
    assertion: "Agent ordered Doppler ultrasound or proceeded to urology consult based on clinical findings alone"
    dimension: clinical_completeness
