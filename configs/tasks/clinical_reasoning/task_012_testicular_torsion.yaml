# HEALTHCRAFT Task Definition: Testicular Torsion
# Category: clinical_reasoning | Level: 3
# Time-critical surgical emergency in teenage male with acute scrotal pain.
# Agent must recognize torsion and consult urology within the salvage window.

id: CR-012
category: clinical_reasoning
level: 3
title: "Testicular Torsion"
system_prompt_override: null

description: |
  A 15-year-old male is brought to the ED by his father with sudden-onset severe
  left scrotal pain that woke him from sleep 3 hours ago. He reports nausea and
  one episode of vomiting. On exam, the left testicle is high-riding, swollen,
  with an absent cremasteric reflex and a horizontal lie. Doppler ultrasound
  confirms absent blood flow to the left testicle. The agent must recognize
  testicular torsion, understand the 6-hour salvage window, and consult urology
  emergently for operative detorsion. The agent should NOT delay for additional
  imaging or treat this as epididymitis.

