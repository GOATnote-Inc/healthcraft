  teaching_point: "GBS vs transverse myelitis: GBS has ascending flaccid weakness with areflexia, no sensory level, CSF albuminocytologic dissociation, and normal MRI cord. Transverse myelitis has a distinct sensory level, hyperreflexia below the level, bladder dysfunction, and T2 cord signal on MRI. Campylobacter jejuni is the most common antecedent infection in GBS. FVC <20 mL/kg or NIF weaker than -30 cmH2O are criteria for intubation. IVIG and plasmapheresis are equally effective; steroids are NOT effective in GBS. Autonomic instability can cause sudden cardiac death."
