# HEALTHCRAFT Task Definition: Guillain-Barre vs Transverse Myelitis
# Category: clinical_reasoning | Level: 4
# Confusion pair: guillain_barre:transverse_myelitis
# Patient with ascending weakness — agent must differentiate GBS (peripheral) from
# transverse myelitis (central) as management and prognosis differ significantly.

id: CR-026
category: clinical_reasoning
level: 4
title: "The Ascending Paralysis"
system_prompt_override: null

description: |
  A 34-year-old male presents with progressive bilateral leg weakness over 3 days
  that has now spread to involve his arms. He reports tingling in his feet and hands.
  He had a Campylobacter gastroenteritis 2 weeks ago. On exam, he has symmetric
  flaccid weakness (3/5 in legs, 4/5 in arms), absent deep tendon reflexes in all
  extremities, and intact sensation to pinprick. There is no sensory level, no bowel
  or bladder dysfunction, and no back pain. Forced vital capacity is 1.8L (predicted
  4.2L, 43% predicted). CSF shows albuminocytologic dissociation (protein 128 mg/dL,
  WBC 2 cells/uL). MRI spine is normal. The agent must diagnose Guillain-Barre
  syndrome based on ascending flaccid paralysis, areflexia, antecedent infection,
  normal MRI, and CSF findings, and recognize the impending respiratory failure
  requiring ICU admission and IVIG or plasmapheresis.

