    tools: ["createClinicalOrder"]
    critical: true
  - step: 6
    action: "Address AF anticoagulation gap as stroke etiology"
    tools: []
    critical: true

metadata:
  confusion_pair: "posterior_stroke_vs_bppv"
  openem_condition: "posterior_circulation_stroke"
  expected_tool_calls: "6-10"
  entity_types: 6
  time_pressure: "high"
  cognitive_load: "high"
  teaching_point: "HINTS exam is more sensitive than early MRI for central vertigo. The dangerous pattern: normal head impulse test + direction-changing nystagmus + skew deviation = central (stroke) until proven otherwise. BPPV is episodic and positional; posterior stroke causes continuous vertigo. CT misses >50% of posterior fossa strokes. AF without anticoagulation is the #1 cause of cardioembolic stroke."
