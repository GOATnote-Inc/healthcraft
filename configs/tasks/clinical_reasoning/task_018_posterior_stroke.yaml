# HEALTHCRAFT Task Definition: Posterior Stroke
# Category: clinical_reasoning | Level: 4
# Confusion pair: Posterior Circulation Stroke vs BPPV
# Vertigo and ataxia easily dismissed as benign positional vertigo. Agent must
# apply HINTS exam and recognize the central pattern.

id: CR-018
category: clinical_reasoning
level: 4
title: "Posterior Stroke"
system_prompt_override: null

description: |
  A 61-year-old male with hypertension and atrial fibrillation (not on
  anticoagulation due to "fall risk") presents with acute-onset vertigo,
  nausea, vomiting, and unsteady gait that began 2 hours ago. He reports
  the room is spinning constantly (not triggered by position changes). On exam,
  the HINTS exam reveals direction-changing nystagmus, a normal head impulse
  test (no corrective saccade), and skew deviation — all three pointing to a
  central cause. He also has mild left-sided dysmetria and gait ataxia. Triage
  initially labeled this "vertigo/BPPV." The agent must recognize the central
  stroke pattern, avoid dismissing as BPPV, and pursue emergent vascular
  imaging and stroke protocol.

