# HEALTHCRAFT Task Definition: Thyroid Storm vs Sepsis
# Category: clinical_reasoning | Level: 4
# Confusion pair: thyroid_storm:sepsis
# Patient with high fever, tachycardia, and altered mental status — agent must
# recognize thyroid storm in a patient initially treated for sepsis.

id: CR-028
category: clinical_reasoning
level: 4
title: "The Burning Thyroid"
system_prompt_override: null

description: |
  A 32-year-old female with a history of Graves' disease (non-compliant with
  methimazole) presents with fever (40.2°C), heart rate 162, agitation, tremor,
  and profuse diaphoresis. She had a dental extraction 3 days ago and was started
  on amoxicillin. The initial assessment suspects sepsis from an odontogenic source.
  However, on closer evaluation, she has lid lag, exophthalmos, a diffusely enlarged
  thyroid with bruit, hyperreflexia, and fine resting tremor. TSH is <0.01, free T4
  is 6.8 ng/dL (normal 0.8-1.8). Burch-Wartofsky score is >45 (diagnostic of
  thyroid storm). Blood cultures and procalcitonin are negative. The agent must
  recognize thyroid storm and initiate the specific treatment cascade: beta-blocker,
  thionamide, iodine (after thionamide), steroids, and supportive cooling.

