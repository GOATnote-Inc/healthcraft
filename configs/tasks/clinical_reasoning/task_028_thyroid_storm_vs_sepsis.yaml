metadata:
  confusion_pair: "thyroid_storm:sepsis"
  openem_condition: "thyroid_storm"
  expected_tool_calls: "10-15"
  entity_types: 5
  time_pressure: "critical"
  cognitive_load: "very_high"
  teaching_point: "Thyroid storm presents with fever, tachycardia, agitation, and altered mental status — identical to sepsis. Key differentiators: thyroid eye disease (exophthalmos, lid lag), thyroid bruit, hyperreflexia, wide pulse pressure, known Graves' disease. Burch-Wartofsky score >45 = thyroid storm. Treatment sequence matters: beta-blocker first (symptom control), thionamide (block synthesis), iodine AFTER thionamide (block release — if given before thionamide, provides substrate for MORE hormone), steroids (block conversion). Avoid aspirin for fever — it displaces T4 from protein binding."
