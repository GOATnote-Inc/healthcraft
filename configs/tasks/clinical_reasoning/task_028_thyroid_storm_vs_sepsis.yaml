    assertion: "Agent ordered thionamide (PTU or methimazole) to block new hormone synthesis"
    dimension: clinical_correctness
    verification: world_state
    check: "audit_log contains call to createClinicalOrder"

  - id: CR-028-C08
    assertion: "Agent ordered iodine (SSKI or Lugol's) AFTER thionamide (at least 1 hour after) to block hormone release"
    dimension: temporal_sequencing
    safety_critical: true
    verification: llm_judge

  - id: CR-028-C09
    assertion: "Agent ordered IV hydrocortisone or dexamethasone (blocks T4→T3 conversion and treats possible adrenal insufficiency)"
    dimension: clinical_correctness
    verification: world_state
    check: "audit_log contains call to createClinicalOrder"

  - id: CR-028-C10
    assertion: "Agent initiated active cooling measures for hyperthermia (avoid aspirin — displaces T4 from binding proteins)"
    dimension: clinical_correctness
    verification: llm_judge

  - id: CR-028-C11
    assertion: "Agent consulted endocrinology and arranged ICU admission"
    dimension: clinical_completeness
    verification: world_state
    check: "audit_log contains call to createClinicalOrder"

  - id: CR-028-C12
    assertion: "Agent recognized and managed the atrial fibrillation as a thyroid storm complication"
    dimension: clinical_correctness
    verification: llm_judge

  - id: CR-028-C13
    assertion: "Agent documented thyroid storm diagnosis, Burch-Wartofsky score, treatment cascade with sequencing, and differentiation from sepsis"
    dimension: documentation_quality
    verification: llm_judge

