# HEALTHCRAFT Task Definition: Methanol Poisoning vs Diabetic Ketoacidosis
# Category: clinical_reasoning | Level: 5
# Confusion pair: methanol_poisoning:diabetic_ketoacidosis
# Patient with severe metabolic acidosis and altered mental status — agent must
# differentiate methanol poisoning from DKA. Fomepizole and dialysis are time-critical.

id: CR-040
category: clinical_reasoning
level: 5
title: "The Toxic Acid"
system_prompt_override: null

description: |
  A 45-year-old male with a history of type 2 diabetes and alcohol use disorder
  presents with progressive confusion, blurred vision, and abdominal pain for 12
  hours. He was found by his roommate surrounded by empty bottles. His roommate
  reports he drank "some kind of alcohol" from an unlabeled container in the garage
  last night. Glucose is 198 (mildly elevated for his diabetes but not >250). There
  are trace ketones in the urine. ABG shows pH 7.02 with severe anion gap metabolic
  acidosis (AG 34). However, the osmol gap is markedly elevated at 42 mOsm/kg
  (normal <10), which is NOT a feature of DKA. On exam, he has bilateral visual
  acuity of hand motions only, fundoscopy shows hyperemic discs with blurred margins,
  and afferent pupillary defects are present. Serum methanol level returns at 68 mg/dL
  (toxic). The agent must diagnose methanol poisoning, initiate fomepizole immediately
  to block metabolism, and arrange emergent hemodialysis rather than treating solely
  with an insulin drip for DKA.

