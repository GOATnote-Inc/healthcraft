  teaching_point: "Methanol poisoning vs DKA: Both cause severe anion gap metabolic acidosis. Key differentiators: 1) Osmol gap >10 (DKA has normal osmol gap). 2) Visual loss (DKA does not affect vision). 3) Glucose often normal or mildly elevated (DKA >250). 4) Trace ketones (DKA has large ketones, BHB >3). 5) History of ingestion. The osmol gap is the critical distinguishing lab value. Methanol itself is not toxic — its metabolite formate causes optic nerve destruction and basal ganglia necrosis. Fomepizole blocks alcohol dehydrogenase (stops formate production). Hemodialysis removes methanol and formate. Folinic acid enhances formate degradation. Bilateral putaminal necrosis on CT is pathognomonic for methanol."
