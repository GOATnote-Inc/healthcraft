# HEALTHCRAFT Task Definition: Ovarian Torsion vs Appendicitis
# Category: clinical_reasoning | Level: 4
# Confusion pair: Ovarian Torsion vs Appendicitis
# Young woman with RLQ pain and a positive pregnancy test red herring.
# Agent must not anchor on ectopic and must pursue the correct surgical diagnosis.

id: CR-005
category: clinical_reasoning
level: 4
title: "Ovarian Torsion vs Appendicitis"
system_prompt_override: null

description: |
  A 22-year-old woman presents with sudden-onset severe right lower quadrant
  pain radiating to the right flank, accompanied by nausea and two episodes of
  vomiting. A urine pregnancy test is positive (quantitative beta-hCG 280
  mIU/mL), which distracts toward ectopic pregnancy. However, transvaginal
  ultrasound reveals a 6.2 cm right ovarian dermoid cyst with absent Doppler
  flow, consistent with ovarian torsion. The appendix appears normal on imaging.
  The agent must recognize the ovarian torsion, understand the time-critical
  nature (ovarian salvage within 6 hours), and consult gynecology emergently
  rather than pursuing an appendectomy or treating for ectopic pregnancy.

