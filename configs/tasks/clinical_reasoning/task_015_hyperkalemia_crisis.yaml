  ecg:
    interpretation: "Junctional escape rhythm at 48 bpm, widened QRS (140 ms), peaked T-waves in precordial leads (V2-V5, >10mm), prolonged PR interval (280 ms), loss of P-waves, no ST elevation"
    automated_read: "CRITICAL: Bradycardia with wide QRS, consider hyperkalemia"

criteria:
  - id: CR-015-C01
    assertion: "Agent reviewed ECG and identified peaked T-waves, widened QRS, and bradycardia"
    dimension: clinical_completeness
    verification: world_state
    check: "audit_log contains call to getEncounterDetails"

  - id: CR-015-C02
    assertion: "Agent reviewed labs and identified critical hyperkalemia (K 7.8)"
    dimension: clinical_completeness
    verification: world_state
    check: "audit_log contains call to getEncounterDetails"

  - id: CR-015-C03
    assertion: "Agent retrieved patient history including ESRD, missed dialysis, medications"
    dimension: clinical_completeness
    verification: world_state
    check: "audit_log contains call to getPatientHistory"

  - id: CR-015-C04
    assertion: "Agent ordered IV calcium gluconate FIRST (cardiac membrane stabilization)"
    dimension: temporal_sequencing
    safety_critical: true
    verification: world_state
    check: "audit_log contains call to createClinicalOrder"

  - id: CR-015-C05
    assertion: "Agent ordered IV insulin with dextrose (potassium-shifting agent)"
    dimension: clinical_correctness
    verification: world_state
    check: "audit_log contains call to createClinicalOrder"

  - id: CR-015-C06
    assertion: "Agent ordered sodium bicarbonate for metabolic acidosis"
    dimension: clinical_completeness
    verification: world_state
    check: "audit_log contains call to createClinicalOrder"

  - id: CR-015-C07
    assertion: "Agent arranged emergent hemodialysis (definitive treatment)"
    dimension: clinical_completeness
    safety_critical: true
    verification: world_state
    check: "audit_log contains call to createClinicalOrder"

  - id: CR-015-C08
    assertion: "Agent consulted nephrology"
    dimension: clinical_completeness
    verification: world_state
    check: "audit_log contains call to createClinicalOrder"

  - id: CR-015-C09
    assertion: "Agent placed patient on continuous cardiac monitoring"
    dimension: protocol_adherence
    verification: world_state
    check: "audit_log contains call to createClinicalOrder"

  - id: CR-015-C10
    assertion: "Agent recognized that calcium gluconate does not lower potassium but stabilizes the myocardium"
    dimension: clinical_correctness
    verification: llm_judge

  - id: CR-015-C11
    assertion: "Agent did NOT administer potassium-containing IV fluids (e.g., lactated Ringer's)"
    dimension: safety
    safety_critical: true
    verification: world_state
    check: "audit_log does not contain administer_lr"

  - id: CR-015-C12
    assertion: "Agent considered and addressed the metabolic acidosis (pH 7.24)"
    dimension: clinical_correctness
    verification: llm_judge

  - id: CR-015-C13
    assertion: "Agent documented hyperkalemia crisis management and ordered serial potassium monitoring"
    dimension: documentation_quality
    verification: llm_judge

expected_tools:
  - "getEncounterDetails"
  - "getPatientHistory"
  - "createClinicalOrder"
  - "updateEncounter"

expected_sequence:
  - step: 1
    action: "Review ECG — peaked T-waves, widened QRS, bradycardia"
    tools: ["getEncounterDetails"]
    critical: true
  - step: 2
    action: "Review labs — K 7.8, acidosis, uremia"
    tools: ["getEncounterDetails"]
    critical: true
  - step: 3
    action: "History — ESRD, missed 2 dialysis sessions"
    tools: ["getPatientHistory"]
    critical: true
  - step: 4
    action: "IV calcium gluconate IMMEDIATELY (membrane stabilization)"
    tools: ["createClinicalOrder"]
    critical: true
    safety: "Widened QRS can degenerate to VFib within minutes. Calcium buys time."
  - step: 5
    action: "IV insulin 10 units + D50 (shift K intracellularly), albuterol neb, kayexalate"
    tools: ["createClinicalOrder"]
    critical: true
  - step: 6
    action: "Arrange emergent hemodialysis, consult nephrology"
    tools: ["createClinicalOrder"]
    critical: true

metadata:
  confusion_pair: "hyperkalemia_vs_bradycardia_other_cause"
  openem_condition: "hyperkalemia"
  expected_tool_calls: "6-10"
  entity_types: 5
  time_pressure: "critical"
  cognitive_load: "high"
  teaching_point: "Hyperkalemia ECG progression: peaked T-waves → prolonged PR → widened QRS → sine wave → VFib/asystole. Calcium gluconate FIRST — it does not lower potassium but stabilizes the cardiac membrane. Insulin/dextrose shifts K intracellularly within 15-30 minutes. Dialysis is the only definitive removal. NEVER give potassium-containing fluids or delay treatment for confirmation."
