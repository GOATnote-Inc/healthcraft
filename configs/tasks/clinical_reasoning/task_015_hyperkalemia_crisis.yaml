# HEALTHCRAFT Task Definition: Hyperkalemia Crisis
# Category: clinical_reasoning | Level: 4
# Dialysis patient with peaked T-waves and bradycardia. Agent must treat
# hyperkalemia emergently before cardiac arrest occurs.

id: CR-015
category: clinical_reasoning
level: 4
title: "Hyperkalemia Crisis"
system_prompt_override: null

description: |
  A 58-year-old male on hemodialysis presents with generalized weakness and
  "feeling like my heart is skipping" after missing his last two dialysis
  sessions. His ECG shows peaked T-waves, widened QRS complexes (140 ms), and
  a heart rate of 48 bpm with a junctional escape rhythm. Serum potassium
  returns at 7.8 mEq/L. The agent must recognize the ECG changes as
  hyperkalemia-induced and initiate the emergent treatment cascade: IV calcium
  gluconate (membrane stabilization first), insulin/dextrose, and arrange
  emergent hemodialysis. Delay in calcium administration risks degeneration
  into ventricular fibrillation.

setting:
  facility: "Mercy Point Emergency Department"
  time: "2026-02-18T10:45:00Z"
  department: "Emergency Department"
  census: 27
  beds_available: 27
  attending_on_duty: "Dr. Mark Thompson"
  specialist_availability:
    nephrology: "on_call, 20min response"
    dialysis_unit: "available, 2 machines open"
    critical_care: "in_house"

