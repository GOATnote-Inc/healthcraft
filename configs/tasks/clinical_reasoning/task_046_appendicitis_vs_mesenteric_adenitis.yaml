# HEALTHCRAFT Task Definition: Appendicitis vs Mesenteric Adenitis
# Category: clinical_reasoning | Level: 4
# Confusion pair: appendicitis:mesenteric_adenitis
# Pediatric patient with RLQ pain — agent must differentiate surgical appendicitis
# from self-limiting mesenteric adenitis to avoid unnecessary laparotomy or missed perforation.

id: CR-046
category: clinical_reasoning
level: 4
title: "The Inflamed Mimic"
system_prompt_override: null

description: |
  A 9-year-old male presents with 18 hours of progressive right lower quadrant pain,
  low-grade fever (38.4°C), and two episodes of non-bilious vomiting. He had an
  upper respiratory infection 5 days ago that has mostly resolved. On exam, there is
  point tenderness at McBurney's point with voluntary guarding, positive Rovsing's
  sign, and a positive psoas sign. WBC is 14.8 with 82% neutrophils. CRP is 4.2 mg/dL.
  Ultrasound shows a non-compressible tubular structure in the RLQ measuring 8mm
  in diameter with periappendiceal fat stranding and a small amount of free fluid.
  Several enlarged mesenteric lymph nodes are also noted (up to 12mm), which could
  suggest mesenteric adenitis. The agent must integrate the clinical picture,
  ultrasound findings, and labs to correctly diagnose acute appendicitis and
  arrange surgical consultation rather than dismissing the presentation as
  post-viral mesenteric adenitis.

