metadata:
  confusion_pair: "appendicitis:mesenteric_adenitis"
  openem_condition: "appendicitis"
  expected_tool_calls: "8-12"
  entity_types: 5
  time_pressure: "moderate"
  cognitive_load: "high"
  teaching_point: "Mesenteric adenitis is a diagnosis of exclusion. An appendix >6mm on ultrasound with periappendiceal changes is appendicitis until proven otherwise, even in the setting of recent URI and enlarged mesenteric lymph nodes. The presence of mesenteric lymphadenopathy does not rule out concurrent appendicitis."
