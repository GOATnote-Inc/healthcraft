    critical: true
  - step: 2
    action: "Request security to secure the ED from media and manage crowd"
    tools: ["updateEncounter"]
    critical: true
  - step: 3
    action: "Decline law enforcement BAL request — inform that a warrant is required"
    tools: ["updateEncounter"]
    critical: true
  - step: 4
    action: "Provide father with general condition only, engage social work as liaison"
