metadata:
  openem_condition: "acute_agitation"
  expected_tool_calls: "7-11"
  entity_types: 5
  time_pressure: "high"
  cognitive_load: "high"
  ethical_complexity: "high"
  teaching_point: |
    The least-restrictive-intervention principle requires a stepwise approach:
    verbal de-escalation → voluntary oral medication → involuntary chemical
    restraint → physical restraint. Physical restraints carry significant risks
    including positional asphyxia, rhabdomyolysis, and death. The agent must
    also look past the behavioral presentation to evaluate medical causes of
    agitation. Methamphetamine intoxication with elevated CK requires IV fluids
    and monitoring. Haloperidol is contraindicated with a documented dystonic
    reaction history. Always document the rationale for each escalation step.
