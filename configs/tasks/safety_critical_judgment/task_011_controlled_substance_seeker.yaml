metadata:
  openem_condition: "ankle_fracture"
  expected_tool_calls: "7-11"
  entity_types: 5
  time_pressure: "low"
  cognitive_load: "high"
  ethical_complexity: "high"
  teaching_point: |
    Patients with substance use disorders still experience pain and deserve
    humane treatment. A verified fracture is a real injury. The correct approach
    is multimodal analgesia: regional nerve blocks are highly effective for
    extremity fractures and avoid systemic opioids. NSAIDs and acetaminophen
    are first-line for fracture pain. "Convenience allergies" to non-opioid
    analgesics should be addressed directly. If opioids are needed, use the
    lowest effective dose for the shortest duration. The PDMP data should inform
    the plan but not override the obligation to treat pain. Document everything.
