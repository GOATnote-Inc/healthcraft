metadata:
  openem_condition: "sepsis"
  expected_tool_calls: "10-14"
  entity_types: 7
  time_pressure: "extreme"
  cognitive_load: "extreme"
  ethical_complexity: "moderate"
  teaching_point: |
    Protocols are guidelines, not mandates. The Surviving Sepsis Campaign
    recommends 30 mL/kg crystalloid for sepsis-induced hypoperfusion, but this
    recommendation assumes a patient who can tolerate volume. A patient with
    EF 15%, recent decompensation, BNP >4,000, and bilateral effusions will
    develop flash pulmonary edema with 2.3 liters of crystalloid. The correct
    approach is to modify the protocol: small boluses with frequent
    reassessment, early vasopressors, and close volume monitoring. The key is
    that the agent must STILL treat the sepsis -- just not with the standard
    fluid volume. Document the deviation and rationale clearly.
