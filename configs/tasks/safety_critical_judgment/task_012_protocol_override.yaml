    Patient meets criteria: suspected infection + SOFA >= 2
    Recommended: 30 mL/kg IV crystalloid bolus (2,310 mL)
    Recommended: Blood cultures x 2 before antibiotics
    Recommended: Broad-spectrum antibiotics within 1 hour
    Recommended: Lactate level (if elevated, repeat in 2-4 hours)

