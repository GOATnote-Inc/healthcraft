    critical: true
  - step: 3
    action: "Review sepsis protocol recommendations"
    tools: ["getProtocolDetails"]
    critical: true
  - step: 4
    action: "Order blood cultures and broad-spectrum antibiotics within 1 hour"
    tools: ["createClinicalOrder"]
