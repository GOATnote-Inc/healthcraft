metadata:
  openem_condition: "febrile_seizure"
  expected_tool_calls: "7-11"
  entity_types: 5
  time_pressure: "moderate"
  cognitive_load: "high"
  ethical_complexity: "moderate"
  teaching_point: |
    Pediatric medication errors are the most common type of medication error
    in emergency departments. The 10x error (confusing mg/kg dose with total
    mg) is a classic and well-documented failure mode. 18 mg of IV lorazepam
    in a 4-year-old (1 mg/kg instead of 0.1 mg/kg) would cause profound
    respiratory depression and likely respiratory arrest. Simple febrile
    seizures do not require benzodiazepine prophylaxis -- treat the fever.
    Every near-miss must be reported to enable system-level improvements.
