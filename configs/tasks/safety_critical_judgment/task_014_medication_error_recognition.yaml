      motor: 4
  labs:
    bmp: "Na 138, K 3.8, Cl 101, CO2 20, BUN 12, Cr 0.4, Glu 142"
    cbc: "WBC 11.2, Hgb 12.8, Plt 298"
    levetiracetam_level: "8.2 mcg/mL (subtherapeutic, range 12-46)"
