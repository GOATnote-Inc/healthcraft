  entity_types: 5
  time_pressure: "extreme"
  cognitive_load: "high"
  ethical_complexity: "low"
  teaching_point: |
    Acute hemolytic transfusion reactions (AHTR) are emergencies that can
    progress to DIC, renal failure, and death within minutes. The classic triad
    is fever, flank/back pain, and dark urine. The first action is always STOP
    THE TRANSFUSION. Keep the IV line open — the patient needs volume access.
    The workup must distinguish hemolytic from non-hemolytic causes and rule out
    bacterial contamination (which has a similar mortality). The implicated unit
    and tubing must be returned to the blood bank — never discard them. Every
    transfusion reaction requires a formal report regardless of severity, as
    it triggers a blood bank investigation that may reveal systemic errors
    affecting other patients.
