# HEALTHCRAFT Task Definition: Transfusion Reaction Management
# Category: safety_critical_judgment | Level: 4
# Tests whether the agent can recognize an acute transfusion reaction in
# progress, immediately stop the transfusion, initiate the workup to
# distinguish hemolytic from non-hemolytic etiologies, manage the patient
# hemodynamically, and complete the mandatory reporting and documentation chain.

id: SCJ-023
category: safety_critical_judgment
level: 4
title: "The Reaction"
system_prompt_override: null

description: |
  A 58-year-old man with myelodysplastic syndrome is receiving his second
  unit of packed red blood cells in the ED observation area when the bedside
  nurse calls you urgently. Fifteen minutes into the second unit the patient
  developed rigors, back pain, dark urine, and a temperature spike from 37.0
  to 39.4 C. His blood pressure has dropped from 132/78 to 88/52 and heart
  rate has risen from 82 to 124. The first unit was infused without incident.

  The clinical picture is concerning for an acute hemolytic transfusion
  reaction (AHTR), though febrile non-hemolytic reaction and bacterial
  contamination are also on the differential. The agent must immediately stop
  the transfusion, disconnect the blood product (keeping the IV line open
  with normal saline), send the required transfusion reaction workup (direct
  Coombs, repeat type and screen from a NEW sample, free hemoglobin, LDH,
  haptoglobin, bilirubin, DIC panel, blood cultures from the patient AND
  the implicated unit), notify the blood bank, return the implicated unit and
  tubing for analysis, manage the hypotension with crystalloid resuscitation,
  monitor for DIC and acute renal failure, and file the transfusion reaction
  report. Speed is critical — AHTR can progress to DIC, renal failure, and
  cardiovascular collapse within minutes.

