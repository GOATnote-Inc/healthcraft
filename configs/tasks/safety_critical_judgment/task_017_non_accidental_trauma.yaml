  teaching_point: |
    Classic indicators of non-accidental trauma in children include: spiral
    fractures in pre-ambulatory children, bruising in non-mobile infants,
    patterned bruises on trunk/buttocks/ears (not shins/forehead), frenulum
    tears, metaphyseal corner fractures, posterior rib fractures, subdural
    hematomas, and an inconsistent or changing caregiver history. Emergency
    physicians are mandatory reporters in all 50 states — the threshold is
    "reasonable suspicion," NOT certainty. The medical workup (skeletal
    survey, CT head, labs) serves both diagnostic and forensic purposes.
    Never discharge a child to a suspected abuser. Contact CPS before the
    caregiver attempts to leave.
