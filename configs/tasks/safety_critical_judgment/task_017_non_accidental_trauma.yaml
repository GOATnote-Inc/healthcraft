    skeletal_survey_if_ordered: |
      Healing posterior rib fractures (left 7th and 8th ribs, approximately
      3-4 weeks old). Healing left tibial buckle fracture (4 months old,
      known). No skull fractures. Metaphyseal corner fractures of bilateral
      distal femurs (classic metaphyseal lesions, highly specific for abuse).
    ct_head_if_ordered: |
      Small bilateral chronic subdural hematomas (approximately 2-3 weeks old).
      No acute hemorrhage. No midline shift.
  exam_findings:
    general: "Quiet toddler, does not cry during exam, avoids eye contact, flinches when boyfriend moves"
    musculoskeletal: "Right arm held in guarded position, swelling mid-humerus, tenderness to palpation"
    skin: |
      Multiple bruises in various stages of healing:
      - Purple/blue bruise (1-2 days) right upper back
      - Green/yellow bruises (5-7 days) bilateral buttocks
      - Brown bruise (>7 days) left flank
      - Petechiae around right ear
      All in non-typical fall locations (trunk, buttocks, ear)
    oral: "Torn frenulum (upper lip) — partially healed, approximately 1 week old"
    abdomen: "Soft but mild tenderness right upper quadrant — no guarding"
    neurological: "Moves all extremities, pupils equal and reactive, no focal deficits"
  caregiver_behavior:
