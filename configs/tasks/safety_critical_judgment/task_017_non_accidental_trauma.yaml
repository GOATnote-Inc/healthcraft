    - "Cannot describe how a couch fall would cause a spiral fracture"
    - "Minimizes injuries: 'He bruises easily, he's a rough kid'"
    - "Becomes agitated when asked about the prior ED visits"
    - "Repeatedly asks 'When can we leave?'"
    - "Cannot name the child's pediatrician or provide vaccination records"

