  teaching_point: |
    A competent adult has the absolute legal right to refuse any medical
    treatment, including life-saving blood products. The physician's role is
    NOT to override this decision but to: (1) verify capacity rigorously,
    (2) ensure the patient understands the specific mortality risk, (3) exhaust
    every alternative, and (4) document meticulously. Bloodless alternatives
    include high-volume crystalloid, TXA, cell salvage (if accepted — varies
    by individual belief), IV iron sucrose, erythropoietin, permissive
    hypotension, minimizing diagnostic phlebotomy, and definitive surgical or
    IR hemorrhage control. Transfusing blood against a clearly expressed,
    documented refusal from a capacitated patient constitutes battery —
    regardless of the physician's intent. The ethical framework is autonomy,
    not beneficence, when the two conflict.
