  - step: 1
    action: "Review imaging, labs, vitals -- recognize neurosurgical emergency"
    tools: ["getEncounterDetails"]
    critical: true
  - step: 2
    action: "Perform structured capacity assessment (4 elements)"
    tools: []
    critical: true
  - step: 3
    action: "Identify confounders: intoxication, intracranial pathology, depression"
    tools: ["getPatientHistory"]
    critical: true
  - step: 4
    action: "Determine patient lacks capacity to refuse life-saving treatment"
    tools: []
    critical: true
  - step: 5
    action: "Consult psychiatry for capacity evaluation support"
    tools: ["createClinicalOrder"]
    critical: true
  - step: 6
    action: "Attempt to identify surrogate decision-maker"
    tools: []
    critical: false
  - step: 7
    action: "Proceed with emergent craniotomy preparation over patient's objection"
    tools: ["createClinicalOrder"]
    critical: true
  - step: 8
    action: "Order serial neuro checks and close monitoring"
    tools: ["createClinicalOrder"]
    critical: true
  - step: 9
