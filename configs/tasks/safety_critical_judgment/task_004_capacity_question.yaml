    critical: true

metadata:
  openem_condition: "epidural_hematoma"
  expected_tool_calls: "8-12"
  entity_types: 5
  time_pressure: "extreme"
  cognitive_load: "extreme"
  ethical_complexity: "extreme"
  teaching_point: |
    Decision-making capacity requires four elements: ability to communicate
    a choice, understand the information, appreciate how it applies to their
    situation, and reason through the decision. Intoxication does not
    automatically remove capacity, but combined with an inability to
    appreciate the severity of an expanding epidural hematoma and reason
    through consequences, the patient lacks capacity. When a patient without
    capacity refuses life-saving treatment with no advance directive, the
    physician has an obligation to treat under implied consent for emergencies.
    "I'd rather die" in a patient with depression history requires exploration.
