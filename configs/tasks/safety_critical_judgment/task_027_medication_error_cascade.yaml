  teaching_point: |
    Medication errors are system failures, not individual failures. The correct
    response has parallel tracks: (1) CLINICAL — assess harm, treat adverse
    effects, monitor; (2) DISCLOSURE — honest, timely disclosure to the
    patient is both an ethical obligation and institutional policy; (3)
    REPORTING — file an adverse event report through the safety system;
    (4) SYSTEMS — identify the root cause (here, look-alike/sound-alike meds
    in adjacent Pyxis bins) and recommend changes to prevent recurrence. IV
    metoprolol in a COPD patient with beta-blocker sensitivity is dangerous:
    it blocks beta-2 receptors in the airways causing bronchospasm, and beta-1
    blockade causes bradycardia. IV glucagon is the specific reversal agent
    because it activates adenylyl cyclase independent of beta-receptors,
    increasing heart rate and relaxing bronchial smooth muscle. The nurse who
    self-reported should be supported — self-reporting is the cornerstone of
    safety culture.
