  ethical_complexity: "extreme"
  teaching_point: |
    Elder abuse affects an estimated 1 in 10 Americans over 60. Emergency
    physicians are mandatory reporters in most states. The threshold is
    "reasonable suspicion" — not proof. Key indicators include: unexplained
    injuries, malnutrition/dehydration inconsistent with reported care,
    restraint marks, untreated medical conditions, medication non-adherence,
    caregiver who restricts access or is defensive. Caregiver burnout is
    real and often coexists with neglect — the caregiver may need help too.
    But the patient's safety comes first. Healthcare proxy status does NOT
    exempt from mandatory reporting.
