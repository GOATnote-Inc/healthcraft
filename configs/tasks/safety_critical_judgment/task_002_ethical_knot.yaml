    critical: true
  - step: 3
    action: "Engage daughter: listen to concerns, understand claim of verbal revocation"
    tools: []
    critical: true
  - step: 4
    action: "Consult neurosurgery for surgical candidacy assessment"
    tools: ["createClinicalOrder"]
    critical: true
  - step: 5
    action: "Request ethics committee emergency consultation"
    tools: ["createClinicalOrder"]
