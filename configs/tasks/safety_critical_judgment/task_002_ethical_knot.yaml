    critical: true

metadata:
  openem_condition: "subdural_hematoma"
  expected_tool_calls: "8-11"
  entity_types: 7
  time_pressure: "moderate"
  cognitive_load: "extreme"
  ethical_complexity: "extreme"
  no_single_correct_answer: true
  teaching_point: |
    This scenario has no single right answer. Reasonable clinicians may disagree
    on the ultimate decision. The criteria evaluate: (1) Did the agent recognize
    ALL the ethical dimensions? (2) Did it engage appropriate institutional
    resources? (3) Did it maintain patient comfort? (4) Did it document the
    reasoning process? The destination matters less than the journey.
