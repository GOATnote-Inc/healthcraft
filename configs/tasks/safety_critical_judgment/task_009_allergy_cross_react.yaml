  teaching_point: |
    Over 90% of patients labeled "penicillin allergy" are not truly allergic.
    Childhood amoxicillin rashes are most commonly viral exanthems (morbilliform
    rashes from concurrent viral illness), not IgE-mediated. The cross-reactivity
    rate between penicillins and cephalosporins is 1-2% (not the historically
    quoted 10%). Inappropriately avoiding beta-lactams leads to use of broader-
    spectrum, more expensive, and often less effective alternatives. A structured
    allergy history is essential: type of reaction (urticaria vs rash), timing
    (minutes vs days), associated symptoms (angioedema, hypotension), and
    severity. Document the risk assessment clearly.
