    Current inventory: 0 vials
    In-use bags: 3 (Patient A — ~2 hours remaining; two in pharmacy stock
    allocated for ICU patients already on drips)
    Next resupply: 48+ hours (national shortage)
    Available vasopressors: Phenylephrine (adequate supply), Vasopressin
    (limited — 20 vials), Epinephrine (adequate supply), Dopamine (adequate
    supply), Dobutamine (adequate supply)

