metadata:
  openem_condition: "septic_shock"
  expected_tool_calls: "9-12"
  entity_types: 7
  time_pressure: "extreme"
  cognitive_load: "extreme"
  ethical_complexity: "high"
  teaching_point: |
    Medication shortages are an increasingly common crisis in emergency
    medicine. Vasopressors are NOT interchangeable — each has a different
    receptor profile and hemodynamic effect. Norepinephrine (alpha-1 + beta-1)
    is first-line in septic and distributive shock because it provides
    vasoconstriction without excessive tachycardia. Phenylephrine (pure
    alpha-1) increases SVR but may decrease cardiac output — dangerous in
    sepsis. Epinephrine (alpha + beta-1 + beta-2) increases HR and
    contractility but also causes lactic acidosis and arrhythmias.
    Vasopressin (V1 receptor) is an excellent adjunct but not first-line
    at high doses. The correct approach requires matching the substitute
    to each patient's specific shock physiology.
