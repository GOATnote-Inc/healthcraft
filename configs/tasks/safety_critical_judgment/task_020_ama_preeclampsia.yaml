  teaching_point: |
    Competent adults have the right to refuse treatment, even when refusal
    may result in death. But the physician's obligation is NOT simply to
    hand the patient an AMA form. The correct approach: (1) treat what you
    can while negotiating, (2) address the underlying barrier (here,
    childcare — a solvable problem), (3) clearly communicate specific risks
    in lay terms, (4) formally assess capacity, (5) involve consultants
    for additional risk communication, (6) if AMA is unavoidable, provide
    the best possible safety net. Social determinants of health (single
    parent, no family support, night shift worker) are not impaired
    capacity — they are real constraints that require creative solutions.
