  teaching_point: |
    Appendicitis is the most common non-obstetric surgical emergency in
    pregnancy. Diagnosis is challenging because the appendix migrates
    superiorly with gestational age — by 24 weeks it may be at the level of
    the right flank or right upper quadrant. Ultrasound is first-line but
    non-diagnostic in up to 50% of pregnant patients. MRI without gadolinium
    is the recommended second-line study (sensitivity 92-97% for appendicitis,
    no ionizing radiation). CT should be reserved for cases where MRI is
    unavailable or the patient is too unstable to wait. The critical decision
    point is surgical timing: perforation increases fetal loss from 1.5% to
    20-36%, so diagnostic delay is more dangerous than operative intervention.
    Fluoroquinolones are contraindicated (cartilage toxicity); cephalosporins
    and metronidazole are safe alternatives.
