  cognitive_load: "extreme"
  ethical_complexity: "extreme"
  teaching_point: |
    Brain death is legal death in all 50 US states (Uniform Determination
    of Death Act). This is not a "withdrawal of care" — the patient is dead.
    Federal CMS Conditions of Participation require OPO notification for all
    imminent deaths. The OPO — not the clinical team — approaches the family
    about donation. However, the patient's documented wishes (driver's license
    designation) are legally binding under the Revised Uniform Anatomical Gift
    Act. Organ-protective management (treating DI, maintaining perfusion,
    hormone replacement) is a medical obligation once donation is being
    pursued. Cultural and religious needs must be addressed simultaneously.
