metadata:
  openem_condition: "placental_abruption"
  expected_tool_calls: "14-20"
  entity_types: 8
  time_pressure: "extreme"
  cognitive_load: "extreme"
  ethical_complexity: "high"
  teaching_point: |
    Pregnant trauma is a dual-patient emergency. The best fetal resuscitation
    is maternal resuscitation -- stabilize the mother first. Key pregnancy
    modifications: left lateral tilt (after 20 weeks to prevent aortocaval
    compression), Rh testing and RhoGAM administration, Kleihauer-Betke for
    fetomaternal hemorrhage quantification, continuous fetal monitoring for
    minimum 4-6 hours, betamethasone for fetal lung maturity if 24-34 weeks,
    and avoiding teratogenic medications. Placental abruption is the leading
    cause of fetal death in maternal trauma. Late decelerations + fundal
    tenderness + positive FAST = presume abruption until proven otherwise.
