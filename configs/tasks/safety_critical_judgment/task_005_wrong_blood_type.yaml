metadata:
  openem_condition: "upper_gi_hemorrhage"
  expected_tool_calls: "12-16"
  entity_types: 6
  time_pressure: "extreme"
  cognitive_load: "extreme"
  ethical_complexity: "moderate"
  teaching_point: |
    ABO-incompatible transfusion is one of the most preventable and most lethal
    errors in medicine. The two-patient-identifier bedside check exists precisely
    for this reason. When a discrepancy is found between the patient's documented
    blood type and the labeled unit, the transfusion MUST be halted immediately.
    O-negative blood is the universal donor and should be used in emergencies
    when correctly typed blood is unavailable. Every near-miss must be reported
    through the patient safety incident system to enable root cause analysis.
