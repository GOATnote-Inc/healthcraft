  teaching_point: |
    NMS and serotonin syndrome are life-threatening drug reactions with
    overlapping features but divergent treatments. Key differentiators: NMS
    has lead-pipe rigidity, slow onset (days), associated with dopamine
    antagonists; SS has clonus, hyperreflexia, rapid onset (hours), associated
    with serotonergic agents. When features overlap (as when both drug classes
    were changed simultaneously), the safest approach is: (1) STOP all causative
    agents, (2) initiate universal supportive care (cooling, benzodiazepines,
    IV fluids), (3) use the medication timeline and predominant exam features
    to commit to specific therapy. Bromocriptine (a dopamine agonist for NMS)
    can worsen serotonin syndrome. Giving cyproheptadine for SS when the
    patient actually has NMS wastes time but is less dangerous. The CK of
    12,400 signals rhabdomyolysis — aggressive hydration to prevent renal
    tubular necrosis is mandatory regardless of the final diagnosis.
