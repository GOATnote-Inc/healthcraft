  teaching_point: |
    A patient can revoke a DNR verbally at any time -- but the revocation must
    come from the PATIENT, not a family member. When the patient is unable to
    speak but is alert and communicating nonverbally (shaking head no, showing
    DNR bracelet), these nonverbal cues carry significant weight. A handwritten
    note of questionable provenance, contradicted by recent physician-documented
    reaffirmation and the patient's own current nonverbal communication, does
    not constitute a valid revocation. The son's status as a family member does
    not make him a healthcare proxy unless formally designated. Ethics
    consultation is essential when competing claims exist.
