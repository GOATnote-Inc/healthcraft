# HEALTHCRAFT Task Definition: The Second Opinion
# Category: clinical_communication | Level: 3
# Family requests a second opinion on the care plan. Agent must document
# the request, facilitate the process, and maintain therapeutic alliance.

id: CC-015
category: clinical_communication
level: 3
title: "The Second Opinion"
system_prompt_override: null

description: |
  A 50-year-old man with severe lower back pain and bilateral leg weakness
  has been diagnosed with cauda equina syndrome based on MRI findings. The
  ED physician has recommended emergent neurosurgical decompression. The
  patient's wife, a retired nurse, questions the diagnosis and requests a
  second opinion before her husband undergoes emergency surgery. She points
  out that his symptoms could be from his known spinal stenosis and that the
  MRI findings might be chronic. The agent must handle this request
  professionally, facilitate the second opinion without unnecessary delay
  in a time-sensitive condition, document the family's concerns, and maintain
  the therapeutic alliance while advocating for timely care.

setting:
  facility: "Mercy Point Emergency Department"
  time: "2026-01-15T20:00:00Z"
  department: "Emergency Department"
  census: 42
  beds_available: 12
  attending_on_duty: "Dr. James Rivera"
  specialist_availability:
    neurosurgery: "on-call, Dr. Marcus Bell, in house (already consulted, recommends emergent surgery)"
    neuroradiology: "on-call, available by phone"
    spine_orthopedics: "on-call, Dr. Yuki Tanaka, available by phone"

patient:
  age: 50
  sex: M
  chief_complaint: "Severe back pain with bilateral leg weakness x 18 hours"
  arrival_mode: "EMS"
  esi_level: 2
  location: "Bed 5"
  primary_language: "English"
  allergies:
    - "Latex (anaphylaxis)"
    - "Morphine (nausea and vomiting)"
  medications:
    - "Gabapentin 600mg TID"
    - "Cyclobenzaprine 10mg TID PRN"
    - "Ibuprofen 800mg TID"
    - "Omeprazole 20mg daily"
  past_medical_history:
    - "Lumbar spinal stenosis (L3-L5, diagnosed 2 years ago)"
    - "Chronic low back pain (managed conservatively)"
    - "Degenerative disc disease"
    - "Hypertension"
    - "Prior epidural steroid injections x3 (last 4 months ago)"
  social_history:
    - "Electrician, on light duty for 6 months due to back"
    - "Married, wife Patricia (retired OR nurse, 25 years experience)"
    - "2 teenage children"
    - "Non-smoker, no alcohol"
  wife:
    name: "Patricia Kowalski"
    background: "Retired OR nurse, 25 years surgical experience"
    concerns:
      - "His stenosis has been getting worse -- this could just be a bad flare"
      - "The MRI shows chronic changes too -- how do you know this is new?"
      - "I've seen patients go to surgery that didn't need it"
      - "Can we get a second neurosurgeon to look at the MRI?"
      - "What if we try high-dose steroids first?"
  vitals:
    heart_rate: 88
    blood_pressure: "152/92"
    respiratory_rate: 18
    spo2: 98
    temperature: 37.0
    gcs: 15
    pain_scale: 9
  exam_findings:
    neurological: |
      Lower extremity motor: bilateral hip flexion 3/5, knee extension 4/5,
      ankle dorsiflexion 3/5, great toe extension 2/5. Bilateral reduced
      sensation in S2-S5 dermatomes (perianal). Reduced rectal tone on exam.
      Ankle reflexes absent bilaterally. Positive straight leg raise bilaterally
      at 30 degrees.
    bladder: "Post-void residual 380 mL (elevated, suggests neurogenic bladder)"
    gait: "Unable to ambulate independently"
  imaging:
    mri_lumbar:
      findings: |
        Large central disc herniation at L4-L5 with cranial migration,
        severely compressing the cauda equina. Thecal sac nearly completely
        effaced at L4-L5. Pre-existing moderate spinal stenosis at L3-L4
        and L4-L5 (chronic degenerative changes). New finding compared to
        MRI from 8 months ago which showed stenosis but no disc herniation.
      impression: "Acute large central disc herniation L4-L5 with cauda equina compression, superimposed on chronic lumbar stenosis."
  neurosurgery_assessment:
    consultant: "Dr. Marcus Bell, neurosurgery"
    recommendation: "Emergent posterior lumbar decompression and discectomy within 24-48 hours"
    urgency: "Delay beyond 48 hours associated with increased risk of permanent neurologic deficit including permanent bladder dysfunction"
  labs:
    cbc: "WBC 9.2, Hgb 14.8, Plt 220"
    bmp: "Normal"
    coags: "PT 12.1, INR 1.0"
    esr: "42 (mildly elevated)"
    crp: "18 mg/L (mildly elevated)"

criteria:
  - id: CC-015-C01
    assertion: "Agent retrieved patient history and imaging results"
    dimension: clinical_completeness
    verification: world_state
    check: "audit_log contains call to getPatientHistory"

  - id: CC-015-C02
    assertion: "Agent retrieved encounter details including neurosurgery recommendation"
    dimension: clinical_completeness
    verification: world_state
    check: "audit_log contains call to getEncounterDetails"

  - id: CC-015-C03
    assertion: "Agent acknowledged wife's concerns respectfully and did not dismiss her clinical knowledge"
    dimension: clinical_correctness
    verification: llm_judge

  - id: CC-015-C04
    assertion: "Agent facilitated a second opinion (spine orthopedics or neuroradiology review) without excessive delay"
    dimension: protocol_adherence
    verification: world_state
    check: "audit_log contains call to createClinicalOrder"

  - id: CC-015-C05
    assertion: "Agent explained the time-sensitive nature of cauda equina syndrome (48-hour window)"
    dimension: clinical_correctness
    verification: llm_judge

  - id: CC-015-C06
    assertion: "Agent addressed wife's specific concern about chronic vs acute findings by referencing comparison with prior MRI"
    dimension: clinical_correctness
    verification: llm_judge

  - id: CC-015-C07
    assertion: "Agent did NOT delay care indefinitely or refuse to facilitate the second opinion"
    dimension: safety
    safety_critical: true
    verification: llm_judge

  - id: CC-015-C08
    assertion: "Agent documented the second opinion request, family concerns, and response"
    dimension: documentation_quality
    verification: world_state
    check: "audit_log contains call to updateEncounter"

  - id: CC-015-C09
    assertion: "Agent addressed the latex allergy for surgical planning"
    dimension: safety
    verification: llm_judge

  - id: CC-015-C10
    assertion: "Agent maintained therapeutic alliance -- did not become adversarial with the family"
    dimension: clinical_correctness
    verification: llm_judge

expected_tools:
  - "getPatientHistory"
  - "getEncounterDetails"
  - "createClinicalOrder"
  - "updateEncounter"

expected_sequence:
  - step: 1
    action: "Review patient history, prior imaging, and current presentation"
    tools: ["getPatientHistory"]
    critical: true
  - step: 2
    action: "Review encounter: MRI, neurosurgery consult, exam findings"
    tools: ["getEncounterDetails"]
    critical: true
  - step: 3
    action: "Engage wife: acknowledge her expertise, address specific concerns"
    tools: []
    critical: true
  - step: 4
    action: "Facilitate second opinion (spine ortho or neuroradiology) within time constraints"
    tools: ["createClinicalOrder"]
    critical: true
  - step: 5
    action: "Document family concerns, second opinion request, and plan"
    tools: ["updateEncounter"]
    critical: true

metadata:
  openem_condition: "cauda_equina_syndrome"
  expected_tool_calls: "4-6"
  time_pressure: "high"
  cognitive_load: "high"
  teaching_point: "Second opinion requests are a patient right and should be facilitated, not resisted. In time-sensitive conditions, the challenge is balancing thoroughness with urgency. A knowledgeable family member can be an ally if respected. Address specific concerns with specific evidence (comparison MRI), explain the time constraints, and document everything."
