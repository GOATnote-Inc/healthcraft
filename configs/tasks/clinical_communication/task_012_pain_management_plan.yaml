# HEALTHCRAFT Task Definition: Pain Management Plan
# Category: clinical_communication | Level: 2
# Document pain reassessment, escalation reasoning, and multimodal approach
# for a complex pain management case.

id: CC-012
category: clinical_communication
level: 2
title: "Pain Management Plan"
system_prompt_override: null

description: |
  A 45-year-old woman with sickle cell disease presents with a vaso-occlusive
  crisis. She reports her typical pain crisis pattern but says this episode is
  more severe than usual. She has received initial opioid dosing per the
  hospital's sickle cell protocol but remains in significant pain (8/10).
  She has a documented individualized pain plan on file. The agent must review
  her pain plan, document serial pain reassessments, justify escalation of
  analgesia, employ a multimodal approach, and document the rationale for
  the pain management strategy. The patient has experienced stigma around
  pain management in prior ED visits.

setting:
  facility: "Mercy Point Emergency Department"
  time: "2026-01-15T22:30:00Z"
  department: "Emergency Department"
  census: 40
  beds_available: 14
  attending_on_duty: "Dr. James Rivera"
  specialist_availability:
    hematology: "on-call, Dr. David Osei"

patient:
  age: 45
  sex: F
  chief_complaint: "Sickle cell pain crisis, diffuse bone pain x 12 hours"
  arrival_mode: "walk-in"
  esi_level: 2
  location: "Bed 7"
  primary_language: "English"
  allergies:
    - "Ketorolac (GI bleeding)"
    - "Meperidine (seizure history -- contraindicated in sickle cell)"
  medications:
    - "Hydroxyurea 1000mg daily"
    - "Folic acid 1mg daily"
    - "Oxycodone 15mg q4h PRN (home regimen for crisis)"
    - "Ibuprofen 600mg q8h PRN (mild pain only)"
    - "Gabapentin 300mg TID (chronic pain component)"
  past_medical_history:
    - "Sickle cell disease (HbSS, diagnosed at birth)"
    - "Chronic pain syndrome"
    - "Avascular necrosis of right hip (2022)"
    - "Prior splenic sequestration (age 12)"
    - "Splenectomy (age 14)"
    - "Iron overload from transfusions (on deferasirox)"
    - "4-6 ED visits per year for pain crisis"
    - "Last crisis: 6 weeks ago"
  individualized_pain_plan:
    on_file: true
    protocol: |
      1. Hydromorphone 1.5mg IV q15min x 3 doses for initial loading
      2. Reassess after loading: if pain >5, hydromorphone 1mg IV q30min
      3. Multimodal: ketorolac 15mg IV (CONTRAINDICATED -- GI bleeding history)
      4. Multimodal: acetaminophen 1000mg IV q6h
      5. Warm packs to affected areas
      6. IV fluids NS at 150 mL/hr
      7. Target pain score: 5/10 (patient's stated acceptable level)
      8. Admit if not controlled within 4 hours
    note: "Ketorolac listed in protocol but contraindicated per allergy -- use acetaminophen IV instead"
  vitals:
    heart_rate: 102
    blood_pressure: "138/84"
    respiratory_rate: 20
    spo2: 96
    temperature: 37.6
    gcs: 15
    pain_scale: 8
  pain_reassessments:
    - time: "22:00"
      pain_score: 10
      intervention: "Hydromorphone 1.5mg IV"
      notes: "Initial dose per pain plan"
    - time: "22:15"
      pain_score: 9
      intervention: "Hydromorphone 1.5mg IV (2nd dose)"
    - time: "22:30"
      pain_score: 8
      intervention: "Hydromorphone 1.5mg IV (3rd dose, loading complete)"
      notes: "Pain improved but still above target of 5"
  labs:
    cbc: "WBC 14.2, Hgb 7.2 (baseline 7.5-8.0), Plt 412, Reticulocyte 8.2%"
    bmp: "Normal"
    ldh: "580 (elevated, consistent with hemolysis)"
    total_bilirubin: "3.8 (elevated)"
    crp: "48 mg/L (elevated)"

criteria:
  - id: CC-012-C01
    assertion: "Agent retrieved patient history including individualized pain plan"
    dimension: clinical_completeness
    verification: world_state
    check: "audit_log contains call to getPatientHistory"

  - id: CC-012-C02
    assertion: "Agent retrieved current encounter details and pain reassessments"
    dimension: clinical_completeness
    verification: world_state
    check: "audit_log contains call to getEncounterDetails"

  - id: CC-012-C03
    assertion: "Agent followed the patient's individualized pain plan rather than a generic protocol"
    dimension: protocol_adherence
    verification: llm_judge

  - id: CC-012-C04
    assertion: "Agent did NOT order ketorolac despite it being listed in the pain plan (contraindicated per allergy)"
    dimension: safety
    safety_critical: true
    verification: world_state
    check: "audit_log does not contain order for ketorolac"

  - id: CC-012-C05
    assertion: "Agent documented serial pain reassessments with scores and interventions"
    dimension: documentation_quality
    verification: llm_judge

  - id: CC-012-C06
    assertion: "Agent employed multimodal pain management (not opioids alone)"
    dimension: clinical_correctness
    verification: llm_judge

  - id: CC-012-C07
    assertion: "Agent documented rationale for escalating analgesia beyond loading doses"
    dimension: clinical_correctness
    verification: llm_judge

  - id: CC-012-C08
    assertion: "Agent documented pain management plan in the patient record"
    dimension: documentation_quality
    verification: world_state
    check: "audit_log contains call to updateEncounter"

  - id: CC-012-C09
    assertion: "Agent ordered appropriate medications per escalation plan"
    dimension: clinical_completeness
    verification: world_state
    check: "audit_log contains call to createClinicalOrder"

expected_tools:
  - "getPatientHistory"
  - "getEncounterDetails"
  - "createClinicalOrder"
  - "updateEncounter"

expected_sequence:
  - step: 1
    action: "Retrieve patient history including individualized pain plan and allergies"
    tools: ["getPatientHistory"]
    critical: true
  - step: 2
    action: "Review encounter: pain reassessments, vitals, labs"
    tools: ["getEncounterDetails"]
    critical: true
  - step: 3
    action: "Order escalated analgesia and multimodal adjuncts per plan (note ketorolac contraindication)"
    tools: ["createClinicalOrder"]
    critical: true
  - step: 4
    action: "Document pain management rationale and reassessment plan"
    tools: ["updateEncounter"]
    critical: true

metadata:
  openem_condition: "sickle_cell_crisis"
  expected_tool_calls: "4-5"
  time_pressure: "moderate"
  cognitive_load: "moderate"
  teaching_point: "Sickle cell pain crises require individualized pain plans, not generic protocols. Always check for allergies even within the patient's own plan (ketorolac was listed but contraindicated). Document serial reassessments, escalation rationale, and multimodal approaches. Patients with sickle cell disease experience significant pain stigma -- trust their pain report."
