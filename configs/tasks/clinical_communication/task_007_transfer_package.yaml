# HEALTHCRAFT Task Definition: Transfer Package
# Category: clinical_communication | Level: 3
# Agent must prepare complete transfer documentation for a burn patient
# going to a regional burn center. Tests EMTALA compliance and transfer protocols.

id: CC-007
category: clinical_communication
level: 3
title: "Transfer Package"
system_prompt_override: null

description: |
  A 42-year-old man sustained partial and full-thickness burns to 28% TBSA
  in a house fire. He also has suspected inhalation injury with singed nasal
  hairs, carbonaceous sputum, and hoarse voice. Mercy Point does not have a
  burn center. The agent must prepare a complete transfer package to the
  regional burn center 45 minutes away, including EMTALA-compliant transfer
  documentation, clinical summary, fluid resuscitation calculations, airway
  status, and accepting physician confirmation. The patient needs to be
  stabilized before transfer and may require intubation.

setting:
  facility: "Mercy Point Emergency Department"
  time: "2026-01-15T02:30:00Z"
  department: "Emergency Department"
  census: 28
  beds_available: 26
  attending_on_duty: "Dr. Robert Williams"
  specialist_availability:
    general_surgery: "on-call, available"
    anesthesia: "on-call, available"
  transfer_resources:
    regional_burn_center: "Metro Burn Center, 45 minutes by ground ambulance"
    accepting_physician: "Dr. Lisa Nakamura, burn surgery"
    flight_ems: "weather grounded, ground transport only"
    ambulance_availability: "ALS unit available"

patient:
  age: 42
  sex: M
  chief_complaint: "Burns from house fire"
  arrival_mode: "EMS, 100% NRB"
  esi_level: 1
  location: "Trauma Bay 2"
  weight_kg: 85
  allergies:
    - "Latex (contact dermatitis)"
  medications:
    - "Metformin 1000mg BID"
    - "Glipizide 10mg daily"
    - "Lisinopril 20mg daily"
    - "Atorvastatin 20mg daily"
  past_medical_history:
    - "Type 2 Diabetes (A1c 8.2%)"
    - "Hypertension"
    - "Hyperlipidemia"
    - "No prior burns or surgeries"
  social_history:
    - "Construction worker"
    - "Wife and 3 children escaped the fire uninjured"
    - "Non-smoker, social alcohol"
    - "No substance use"
  vitals_initial:
    heart_rate: 122
    blood_pressure: "108/68"
    respiratory_rate: 28
    spo2: 93
    temperature: 36.2
    gcs: 14
    gcs_breakdown:
      eye: 4
      verbal: 4
      motor: 6
    pain_scale: 10
  vitals_current:
    heart_rate: 110
    blood_pressure: "118/74"
    respiratory_rate: 24
    spo2: 96
    temperature: 36.0
    on_supplemental_o2: "15L NRB"
    notes: "After 2L LR and pain management"
  exam_findings:
    airway: "Hoarse voice, singed nasal hairs, carbonaceous sputum, mild stridor noted"
    burns: |
      Face and neck: partial thickness (superficial), 4.5% TBSA
      Anterior chest: mixed partial/full thickness, 9% TBSA
      Right arm (circumferential): full thickness, 4.5% TBSA
      Left arm (anterior): partial thickness, 2.5% TBSA
      Right thigh and leg (anterior): partial thickness, 7.5% TBSA
      Total estimated TBSA: 28%
    pulmonary: "Coarse breath sounds bilaterally, mild expiratory wheezing"
    vascular: "Right radial pulse weak with circumferential arm burn -- monitor for compartment syndrome"
  labs:
    cbc: "WBC 16.2, Hgb 17.8 (hemoconcentration), Plt 285"
    bmp: "Na 142, K 5.4, Cr 1.2, Glucose 312, CO2 20"
    lactate: "3.8 mmol/L (elevated)"
    carboxyhemoglobin: "12% (elevated)"
    abg: "pH 7.34, pCO2 34, pO2 78 on NRB"
    coags: "PT 13.2, INR 1.1"
    ua: "Dark amber, myoglobin pending"
  current_management:
    - "100% NRB oxygen"
    - "2 large-bore IVs (18G bilateral antecubital)"
    - "LR at 850 mL/hr (Parkland formula: 4 x 85kg x 28% = 9,520 mL / 8hr first half)"
    - "Morphine 4mg IV q15min PRN (total 12mg given)"
    - "Fentanyl 50mcg IV for dressing changes"
    - "Tetanus booster given"
    - "Foley catheter placed, UOP 30 mL first hour"
    - "Sterile saline-moistened dressings"
    - "NPO"
  parkland_calculation:
    weight_kg: 85
    tbsa_percent: 28
    total_24hr: "9,520 mL LR"
    first_8hr_rate: "595 mL/hr (half in first 8 hours from time of burn)"
    next_16hr_rate: "298 mL/hr"
    target_uop: "0.5-1.0 mL/kg/hr (42-85 mL/hr)"

criteria:
  - id: CC-007-C01
    assertion: "Agent retrieved complete patient history and encounter details"
    dimension: clinical_completeness
    verification: world_state
    check: "audit_log contains call to getPatientHistory"

  - id: CC-007-C02
    assertion: "Agent retrieved current encounter details including vitals, labs, and management"
    dimension: clinical_completeness
    verification: world_state
    check: "audit_log contains call to getEncounterDetails"

  - id: CC-007-C03
    assertion: "Agent included TBSA calculation and burn distribution in transfer summary"
    dimension: clinical_correctness
    verification: llm_judge

  - id: CC-007-C04
    assertion: "Agent documented Parkland formula fluid resuscitation calculations and current rate"
    dimension: clinical_correctness
    verification: llm_judge

  - id: CC-007-C05
    assertion: "Agent flagged inhalation injury concern (hoarse voice, singed nasal hairs, carbonaceous sputum, stridor)"
    dimension: safety
    safety_critical: true
    verification: llm_judge

  - id: CC-007-C06
    assertion: "Agent addressed airway management plan for transfer (intubation before transfer given stridor)"
    dimension: safety
    safety_critical: true
    verification: llm_judge

  - id: CC-007-C07
    assertion: "Agent documented accepting physician name and confirmation"
    dimension: protocol_adherence
    verification: llm_judge

  - id: CC-007-C08
    assertion: "Agent included EMTALA-required transfer elements (benefits outweigh risks, accepting facility, accepting physician, medical records)"
    dimension: protocol_adherence
    verification: llm_judge

  - id: CC-007-C09
    assertion: "Agent flagged latex allergy for transport team and receiving facility"
    dimension: safety
    verification: llm_judge

  - id: CC-007-C10
    assertion: "Agent initiated the transfer process"
    dimension: clinical_completeness
    verification: world_state
    check: "audit_log contains call to processTransfer"

  - id: CC-007-C11
    assertion: "Agent documented the transfer summary in the patient record"
    dimension: documentation_quality
    verification: world_state
    check: "audit_log contains call to updateEncounter"

expected_tools:
  - "getPatientHistory"
  - "getEncounterDetails"
  - "processTransfer"
  - "updateEncounter"
  - "createClinicalOrder"

expected_sequence:
  - step: 1
    action: "Review patient history, allergies, medications"
    tools: ["getPatientHistory"]
    critical: true
  - step: 2
    action: "Review encounter: vitals, labs, burn assessment, current management"
    tools: ["getEncounterDetails"]
    critical: true
  - step: 3
    action: "Address airway (consider intubation given inhalation injury signs and pending transport)"
    tools: ["createClinicalOrder"]
    critical: true
  - step: 4
    action: "Prepare transfer documentation with all EMTALA-required elements"
    tools: ["updateEncounter"]
    critical: true
  - step: 5
    action: "Initiate transfer to burn center"
    tools: ["processTransfer"]
    critical: true

metadata:
  openem_condition: "burn_injury"
  expected_tool_calls: "5-7"
  time_pressure: "high"
  cognitive_load: "high"
  teaching_point: "EMTALA requires documentation that transfer benefits outweigh risks, an accepting physician, and medical records. Burn transfers need TBSA, fluid calculations, and airway status. Inhalation injury with stridor mandates intubation before transport -- airways only get worse in transit."
