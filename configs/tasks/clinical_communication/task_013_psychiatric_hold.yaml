# HEALTHCRAFT Task Definition: Psychiatric Hold
# Category: clinical_communication | Level: 3
# Agent must document involuntary psychiatric hold criteria for a patient
# who is a danger to self. Tests legal documentation and safety assessment.

id: CC-013
category: clinical_communication
level: 3
title: "Psychiatric Hold"
system_prompt_override: null

description: |
  A 22-year-old woman is brought to the ED by police after her roommate
  called 911. The roommate found a suicide note and an empty bottle of
  alprazolam on the kitchen counter. The patient admits to taking 15 tablets
  of alprazolam 1mg approximately 2 hours ago. She states she wanted to die
  and is angry that her roommate intervened. She is medically stable after
  assessment (no respiratory depression, GCS 14 -- mildly drowsy). She is
  now demanding to leave. The agent must document the criteria for an
  involuntary psychiatric hold (danger to self), complete the medical
  clearance, ensure a safe environment, and coordinate psychiatric evaluation
  while respecting the patient's dignity.

setting:
  facility: "Mercy Point Emergency Department"
  time: "2026-01-15T23:45:00Z"
  department: "Emergency Department"
  census: 38
  beds_available: 16
  attending_on_duty: "Dr. James Rivera"
  specialist_availability:
    psychiatry: "on-call, Dr. Amir Hassan, available within 1 hour"
    toxicology: "poison control available by phone"
  support_services:
    social_work: "on-call after hours"
    crisis_counselor: "on-call"
    security: "available"
    patient_advocate: "on-call"

patient:
