    spo2: 99
    temperature: 39.2
    gcs: 14
    gcs_notes: "E4V4M6 -- slightly drowsy but arousable, appropriate for post-ictal state"
  vitals_30_minutes_later:
    heart_rate: 118
    blood_pressure: "94/60"
    respiratory_rate: 22
    spo2: 99
    temperature: 38.6
    gcs: 15
    notes: "Back to baseline, interactive, playful"
  exam_findings:
    general: "Sleepy but arousable toddler, no distress. Mother in tears at bedside."
    heent: "Bilateral ear exam: left TM erythematous, bulging with loss of light reflex (acute otitis media). Right TM normal. Pharynx mildly erythematous."
    neurological: "Post-ictal initially, now alert and age-appropriate. Moves all extremities symmetrically. No focal deficits. Normal tone."
    skin: "No rash, no petechiae, no signs of meningismus"
    neck: "Supple, no nuchal rigidity"
  seizure_details:
