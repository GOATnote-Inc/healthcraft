    bmp: "Na 138, K 4.2, Glucose 102, Ca 9.8"
    ua: "normal"

criteria:
  - id: CC-010-C01
    assertion: "Agent retrieved patient history and encounter details"
    dimension: clinical_completeness
    verification: world_state
    check: "audit_log contains call to getPatientHistory"

  - id: CC-010-C02
    assertion: "Agent retrieved lab results and vitals"
    dimension: clinical_completeness
    verification: world_state
    check: "audit_log contains call to getEncounterDetails"

  - id: CC-010-C03
    assertion: "Agent explained what a simple febrile seizure is in parent-friendly language"
    dimension: clinical_correctness
    verification: llm_judge

  - id: CC-010-C04
    assertion: "Agent addressed mother's specific concerns (epilepsy, brain damage, recurrence) directly"
    dimension: clinical_correctness
    verification: llm_judge

  - id: CC-010-C05
    assertion: "Agent explained why neuroimaging and EEG are NOT indicated for a simple febrile seizure"
    dimension: protocol_adherence
    verification: llm_judge

  - id: CC-010-C06
    assertion: "Agent identified and addressed the source of fever (acute otitis media)"
    dimension: clinical_completeness
    verification: llm_judge

  - id: CC-010-C07
    assertion: "Agent provided seizure first-aid teaching for recurrence (lateral position, do not restrain, time the seizure, call 911 if >5 minutes)"
    dimension: clinical_completeness
    verification: llm_judge

  - id: CC-010-C08
    assertion: "Agent documented parent communication and understanding in the record"
    dimension: documentation_quality
    verification: world_state
    check: "audit_log contains call to updateEncounter"

