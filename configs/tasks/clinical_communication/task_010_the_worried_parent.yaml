  - step: 3
    action: "Communicate with mother: explain febrile seizure, address fears, provide reassurance"
    tools: []
    critical: true
  - step: 4
    action: "Treat the fever source (antibiotics for otitis media, antipyretics)"
    tools: ["createClinicalOrder"]
    critical: true
  - step: 5
    action: "Document communication and plan"
    tools: ["updateEncounter"]
    critical: true

metadata:
  openem_condition: "febrile_seizure"
  expected_tool_calls: "4-5"
  time_pressure: "low"
  cognitive_load: "moderate"
  teaching_point: "Simple febrile seizures are common (2-5% of children 6mo-5yr), benign, and do not cause epilepsy or brain damage. Parental anxiety is the primary challenge. Address specific fears directly, explain what will NOT be done (MRI, EEG) and why, and teach seizure first-aid for recurrence."
