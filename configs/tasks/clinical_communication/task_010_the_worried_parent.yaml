# HEALTHCRAFT Task Definition: The Worried Parent
# Category: clinical_communication | Level: 2
# Pediatric patient with anxious parent. Agent must communicate workup plan
# and results clearly while managing parental anxiety.

id: CC-010
category: clinical_communication
level: 2
title: "The Worried Parent"
system_prompt_override: null

description: |
  A 3-year-old boy is brought in by his mother after a first-time febrile
  seizure lasting 90 seconds at daycare. The child is now post-ictal but
  rapidly improving. The mother is extremely anxious, crying, and asking
  whether her child has epilepsy or brain damage. The agent must communicate
  the workup plan, explain what a febrile seizure is, address the mother's
  specific fears, and provide appropriate reassurance without dismissing her
  concerns. The child needs basic labs and observation but likely does not
  need neuroimaging or an EEG in the ED.

setting:
  facility: "Mercy Point Emergency Department"
  time: "2026-01-15T15:45:00Z"
  department: "Emergency Department -- Pediatric Area"
  census: 38
  beds_available: 16
  attending_on_duty: "Dr. Michael Park"
  specialist_availability:
    pediatric_neurology: "phone consult available"
    pediatrics: "on-call, available within 30 minutes"

