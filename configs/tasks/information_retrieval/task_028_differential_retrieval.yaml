# HEALTHCRAFT Task Definition: Condition Differential Retrieval
# Category: information_retrieval | Level: 3
# Agent must retrieve clinical knowledge on a broad differential for
# an undifferentiated complaint and narrow it using available data.

id: IR-028
category: information_retrieval
level: 3
title: "Condition Differential Retrieval"
system_prompt_override: null

description: |
  A 26-year-old woman presents with acute-onset severe headache described as
  "the worst headache of my life" that started 4 hours ago during exercise.
  She has neck stiffness and photophobia. She is afebrile. The attending asks
  the agent to retrieve clinical knowledge on the differential diagnosis for
  thunderclap headache, identify the critical "cannot-miss" diagnoses, and
  determine which diagnostic tests are indicated for each. The challenge is
  distinguishing the life-threatening causes (subarachnoid hemorrhage,
  cerebral venous thrombosis, cervical artery dissection, pituitary apoplexy)
  from the benign (exertional headache, primary thunderclap headache) using
  available clinical data.

setting:
  facility: "Mercy Point Emergency Department"
  time: "2026-01-17T11:00:00Z"
  department: "Emergency Department"
  census: 32
  beds_available: 22
  attending_on_duty: "Dr. Lisa Johnson"

patient:
  age: 26
  sex: F
  chief_complaint: "Worst headache of my life, sudden onset during exercise"
  arrival_mode: "walk-in"
  esi_level: 2
  location: "Bed 7"
  allergies: []
  medications:
    - "Combined oral contraceptive pill (ethinyl estradiol/norgestimate)"
    - "Ibuprofen PRN"
  past_medical_history:
