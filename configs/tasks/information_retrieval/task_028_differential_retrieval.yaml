  exam_findings:
    neurological: "Alert, oriented x4. Neck stiffness with flexion. Photophobia. No focal deficits. Pupils equal and reactive. Cranial nerves intact. No papilledema on fundoscopy."
    general: "In obvious distress from pain, lying in darkened room with eyes closed"
  labs:
    cbc: "WBC 9.2, Hgb 13.8, Plt 244"
    bmp: "within normal limits"
    coagulation: "PT 12.4, INR 1.0"
  imaging:
