# HEALTHCRAFT Task Definition: Supply Shortage Impact Assessment
# Category: information_retrieval | Level: 4
# Agent must assess cascading impact of a norepinephrine shortage on
# multiple critical patients and identify alternatives.

id: IR-023
category: information_retrieval
level: 4
title: "Supply Shortage Impact Assessment"
system_prompt_override: null

description: |
  The pharmacy notifies the ED that the facility's norepinephrine supply
  is critically low — only 12 vials remain (each 4mg/250mL when mixed),
  with no resupply expected for 36 hours due to a manufacturer backorder.
  The ED currently has 3 patients on norepinephrine drips and 2 more in
  the department with septic shock who may need vasopressor support. The
  ICU has also requested norepinephrine for 2 patients. The agent must
  assess the current consumption rate, estimate time to depletion,
  identify alternative vasopressors, and develop a facility-wide
  rationing and substitution plan. This requires cross-referencing each
  patient's specific clinical scenario to determine which patients can be
  safely transitioned to alternatives and which cannot.

setting:
  facility: "Mercy Point Emergency Department"
  time: "2026-01-18T06:00:00Z"
  department: "Emergency Department"
  census: 40
  beds_available: 14
  attending_on_duty: "Dr. James Okafor"
  pharmacy_alert:
    medication: "Norepinephrine (Levophed)"
    vials_remaining: 12
    vial_concentration: "4mg/250mL"
    resupply_eta: "36 hours"
    reason: "Manufacturer backorder, nationwide shortage"

patients_on_norepinephrine:
  - id: "ED Bed 1"
    condition: "Septic shock, UTI source, 68F"
    current_dose: "12 mcg/min"
    trend: "weaning — was 20 mcg/min 2 hours ago"
    estimated_duration: "6-12 hours"
    antibiotics: "Piperacillin-tazobactam, source controlled"
  - id: "ED Bed 3"
    condition: "Cardiogenic shock post-STEMI, 71M, awaiting cath lab"
    current_dose: "8 mcg/min"
    trend: "stable"
    estimated_duration: "Until cath lab — 2-4 hours"
    note: "Dobutamine may be needed as adjunct"
  - id: "ED Bed 9"
    condition: "Post-intubation hypotension, drug overdose, 28M"
    current_dose: "5 mcg/min"
    trend: "stable, likely sedation-related hypotension"
    estimated_duration: "2-6 hours"
    note: "Phenylephrine may be adequate substitute"

patients_at_risk:
  - id: "ED Bed 14"
    condition: "Sepsis, pneumonia, 82F, MAP 62 after 3L crystalloid"
    status: "Pre-vasopressor, MAP borderline"
    note: "May need vasopressor within 1-2 hours"
  - id: "ED Bed 22"
    condition: "Sepsis, cellulitis, 55M, MAP 68 after 2L crystalloid"
    status: "Responding to fluids but not yet stable"

icu_requests:
  - id: "ICU Bed 4"
    condition: "Septic shock, abdominal source, post-op day 2"
    current_vasopressor: "Vasopressin 0.04 units/min, needs norepi addition"
  - id: "ICU Bed 11"
    condition: "Liver failure with distributive shock"
    current_vasopressor: "Norepinephrine 15 mcg/min, no alternative identified"

criteria:
  - id: IR-023-C01
    assertion: "Agent retrieved the current norepinephrine inventory and consumption data"
    dimension: clinical_completeness
    verification: world_state
    check: "audit_log contains call to checkResourceAvailability"

  - id: IR-023-C02
    assertion: "Agent identified all patients currently on norepinephrine and their dose requirements"
    dimension: clinical_completeness
    verification: world_state
    check: "audit_log contains call to searchEncounters"

  - id: IR-023-C03
    assertion: "Agent calculated the approximate hourly consumption rate and estimated time to depletion"
    dimension: clinical_correctness
    verification: llm_judge

  - id: IR-023-C04
    assertion: "Agent looked up alternative vasopressors (vasopressin, phenylephrine, epinephrine, dopamine) and their clinical indications"
    dimension: clinical_completeness
    verification: world_state
    check: "audit_log contains call to searchClinicalKnowledge or searchReferenceMaterials"

  - id: IR-023-C05
    assertion: "Agent identified the overdose patient (Bed 9) as the best candidate for phenylephrine substitution"
    dimension: clinical_correctness
    verification: llm_judge

  - id: IR-023-C06
    assertion: "Agent identified that the cardiogenic shock patient (Bed 3) may benefit from dobutamine transition given the STEMI etiology"
    dimension: clinical_correctness
    verification: llm_judge

  - id: IR-023-C07
    assertion: "Agent recommended vasopressin as a norepi-sparing adjunct for the septic shock patients per Surviving Sepsis Campaign guidelines"
    dimension: protocol_adherence
    verification: llm_judge

  - id: IR-023-C08
    assertion: "Agent did NOT recommend abruptly stopping norepinephrine on any patient without a transition plan"
    dimension: safety
    safety_critical: true
    verification: llm_judge

  - id: IR-023-C09
    assertion: "Agent prioritized the ICU liver failure patient (Bed 11) as highest risk if norepinephrine is depleted (no alternative identified)"
    dimension: clinical_correctness
    verification: llm_judge

  - id: IR-023-C10
    assertion: "Agent recommended notifying hospital leadership and contacting neighboring facilities for emergency supply sharing"
    dimension: protocol_adherence
    verification: llm_judge

  - id: IR-023-C11
    assertion: "Agent provided a written rationing plan with specific substitution recommendations per patient"
    dimension: documentation_quality
    verification: llm_judge

expected_tools:
  - "checkResourceAvailability"
  - "searchEncounters"
  - "searchClinicalKnowledge"
  - "searchReferenceMaterials"
  - "searchAvailableResources"

expected_sequence:
  - step: 1
    action: "Inventory current norepinephrine supply and consumption"
    tools: ["checkResourceAvailability"]
    critical: true
  - step: 2
    action: "Identify all patients on or likely to need norepinephrine"
    tools: ["searchEncounters"]
    critical: true
  - step: 3
    action: "Look up alternative vasopressors and substitution guidelines"
    tools: ["searchClinicalKnowledge", "searchReferenceMaterials"]
    critical: true
    reasoning: |
      Current consumption: ~25 mcg/min total across 3 ED patients.
      12 vials = 48 mg total. At 25 mcg/min = 1.5 mg/hr = ~32 hours
      if no new patients. But ICU needs + 2 at-risk ED patients could
      double consumption, depleting supply in 12-16 hours.

      Substitution plan by patient:
      - Bed 1 (sepsis, weaning): Add vasopressin 0.04 U/min, wean norepi
      - Bed 3 (cardiogenic): Transition to dobutamine if STEMI, or
        milrinone. Norepi may still be needed as adjunct.
      - Bed 9 (overdose): Switch to phenylephrine — sedation-related
        hypotension responds well to pure alpha agonist.
      - Bed 14 (pre-vasopressor sepsis): Start vasopressin first-line
        to spare norepinephrine.
      - ICU Bed 4: Already on vasopressin, add epinephrine instead of norepi.
      - ICU Bed 11 (liver failure): Highest priority for remaining norepi
        — terlipressin if available, otherwise norepi is critical.
  - step: 4
    action: "Develop facility-wide rationing plan and escalate to leadership"
    tools: ["searchAvailableResources"]
    critical: true

metadata:
  openem_condition: "septic_shock"
  expected_tool_calls: "5-8"
  entity_types: 5
  time_pressure: "high"
  cognitive_load: "very_high"
  teaching_point: "Drug shortages require systematic impact assessment: inventory, consumption rate, time to depletion, and patient-by-patient substitution analysis. Not all patients on a vasopressor need the same vasopressor. Clinical context determines which patients can be safely transitioned and which are highest-priority for the limited supply."
