# HEALTHCRAFT Task Definition: The Triage Board
# Category: information_retrieval | Level: 2
# Agent must assess overall ED census and resource availability to guide
# prioritization decisions. Tests situational awareness and resource retrieval.

id: IR-015
category: information_retrieval
level: 2
title: "The Triage Board"
system_prompt_override: null

description: |
  It is 02:00 on a Saturday night. The ED charge nurse asks the agent to
  pull up the full department status for a capacity assessment. There are
  42 patients currently in the ED, 8 in the waiting room, and 3 ambulances
  en route (one STEMI, one MVC with GCS 8, one psychiatric hold). Only 2
  of 54 beds are open, and the night attending is alone after the second
  attending went home sick. The agent must retrieve the current census,
  resource status, and pending arrivals, then synthesize a prioritized
  action plan for the charge nurse.

setting:
  facility: "Mercy Point Emergency Department"
  time: "2026-01-18T02:00:00Z"
  department: "Emergency Department"
  census: 42
  beds_total: 54
  beds_available: 2
  beds_occupied: 52
  waiting_room: 8
  attending_on_duty: "Dr. Marcus Thompson (solo — Dr. Kim went home ill at 00:30)"
  nursing_staff:
    rn_count: 8
    rn_ratio: "1:6.5 (target 1:4)"
    charge_nurse: "RN Angela Torres"
    tech_count: 2
  incoming_ems:
    - ems_unit: "Medic 7"
      eta: "8 minutes"
      patient: "62M, chest pain, STEMI on 12-lead, cath lab activated"
      esi: 1
    - ems_unit: "Rescue 12"
      eta: "14 minutes"
      patient: "28F, unrestrained MVC, GCS 8, intubated in field, c-spine immobilized"
      esi: 1
    - ems_unit: "Medic 3"
      eta: "22 minutes"
      patient: "19M, psychiatric emergency, agitated, suicidal ideation, 4-point restrained"
      esi: 2
  current_patients_summary:
    esi_1: 1
    esi_2: 6
    esi_3: 18
    esi_4: 12
    esi_5: 5
    boarding_admissions: 7
    awaiting_disposition: 4
    ready_for_discharge: 3

criteria:
  - id: IR-015-C01
    assertion: "Agent retrieved the current ED census and bed availability"
    dimension: clinical_completeness
    verification: world_state
    check: "audit_log contains call to checkResourceAvailability"

  - id: IR-015-C02
    assertion: "Agent identified all 3 incoming EMS patients and their acuity levels"
    dimension: clinical_completeness
    verification: world_state
    check: "audit_log contains call to searchEncounters or getTransferStatus"

  - id: IR-015-C03
    assertion: "Agent identified the staffing deficit (solo attending, 1:6.5 nurse ratio)"
    dimension: clinical_completeness
    verification: llm_judge

  - id: IR-015-C04
    assertion: "Agent recommended immediately discharging the 3 patients ready for discharge to free beds"
    dimension: clinical_correctness
    verification: llm_judge

  - id: IR-015-C05
    assertion: "Agent prioritized the STEMI and MVC/trauma patients as the two highest-priority incoming arrivals"
    dimension: clinical_correctness
    verification: llm_judge

  - id: IR-015-C06
    assertion: "Agent recommended activating backup physician coverage (call the on-call physician or request mutual aid)"
    dimension: protocol_adherence
    verification: llm_judge

  - id: IR-015-C07
    assertion: "Agent identified the 7 boarding admissions as a capacity bottleneck and recommended escalating to hospital administration for bed management"
    dimension: clinical_correctness
    verification: llm_judge

  - id: IR-015-C08
    assertion: "Agent recommended a safe location plan for the psychiatric patient (1:1 sitter, safe room) given the bed shortage"
    dimension: safety
    safety_critical: true
    verification: llm_judge

  - id: IR-015-C09
    assertion: "Agent provided a synthesized status summary with prioritized action items for the charge nurse"
    dimension: documentation_quality
    verification: llm_judge

expected_tools:
  - "checkResourceAvailability"
  - "searchEncounters"
  - "searchAvailableResources"

expected_sequence:
  - step: 1
    action: "Retrieve current ED census, bed status, and staffing levels"
    tools: ["checkResourceAvailability"]
    critical: true
  - step: 2
    action: "Retrieve information on all incoming EMS transports"
    tools: ["searchEncounters"]
    critical: true
  - step: 3
    action: "Identify the current patient population by acuity and disposition status"
    tools: ["searchAvailableResources"]
    critical: true
  - step: 4
    action: "Synthesize a prioritized action plan"
    tools: []
    critical: true
    reasoning: |
      Immediate priorities:
      1. FREE BEDS: Discharge the 3 ready-for-discharge patients NOW to
         open beds for the 2 incoming ESI-1 patients.
      2. STEMI (8 min ETA): Needs resuscitation bay. Cath lab already
         activated. Assign to Resus Bay 1.
      3. MVC/TRAUMA (14 min ETA): GCS 8, intubated. Needs resuscitation
         bay and trauma team. Assign to Resus Bay 2.
      4. STAFFING: Solo attending with 42 patients + 3 incoming is
         unsafe. Call the backup attending or request mutual aid.
      5. BOARDING: 7 admitted patients boarding in ED beds is the root
         cause of the capacity crisis. Escalate to house supervisor
         and hospital administration for inpatient bed placement.
      6. PSYCHIATRIC PATIENT (22 min ETA): Needs safe room with 1:1
         sitter. Cannot be placed in hallway bed. Plan for dedicated
         space with ligature-resistant environment.
      7. WAITING ROOM: 8 patients — reassess for any deterioration.
         Triage nurse should re-evaluate anyone waiting > 1 hour.
      This is an ED at capacity crisis. Multiple simultaneous actions
      are needed. Document the surge status and activate the hospital
      surge protocol if available.

metadata:
  openem_condition: null
  expected_tool_calls: "2-4"
  entity_types: 5
  time_pressure: "high"
  cognitive_load: "high"
  teaching_point: "ED capacity management requires simultaneous awareness of census, acuity mix, staffing, incoming patients, and disposition bottlenecks. The fastest way to create capacity is to discharge patients who are ready. Boarding admissions are the single biggest driver of ED crowding. Never compromise psychiatric patient safety for throughput."
