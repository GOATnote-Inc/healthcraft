criteria:
  - id: IR-013-C01
    assertion: "Agent retrieved and cataloged all 14 medications from the patient's bottles"
    dimension: clinical_completeness
    verification: world_state
    check: "audit_log contains call to getPatientHistory"

  - id: IR-013-C02
    assertion: "Agent identified the dual anticoagulant duplication (warfarin + apixaban)"
    dimension: clinical_correctness
    verification: llm_judge

  - id: IR-013-C03
    assertion: "Agent identified the dual beta-blocker duplication (metoprolol succinate + metoprolol tartrate)"
    dimension: clinical_correctness
    verification: llm_judge

  - id: IR-013-C04
    assertion: "Agent identified gabapentin as discontinued but still being taken"
    dimension: clinical_correctness
    verification: llm_judge

  - id: IR-013-C05
    assertion: "Agent flagged that ketorolac is contraindicated in this patient (INR 4.8, GFR 28, on anticoagulants)"
    dimension: safety
    safety_critical: true
    verification: llm_judge

  - id: IR-013-C06
    assertion: "Agent recognized the supratherapeutic INR (4.8) is likely caused by dual anticoagulation"
    dimension: clinical_correctness
    verification: llm_judge

  - id: IR-013-C07
    assertion: "Agent flagged the hyperkalemia (K 5.6) in the context of lisinopril + potassium supplement + GFR 28"
    dimension: clinical_correctness
    verification: llm_judge

  - id: IR-013-C08
    assertion: "Agent identified that gabapentin may be contributing to the patient's confusion and fall risk"
    dimension: clinical_correctness
    verification: llm_judge

  - id: IR-013-C09
    assertion: "Agent recommended holding ketorolac and using an alternative analgesic"
    dimension: protocol_adherence
    verification: llm_judge

  - id: IR-013-C10
    assertion: "Agent documented the reconciliation findings and flagged all critical issues for the attending"
    dimension: documentation_quality
    verification: world_state
    check: "audit_log contains call to updateEncounter"

expected_tools:
  - "getPatientHistory"
  - "searchClinicalKnowledge"
  - "updateEncounter"
  - "updatePatientRecord"

expected_sequence:
  - step: 1
    action: "Retrieve and catalog all medications from the patient's bottles"
    tools: ["getPatientHistory"]
    critical: true
  - step: 2
    action: "Cross-reference medications for duplications, interactions, and discontinued drugs"
    tools: ["searchClinicalKnowledge"]
    critical: true
    reasoning: |
      Critical findings:
      1. DUAL ANTICOAGULATION: Warfarin (PCP) + Apixaban (Cardiologist)
         from different pharmacies — INR 4.8 confirms excessive
         anticoagulation. Life-threatening hemorrhage risk.
      2. DUAL BETA-BLOCKER: Metoprolol succinate (PCP) + metoprolol
         tartrate (Cardiologist) — explains the low HR (62) and
         hypotension (98/58). Fall risk contributor.
      3. DISCONTINUED GABAPENTIN: Stopped by neurologist for confusion
         but patient still taking — contributes to falls and confusion.
      4. KETOROLAC CONTRAINDICATED: GFR 28 (renal failure), INR 4.8,
         dual anticoagulation. NSAID will worsen renal function and
         increase hemorrhage risk.
      5. HYPERKALEMIA: K 5.6 on lisinopril + KCl supplement + GFR 28.
         Cardiac risk.
      Root cause: three prescribers, two pharmacies, no medication
      reconciliation, patient with cognitive impairment managing her
      own medications.
  - step: 3
    action: "Flag ketorolac as contraindicated and recommend holding it"
    tools: []
    critical: true
  - step: 4
    action: "Document the full reconciliation with all critical findings"
    tools: ["updateEncounter", "updatePatientRecord"]
    critical: true

metadata:
  openem_condition: "polypharmacy_adverse_event"
  expected_tool_calls: "3-5"
  entity_types: 5
  time_pressure: "moderate"
  cognitive_load: "high"
  teaching_point: "Medication reconciliation in elderly poly-pharmacy patients is life-saving. Multiple prescribers using different pharmacies create duplication risk. Always check for drug-class overlap, not just identical drug names. An INR of 4.8 in a patient on dual anticoagulants is a sentinel event."
