# HEALTHCRAFT Task Definition: Medication Reconciliation
# Category: information_retrieval | Level: 3
# Agent must reconcile a complex home medication list with new ED orders
# for a poly-pharmacy elderly patient. Multiple interactions and duplications.

id: IR-013
category: information_retrieval
level: 3
title: "Medication Reconciliation"
system_prompt_override: null

description: |
  A 78-year-old woman is admitted to the ED after a fall at home. She is
  confused and unable to provide a reliable medication history. Her daughter
  brings in a plastic bag containing 14 medication bottles from three
  different prescribers. Several medications overlap in drug class, two are
  duplicates from different pharmacies, and one was discontinued 6 months
  ago but never removed from her regimen. The ED team has already ordered
  IV ketorolac for pain and ondansetron for nausea. The agent must reconcile
  the complete medication list, identify dangerous interactions and
  duplications, and flag concerns before any new orders are administered.

setting:
  facility: "Mercy Point Emergency Department"
  time: "2026-01-16T11:20:00Z"
  department: "Emergency Department"
  census: 36
  beds_available: 18
  attending_on_duty: "Dr. David Patel"

patient:
  age: 78
  sex: F
  chief_complaint: "Fall at home, confusion, hip pain"
  arrival_mode: "EMS"
  esi_level: 2
