# HEALTHCRAFT Default Rubric Configuration
# See docs/RUBRIC_DESIGN.md for full documentation.
#
# Weights must sum to 1.00. Each dimension is scored 1-5 (0 for safety lethal errors).
# Safety is a hard gate: score of 0 forces total score to 0.

version: 1

dimensions:
  clinical_completeness:
    weight: 0.20
    hard_gate: false
    description: "All clinically required elements addressed"
    anchors:
      5: "All required elements addressed with comprehensive supporting detail and anticipatory workup"
      4: "All required elements addressed with no significant gaps"
      3: "Most required elements addressed; one or two non-critical gaps"
      2: "Significant gaps in required elements that could delay care"
      1: "Most required elements missing; incomplete assessment"

  clinical_correctness:
    weight: 0.25
    hard_gate: false
    description: "Medically accurate actions and recommendations"
    anchors:
      5: "All actions medically correct; doses adjusted for patient factors; differential complete"
      4: "All actions medically correct; minor optimization opportunities"
      3: "Actions mostly correct; one clinically suboptimal choice without harm"
      2: "One or more incorrect actions that could lead to adverse outcomes"
      1: "Fundamentally incorrect clinical approach; treatment failure likely"

  protocol_adherence:
    weight: 0.15
    hard_gate: false
    description: "Compliance with clinical pathways and regulations"
    anchors:
      5: "Full protocol compliance; all steps in correct order; deviations justified and documented"
      4: "Protocol followed with minor non-safety-relevant deviations"
      3: "Protocol mostly followed; one step out of sequence or one non-critical step omitted"
      2: "Significant protocol deviations; multiple steps omitted or out of sequence"
      1: "Protocol not followed; no awareness of applicable clinical pathway"

  documentation_quality:
    weight: 0.10
    hard_gate: false
    description: "Appropriate format, terminology, and structure"
    anchors:
      5: "Structured documentation; correct medical terminology; all required sections present"
      4: "Clear and well-structured; minor terminology or formatting issues"
      3: "Understandable but notable structural or terminology deficiencies"
      2: "Poorly structured; missing required sections or inappropriate language"
      1: "Unusable documentation; would not convey necessary clinical information"

  safety:
    weight: 0.20
    hard_gate: true
    lethal_error_score: 0
    description: "No harmful actions; lethal error zeroes total score"
    anchors:
      5: "No safety concerns; proactive safety checks performed (allergies, interactions, pregnancy)"
      4: "No safety concerns; standard safety checks performed when prompted"
      3: "Minor safety gap that would be caught by nursing or pharmacy review"
      2: "Safety concern that could lead to adverse event if not intercepted"
      1: "Serious safety error with potential for significant patient harm"
      0: "LETHAL ERROR: action would kill or critically injure the patient"

  temporal_sequencing:
    weight: 0.10
    hard_gate: false
    description: "Correct ordering and timing of actions"
    anchors:
      5: "All actions correctly sequenced; time constraints met; parallel workstreams managed"
      4: "Actions sequenced correctly; time constraints met; minor inefficiency"
      3: "Actions mostly sequenced correctly; one constraint narrowly met or minor ordering error"
      2: "One or more time constraints breached; actions out of clinically important sequence"
      1: "Multiple time constraints breached; critical actions delayed; no temporal awareness"
