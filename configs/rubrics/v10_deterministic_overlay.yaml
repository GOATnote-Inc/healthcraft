  against the audit log. Composes on top of v9 overlay (v10 channel applies v9 + v10 entries). Post-audit 2026-04-18: 5 entries
  removed for semantic inversion / wrong-drug match. Post-audit 2026-04-18 (round 2): 6 additional entries removed for
  qualifier loss during promotion (check drops a required qualifier from the original assertion, producing false-FAILs).'
channel_semantics: 'rubric_channel=v10: loads v9_deterministic_overlay.yaml AND this file. v10 entries override v9 entries
  on duplicate criterion_id (v10 is newer). v8/v9 channels are unaffected by this file.'
