# Emergency Medicine vocabulary for v9 audit-log matching.
#
# Purpose: let rubric checks name a *class* (e.g. "anticoagulant") and have
# the evaluator match any canonical synonym in that class against audit-log
# params. Lives alongside OpenEM and is deliberately independent of it --
# this is a matcher vocabulary, not a knowledge graph.
#
# Scope (MVP):
#   - Pharmacologic classes that appear in HEALTHCRAFT safety criteria
#     (anticoagulants, antibiotics, pressors, sedatives, paralytics, ...)
#   - Blood-product subtypes for order_type="blood_product"
#   - Forward-compatible with rxcui/SNOMED fields (null for now) -- the
#     schema slot exists so future provenance work is a schema-free upgrade.
#
# Out of scope for MVP: attributes (dose ranges, routes), SNOMED/RxNorm
# mapping, NDC codes, brand-name expansion beyond what a working ED
# physician would actually write.
#
# Maintainer: add entries by class, keep synonyms lowercase, prefer terms
# an agent or chart would actually produce. This file is consumed by
# src/healthcraft/tasks/em_vocab.py.

version: "0.1.0"

classes:

  # ---- Blood products ----
  blood_product:
