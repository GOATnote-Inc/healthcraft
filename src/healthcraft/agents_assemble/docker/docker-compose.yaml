services:
  ed-decision-rules:
    image: agents-assemble/ed-decision-rules
    build:
      context: ../../../..
      dockerfile: src/healthcraft/agents_assemble/docker/Dockerfile
    stdin_open: true
    tty: false
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    environment:
      # Optional — wire your LLM API key here to enable the LLM extractor.
      # ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      PYTHONUNBUFFERED: "1"
