# Fly.io deployment for the Agents Assemble ED Decision Rules MCP server.
#
# Builds from src/healthcraft/agents_assemble/docker/Dockerfile and serves
# the Streamable-HTTP MCP transport at https://<app>.fly.dev/mcp.
#
# Deploy from repo root:
#   fly launch --no-deploy --copy-config       # first time only — creates the app
#   fly deploy
#
# After custom domain is bound:
#   fly certs add mcp.thegoatnote.com
#   # add CNAME at GoDaddy, then verify:
#   fly certs check mcp.thegoatnote.com

app = "healthcraft-mcp"
primary_region = "iad"
kill_signal = "SIGTERM"
kill_timeout = "10s"

[build]
  dockerfile = "src/healthcraft/agents_assemble/docker/Dockerfile"

[env]
  PORT = "8080"
  PYTHONUNBUFFERED = "1"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"
    method = "GET"
    path = "/healthz"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
  cpus = 1
