services:
  world-state:
    build:
      context: ./world-state
      dockerfile: Dockerfile
    container_name: healthcraft-world-state
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: healthcraft
      POSTGRES_USER: healthcraft
      POSTGRES_PASSWORD: healthcraft_dev
    volumes:
      - world-state-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U healthcraft -d healthcraft"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  mcp-server:
    build:
      context: ..
      dockerfile: docker/mcp-server/Dockerfile
    container_name: healthcraft-mcp-server
    ports:
      - "8000:8000"
    environment:
      HEALTHCRAFT_DB_HOST: world-state
      HEALTHCRAFT_DB_PORT: "5432"
      HEALTHCRAFT_DB_NAME: healthcraft
      HEALTHCRAFT_DB_USER: healthcraft
      HEALTHCRAFT_DB_PASSWORD: healthcraft_dev
      HEALTHCRAFT_SEED: "42"
      HEALTHCRAFT_SEED_CONFIG: /app/configs/world/mercy_point_v1.yaml
      HEALTHCRAFT_LOG_LEVEL: INFO
    depends_on:
      world-state:
        condition: service_healthy
    volumes:
      - ../configs:/app/configs:ro

  task-engine:
    build:
      context: ..
      dockerfile: docker/task-engine/Dockerfile
    container_name: healthcraft-task-engine
    environment:
      HEALTHCRAFT_SEED: "42"
      HEALTHCRAFT_SEED_CONFIG: /app/configs/world/mercy_point_v1.yaml
      HEALTHCRAFT_MODEL: "simulated"
      HEALTHCRAFT_TRIALS: "5"
      HEALTHCRAFT_MCP_URL: "http://mcp-server:8000"
      HEALTHCRAFT_LOG_LEVEL: INFO
    depends_on:
      mcp-server:
        condition: service_started
    volumes:
      - eval-results:/app/results
      - ../configs:/app/configs:ro
      - ../system-prompts:/app/system-prompts:ro

volumes:
  world-state-data:
  eval-results:
